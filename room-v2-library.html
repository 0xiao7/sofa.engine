<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<title>SoFa 自習室 — 無止盡圖書館（場景預覽）</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="robots" content="noindex"/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23244658'/%3E%3Ctext x='16' y='23.5' font-size='21' font-family='Georgia,serif' font-weight='700' text-anchor='middle' fill='%23E7BBA7'%3ES%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ============================================================
   Endless Minimal Library Walk — 無止盡走路 · 安靜陪讀 · 低 UI
   room.html 場景改版 prototype（純前端假資料，未接 Supabase）
   ============================================================ */
:root{
  --paper:   #F7F3EA;
  --card:    rgba(255,253,247,.86);
  --card-solid:#FFFDF7;
  --ink:     #3D3628;
  --ink-2:   #8A7E68;
  --ink-3:   #B5AB94;
  --line:    rgba(140,120,90,.14);
  --line-2:  rgba(140,120,90,.26);
  --accent:  #5E93B8;      /* mockup 的灰藍 */
  --accent-2:#EAF2F6;
  --good:    #6FA98C;
  --serif:"Noto Serif TC",serif;
  --sans:"Noto Sans TC",system-ui,sans-serif;
  --mono:"JetBrains Mono","Courier New",monospace;
  --r-card:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100dvh;overflow:hidden;font-family:var(--sans);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;}
button{font-family:var(--sans);}

/* ── three.js canvas ── */
#stage{position:fixed;inset:0;z-index:0;}
#stage canvas{display:block;}
/* 極淡 vignette + 暖色調層：四角稍暗、畫面聚焦走道盡頭 */
#stage::after{
  content:'';position:absolute;inset:0;z-index:1;pointer-events:none;
  background:
    radial-gradient(120% 95% at 50% 44%, rgba(0,0,0,0) 54%, rgba(72,56,36,.09) 79%, rgba(58,44,28,.20) 100%),
    linear-gradient(rgba(255,216,166,.045), rgba(255,206,150,.03));
  mix-blend-mode:multiply;
}

/* ── loader ── */
#loader{
  position:fixed;inset:0;z-index:60;background:var(--paper);
  display:flex;flex-direction:column;gap:14px;align-items:center;justify-content:center;
  transition:opacity .9s ease;color:var(--ink-2);
}
#loader.off{opacity:0;pointer-events:none;}
#loader .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);animation:pulse 1.1s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(.7);opacity:.4}50%{transform:scale(1);opacity:1}}
#loader .msg{font-size:.85rem;letter-spacing:.14em;font-family:var(--serif);}

/* ── 頂欄 ── */
#topbar{
  position:fixed;top:14px;left:16px;right:16px;z-index:20;
  display:flex;align-items:center;justify-content:space-between;gap:10px;pointer-events:none;
}
.bar-chunk{
  display:flex;align-items:center;gap:8px;pointer-events:auto;
  background:var(--card);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--line);border-radius:999px;
  box-shadow:0 4px 18px rgba(90,70,40,.08);
  padding:8px 14px;
}
.brand{display:flex;align-items:center;gap:9px;font-family:var(--serif);font-weight:700;font-size:.98rem;letter-spacing:.02em;}
.brand .mark{width:26px;height:26px;border-radius:50%;background:var(--accent-2);display:flex;align-items:center;justify-content:center;color:var(--accent);}
.brand .mark svg{width:15px;height:15px;}
.brand .sep{width:1px;height:16px;background:var(--line-2);margin:0 3px;}
.brand .who{font-family:var(--sans);font-weight:500;font-size:.8rem;color:var(--ink-2);letter-spacing:.01em;}
.brand .who b{color:var(--accent);font-weight:600;}
#topbar .right{display:flex;gap:8px;pointer-events:auto;}
.pill-btn{
  display:flex;align-items:center;gap:6px;border:1px solid var(--line);cursor:pointer;
  background:var(--card);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-radius:999px;padding:8px 14px;font-size:.8rem;color:var(--ink);font-weight:500;
  box-shadow:0 4px 18px rgba(90,70,40,.08);transition:background .2s,transform .12s;
}
.pill-btn:hover{background:var(--card-solid);}
.pill-btn:active{transform:scale(.97);}
.pill-btn svg{width:14px;height:14px;color:var(--ink-2);}
.pill-btn.static{cursor:default;}
.pill-btn.static:active{transform:none;}

/* ── 右側卡片欄（桌面） ── */
#side{
  position:fixed;right:16px;top:72px;bottom:16px;z-index:15;width:250px;
  display:flex;flex-direction:column;gap:10px;overflow:hidden auto;scrollbar-width:none;
}
#side::-webkit-scrollbar{display:none;}
.card{
  background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--line);border-radius:var(--r-card);
  box-shadow:0 6px 24px rgba(90,70,40,.09);
  padding:13px 15px;flex-shrink:0;
}
.card-head{display:flex;align-items:center;gap:8px;font-size:.84rem;font-weight:600;color:var(--ink);}
.card-head svg{width:15px;height:15px;color:var(--ink-2);}
.card-sub{font-size:.7rem;color:var(--ink-2);margin-top:4px;line-height:1.5;}

/* 在線名單 */
#list-rows{margin-top:9px;display:flex;flex-direction:column;gap:2px;max-height:236px;overflow:hidden auto;scrollbar-width:none;}
#list-rows::-webkit-scrollbar{display:none;}
.u-row{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:10px;font-size:.76rem;}
.u-row.me{background:rgba(94,147,184,.10);}
.u-row .ava{
  width:24px;height:24px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:.62rem;font-weight:600;
}
.u-row .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink);}
.u-row .tm{font-size:.68rem;color:var(--ink-2);font-family:var(--mono);letter-spacing:-.02em;}
.list-more{
  margin-top:7px;width:100%;display:flex;align-items:center;justify-content:space-between;
  background:none;border:none;border-top:1px solid var(--line);padding:9px 6px 2px;cursor:pointer;
  font-size:.72rem;color:var(--ink-2);
}
.list-more:hover{color:var(--accent);}

/* 番茄鐘 */
.pom-row{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
.pom-time{font-family:var(--mono);font-size:1.72rem;font-weight:600;color:var(--ink);letter-spacing:.01em;font-variant-numeric:tabular-nums;}
.pom-play{
  width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;
  background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(94,147,184,.35);transition:transform .12s,background .2s;
}
.pom-play:hover{background:#4F83A8;}
.pom-play:active{transform:scale(.94);}
.pom-play svg{width:15px;height:15px;}
.pom-state{font-size:.68rem;color:var(--ink-2);margin-top:4px;min-height:1em;}

/* 喊話 */
.shout-row{display:flex;gap:6px;margin-top:9px;}
.shout-input{
  flex:1;min-width:0;border:1px solid var(--line-2);border-radius:11px;background:rgba(255,255,255,.7);
  padding:8px 11px;font-size:.76rem;font-family:var(--sans);color:var(--ink);outline:none;
}
.shout-input:focus{border-color:var(--accent);}
.shout-input::placeholder{color:var(--ink-3);}
.shout-send{
  width:36px;height:34px;flex-shrink:0;border:none;border-radius:11px;cursor:pointer;
  background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;
  transition:opacity .2s;font-size:.66rem;font-family:var(--mono);
}
.shout-send:disabled{background:var(--ink-3);cursor:default;}
.shout-send svg{width:14px;height:14px;}

/* 今日記錄 */
.note-open{
  width:100%;display:flex;align-items:center;justify-content:space-between;margin-top:8px;
  background:none;border:none;cursor:pointer;font-size:.74rem;color:var(--ink-2);padding:2px 2px 0;
}
.note-open:hover{color:var(--accent);}

/* ── 喊話 banner ── */
#banner{
  position:fixed;top:66px;left:50%;transform:translate(-50%,-12px);z-index:30;
  background:rgba(61,54,40,.88);color:#F6F1E4;border-radius:999px;
  padding:8px 18px;font-size:.8rem;max-width:min(80vw,480px);
  opacity:0;transition:opacity .4s,transform .4s;pointer-events:none;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#banner.on{opacity:1;transform:translate(-50%,0);}
#banner b{color:#FFD9A8;font-weight:600;margin-right:6px;}

/* ── 左下提示 ── */
#hint{
  position:fixed;left:18px;bottom:18px;z-index:15;
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  padding:9px 14px;font-size:.72rem;color:var(--ink-2);letter-spacing:.06em;
  display:flex;align-items:center;gap:8px;
  transition:opacity 1.2s ease;font-family:var(--serif);
}
#hint.off{opacity:0;pointer-events:none;}
#hint .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);}

/* ── 記錄 modal / sheet ── */
#overlay{position:fixed;inset:0;z-index:40;background:rgba(50,42,28,.28);opacity:0;pointer-events:none;transition:opacity .3s;}
#overlay.on{opacity:1;pointer-events:auto;}
#note-modal{
  position:fixed;z-index:41;left:50%;top:50%;transform:translate(-50%,-46%) scale(.97);
  width:min(400px,92vw);background:var(--card-solid);border:1px solid var(--line);
  border-radius:20px;box-shadow:0 24px 70px rgba(60,45,20,.25);padding:20px;
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;
}
#note-modal.on{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1);}
#note-modal h3{font-family:var(--serif);font-size:.95rem;margin-bottom:4px;}
#note-modal .tip{font-size:.7rem;color:var(--ink-2);margin-bottom:12px;}
#note-ta{
  width:100%;height:120px;resize:none;border:1px solid var(--line-2);border-radius:12px;
  background:rgba(255,255,255,.8);padding:10px 12px;font-size:.8rem;font-family:var(--sans);
  color:var(--ink);outline:none;line-height:1.7;
}
#note-ta:focus{border-color:var(--accent);}
#note-modal .foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;}
#note-cnt{font-size:.7rem;color:var(--ink-2);font-family:var(--mono);}
#note-save{
  border:none;background:var(--accent);color:#fff;border-radius:999px;
  padding:8px 20px;font-size:.78rem;font-weight:500;cursor:pointer;transition:background .2s;
}
#note-save:hover{background:#4F83A8;}
#note-saved-msg{font-size:.7rem;color:var(--good);opacity:0;transition:opacity .4s;margin-right:auto;padding-left:2px;}

/* ── 鎖定（低 UI 專注模式） ── */
body.locked #side,body.locked #hint,body.locked #mob-bar,body.locked #mob-pom{opacity:0;pointer-events:none;}
#side,#hint,#mob-bar,#mob-pom{transition:opacity .5s;}

/* ══════════ Mobile ══════════ */
#mob-pom,#mob-bar,#sheet{display:none;}

@media (max-width:760px){
  #side,#hint{display:none;}
  #topbar{top:10px;left:10px;right:10px;}
  .brand .sep,.brand .who{display:none;}
  #btn-lock span,#btn-leave span{display:none;}
  .pill-btn{padding:8px 11px;}

  /* 浮動番茄鐘 pill */
  #mob-pom{
    display:flex;position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:18;
    align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-radius:999px;padding:7px 8px 7px 16px;box-shadow:0 6px 22px rgba(90,70,40,.12);
  }
  #mob-pom .lab{font-size:.62rem;color:var(--ink-2);letter-spacing:.08em;}
  #mob-pom .t{font-family:var(--mono);font-size:1.05rem;font-weight:600;font-variant-numeric:tabular-nums;}
  #mob-pom .pom-play{width:32px;height:32px;}
  #mob-pom .pom-play svg{width:12px;height:12px;}

  /* 底部導航 */
  #mob-bar{
    display:flex;position:fixed;left:14px;right:14px;bottom:calc(12px + env(safe-area-inset-bottom));
    z-index:22;gap:10px;justify-content:center;
  }
  .mob-btn{
    flex:1;max-width:86px;display:flex;flex-direction:column;align-items:center;gap:4px;
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    padding:11px 4px 9px;cursor:pointer;color:var(--ink);
    box-shadow:0 6px 22px rgba(90,70,40,.10);transition:transform .12s,background .2s;
  }
  .mob-btn:active{transform:scale(.95);}
  .mob-btn svg{width:17px;height:17px;color:var(--ink-2);}
  .mob-btn .lb{font-size:.64rem;font-weight:500;font-variant-numeric:tabular-nums;}
  .mob-btn.act{background:var(--accent-2);border-color:rgba(94,147,184,.4);}
  .mob-btn.act svg{color:var(--accent);}

  /* bottom sheet */
  #sheet{
    display:block;position:fixed;left:0;right:0;bottom:0;z-index:45;
    background:var(--card-solid);border-radius:22px 22px 0 0;
    box-shadow:0 -14px 50px rgba(60,45,20,.22);
    transform:translateY(105%);transition:transform .32s cubic-bezier(.32,.72,0,1);
    padding:10px 20px calc(20px + env(safe-area-inset-bottom));max-height:72dvh;overflow:hidden auto;
  }
  #sheet.on{transform:translateY(0);}
  #sheet .grab{width:40px;height:4px;border-radius:2px;background:var(--line-2);margin:2px auto 14px;}
  .sheet-pane{display:none;}
  .sheet-pane.on{display:block;}
  .sheet-title{font-family:var(--serif);font-size:.95rem;font-weight:700;margin-bottom:4px;}
  .sheet-sub{font-size:.72rem;color:var(--ink-2);margin-bottom:12px;}
  .seg-tabs{display:flex;gap:6px;margin-bottom:12px;}
  .seg-tab{
    flex:1;border:1px solid var(--line-2);background:none;border-radius:999px;
    padding:7px 4px;font-size:.72rem;color:var(--ink-2);cursor:pointer;
  }
  .seg-tab.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  #m-list-rows{display:flex;flex-direction:column;gap:2px;}
  #m-list-rows .u-row{font-size:.82rem;padding:7px 6px;}
  #m-list-rows .u-row .ava{width:28px;height:28px;font-size:.68rem;}
  #m-list-rows .u-row .tm{font-size:.74rem;}
  /* sheet 內番茄鐘 */
  .sheet-pom-row{display:flex;align-items:center;justify-content:space-between;padding:6px 4px;}
  .sheet-pom-row .pom-time{font-size:2.2rem;}
  .sheet-pom-row .pom-play{width:48px;height:48px;}
  /* sheet 喊話 / 記錄 */
  #m-shout-input{height:auto;}
  #m-note-ta{
    width:100%;height:110px;resize:none;border:1px solid var(--line-2);border-radius:12px;
    background:rgba(255,255,255,.8);padding:10px 12px;font-size:.85rem;font-family:var(--sans);
    color:var(--ink);outline:none;line-height:1.7;
  }
  #note-modal{display:none;}
}
</style>
</head>
<body>

<div id="stage"></div>

<!-- loader -->
<div id="loader">
  <div class="dot"></div>
  <div class="msg">整理書架中⋯</div>
</div>

<!-- 頂欄 -->
<div id="topbar">
  <div class="bar-chunk brand">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21c-4.5-2.5-8-6.5-8-11a8 8 0 0 1 16 0c0 4.5-3.5 8.5-8 11z" fill="currentColor" stroke="none" opacity=".18"/><path d="M12 3v18M12 8c2-2 5-2.5 7-2M12 13c-2-2-5-2.5-7-2"/></svg>
    </div>
    <span>SoFa 自習室</span>
    <span class="sep"></span>
    <span class="who">登入 <b>fayytest</b></span>
  </div>
  <div class="right">
    <div class="pill-btn static" id="count-pill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="8" r="3.4"/><path d="M3.5 19c.6-3.2 2.9-5 5.5-5s4.9 1.8 5.5 5"/><circle cx="16.5" cy="9" r="2.6"/><path d="M16 14.2c2.3.2 4 1.8 4.5 4.3"/></svg>
      <span id="count-txt">20 人在場</span>
    </div>
    <button class="pill-btn" id="btn-lock">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="5" y="11" width="14" height="9" rx="2.5"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
      <span>鎖定</span>
    </button>
    <button class="pill-btn" id="btn-leave">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4h-7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h7"/><path d="M10 12h10M17 9l3 3-3 3"/></svg>
      <span>離開</span>
    </button>
  </div>
</div>

<!-- 右側卡片欄 -->
<div id="side">
  <div class="card">
    <div class="card-head">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="8" r="3.4"/><path d="M3.5 19c.6-3.2 2.9-5 5.5-5s4.9 1.8 5.5 5"/><circle cx="16.5" cy="9" r="2.6"/><path d="M16 14.2c2.3.2 4 1.8 4.5 4.3"/></svg>
      在線名單
    </div>
    <div class="card-sub">顯示最久 19 名＋自己<br/>其他人在列表</div>
    <div id="list-rows"></div>
    <button class="list-more" id="list-more">
      <span>查看其他人（列表）</span><span>›</span>
    </button>
  </div>

  <div class="card">
    <div class="card-head">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="13" r="8"/><path d="M12 9.5V13l2.4 2M10 2.5h4"/></svg>
      番茄鐘
    </div>
    <div class="pom-row">
      <div class="pom-time" id="pom-time">25:00</div>
      <button class="pom-play" id="pom-play" aria-label="開始">
        <svg viewBox="0 0 24 24" fill="currentColor" id="pom-ico"><path d="M8 5.5v13l11-6.5z"/></svg>
      </button>
    </div>
    <div class="pom-state" id="pom-state">25 分鐘專注 → 5 分鐘休息</div>
  </div>

  <div class="card">
    <div class="card-head">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11.5a7.5 7.5 0 0 1-11 6.6L4 19.5l1.5-4.4A7.5 7.5 0 1 1 20 11.5z"/></svg>
      喊話
    </div>
    <div class="shout-row">
      <input class="shout-input" id="shout-input" placeholder="輸入內容⋯（30 秒冷卻）" maxlength="40"/>
      <button class="shout-send" id="shout-send" aria-label="送出">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 3 10.5 13.5M21 3l-7 18-3.5-7.5L3 10z"/></svg>
      </button>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h10l3 3v15H6z"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>
      今日記錄
    </div>
    <button class="note-open" id="note-open">
      <span id="note-count">已儲存 0 / 200</span><span>›</span>
    </button>
  </div>
</div>

<!-- 喊話 banner -->
<div id="banner"><b id="banner-who"></b><span id="banner-msg"></span></div>

<!-- 左下提示 -->
<div id="hint"><span class="dot"></span>無止盡走路 · 安靜陪讀 · V 切換視角</div>

<!-- 記錄 modal（桌面） -->
<div id="overlay"></div>
<div id="note-modal">

    <span class="lb" id="m-bar-pom">25:00</span>

  <button class="mob-btn" data-pane="shout">

  <div class="sheet-pane" data-pane="list">

    <div class="sheet-sub">場景顯示最久 19 名＋自己，其餘同學都在列表。</div>

<script>

   假資料 & UI 邏輯（之後接 Supabase presence 時替換這一段）
   ════════════════════════════════════════════════════════════ */
const USERS = [
  { n:'你（fayytest）', min:208, me:true },
  { n:'晨曦',   min:187 }, { n:'小光',   min:168 }, { n:'專注熊', min:152 },
  { n:'靜靜讀書',min:141 }, { n:'阿布',   min:135 }, { n:'貓貓',   min:128 },
  { n:'Chloe',  min:117 }, { n:'草莓',   min:104 }, { n:'Kai',    min:98  },
  { n:'呱呱',   min:91  }, { n:'小白',   min:83  }, { n:'Nora',   min:75  },
  { n:'布丁',   min:66  }, { n:'嘿嘿',   min:58  }, { n:'Iris',   min:47  },
  { n:'烤地瓜', min:39  }, { n:'Evan',   min:26  }, { n:'語晴',   min:18  },
  { n:'Yoyo',   min:7   },
];
const AVA_COLORS = ['#8FB4CC','#D3A791','#A6BE92','#C8B285','#AC9DC4','#CC9AA5','#8FBCAF','#C2AE86'];
const fmtMin = m => `${Math.floor(m/60)}時${String(m%60).padStart(2,'0')}分`;

function userRow(u,i){
  const row = document.createElement('div');
  row.className = 'u-row' + (u.me ? ' me' : '');
  const c = AVA_COLORS[i % AVA_COLORS.length];
  row.innerHTML = `<span class="ava" style="background:${c}">${u.n.replace(/（.*/,'').slice(0,1)}</span>
    <span class="nm">${u.n}</span><span class="tm">${fmtMin(u.min)}</span>`;
  return row;
}
function renderLists(){
  const rows = document.getElementById('list-rows');
  rows.textContent = '';
  const n = listExpanded ? USERS.length : 6;
  USERS.slice(0,n).forEach((u,i)=>rows.appendChild(userRow(u,i)));
  document.querySelector('#list-more span').textContent = listExpanded ? '收合' : '查看其他人（列表）';
  // mobile
  const mrows = document.getElementById('m-list-rows');
  mrows.textContent = '';
  const src = mobTab === 'top' ? USERS.slice(0,20) : USERS.slice(20);
  if (!src.length) mrows.innerHTML = '<div style="font-size:.76rem;color:var(--ink-2);padding:14px 4px;">目前大家都在場景裡 ☺</div>';
  src.forEach((u,i)=>mrows.appendChild(userRow(u,i)));
  document.getElementById('count-txt').textContent = `${USERS.length} 人在場`;
}
let listExpanded = false, mobTab = 'top';
document.getElementById('list-more').addEventListener('click',()=>{listExpanded=!listExpanded;renderLists();});
document.querySelectorAll('.seg-tab').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.seg-tab').forEach(x=>x.classList.toggle('on',x===b));
  mobTab = b.dataset.tab; renderLists();
}));
renderLists();
// 自己的時數每分鐘 +1（陪讀感）
setInterval(()=>{ USERS[0].min++; renderLists(); }, 60000);

/* ── 番茄鐘（focus 25 → break 5，同步三個顯示點） ── */
const POM_FOCUS = 25*60, POM_BREAK = 5*60;
const pom = { remaining: POM_FOCUS, running: false, mode: 'focus', timer: null };
const PLAY = '<path d="M8 5.5v13l11-6.5z"/>', PAUSE = '<path d="M7.5 5.5h3.4v13H7.5zM13.1 5.5h3.4v13h-3.4z"/>';
function pomRender(){
  const t = `${String(Math.floor(pom.remaining/60)).padStart(2,'0')}:${String(pom.remaining%60).padStart(2,'0')}`;
  for (const id of ['pom-time','m-pom-time','s-pom-time']) document.getElementById(id).textContent = t;
  document.getElementById('m-bar-pom').textContent = t;
  for (const id of ['pom-ico','m-pom-ico','s-pom-ico']) document.getElementById(id).innerHTML = pom.running ? PAUSE : PLAY;
  document.getElementById('pom-state').textContent =
    pom.running ? (pom.mode==='focus' ? '專注中 — 大家陪你一起讀' : '休息中 — 站起來走走 🍵')
                : '25 分鐘專注 → 5 分鐘休息';
}
function pomToggle(){
  pom.running = !pom.running;
  clearInterval(pom.timer);
  if (pom.running) pom.timer = setInterval(()=>{
    if (--pom.remaining <= 0){
      if (pom.mode === 'focus'){ pom.mode='break'; pom.remaining=POM_BREAK; showBanner('番茄鐘','25 分鐘完成！休息 5 分鐘 🍵'); }
      else { pom.mode='focus'; pom.remaining=POM_FOCUS; pom.running=false; clearInterval(pom.timer); showBanner('番茄鐘','休息結束，準備下一輪'); }
    }
    pomRender();
  },1000);
  pomRender();
}
for (const id of ['pom-play','m-pom-play','s-pom-play']) document.getElementById(id).addEventListener('click',pomToggle);
pomRender();

/* ── 喊話（30 秒冷卻） ── */
let shoutCd = 0, shoutCdTimer = null, bannerTimer = null;
function showBanner(who,msg){
  document.getElementById('banner-who').textContent = who;
  document.getElementById('banner-msg').textContent = msg;
  const b = document.getElementById('banner');
  b.classList.add('on');
  clearTimeout(bannerTimer);
  bannerTimer = setTimeout(()=>b.classList.remove('on'), 5000);
}
function sendShout(inputId){
  const inp = document.getElementById(inputId);
  const msg = inp.value.trim();
  if (!msg || shoutCd > 0) return;
  showBanner('fayytest', msg);
  inp.value = '';
  shoutCd = 30;
  const btns = [document.getElementById('shout-send'), document.getElementById('m-shout-send')];
  const tick = ()=>{
    btns.forEach(b=>{ b.disabled = shoutCd>0; b.textContent='';
      if (shoutCd>0) b.textContent = shoutCd;
      else b.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 3 10.5 13.5M21 3l-7 18-3.5-7.5L3 10z"/></svg>';
    });
    if (shoutCd-- <= 0) clearInterval(shoutCdTimer);
  };
  clearInterval(shoutCdTimer); tick();
  shoutCdTimer = setInterval(tick, 1000);
}
document.getElementById('shout-send').addEventListener('click',()=>sendShout('shout-input'));
document.getElementById('shout-input').addEventListener('keydown',e=>{ if(e.key==='Enter') sendShout('shout-input'); });
document.getElementById('m-shout-send').addEventListener('click',()=>{sendShout('m-shout-input'); closeSheet();});
// 環境喊話：偶爾有人說句話，比較有人氣
const AMBIENT = [
  ['晨曦','先讀 25 分鐘，衝'],['專注熊','民法 §184 看第三遍了'],['小光','今天目標三章'],
  ['靜靜讀書','加油，還有一小時下課'],['阿布','喝口水再繼續'],['貓貓','這題終於懂了！'],
];
(function ambientLoop(){
  setTimeout(()=>{
    const [w,m] = AMBIENT[Math.floor(Math.random()*AMBIENT.length)];
    showBanner(w,m); ambientLoop();
  }, 45000 + Math.random()*45000);
})();

/* ── 今日記錄（localStorage） ── */
const NOTE_KEY = 'sofa-v2-note-' + new Date().toISOString().slice(0,10);
function noteLoad(){ return localStorage.getItem(NOTE_KEY) || ''; }
function noteCountRender(){
  const v = noteLoad();
  document.getElementById('note-count').textContent = `已儲存 ${v.length} / 200`;
  document.getElementById('m-note-count').textContent = `已儲存 ${v.length} / 200`;
}
noteCountRender();
const overlay = document.getElementById('overlay');
document.getElementById('note-open').addEventListener('click',()=>{
  document.getElementById('note-ta').value = noteLoad();
  document.getElementById('note-cnt').textContent = `${noteLoad().length} / 200`;
  overlay.classList.add('on');
  document.getElementById('note-modal').classList.add('on');
});
document.getElementById('note-ta').addEventListener('input',e=>{
  document.getElementById('note-cnt').textContent = `${e.target.value.length} / 200`;
});
document.getElementById('note-save').addEventListener('click',()=>{
  localStorage.setItem(NOTE_KEY, document.getElementById('note-ta').value);
  noteCountRender();
  const m = document.getElementById('note-saved-msg');
  m.style.opacity = 1; setTimeout(()=>m.style.opacity=0, 1800);
});
document.getElementById('m-note-save').addEventListener('click',()=>{
  localStorage.setItem(NOTE_KEY, document.getElementById('m-note-ta').value);
  noteCountRender(); closeSheet();
});
function closeModal(){ overlay.classList.remove('on'); document.getElementById('note-modal').classList.remove('on'); closeSheet(); }
overlay.addEventListener('click', closeModal);

/* ── 手機 bottom sheet ── */
const sheet = document.getElementById('sheet');
function openSheet(pane){
  document.querySelectorAll('.sheet-pane').forEach(p=>p.classList.toggle('on', p.dataset.pane===pane));
  document.querySelectorAll('.mob-btn').forEach(b=>b.classList.toggle('act', b.dataset.pane===pane));
  if (pane==='note') document.getElementById('m-note-ta').value = noteLoad();
  sheet.classList.add('on'); overlay.classList.add('on');
}
function closeSheet(){
  sheet.classList.remove('on');
  overlay.classList.remove('on');
  document.querySelectorAll('.mob-btn').forEach(b=>b.classList.remove('act'));
}
document.querySelectorAll('.mob-btn').forEach(b=>b.addEventListener('click',()=>{
  if (sheet.classList.contains('on') && b.classList.contains('act')) closeSheet();
  else openSheet(b.dataset.pane);
}));

/* ── 鎖定 = 低 UI 專注模式；離開 = 預覽提示 ── */
document.getElementById('btn-lock').addEventListener('click',function(){
  document.body.classList.toggle('locked');
  const on = document.body.classList.contains('locked');
  this.querySelector('span') && (this.querySelector('span').textContent = on ? '解除' : '鎖定');
  showBanner('專注模式', on ? '介面已收起，安靜讀書' : '介面已恢復');
});
document.getElementById('btn-leave').addEventListener('click',()=>showBanner('預覽','此頁為場景 prototype，離開功能之後接回自習室'));

/* 提示自動淡出 */
setTimeout(()=>document.getElementById('hint').classList.add('off'), 9000);

/* ════════════════════════════════════════════════════════════
   three.js — 無止盡圖書館走廊
   主角原地走路（Walk_Loop），世界往鏡頭方向流動，段落循環回收
   ════════════════════════════════════════════════════════════ */
const SEG_LEN = 16, NUM_SEG = 6, HALL_W = 11, CEIL_H = 6.6;
const WALK_SPEED = 1.15;               // m/s，悠閒步伐
const FOG_COLOR = 0xF8F5EC;           // 亮暖白：遠端走廊像發光

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.18;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('stage').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(FOG_COLOR);
scene.fog = new THREE.Fog(FOG_COLOR, 14, 60);

const camera = new THREE.PerspectiveCamera(48, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 1.55, 3.2);   // 第一視角，眼睛高度

/* 光：柔和天光 + 從左側窗戶進來的暖陽 */
scene.add(new THREE.HemisphereLight(0xFFFFFF, 0xEEE6D8, 1.30));
const sun = new THREE.DirectionalLight(0xFFF4DC, 1.2);
sun.position.set(-9, 11, -3);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -18; sun.shadow.camera.right = 18;
sun.shadow.camera.top = 18;   sun.shadow.camera.bottom = -18;
sun.shadow.camera.far = 50;
sun.shadow.bias = -0.0004;
sun.shadow.radius = 4;        // 影子柔化
scene.add(sun);
scene.add(sun.target);

/* ── 材質 ── */
function woodFloorTexture(){
  // 蜜糖色橡木：板間色差 + 立體漸層 + 木紋 + 節眼，對齊 mockup 的暖木地板
  const S = 1024;
  const c = document.createElement('canvas'); c.width = c.height = S;
  const g = c.getContext('2d');
  const rnd = (s => () => (s = (s*1664525 + 1013904223) >>> 0) / 4294967296)(7);
  const NP = 10, PW = S/NP;
  const tones = ['#EBD9B2','#E4D0A6','#EFDFBC','#E0CA9C','#E9D6AC','#E2CEA2','#F1E1C0','#E5D1A4','#ECDAB4','#DFC898'];
  for (let i=0;i<NP;i++){
    const x0 = i*PW;
    g.fillStyle = tones[i%tones.length];
    g.fillRect(x0,0,PW,S);
    // 橫向漸層：板緣壓深、受光面提亮，讓每塊板有圓潤立體感
    const lg = g.createLinearGradient(x0,0,x0+PW,0);
    lg.addColorStop(0,   'rgba(115,76,32,.10)');
    lg.addColorStop(0.14,'rgba(255,240,210,.08)');
    lg.addColorStop(0.82,'rgba(255,240,210,.03)');
    lg.addColorStop(1,   'rgba(105,68,28,.11)');
    g.fillStyle = lg; g.fillRect(x0,0,PW,S);
    // 木紋長曲線
    for (let k=0;k<7;k++){
      const gx = x0 + 8 + rnd()*(PW-16);
      g.strokeStyle = `rgba(150,106,54,${(0.05 + rnd()*0.08).toFixed(3)})`;
      g.lineWidth = 1 + rnd()*1.8;
      g.beginPath();
      g.moveTo(gx, -12);
      g.bezierCurveTo(gx+(rnd()-0.5)*20, S*0.3, gx+(rnd()-0.5)*20, S*0.7, gx+(rnd()-0.5)*14, S+12);
      g.stroke();
    }
    // 節眼（偶爾）
    if (rnd() < 0.55){
      const kx = x0 + PW*(0.3 + rnd()*0.4), ky = rnd()*S, kr = 6 + rnd()*7;
      const rg = g.createRadialGradient(kx,ky,1,kx,ky,kr);
      rg.addColorStop(0,'rgba(126,88,44,.3)');
      rg.addColorStop(1,'rgba(118,76,34,0)');
      g.fillStyle = rg;
      g.beginPath(); g.arc(kx,ky,kr*2,0,Math.PI*2); g.fill();
    }
    // 板間直縫（深 + 一絲亮邊）
    g.fillStyle = 'rgba(110,78,40,.20)';
    g.fillRect(x0,0,3,S);
    g.fillStyle = 'rgba(255,242,214,.10)';
    g.fillRect(x0+3,0,2,S);
    // 橫向接縫（錯位）
    for (let s2=0;s2<2;s2++){
      const sy = (i*397 + s2*512) % S;
      g.fillStyle = 'rgba(96,64,28,.28)';
      g.fillRect(x0, sy, PW, 3);
      g.fillStyle = 'rgba(255,238,205,.12)';
      g.fillRect(x0, sy+3, PW, 2);
    }
  }
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.colorSpace = THREE.SRGBColorSpace;
  t.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
  t.repeat.set(2.6, 3.4);
  return t;
}
function windowSkyTexture(){
  // 窗景：上緣淡天藍 → 下緣暖白，加非常淡的綠色圓斑暗示窗外樹影
  const c = document.createElement('canvas'); c.width = 256; c.height = 512;
  const g = c.getContext('2d');
  const grad = g.createLinearGradient(0,0,0,512);
  grad.addColorStop(0,   '#BFDCEE');
  grad.addColorStop(0.45,'#E9F2F3');
  grad.addColorStop(1,   '#FFF8E9');
  g.fillStyle = grad; g.fillRect(0,0,256,512);
  const rnd = (s => () => (s = (s*1664525 + 1013904223) >>> 0) / 4294967296)(11);
  // 遠方小屋（很淡）
  for (let i=0;i<3;i++){
    const hx = 30 + rnd()*180, hw = 26 + rnd()*22, hy = 322 - rnd()*16;
    g.fillStyle = 'rgba(226,214,196,.55)'; g.fillRect(hx, hy, hw, 34);
    g.fillStyle = 'rgba(188,166,142,.5)';
    g.beginPath(); g.moveTo(hx-3, hy); g.lineTo(hx+hw/2, hy-16); g.lineTo(hx+hw+3, hy); g.fill();
  }
  // 樹冠帶（中下段一整排綠意）
  for (let i=0;i<16;i++){
    const x = rnd()*256, y = 330 + rnd()*80, r = 30 + rnd()*44;
    const rg = g.createRadialGradient(x,y,0,x,y,r);
    rg.addColorStop(0,'rgba(138,178,128,.34)');
    rg.addColorStop(1,'rgba(138,178,128,0)');
    g.fillStyle = rg;
    g.beginPath(); g.arc(x,y,r,0,Math.PI*2); g.fill();
  }
  // 高處零星樹影
  for (let i=0;i<8;i++){
    const x = rnd()*256, y = 140 + rnd()*160, r = 20 + rnd()*30;
    const rg = g.createRadialGradient(x,y,0,x,y,r);
    rg.addColorStop(0,'rgba(148,188,138,.14)');
    rg.addColorStop(1,'rgba(148,188,138,0)');
    g.fillStyle = rg;

function normalize(obj, targetH){
  const box = new THREE.Box3().setFromObject(obj);
  const size = box.getSize(new THREE.Vector3());
  const s = targetH / (size.y || 1);
  obj.scale.setScalar(s);
  // 重新計算，讓底部貼地、水平置中
  const b2 = new THREE.Box3().setFromObject(obj);
  const ctr = b2.getCenter(new THREE.Vector3());
  obj.position.x -= ctr.x;
  obj.position.z -= ctr.z;
  obj.position.y -= b2.min.y;
  const wrap = new THREE.Group();
  wrap.add(obj);
  return wrap;
}

function beamTexture(){
  const c = document.createElement('canvas'); c.width = 128; c.height = 256;
  const g = c.getContext('2d');
  const h = g.createLinearGradient(0,0,128,0);       // 橫向：兩側淡出
  h.addColorStop(0,  'rgba(255,253,240,0)');
  h.addColorStop(0.5,'rgba(255,253,240,1)');
  h.addColorStop(1,  'rgba(255,253,240,0)');
  g.fillStyle = h; g.fillRect(0,0,128,256);
  g.globalCompositeOperation = 'destination-out';    // 縱向：往地板淡出
  const v = g.createLinearGradient(0,0,0,256);
  v.addColorStop(0,   'rgba(0,0,0,0)');
  v.addColorStop(0.6, 'rgba(0,0,0,.25)');
  v.addColorStop(1,   'rgba(0,0,0,.9)');
  g.fillStyle = v; g.fillRect(0,0,128,256);
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

  // 攤開的書
  const bookL = new THREE.Mesh(new THREE.BoxGeometry(0.17,0.015,0.24), MAT.book);
  bookL.rotation.z = 0.09; bookL.position.set(-0.09, 0.80, 0.12);

  // 桌面雜物：小書堆（彩色小方塊疊 2~3 本）
  const nb = 2 + Math.floor(rand()*2);

  return g;
}

/* ── 白色格狀天花板（coffered）：共享幾何，每段 縱樑×5 + 橫樑×7 ── */
const COFFER_GEO = {
  long:  new THREE.BoxGeometry(0.16, 0.22, SEG_LEN),
  cross: new THREE.BoxGeometry(HALL_W+1.4, 0.22, 0.16),
  edge:  new THREE.BoxGeometry(0.30, 0.20, SEG_LEN),
};
function addCofferedCeiling(g){
  // 內凹白色面板
  const panel = new THREE.Mesh(new THREE.PlaneGeometry(HALL_W+3, SEG_LEN), MAT.ceil);
  panel.rotation.x = Math.PI/2;
  panel.position.set(0, CEIL_H, -SEG_LEN/2);
  g.add(panel);
  const beamY = CEIL_H - 0.11;
  // 縱樑（沿走道方向）
  for (const bx of [-4.4, -2.2, 0, 2.2, 4.4]){
    const b = new THREE.Mesh(COFFER_GEO.long, MAT.beam);
    b.position.set(bx, beamY, -SEG_LEN/2);
    g.add(b);
  }
  // 橫樑（每 2m 一根；z=0/-16 交界處由拱門收邊）
  for (let z = -2; z > -SEG_LEN; z -= 2){
    const b = new THREE.Mesh(COFFER_GEO.cross, MAT.beam);
    b.position.set(0, beamY, z);
    g.add(b);
  }
  // 貼牆邊樑（天花板與牆交接的收邊帶）
  for (const side of [-1, 1]){
    const e = new THREE.Mesh(COFFER_GEO.edge, MAT.beam);
    e.position.set(side*(HALL_W/2 - 0.13), CEIL_H - 0.10, -SEG_LEN/2);
    g.add(e);
  }
}

/* ── 精緻吊燈：細吊繩 + 白玻璃鐘形罩 + 暖色燈泡微光 ── */
const PENDANT_GEO = {
  cap:   new THREE.CylinderGeometry(0.045, 0.06, 0.06, 12),
  cord:  new THREE.CylinderGeometry(0.008, 0.008, 1, 6),
  neck:  new THREE.CylinderGeometry(0.032, 0.055, 0.07, 12),
  shade: new THREE.SphereGeometry(0.235, 20, 14, 0, Math.PI*2, 0, Math.PI*0.68),  // 鐘形，開口朝下
  bulb:  new THREE.SphereGeometry(0.06, 12, 10),
};
const PENDANT_BULB_MAT = new THREE.MeshBasicMaterial({ color:0xFFF1D2 });
function makePendantLamp(withLight){
  const CORD_L = 0.55;   // mockup 是短吊繩小圓燈
  const lampG = new THREE.Group();
  const cap = new THREE.Mesh(PENDANT_GEO.cap, MAT.cord);
  cap.position.y = CEIL_H - 0.14;
  const cord = new THREE.Mesh(PENDANT_GEO.cord, MAT.cord);
  cord.scale.y = CORD_L;
  cord.position.y = CEIL_H - CORD_L/2 - 0.1;
  const shadeY = CEIL_H - CORD_L - 0.12;
  const neck = new THREE.Mesh(PENDANT_GEO.neck, MAT.cord);
  neck.position.y = shadeY + 0.10;
  const shade = new THREE.Mesh(PENDANT_GEO.shade, MAT.brass);
  shade.position.y = shadeY;
  const bulb = new THREE.Mesh(PENDANT_GEO.bulb, PENDANT_BULB_MAT);
  bulb.position.y = shadeY - 0.06;
  lampG.add(cap, cord, neck, shade, bulb);
  const glowSpr = new THREE.Sprite(new THREE.SpriteMaterial({
    map:POOL_TEX, color:0xFFE2B0, transparent:true, opacity:0.55,
    depthWrite:false, blending:THREE.AdditiveBlending }));
  glowSpr.scale.setScalar(0.85);
  glowSpr.position.y = shadeY - 0.10;
  lampG.add(glowSpr);
  if (withLight){
    // 收斂的暖光：小 distance + decay 2，不染黃天花板
    const glow = new THREE.PointLight(0xFFDFAE, 1.25, 4.6, 2);
    glow.position.y = shadeY - 0.32;
    lampG.add(glow);
  }
  return lampG;
}

function buildSegment(index, seed){
  const rand = rng(seed*2654435761 >>> 0 || 1);
  const g = new THREE.Group();
  const X = HALL_W/2;

  // 地板
  const floor = new THREE.Mesh(new THREE.BoxGeometry(HALL_W+3, 0.2, SEG_LEN), MAT.floor);
  floor.position.set(0,-0.1,-SEG_LEN/2);
  floor.receiveShadow = true;
  g.add(floor);

  // 天花板：白色格狀（coffered）
  addCofferedCeiling(g);

  // 兩側牆
  for (const side of [-1,1]){
    const wall = new THREE.Mesh(new THREE.PlaneGeometry(SEG_LEN, CEIL_H), MAT.wall);
    wall.rotation.y = side>0 ? -Math.PI/2 : Math.PI/2;
    wall.position.set(side*X, CEIL_H/2, -SEG_LEN/2);
    wall.receiveShadow = true;
    g.add(wall);
    // 踢腳線
    const skirt = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.35, SEG_LEN), MAT.trim);
    skirt.position.set(side*(X-0.03), 0.175, -SEG_LEN/2);
    g.add(skirt);
  }

  // 右牆高窗（clerestory）：書櫃上方透光，平衡右側亮度
  {
    const hw = new THREE.Group();
    const hpane = new THREE.Mesh(new THREE.PlaneGeometry(2.2, 1.35), MAT.pane);
    hpane.rotation.y = -Math.PI/2;
    hw.add(hpane);
    const mkh = (w,h,y,z)=>{ const m = new THREE.Mesh(new THREE.BoxGeometry(0.1,h,w), MAT.frame); m.position.set(-0.02,y,z); hw.add(m); };
    mkh(2.5, 0.1,  0.72, 0); mkh(2.5, 0.1, -0.72, 0);
    mkh(0.1, 1.5, 0,  1.25); mkh(0.1, 1.5, 0, -1.25);
    mkh(0.07, 1.4, 0, 0);
    hw.position.set(X-0.02, 4.85, -7.5);
    g.add(hw);
  }

  // 白壁柱：頂到天花板（mockup 是平天花板 + 壁柱，沒有大拱）
  for (const side of [-1,1]){
    const col = new THREE.Mesh(new THREE.BoxGeometry(0.46, CEIL_H, 0.40), MAT.trim);
    col.position.set(side*(X-0.28), CEIL_H/2, 0);
    col.castShadow = true;
    g.add(col);
  }

  // 高窗 + 十字窗櫺（兩側通用；mockup 兩側都有大窗）
  const tallWindow = (side, wz)=>{
    const win = new THREE.Group();
    const pane = new THREE.Mesh(new THREE.PlaneGeometry(2.1, 3.4), MAT.pane);
    pane.rotation.y = side < 0 ? Math.PI/2 : -Math.PI/2;
    win.add(pane);
    const fx = side < 0 ? 0.02 : -0.02;
    const mk = (w,h,y,z)=>{ const m = new THREE.Mesh(new THREE.BoxGeometry(0.1,h,w), MAT.frame); m.position.set(fx,y,z); win.add(m); };
    mk(2.4, 0.12,  1.75, 0); mk(2.4, 0.12, -1.75, 0);   // 上下框
    mk(0.12, 3.6, 0,  1.16); mk(0.12, 3.6, 0, -1.16);   // 左右框
    mk(0.07, 3.5, 0, 0);                                 // 中櫺
    mk(2.3, 0.07, 0.6, 0);  mk(2.3, 0.07, -0.6, 0);     // 橫櫺
    const halo = new THREE.Mesh(POOL_GEO, WINDOW_HALO_MAT);
    halo.rotation.y = side < 0 ? Math.PI/2 : -Math.PI/2;
    halo.scale.set(1.35, 2.3, 1);
    halo.position.set(side < 0 ? 0.09 : -0.09, 0, 0);
    win.add(halo);
    win.position.set(side*(X-0.02), 2.6, wz);
    g.add(win);
  };
  tallWindow(-1, -2.6); tallWindow(-1, -8); tallWindow(-1, -13.4);
  tallWindow(1, -13.4);

  // 書櫃：沿兩側牆連續排列（窗戶與柱子留空），偶爾一組垂直於牆形成小凹間
  const shelfAt = (x, z, rotY)=>{
    const s = shadowify(TPL.bookcase.clone(true));
    s.position.set(x, 0, z); s.rotation.y = rotY;
    const cs = contactShadow(BOOK_W + 0.3, 0.85, 0.3);
    cs.position.set(x, 0.012, z);
    cs.rotation.z = rotY;
    g.add(s, cs);
  };
  const step = BOOK_W + 0.04;   // 幾乎無縫，書牆連綿
  // 右牆：整排書牆（偶爾留一格空隙透氣）
  for (let z = -1.0 - BOOK_W/2; z > -SEG_LEN + 0.8 + BOOK_W/2; z -= step){
    const nearRWin = Math.abs(z + 13.4) < 1.4 + BOOK_W/2;
    if (!nearRWin && rand() < 0.88) shelfAt(X-0.62, z, -Math.PI/2);
  }
  // 左牆：窗間書牆（避開兩扇窗）
  for (let z = -1.0 - BOOK_W/2; z > -SEG_LEN + 0.8 + BOOK_W/2; z -= step){
    const nearWin = [-2.6,-8,-13.4].some(wz => Math.abs(z - wz) < 1.4 + BOOK_W/2);
    if (!nearWin && rand() < 0.9) shelfAt(-X+0.62, z, Math.PI/2);
  }
  // 垂直於牆的凹間書櫃（避開座位帶）
  let alcoveLeft = false;
  if (rand() < 0.55){
    const side = rand() < 0.5 ? -1 : 1;
    if (side < 0) alcoveLeft = true;
    const az = side < 0 ? -13.6 : -2.3;
    shelfAt(side*(X - 1.1 - BOOK_W/2), az, 0);   // 面向 +z，走近時看見書
  }

  // 讀書座位：每段 3~4 組，左右交錯
  const spots = [];
  if (rand() < 0.95) spots.push({ x:-X+2.6, z:-3.9 - rand()*1.2, r: Math.PI/2 + (rand()-0.5)*0.5 });
  if (rand() < 0.95) spots.push({ x: X-2.7, z:-5.4 - rand()*1.4, r:-Math.PI/2 + (rand()-0.5)*0.5 });
  if (rand() < 0.95) spots.push({ x:-X+2.7, z:-8.6 - rand()*1.4, r: Math.PI/2 + (rand()-0.5)*0.4 });
  if (rand() < 0.95) spots.push({ x: X-2.6, z:-11.4 - rand()*1.6, r:-Math.PI/2 + (rand()-0.5)*0.5 });
  if (!alcoveLeft && rand() < 0.4)
    spots.push({ x:-X+2.8, z:-13.2 - rand()*0.8, r: Math.PI/2 + (rand()-0.5)*0.4 });
  for (const sp of spots){
    const spot = makeStudySpot(rand);
    spot.position.set(sp.x, 0, sp.z);
    spot.rotation.y = sp.r;
    g.add(spot);
  }

  // 植物：柱邊 + 牆邊，大小有變化
  const plantAt = (x, z, sc)=>{
    const p = shadowify(TPL.plant.clone(true));
    p.position.set(x, 0, z);
    p.rotation.y = rand()*Math.PI*2;
    p.scale.multiplyScalar(sc);
    const cs = contactShadow(0.85*sc, 0.85*sc, 0.32);
    cs.position.set(x, 0.011, z);
    g.add(p, cs);
  };
  for (const side of [-1,1]) if (rand() < 0.8) plantAt(side*(X-1.25), -0.95, 0.8 + rand()*0.55);
  if (rand() < 0.7) plantAt(-X+1.45, -4.6 - rand()*0.9, 0.6 + rand()*0.4);   // 左窗邊小盆栽
  if (rand() < 0.6) plantAt( X-1.6, -8.5 - rand()*1.4, 0.65 + rand()*0.45);
  if (rand() < 0.5) plantAt( X-1.5, -14.2 - rand()*0.6, 0.75 + rand()*0.5);
  if (rand() < 0.5) plantAt(-X+1.45, -12.3 - rand()*0.5, 0.55 + rand()*0.4); // 左窗另一側
  if (rand() < 0.45) plantAt((rand()<0.5?-1:1)*2.25, -1.1 - rand()*0.9, 1.30 + rand()*0.35); // 柱邊大盆栽（前景感，避開讀書位）

  // 矮櫃（窗下/牆邊，上面擺盆栽）
  if (rand() < 0.8){
    const sb = makeSideboard(rand() < 0.85);
    sb.position.set(-X+0.95, 0, -5.4 - rand()*0.6);
    sb.rotation.y = Math.PI/2;
    g.add(sb);
  }
  if (rand() < 0.5){
    const sb = makeSideboard(rand() < 0.7);
    sb.position.set(X-0.95, 0, -10.6 - rand()*0.8);
    sb.rotation.y = -Math.PI/2;
    g.add(sb);
  }

  // 吊燈：沿走道等距成列，每段 2 盞（各 1 個收斂的暖 PointLight）
  for (const lz of [-SEG_LEN*0.25, -SEG_LEN*0.75]){
    const lamp = makePendantLamp(true);
    lamp.position.z = lz;
    g.add(lamp);
  }

  // 左窗光束
  addLightShafts(g, X);

  // 窗光灑在地板上的光斑
  for (const wz of [-2.6, -8, -13.4]){
    const pool = new THREE.Mesh(POOL_GEO, POOL_MAT);
    pool.rotation.x = -Math.PI/2;
    pool.rotation.z = 0.5;
    pool.position.set(-X+2.2, 0.02, wz + 0.6);
    g.add(pool);
  }

  // 掛畫：兩側牆高處多幅（書櫃上方），共用 3 款柔和畫作
  const artAt = (side, z, w, h)=>{
    const art = new THREE.Group();
    const mat = ART_MATS[Math.floor(rand()*ART_MATS.length)];
    const canvasM = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
    canvasM.rotation.y = side>0 ? -Math.PI/2 : Math.PI/2;
    canvasM.position.x = side * -0.035;
    const frame = new THREE.Mesh(new THREE.BoxGeometry(0.05, h+0.16, w+0.16), MAT.frame);
    art.add(frame, canvasM);
    art.position.set(side*(X-0.05), 3.55 + rand()*0.35, z);
    g.add(art);
  };
  if (rand() < 0.85) artAt( 1, -3.2 - rand()*2,  0.9, 1.1);
  if (rand() < 0.85) artAt( 1, -9.6 - rand()*1.4, 1.2, 0.85);
  if (rand() < 0.7)  artAt(-1, -7.4 - rand()*1.0, 0.85, 1.05);   // 左牆窗間

  g.position.z = -index * SEG_LEN;
  g.userData.recycles = 0;
  scene.add(g);
  return g;
}

/* 接觸陰影：柔邊暗斑，把物件「壓」在地板上 */
const CONTACT_TEX = (()=>{
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const g = c.getContext('2d');
  const rg = g.createRadialGradient(64,64,6,64,64,62);
  rg.addColorStop(0,'rgba(60,44,24,.58)');
  rg.addColorStop(0.55,'rgba(60,44,24,.28)');
  rg.addColorStop(1,'rgba(60,44,24,0)');
  g.fillStyle = rg; g.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
})();
const CONTACT_GEO = new THREE.PlaneGeometry(1,1);
const CONTACT_MAT = new THREE.MeshBasicMaterial({
  map:CONTACT_TEX, transparent:true, depthWrite:false });
function contactShadow(w, d, opacity){
  const m = new THREE.Mesh(CONTACT_GEO, CONTACT_MAT);
  m.rotation.x = -Math.PI/2;
  m.scale.set(w, d, 1);
  m.position.y = 0.013;
  m.renderOrder = 1;
  if (opacity != null){ m.material = CONTACT_MAT.clone(); m.material.opacity = opacity; }
  return m;
}

/* 窗光地板光斑（additive 柔邊橢圓） */
const POOL_TEX = (()=>{
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const g = c.getContext('2d');
  const rg = g.createRadialGradient(64,64,4,64,64,62);
  rg.addColorStop(0,'rgba(255,244,214,.55)');
  rg.addColorStop(0.6,'rgba(255,244,214,.20)');
  rg.addColorStop(1,'rgba(255,244,214,0)');
  g.fillStyle = rg; g.fillRect(0,0,128,128);
  const t = new THREE.CanvasTexture(c); return t;
})();
const POOL_GEO = new THREE.PlaneGeometry(3.6, 2.2);
const POOL_MAT = new THREE.MeshBasicMaterial({
  map:POOL_TEX, transparent:true, opacity:0.5, depthWrite:false,
  blending:THREE.AdditiveBlending });
const WINDOW_HALO_MAT = new THREE.MeshBasicMaterial({
  map:POOL_TEX, transparent:true, opacity:0.32, depthWrite:false,
  blending:THREE.AdditiveBlending, side:THREE.DoubleSide });

/* 簡易木椅（mockup 是四腳木椅，chair.glb 辦公椅椅背正後方看像白圓筒） */
const CHAIR_MAT = new THREE.MeshStandardMaterial({ color:0xD3B888, roughness:.85 });

  seat.position.y = 0.45;

  for (const sx of [-1,1]) for (const sz of [-1,1]){

    leg.position.set(sx*0.185, 0.225, sz*0.185);
    g.add(leg);

  for (const sx of [-1,1]){          // 椅背立柱
    const post = sh(new THREE.Mesh(new THREE.BoxGeometry(0.045,0.5,0.045), CHAIR_MAT));
    post.position.set(sx*0.185, 0.72, 0.195);
    g.add(post);

  for (const by of [0.78, 0.92]){    // 椅背橫板

/* 矮櫃（淺木 sideboard，上面擺盆栽）——mockup 窗邊元素 */
const SIDEBOARD_MATS = {
  body: new THREE.MeshStandardMaterial({ color:0xE3CDA5, roughness:.85 }),
  top:  new THREE.MeshStandardMaterial({ color:0xEFDDB9, roughness:.8 }),
  seam: new THREE.MeshStandardMaterial({ color:0xC7AC80, roughness:.9 }),
};
function makeSideboard(withPlant, sc){
  const g = new THREE.Group();
  g.add(contactShadow(1.75, 0.65, 0.3));
  const body = new THREE.Mesh(new THREE.BoxGeometry(1.5,0.82,0.42), SIDEBOARD_MATS.body);
  body.position.y = 0.41; body.castShadow = true; body.receiveShadow = true;

  top.position.y = 0.845;
  g.add(body, top);
  for (const sx of [-0.375, 0.375]){
    const seam = new THREE.Mesh(new THREE.BoxGeometry(0.72,0.62,0.012), SIDEBOARD_MATS.seam);
    seam.position.set(sx, 0.42, 0.211);

/* 主角：背書包的 chibi 小孩（mockup 構圖），V 鍵切換第一/第三視角 */

/* ── 塵埃微粒（光裡的漂浮感） ── */
let motes = null;
function makeMotes(){
  const N = 170, pos = new Float32Array(N*3);
  for (let i=0;i<N;i++){
    // 靠窗側（-x）略多：約 6 成聚在左半，像陽光裡的浮塵
    pos[i*3]   = Math.random() < 0.6 ? (-4.8 + Math.random()*4.3) : (Math.random()-0.5)*9;
    pos[i*3+1] = 0.5 + Math.random()*4.3;
    pos[i*3+2] = 6 - Math.random()*50;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const c = document.createElement('canvas'); c.width=c.height=32;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(16,16,0,16,16,16);
  gr.addColorStop(0,'rgba(255,250,235,.7)');
  gr.addColorStop(0.45,'rgba(255,248,232,.22)');
  gr.addColorStop(1,'rgba(255,250,235,0)');
  g.fillStyle = gr; g.fillRect(0,0,32,32);
  const tex = new THREE.CanvasTexture(c);
  motes = new THREE.Points(geo, new THREE.PointsMaterial({
    map:tex, size:0.05, transparent:true, opacity:.42, depthWrite:false,
    blending:THREE.AdditiveBlending, sizeAttenuation:true,
  }));
  scene.add(motes);
}

/* ── 啟動 ── */
const clock = new THREE.Clock();
let mouseX = 0, mouseY = 0;
addEventListener('pointermove', e=>{
  mouseX = (e.clientX/innerWidth - 0.5)*2;
  mouseY = (e.clientY/innerHeight - 0.5)*2;
});
addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

Promise.all([
  loadGLB('models/desk.glb'),
  loadGLB('models/chair.glb'),
  loadGLB('models/bookcase.glb'),
  loadGLB('models/lamp.glb'),
  loadGLB('models/plant.glb'),
]).then(([desk, chair, bookcase, lamp, plant])=>{
  TPL = {
    desk:     shadowify(liftColors(normalize(desk.scene,     0.82))),
    chair:    shadowify(liftColors(normalize(chair.scene,    0.95))),
    bookcase: shadowify(liftColors(normalize(bookcase.scene, 2.65))),
    lamp:     shadowify((r=>{ r.traverse(n=>{ if(n.isMesh){ const ms=Array.isArray(n.material)?n.material:[n.material]; ms.forEach(m=>m&&m.color&&m.color.set(0x5E7064)); } }); return r; })(normalize(lamp.scene, 0.42))),
    plant:    shadowify(normalize(plant.scene,    1.25)),
  };
  BOOK_W = new THREE.Box3().setFromObject(TPL.bookcase).getSize(new THREE.Vector3()).x;
  for (let i=0;i<NUM_SEG;i++) segments.push(buildSegment(i, i+7));
  makeWalker();
  makeMotes();
  document.getElementById('loader').classList.add('off');
  animate();
}).catch(err=>{
  console.error('GLB 載入失敗', err);
  document.querySelector('#loader .msg').textContent = '素材載入失敗，請重新整理';
});

let t = 0;
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  t += dt;
  const dz = WALK_SPEED * dt;

  // 世界往 +z 流動；走出鏡頭後回收到最前面
  for (const seg of segments){
    seg.position.z += dz;
    if (seg.position.z > SEG_LEN * 1.1){
      seg.position.z -= NUM_SEG * SEG_LEN;
      seg.userData.recycles++;
    }
  }
  // 塵埃
  if (motes){
    const p = motes.geometry.attributes.position;
    for (let i=0;i<p.count;i++){
      p.setZ(i, p.getZ(i) + dz*0.92);
      p.setY(i, p.getY(i) + Math.sin(t*0.7 + i)*0.0012);
      if (p.getZ(i) > 7) p.setZ(i, p.getZ(i) - 50);
    }
    p.needsUpdate = true;
  }
  // 第一視角：緩慢前行的步伐微晃 + 滑鼠環顧（幅度收小，走起來不暈）
  const drift = Math.sin(t*0.16)*0.45;                // 沿走道輕微左右漂移
  camera.position.x += ((drift + mouseX*0.45) - camera.position.x)*0.04;
  camera.position.y += ((1.55 + Math.sin(t*2.1)*0.013 - mouseY*0.14) - camera.position.y)*0.07;
  camera.lookAt(drift*0.4 + mouseX*2.0, 1.52 - mouseY*0.75, -10);

  // chibi 動畫：走路擺腿甩手，坐著呼吸點頭
  for (const w of walkers){
    const wt = t*5.2 + w.phase;
    const s = Math.sin(wt);
    w.parts.legL.rotation.x =  s*0.55;
    w.parts.legR.rotation.x = -s*0.55;
    w.parts.armL.rotation.x = -s*0.38;
    w.parts.armR.rotation.x =  s*0.38;
    w.parts.bob.position.y = Math.abs(Math.cos(wt))*0.045;
    w.parts.head.rotation.z = Math.sin(wt*0.5)*0.03;
  }
  for (const si of sitters){
    si.parts.bob.position.y = Math.sin(t*1.3 + si.phase)*0.012;
    si.parts.head.rotation.x = 0.14 + Math.sin(t*0.8 + si.phase)*0.05;  // 低頭讀書微點頭
  }
  renderer.render(scene, camera);
}
</script>
</body>
