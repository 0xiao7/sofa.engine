<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>法規更新紀錄</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23244658'/%3E%3Ctext x='16' y='23.5' font-size='21' font-family='Georgia,serif' font-weight='700' text-anchor='middle' fill='%23E7BBA7'%3ES%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#142836;
  --navy-2:#1F3848;
  --navy-3:#0D1C28;
  --panel:#19303E;
  --peach:#E7BBA7;
  --peach-2:#F0CDBD;
  --peach-3:#C89580;
  --cream:#F5F0EA;
  --cream-2:#ECE5DB;
  --cream-3:#D8CEC0;
  --green:#9FB89F;
  --gold:#D9B084;
  --red:#D88C7A;
  --line:rgba(245,240,234,.13);
  --line-2:rgba(245,240,234,.22);
  --serif:"Noto Serif TC","Songti TC",serif;
  --sans:"Noto Sans TC",system-ui,sans-serif;
}
*{box-sizing:border-box}
html{background:var(--navy-3)}
body{
  margin:0;
  background:var(--navy);
  color:var(--cream);
  font-family:var(--sans);
  font-size:15px;
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit}
button{font:inherit}
.topbar{
  position:sticky;
  top:0;
  z-index:10;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding:14px clamp(18px,4vw,48px);
  background:rgba(13,28,40,.92);
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(12px);
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  color:var(--cream-2);
  font-weight:700;
}
.brand-mark{
  display:grid;
  width:28px;
  height:28px;
  place-items:center;
  border-radius:7px;
  background:var(--peach);
  color:var(--navy-3);
  font-family:Georgia,serif;
  font-weight:700;
}
.topbar a{
  color:var(--peach);
  font-size:13px;
  text-decoration:none;
}
main{
  width:min(1180px,calc(100% - 32px));
  margin:0 auto;
  padding:28px 0 56px;
}
.page-head{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:24px;
  align-items:end;
  padding:10px 0 24px;
  border-bottom:1px solid var(--line);
}
.eyebrow{
  margin:0 0 8px;
  color:var(--peach);
  font-size:13px;
  font-weight:700;
}
h1{
  margin:0;
  color:var(--cream);
  font-family:var(--serif);
  font-size:clamp(34px,5vw,58px);
  font-weight:700;
  line-height:1.15;
}
.lead{
  max-width:760px;
  margin:14px 0 0;
  color:var(--cream-2);
}
.checked{
  min-width:180px;
  padding:14px 16px;
  border:1px solid var(--line);
  border-radius:8px;
  background:rgba(245,240,234,.04);
  text-align:right;
}
.checked span{
  display:block;
  color:var(--cream-3);
  font-size:12px;
}
.checked strong{
  color:var(--peach-2);
  font-size:19px;
}
.summary{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:12px;
  margin:22px 0;
}
.stat{
  min-height:108px;
  padding:16px;
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--panel);
}
.stat .label{
  color:var(--cream-3);
  font-size:13px;
}
.stat .value{
  margin-top:8px;
  color:var(--peach);
  font-family:var(--serif);
  font-size:34px;
  font-weight:700;
  line-height:1;
}
.stat .hint{
  margin-top:8px;
  color:rgba(245,240,234,.68);
  font-size:12px;
}
.toolbar{
  display:grid;
  gap:12px;
  padding:16px;
  border:1px solid var(--line);
  border-radius:8px;
  background:rgba(13,28,40,.48);
}
.filter-row{
  display:grid;
  grid-template-columns:88px minmax(0,1fr);
  gap:12px;
  align-items:start;
}
.filter-label{
  padding-top:7px;
  color:var(--cream-3);
  font-size:13px;
  font-weight:700;
}
.filter-buttons{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.filter-btn{
  min-height:34px;
  padding:7px 12px;
  border:1px solid var(--line-2);
  border-radius:8px;
  background:rgba(245,240,234,.04);
  color:var(--cream-2);
  cursor:pointer;
}
.filter-btn:hover{border-color:rgba(231,187,167,.5)}
.filter-btn.active{
  background:var(--peach);
  border-color:var(--peach);
  color:var(--navy-3);
  font-weight:700;
}
.content-grid{
  display:grid;
  grid-template-columns:minmax(0,1fr) 310px;
  gap:18px;
  align-items:start;
  margin-top:18px;
}
.records{
  display:grid;
  gap:12px;
}
.card{
  padding:18px;
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--panel);
}
.card-top{
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:flex-start;
}
.law-name{
  margin:0;
  color:var(--cream);
  font-family:var(--serif);
  font-size:24px;
  line-height:1.3;
}
.section{
  color:var(--peach-2);
  font-size:13px;
  font-weight:700;
}
.badges{
  display:flex;
  flex-wrap:wrap;
  justify-content:flex-end;
  gap:6px;
}
.badge{
  display:inline-flex;
  align-items:center;
  min-height:26px;
  padding:3px 8px;
  border-radius:6px;
  background:rgba(245,240,234,.06);
  color:var(--cream-2);
  font-size:12px;
  font-weight:700;
}
.badge.high{color:var(--red)}
.badge.medium{color:var(--gold)}
.badge.low{color:var(--green)}
.badge.watch{color:var(--peach)}
.dates{
  display:flex;
  flex-wrap:wrap;
  gap:10px 16px;
  margin:14px 0;
  color:var(--cream-3);
  font-size:13px;
}
.dates strong{color:var(--cream)}
.summary-text{
  margin:0 0 12px;
  color:var(--cream-2);
}
.study-action{
  margin:0;
  padding:12px 14px;
  border-left:3px solid var(--peach);
  border-radius:6px;
  background:rgba(231,187,167,.08);
  color:var(--cream);
}
.chip-list{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin:14px 0 0;
}
.chip{
  padding:3px 8px;
  border:1px solid var(--line);
  border-radius:6px;
  color:var(--peach-2);
  font-size:12px;
}
.source{
  display:inline-flex;
  margin-top:14px;
  color:var(--peach);
  font-size:13px;
  text-decoration:none;
}
.method{
  position:sticky;
  top:76px;
  padding:18px;
  border:1px solid var(--line);
  border-radius:8px;
  background:rgba(13,28,40,.58);
}
.method h2{
  margin:0 0 10px;
  font-family:var(--serif);
  font-size:20px;
}
.method p{
  margin:0 0 14px;
  color:var(--cream-2);
}
.method ol{
  margin:0;
  padding-left:20px;
  color:var(--cream-2);
}
.method li+li{margin-top:8px}
.empty{
  padding:28px;
  border:1px dashed var(--line-2);
  border-radius:8px;
  color:var(--cream-3);
  text-align:center;
}
@media (max-width:880px){
  .page-head,.content-grid{grid-template-columns:1fr}
  .checked{text-align:left}
  .summary{grid-template-columns:repeat(2,minmax(0,1fr))}
  .method{position:static}
}
@media (max-width:620px){
  main{width:min(100% - 24px,1180px);padding-top:18px}
  .topbar{padding:12px}
  .summary{grid-template-columns:1fr}
  .filter-row{grid-template-columns:1fr}
  .filter-label{padding-top:0}
  .card-top{display:grid}
  .badges{justify-content:flex-start}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand"><span class="brand-mark">S</span><span>SoFa Engine</span></div>
  <a href="law/index.html">法規庫</a>
</header>

<main>
  <section class="page-head" aria-labelledby="page-title">
    <div>
      <p class="eyebrow">PUBLIC LAW UPDATES</p>
      <h1 id="page-title">法規更新紀錄</h1>
      <p class="lead">政府資料按日期排序，SoFa 按考科、影響與備考用途整理，讓舊題與現行法的落差更容易被看見。</p>
    </div>
    <div class="checked">
      <span>最後整理</span>
      <strong id="lastChecked">--</strong>
    </div>
  </section>

  <section class="summary" aria-label="更新摘要">
    <div class="stat">
      <div class="label">追蹤筆數</div>
      <div class="value" id="totalCount">0</div>
      <div class="hint">公開更新紀錄</div>
    </div>
    <div class="stat">
      <div class="label">高影響</div>
      <div class="value" id="highCount">0</div>
      <div class="hint">優先複核考題</div>
    </div>
    <div class="stat">
      <div class="label">考題複核</div>
      <div class="value" id="reviewCount">0</div>
      <div class="hint">需比對舊題答案</div>
    </div>
    <div class="stat">
      <div class="label">涉及考科</div>
      <div class="value" id="examCount">0</div>
      <div class="hint">依 SoFa 備考用途歸類</div>
    </div>
  </section>

  <section class="toolbar" aria-label="篩選法規更新">
    <div class="filter-row">
      <div class="filter-label">考科</div>
      <div class="filter-buttons" id="examFilters"></div>
    </div>
    <div class="filter-row">
      <div class="filter-label">影響</div>
      <div class="filter-buttons" id="impactFilters"></div>
    </div>
    <div class="filter-row">
      <div class="filter-label">狀態</div>
      <div class="filter-buttons" id="statusFilters"></div>
    </div>
  </section>

  <section class="content-grid">
    <div class="records" id="records" aria-live="polite"></div>
    <aside class="method">
      <h2>整理方法</h2>
      <p>SoFa 先追蹤政府公開法規資料，再把更新依考科、考試影響與備考用途整理成可讀紀錄。</p>
      <ol id="methodList"></ol>
    </aside>
  </section>
</main>

<script src="law-updates-data.js"></script>
<script>
const data = window.SOFA_LAW_UPDATES || { lastChecked: '', method: [], records: [] };
const state = { exam: 'all', impact: 'all', status: 'all' };
const impactLabels = { all: '全部', high: '高', medium: '中', low: '低', watch: '觀察' };
const statusLabels = {
  all: '全部',
  synced: '已同步',
  analysis_updated: '解析已更新',
  exam_review: '考題複核',
  watching: '觀察中',
  not_relevant: '暫無影響'
};
const impactRank = { high: 0, medium: 1, watch: 2, low: 3 };
const statusRank = { exam_review: 0, analysis_updated: 1, synced: 2, watching: 3, not_relevant: 4 };

function escapeHtml(value) {
  return String(value || '').replace(/[&<>"']/g, (char) => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  })[char]);
}

function sortRecords(records) {
  return [...records].sort((a, b) => {
    const byImpact = (impactRank[a.impact] ?? 99) - (impactRank[b.impact] ?? 99);
    if (byImpact) return byImpact;
    const byStatus = (statusRank[a.status] ?? 99) - (statusRank[b.status] ?? 99);
    if (byStatus) return byStatus;
    const byGovernmentDate = String(b.governmentDate).localeCompare(String(a.governmentDate));
    return byGovernmentDate || String(b.detectedDate).localeCompare(String(a.detectedDate));
  });
}

function uniqueExams(records) {
  return [...new Set(records.flatMap((record) => record.examCategories || []))].sort((a, b) => a.localeCompare(b, 'zh-Hant'));
}

function setSummary(records) {
  const exams = uniqueExams(records);
  document.getElementById('lastChecked').textContent = data.lastChecked || '--';
  document.getElementById('totalCount').textContent = records.length;
  document.getElementById('highCount').textContent = records.filter((record) => record.impact === 'high').length;
  document.getElementById('reviewCount').textContent = records.filter((record) => record.status === 'exam_review').length;
  document.getElementById('examCount').textContent = exams.length;
}

function createButton(group, value, label) {
  const button = document.createElement('button');
  button.type = 'button';
  button.className = `filter-btn${state[group] === value ? ' active' : ''}`;
  button.textContent = label;
  button.setAttribute('aria-pressed', state[group] === value ? 'true' : 'false');
  button.addEventListener('click', () => {
    state[group] = value;
    render();
  });
  return button;
}

function renderFilters(records) {
  const examWrap = document.getElementById('examFilters');
  const impactWrap = document.getElementById('impactFilters');
  const statusWrap = document.getElementById('statusFilters');
  examWrap.replaceChildren(createButton('exam', 'all', '全部'), ...uniqueExams(records).map((exam) => createButton('exam', exam, exam)));
  impactWrap.replaceChildren(...Object.entries(impactLabels).map(([value, label]) => createButton('impact', value, label)));
  statusWrap.replaceChildren(...Object.entries(statusLabels).map(([value, label]) => createButton('status', value, label)));
}

function filteredRecords(records) {
  return records.filter((record) => {
    const matchesExam = state.exam === 'all' || (record.examCategories || []).includes(state.exam);
    const matchesImpact = state.impact === 'all' || record.impact === state.impact;
    const matchesStatus = state.status === 'all' || record.status === state.status;
    return matchesExam && matchesImpact && matchesStatus;
  });
}

function recordCard(record) {
  const exams = (record.examCategories || []).map((exam) => `<span class="chip">${escapeHtml(exam)}</span>`).join('');
  const source = record.sourceUrl
    ? `<a class="source" href="${escapeHtml(record.sourceUrl)}" target="_blank" rel="noopener">${escapeHtml(record.sourceLabel)}</a>`
    : `<span class="source">${escapeHtml(record.sourceLabel)}</span>`;
  return `
    <article class="card">
      <div class="card-top">
        <div>
          <h2 class="law-name">${escapeHtml(record.law)}</h2>
          <div class="section">${escapeHtml(record.section || '')}</div>
        </div>
        <div class="badges">
          <span class="badge ${escapeHtml(record.impact)}">${escapeHtml(impactLabels[record.impact] || record.impact)}</span>
          <span class="badge">${escapeHtml(statusLabels[record.status] || record.status)}</span>
        </div>
      </div>
      <div class="dates">
        <span>政府日期 <strong>${escapeHtml(record.governmentDate)}</strong></span>
        <span>SoFa 整理 <strong>${escapeHtml(record.detectedDate)}</strong></span>
      </div>
      <p class="summary-text">${escapeHtml(record.summary)}</p>
      <p class="study-action">${escapeHtml(record.studyAction)}</p>
      <div class="chip-list">${exams}</div>
      ${source}
    </article>
  `;
}

function renderRecords(records) {
  const list = document.getElementById('records');
  const visible = filteredRecords(sortRecords(records));
  if (!visible.length) {
    list.innerHTML = '<div class="empty">目前沒有符合篩選條件的法規更新。</div>';
    return;
  }
  list.innerHTML = visible.map(recordCard).join('');
}

function renderMethod() {
  const methodList = document.getElementById('methodList');
  methodList.innerHTML = (data.method || []).map((item) => `<li>${escapeHtml(item)}</li>`).join('');
}

function render() {
  const records = data.records || [];
  setSummary(records);
  renderFilters(records);
  renderRecords(records);
  renderMethod();
}

render();
</script>
</body>
</html>
