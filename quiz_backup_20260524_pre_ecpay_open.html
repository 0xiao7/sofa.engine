<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<title>SoFa Engine — 選擇題</title>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-G81F9D4YJ3"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-G81F9D4YJ3');</script>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="sofa.css" />
<style>
  .pr-bar{
    background:var(--navy-2);border-bottom:1px solid var(--line);
    padding:16px 40px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;
  }
  .pr-bar .l{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .pr-bar .back{
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;
    color:rgba(245,240,234,.55);text-transform:uppercase;
    padding:6px 10px;border:1px solid var(--line-2);border-radius:3px;
  }
  .pr-bar .title{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .pr-bar .title .lab{
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;
    color:rgba(245,240,234,.5);text-transform:uppercase;
  }
  .pr-bar .title .v{font-family:var(--serif);font-weight:600;font-size:17px;color:var(--cream)}
  .pr-meta{
    display:flex;align-items:center;gap:22px;
    font-family:var(--mono);font-size:12px;letter-spacing:.08em;color:rgba(245,240,234,.55);
  }
  .pr-meta .seg b{color:var(--peach);font-weight:600;font-size:13px;margin-left:6px}
  .pr-meta .timer b{color:var(--cream);font-family:var(--serif);font-size:18px;letter-spacing:.02em}

  .pr-progress{height:2px;background:rgba(245,240,234,.06);position:relative}
  .pr-progress .fl{
    position:absolute;left:0;top:0;height:100%;
    background:linear-gradient(to right, var(--peach), var(--peach-2));
    width:42%;
  }

  .stage{padding:40px 64px 96px;background:var(--navy-3);position:relative;min-height:calc(100vh - 70px - 60px - 2px)}
  .stage::before{
    content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(245,240,234,.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,240,234,.018) 1px, transparent 1px);
    background-size:60px 60px;
    mask-image:radial-gradient(ellipse 60% 50% at 50% 0%, #000 30%, transparent 70%);
    pointer-events:none;
  }
  .inner{max-width:1080px;margin:0 auto;position:relative;display:grid;grid-template-columns:1fr 260px;gap:32px}

  /* question head */
  .q-head{
    display:flex;align-items:flex-end;justify-content:space-between;gap:24px;
    padding-bottom:18px;border-bottom:1px solid var(--line);margin-bottom:28px;
  }
  .q-head .eb{
    font-family:var(--mono);font-size:11px;color:var(--peach);
    letter-spacing:.22em;text-transform:uppercase;
    display:flex;align-items:center;gap:10px;
  }
  .q-head .eb::before{content:"";width:18px;height:1px;background:var(--peach)}
  .q-head .n{
    font-family:var(--serif);font-weight:600;font-size:54px;line-height:1;
    color:var(--cream);letter-spacing:-.01em;
  }
  .q-head .n .of{font-size:22px;color:rgba(245,240,234,.45);font-weight:400;margin-left:4px}
  .q-head .src{
    text-align:right;font-family:var(--mono);font-size:11px;letter-spacing:.12em;
    color:rgba(245,240,234,.5);text-transform:uppercase;line-height:1.8;
  }
  .q-head .src b{color:var(--peach);font-weight:600;display:block;margin-top:4px;font-size:12px}

  .q-stem{
    background:var(--navy-2);border:1px solid var(--line);border-radius:4px;
    padding:32px 36px;position:relative;
  }
  .q-stem::before{
    content:"QUESTION";position:absolute;top:16px;right:22px;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;color:rgba(245,240,234,.25);
  }
  .q-stem p{font-family:var(--serif);font-size:21px;line-height:1.85;color:var(--cream);letter-spacing:.02em}
  .q-stem .quote{
    margin-top:18px;padding:18px 22px;background:var(--navy-3);border-left:3px solid var(--peach-dim);
    border-radius:0 3px 3px 0;font-size:16px;line-height:1.85;color:rgba(245,240,234,.72);
  }
  .q-stem .quote .ro{font-family:var(--mono);color:var(--peach);font-weight:600;margin-right:4px;font-size:13px}

  /* options */
  .opts{margin-top:24px;display:flex;flex-direction:column;gap:10px}
  .opt{
    background:var(--navy-2);border:1px solid var(--line);border-radius:4px;
    padding:18px 22px;display:flex;align-items:flex-start;gap:18px;
    cursor:pointer;transition:.18s;position:relative;
  }
  .opt:hover{background:var(--plum-1);border-color:var(--peach-dim);transform:translateX(2px)}
  .opt .key{
    width:36px;height:36px;border:1.5px solid var(--line-2);border-radius:50%;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    font-family:var(--mono);font-weight:600;font-size:14px;color:rgba(245,240,234,.65);
    transition:.18s;
  }
  .opt .body{flex:1;font-size:15.5px;line-height:1.75;color:rgba(245,240,234,.85);padding-top:4px}
  .opt .body .tag{
    display:inline-block;margin-right:8px;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;
    color:rgba(245,240,234,.5);
  }

  /* selected */
  .opt.sel{border-color:var(--peach);background:rgba(231,187,167,.06)}
  .opt.sel .key{background:var(--peach);color:var(--navy);border-color:var(--peach)}
  .opt.sel .body{color:var(--cream)}

  /* answered states */
  .opt.right{border-color:var(--good);background:rgba(159,184,159,.08)}
  .opt.right .key{background:var(--good);color:var(--navy-3);border-color:var(--good)}
  .opt.right::after{
    content:"✓ 正確";position:absolute;top:18px;right:22px;
    font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--good);font-weight:600;
  }
  .opt.wrong{border-color:var(--bad);background:rgba(199,123,106,.08)}
  .opt.wrong .key{background:var(--bad);color:var(--cream);border-color:var(--bad)}
  .opt.wrong::after{
    content:"✗ 你選的";position:absolute;top:18px;right:22px;
    font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--bad);font-weight:600;
  }

  /* explanation */
  .explain{
    margin-top:24px;background:var(--cream);color:var(--navy);
    border-radius:4px;padding:24px 28px;border-left:4px solid var(--peach-3);
    position:relative;
  }
  .explain .eb{
    font-family:var(--mono);font-size:11px;font-weight:600;color:var(--peach-3);
    letter-spacing:.22em;text-transform:uppercase;
  }
  .explain h3{
    font-family:var(--serif);font-weight:600;font-size:20px;margin-top:8px;color:var(--navy);
  }
  .explain p{margin-top:12px;font-size:14.5px;line-height:1.85;color:rgba(31,56,72,.78)}
  .explain p b{color:var(--navy);font-weight:600}
  .explain .kw{background:rgba(231,187,167,.45);padding:1px 5px;border-radius:2px;color:var(--navy);font-weight:600}
  .explain .src{
    margin-top:16px;padding-top:12px;border-top:1px dashed rgba(31,56,72,.15);
    display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;
    letter-spacing:.12em;color:rgba(31,56,72,.55);text-transform:uppercase;
  }
  .explain .src a{color:var(--peach-3);font-weight:600}

  /* section analysis */
  .sec-block{margin-top:16px;padding-top:14px;border-top:1px dashed rgba(31,56,72,.15)}
  .sec-label{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--peach-3);font-weight:600;margin-bottom:6px}
  .sec-text{font-size:13px;line-height:1.85;color:rgba(31,56,72,.78);white-space:pre-wrap}
  .sec-lock{margin-top:16px;position:relative;border-radius:3px;overflow:hidden}
  .sec-lock-inner{padding:12px 0;border-top:1px dashed rgba(31,56,72,.15);filter:blur(4px);user-select:none;pointer-events:none}
  .sec-lock-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:rgba(245,240,234,.92);backdrop-filter:blur(2px)}
  .sec-lock-overlay p{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:rgba(27,43,75,.8);text-transform:uppercase;font-weight:600;margin:0}
  .sec-lock-overlay a{display:inline-block;padding:7px 20px;background:var(--peach);color:var(--navy);font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.08em;border-radius:2px;text-decoration:none}

  /* bottom action */
  .q-foot{
    margin-top:28px;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;
    padding-top:20px;border-top:1px dashed var(--line);
  }
  .q-foot .l{display:flex;gap:18px;font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:rgba(245,240,234,.5);text-transform:uppercase;align-items:center;flex-wrap:wrap}
  .q-foot .l kbd{
    display:inline-block;padding:3px 8px;
    background:var(--navy-2);border:1px solid var(--line-2);
    border-radius:3px;font-family:var(--mono);font-size:10.5px;color:var(--peach);margin-right:6px;
  }
  .q-foot .r{display:flex;gap:10px}

  /* === rail === */
  .rail{display:flex;flex-direction:column;gap:18px;position:sticky;top:92px;align-self:start}
  .rail-card{background:var(--navy-2);border:1px solid var(--line);border-radius:4px;padding:22px}
  .rail-h{
    font-family:var(--mono);font-size:11px;color:var(--peach);
    letter-spacing:.22em;text-transform:uppercase;font-weight:600;
    padding-bottom:12px;border-bottom:1px dashed var(--line);margin-bottom:14px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .rail-h .ct{color:rgba(245,240,234,.4);font-weight:500;letter-spacing:.1em}

  .qgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
  .qcell{
    aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:12px;font-weight:600;
    background:var(--navy-3);border:1px solid var(--line-2);border-radius:3px;
    color:rgba(245,240,234,.6);cursor:pointer;transition:.18s;
  }
  .qcell:hover{border-color:var(--peach)}
  .qcell.cur{background:var(--peach);color:var(--navy);border-color:var(--peach)}
  .qcell.ok{background:rgba(159,184,159,.18);color:var(--good);border-color:rgba(159,184,159,.3)}
  .qcell.bad{background:rgba(199,123,106,.18);color:var(--bad);border-color:rgba(199,123,106,.3)}
  .qcell.flag{position:relative}
  .qcell.flag::after{
    content:"";position:absolute;top:3px;right:3px;width:4px;height:4px;
    background:var(--warn);border-radius:50%;
  }

  .stat-line{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:13px;color:rgba(245,240,234,.7)}
  .stat-line + .stat-line{border-top:1px dashed var(--line)}
  .stat-line b{font-family:var(--mono);color:var(--cream);font-weight:600}
  .stat-line .v.good{color:var(--good)}
  .stat-line .v.bad{color:var(--bad)}

  @media (max-width:1100px){
    .pr-bar{padding:14px 24px}
    .stage{padding:32px 32px 72px}
    .inner{grid-template-columns:1fr}
    .rail{position:static;flex-direction:row;flex-wrap:wrap}
    .rail-card{flex:1;min-width:240px}
  }
  @media (max-width:760px){
    .pr-bar{padding:12px 18px}
    .pr-meta{gap:14px;font-size:11px}
    .stage{padding:24px 18px 60px}
    .q-head{flex-direction:column;align-items:flex-start;gap:14px}
    .q-head .src{text-align:left}
    .q-head .n{font-size:42px}
    .q-stem{padding:22px 22px}
    .q-stem p{font-size:17px}
    .opt{padding:14px 18px;gap:14px}
    .opt .body{font-size:14.5px}
    .opt.right::after,.opt.wrong::after{display:none}
    .q-foot{flex-direction:column;align-items:stretch}
    .q-foot .r{flex-direction:column}
    .rail{flex-direction:column}
  }
  h1,h2,h3,h4{text-wrap:balance;}
  p{text-wrap:pretty;}
</style>
</head>
<body>

  <header class="topbar">
    <a class="brand" href="index.html"><span class="dot"></span>SOFA&nbsp;ENGINE</a>
    <nav class="top-mid">
      <a href="dashboard.html">會員中心</a>
      <a href="practice.html">打字</a>
      <a href="fill.html">填空</a>
      <a href="quiz.html" class="on">選擇題</a>
    </nav>
    <div class="top-right">
      <span class="user-pill"><span class="live"></span><span id="navUid">—</span></span>
      <button class="btn-out" onclick="localStorage.removeItem('sofa_uid');window.location.href='login.html'">登出</button>
      <button class="menu-btn"><span></span></button>
    </div>
  </header>

  <div class="pr-bar">
    <div class="l">
      <a href="dashboard.html" class="back">← BACK</a>
      <div class="title">
        <span class="lab">LAW</span>
        <select id="lawSelect" style="background:transparent;border:none;outline:none;font-family:var(--serif);font-weight:600;font-size:17px;color:var(--cream);cursor:pointer;-webkit-appearance:none;appearance:none"><option value="">全部法規</option></select>
      </div>
      <button id="btnNew" class="btn btn-sec" style="padding:8px 16px;font-size:13px">出題</button>
    </div>
    <div class="pr-meta">
      <div class="seg">第 <b id="qNum">—</b></div>
      <div class="seg">正確 <b id="scoreRight" style="color:var(--good)">0</b></div>
      <div class="seg">錯誤 <b id="scoreWrong" style="color:var(--bad)">0</b></div>
      <div class="seg timer">TIMER <b id="topTimer">0:00</b></div>
    </div>
  </div>
  <div class="pr-progress"><div class="fl" id="quizProg" style="width:0%"></div></div>

  <main class="stage">
    <div class="inner">

      <div>
        <div class="q-head">
          <div>
            <span class="eb">QUESTION · MULTIPLE CHOICE</span>
            <div class="n" style="margin-top:8px"><span id="qNumBig">—</span></div>
          </div>
<div class="src" id="qSrc">—</div>
        </div>

        <div class="q-stem">
          <p id="questionBox" style="opacity:.45;font-family:var(--mono);font-size:13px;letter-spacing:.1em;color:rgba(245,240,234,.4)">按「出題」開始作答</p>
        </div>

        <div class="opts" id="optionsBox"></div>

        <div class="explain" id="explainBox" style="display:none">
          <span class="eb">答對了</span>
          <div class="src" id="sourceBox">
            <span>—</span>
            <a href="dashboard.html" id="sourceLink">查看完整條文 →</a>
          </div>
        </div>

        <div class="q-foot">
          <div class="l">
            <span><kbd>A</kbd><kbd>B</kbd><kbd>C</kbd><kbd>D</kbd>作答</span>
            <span><kbd>↵</kbd>下一題</span>
            <span><kbd>F</kbd>標記</span>
          </div>
          <div class="r">
            <button class="btn btn-ghost" id="btnFlag">⚑ 標記</button>
            <button class="btn btn-sec">← 上一題</button>
            <button class="btn btn-pri" id="btnNext">下一題 <span class="k">↵</span></button>
          </div>
        </div>
      </div>

      <!-- rail -->
      <aside class="rail">
        <div class="rail-card">
          <div class="rail-h">SET MAP<span class="ct" id="mapCount">0 Q</span></div>
          <div class="qgrid" id="qgrid"></div>
        </div>

        <div class="rail-card">
          <div class="rail-h">SESSION<span class="ct">LIVE</span></div>
          <div class="stat-line"><span>已作答</span><span><b id="railTotal">0</b></span></div>
          <div class="stat-line"><span>命中率</span><span><b id="railAcc" style="color:var(--good)">—</b></span></div>
          <div class="stat-line"><span>累計答錯</span><span><b id="railWrong" style="color:var(--bad)">0</b></span></div>
          <div class="stat-line"><span>已標記</span><span><b id="railFlagged">0</b></span></div>
          <div class="stat-line"><span>用時</span><span><b id="railTimer">0:00</b></span></div>
        </div>

        <div class="rail-card">
          <div class="rail-h">ERRORS<span class="ct">REVIEW</span></div>
          <div id="errorList" style="font-family:var(--mono);font-size:11.5px;letter-spacing:.06em;line-height:2;color:rgba(245,240,234,.65)">—</div>
        </div>
      </aside>

    </div>
  </main>

<script>
const API = 'https://sofa-engine-api.onrender.com';
const uid = localStorage.getItem('sofa_uid') || (location.hostname==='localhost'||location.protocol==='file:'?'PREVIEW':null);
const isFree = !uid && localStorage.getItem('sofa_free') === 'FREE';
if (!uid && !isFree) { window.location.href = 'login.html?redirect=quiz.html'; }
document.getElementById('navUid').textContent = isFree ? '免費版' : (localStorage.getItem('sofa_nickname') || uid);
if(isFree){
  const bar=document.createElement('div');
  bar.style.cssText='background:rgba(231,187,167,.13);border-bottom:1px solid rgba(231,187,167,.3);padding:10px 40px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;';
  bar.innerHTML='<span style="font-family:var(--mono);font-size:12px;letter-spacing:.06em;color:rgba(231,187,167,.9)">🔒 免費版 · 選擇題範圍有限，答題紀錄不會儲存 &nbsp;|&nbsp; <strong style="color:#E7BBA7">付費方案準備中，尚未開放</strong></span>'
    +'<a href="checkout.html" style="font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:rgba(231,187,167,.6);border:1px solid rgba(231,187,167,.4);border-radius:3px;padding:5px 14px;text-transform:uppercase;white-space:nowrap">了解方案 →</a>';
  document.querySelector('.pr-bar').before(bar);
}

(async()=>{
  const sel=document.getElementById('lawSelect');
  if(uid){
    const o=document.createElement('option');o.value='__starred__';o.textContent='★ 五星條文';sel.appendChild(o);
    const sep=document.createElement('option');sep.disabled=true;sep.textContent='──────';sel.appendChild(sep);
  }
  try{
    const d=await fetch(`${API}/api/laws`).then(r=>r.json());
    (d.laws||[]).forEach(l=>{const o=document.createElement('option');o.value=l.name;o.textContent=l.name;sel.appendChild(o);});
  }catch{}
})();

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

const _FREE_SECS=['規範意旨與條文解析','條文解析','考點整理','記憶技巧','相關條文'];
function buildSections(sections,isPaid,wrapEl,beforeEl){
  wrapEl.querySelectorAll('.sec-block,.sec-lock').forEach(e=>e.remove());
  _FREE_SECS.forEach(name=>{
    if(!sections[name])return;
    const d=document.createElement('div');d.className='sec-block';
    const lb=document.createElement('div');lb.className='sec-label';lb.textContent=name;
    const tx=document.createElement('div');tx.className='sec-text';tx.textContent=sections[name];
    d.append(lb,tx);
    if(beforeEl)wrapEl.insertBefore(d,beforeEl);else wrapEl.appendChild(d);
  });
  if(!isPaid){
    const lk=document.createElement('div');lk.className='sec-lock';
    lk.innerHTML='<div class="sec-lock-inner"><div class="sec-label">修法與聯覺備註</div><div class="sec-text">本條文近期修法重點與考試常見出題方向完整分析，含記憶技巧與易混淆比較⋯⋯</div></div><div class="sec-lock-overlay"><p>🔒 付費版完整考情分析</p><a href="checkout.html">升級解鎖 修法備註 · 實務應用 · 常見錯誤 →</a></div>';
    if(beforeEl)wrapEl.insertBefore(lk,beforeEl);else wrapEl.appendChild(lk);
  }
}

let answered=false,right=0,wrong=0,total=0,flagged=0;
let quizData=null;
// 本次作答紀錄
let sessionHistory=[]; // [{num, correct:null|true|false, flagged:false, law:'', title:''}]
// 計時器
let sessionStart=null, timerIv=null;

function startSessionTimer(){
  if(timerIv)return;
  sessionStart=Date.now();
  timerIv=setInterval(()=>{
    const sec=Math.floor((Date.now()-sessionStart)/1000);
    const m=Math.floor(sec/60), s=sec%60;
    const t=m+':'+(s<10?'0':'')+s;
    document.getElementById('railTimer').textContent=t;
    document.getElementById('topTimer').textContent=t;
  },1000);
}

function rebuildSetMap(){
  const grid=document.getElementById('qgrid');
  document.getElementById('mapCount').textContent=total+' Q';
  grid.innerHTML=sessionHistory.map(q=>{
    let cls='qcell';
    if(q.num===total&&q.correct===null)cls+=' cur';
    else if(q.correct===true)cls+=' ok';
    else if(q.correct===false)cls+=' bad';
    if(q.flagged)cls+=' flag';
    return`<div class="${cls}">${q.num}</div>`;
  }).join('');
}

function rebuildErrorList(){
  const errors=sessionHistory.filter(q=>q.correct===false);
  document.getElementById('errorList').innerHTML=errors.length
    ?errors.map(e=>`<div>Q${e.num}${e.law?' · '+e.law:''}${e.title?' '+e.title:''}</div>`).join('')
    :'<span style="color:rgba(245,240,234,.3)">—</span>';
}

function updateScore(){
  document.getElementById('qNum').textContent=total;
  document.getElementById('qNumBig').textContent=total;
  document.getElementById('scoreRight').textContent=right;
  document.getElementById('scoreWrong').textContent=wrong;
  document.getElementById('railTotal').textContent=sessionHistory.filter(q=>q.correct!==null).length;
  document.getElementById('railWrong').textContent=wrong;
  document.getElementById('railFlagged').textContent=flagged;
  const answered_n=sessionHistory.filter(q=>q.correct!==null).length;
  const acc=answered_n>0?Math.round(right/answered_n*100):0;
  document.getElementById('railAcc').textContent=answered_n>0?acc+'%':'—';
  rebuildSetMap();
  rebuildErrorList();
  // 進度條：以命中率為寬度（有作答才顯示）
  const prog_n=sessionHistory.filter(q=>q.correct!==null).length;
  const prog=prog_n>0?Math.round(right/prog_n*100):0;
  document.getElementById('quizProg').style.width=prog+'%';
}

async function loadQuiz(){
  answered=false; total++;
  // 新增到 sessionHistory
  sessionHistory.push({num:total, correct:null, flagged:false, law:'', title:''});
  startSessionTimer();

  document.getElementById('questionBox').textContent='載入中…';
  document.getElementById('questionBox').style.opacity='.45';
  document.getElementById('optionsBox').innerHTML='';
  document.getElementById('explainBox').style.display='none';
  document.getElementById('qSrc').innerHTML='—';
  updateScore();

  let law=document.getElementById('lawSelect').value;
  try{
    if(law==='__starred__'){
      const sl=await fetch(`${API}/api/starred?min_stars=5`,{headers:{'X-Sofa-UID':uid}}).then(r=>r.json());
      const arts=(sl.articles||[]).filter(a=>a.law);
      if(!arts.length) throw new Error('no starred');
      law=arts[Math.floor(Math.random()*arts.length)].law;
    }
    const url=law?`${API}/api/quiz?law=${encodeURIComponent(law)}`:`${API}/api/quiz`;
    const data=await fetch(url,{headers:{'X-Sofa-UID':uid}}).then(r=>r.json());
    if(data.error||data.detail){
      document.getElementById('questionBox').textContent=data.error||data.detail;
      document.getElementById('questionBox').style.opacity='1';
      sessionHistory.pop(); total--; updateScore(); return;
    }
    quizData=data;

    // 相容兩種 API 格式：
    // 新格式（已部署）：options=[string], answer=string, page_id=..., title=..., law_name=...
    // 舊格式：options=[{snippet, is_correct, id}], question=...
    const isNewFmt = typeof (data.options||[])[0] !== 'object';
    const correctAnswer = isNewFmt ? data.answer : null;
    const pageId = data.page_id || data.correct_id || null;

    const lawName=data.law_name||(law&&law!=='__starred__'?document.getElementById('lawSelect').selectedOptions[0]?.text:'');
    const artTitle=data.title||data.correct_title||'';
    const cur=sessionHistory[sessionHistory.length-1];
    cur.law=lawName; cur.title=artTitle;

    // 顯示法規來源
    if(lawName||artTitle){
      document.getElementById('qSrc').innerHTML=
        `<span style="color:var(--peach)">${esc(lawName)}</span>${artTitle?` <b>${esc(artTitle)}</b>`:''}`;
    }

    document.getElementById('questionBox').textContent=data.question||'出題失敗';
    document.getElementById('questionBox').style.opacity='1';
    document.getElementById('btnFlag').classList.remove('flagged');
    document.getElementById('btnFlag').textContent='⚑ 標記';

    const labels=['A','B','C','D'];
    (data.options||[]).forEach((opt,i)=>{
      const btn=document.createElement('div');
      btn.className='opt';
      const displayText=isNewFmt?opt:(opt.snippet||'');
      const isOptCorrect=isNewFmt?(opt===correctAnswer):!!opt.is_correct;
      btn.innerHTML=`<div class="key">${labels[i]}</div><div class="body">${esc(displayText)}</div>`;
      btn.addEventListener('click',()=>{
        if(answered)return;
        answered=true;
        document.querySelectorAll('#optionsBox .opt').forEach((b,j)=>{
          b.style.pointerEvents='none';b.style.cursor='default';
          const jOpt=data.options[j];
          const jCorrect=isNewFmt?(jOpt===correctAnswer):!!jOpt?.is_correct;
          if(jCorrect)b.classList.add('right');
        });
        const isCorrect=isOptCorrect;
        if(!isCorrect){btn.classList.add('wrong');wrong++;}else{right++;}
        cur.correct=isCorrect;
        updateScore();
        // 寫入練習紀錄
        if(pageId&&uid&&uid!=='PREVIEW'&&!isFree){
          fetch(`${API}/api/me/history`,{method:'POST',headers:{'Content-Type':'application/json','X-Sofa-UID':uid},body:JSON.stringify({page_id:pageId,law_name:lawName,article:artTitle})}).catch(()=>{});
        }
        // 顯示說明框
        const eb=document.querySelector('#explainBox .eb');
        if(eb)eb.textContent=isCorrect?'✓ 答對了':'✗ 答錯了，正確答案已標綠';
        if(pageId){
          document.getElementById('sourceLink').href=`dashboard.html?open=${encodeURIComponent(pageId)}`;
          document.getElementById('sourceBox').querySelector('span').textContent='查看該條完整原文 →';
        }
        document.getElementById('explainBox').style.display='block';
        // 載入條文解析 sections
        if(pageId){
          (async()=>{
            try{
              const h={};if(uid)h['X-Sofa-UID']=uid;
              const art=await fetch(`${API}/api/article/${pageId}`,{headers:h}).then(r=>r.json());
              buildSections(art.sections||{},art._plan!=='free',
                document.getElementById('explainBox'),document.getElementById('sourceBox'));
            }catch(e){}
          })();
        }
      });
      document.getElementById('optionsBox').appendChild(btn);
    });
  }catch(e){
    document.getElementById('questionBox').textContent='載入失敗，請稍後再試';
    document.getElementById('questionBox').style.opacity='1';
    sessionHistory.pop(); total--; updateScore();
  }
}

function doFlag(){
  if(!quizData)return;
  const cur=sessionHistory.find(q=>q.num===total);
  const pid=quizData.page_id||quizData.correct_id||null;
  const btn=document.getElementById('btnFlag');
  if(btn.classList.contains('flagged')){
    btn.classList.remove('flagged');btn.textContent='⚑ 標記';
    flagged=Math.max(0,flagged-1);
    if(cur)cur.flagged=false;
    if(uid&&uid!=='PREVIEW'&&!isFree&&pid)
      fetch(`${API}/api/me/mastery`,{method:'POST',headers:{'Content-Type':'application/json','X-Sofa-UID':uid},body:JSON.stringify({page_id:pid,status:'none'})}).catch(()=>{});
  }else{
    btn.classList.add('flagged');btn.textContent='⚑ 已標記';
    flagged++;
    if(cur)cur.flagged=true;
    if(uid&&uid!=='PREVIEW'&&!isFree&&pid)
      fetch(`${API}/api/me/mastery`,{method:'POST',headers:{'Content-Type':'application/json','X-Sofa-UID':uid},body:JSON.stringify({page_id:pid,law_name:quizData.law_name||'',article:quizData.title||quizData.correct_title||'',status:'review',review_days:7})}).catch(()=>{});
  }
  updateScore();
}
document.getElementById('btnFlag').addEventListener('click',doFlag);
document.getElementById('btnNew').addEventListener('click',loadQuiz);
document.getElementById('btnNext').addEventListener('click',loadQuiz);
document.addEventListener('keydown',e=>{
  if(e.key==='Enter')loadQuiz();
  if(e.key.toLowerCase()==='f'){doFlag();return;}
  const idx={'a':0,'b':1,'c':2,'d':3}[e.key.toLowerCase()];
  if(idx!==undefined){const opts=document.querySelectorAll('.opt');if(opts[idx])opts[idx].click();}
});
</script>
