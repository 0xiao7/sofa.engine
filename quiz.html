<html lang="zh-TW">

<title>選擇題 — SoFa Engine</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --navy:   #1F3848; --navy-2: #19303E; --navy-3: #142836;
  --peach:  #E7BBA7; --peach-2:#F0CDBD; --peach-3:#C89580;
  --cream:  #F5F0EA;
  --green:  #7ecf7e; --red:    #e06060;
  --line-on-navy: rgba(245,240,234,.14);
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --serif:'Noto Serif TC',serif; --sans:'Noto Sans TC',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
body{background:var(--navy);color:var(--cream);font-family:var(--sans);font-weight:300;min-height:100vh;display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 70% 50% at 10% 0%,rgba(13,28,40,.7) 0%,transparent 60%),
             radial-gradient(ellipse 60% 70% at 85% 95%,rgba(231,187,167,.05) 0%,transparent 55%);
  pointer-events:none;z-index:0;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;background:rgba(13,28,40,.96);backdrop-filter:blur(18px);border-bottom:1px solid var(--line-on-navy);}
.nav-brand{font-family:var(--mono);font-size:.85rem;letter-spacing:.14em;color:var(--peach);text-decoration:none;}
.nav-back{font-family:var(--mono);font-size:.7rem;letter-spacing:.12em;color:rgba(245,240,234,.4);text-decoration:none;border:1px solid var(--line-on-navy);padding:.28rem .8rem;transition:color .2s,border-color .2s;}
.nav-back:hover{color:var(--cream);border-color:rgba(231,187,167,.3);}
main{flex:1;padding:5rem 1.5rem 3rem;position:relative;z-index:1;max-width:640px;margin:0 auto;width:100%;}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:1rem;}
.spinner{width:28px;height:28px;border:2px solid rgba(231,187,167,.15);border-top-color:var(--peach);border-radius:50%;animation:spin .8s linear infinite;}
.loading-text{font-family:var(--mono);font-size:.72rem;color:rgba(245,240,234,.35);letter-spacing:.1em;}
.art-eyebrow{font-family:var(--mono);font-size:.65rem;letter-spacing:.18em;color:rgba(245,240,234,.35);text-transform:uppercase;margin-bottom:.4rem;}
.art-title{font-family:var(--serif);font-size:1.1rem;font-weight:600;color:var(--cream);margin-bottom:1.2rem;}
.counter{font-family:var(--mono);font-size:.68rem;letter-spacing:.1em;color:rgba(245,240,234,.3);margin-bottom:.9rem;}
/* SCORE BAR */
.score-bar{display:flex;gap:1.2rem;margin-bottom:1.4rem;font-family:var(--mono);font-size:.7rem;letter-spacing:.06em;}
.score-item{color:rgba(245,240,234,.35);}
.score-item span{margin-left:.3rem;}
.score-item .v-correct{color:var(--green);}
.score-item .v-wrong{color:var(--red);}
/* QUESTION */
.question-card{
  background:var(--navy-2);border:1px solid var(--line-on-navy);
  padding:1.4rem 1.6rem;margin-bottom:1.2rem;
  font-family:var(--serif);font-size:1rem;line-height:1.9;
}
.blank-slot{
  display:inline-block;font-family:var(--mono);font-size:.9rem;
  color:var(--peach);border-bottom:2px solid var(--peach);
  padding:0 .3rem;letter-spacing:.05em;
}
/* OPTIONS */
.options{display:flex;flex-direction:column;gap:.6rem;margin-bottom:1.4rem;}
.option{
  display:flex;align-items:center;gap:.9rem;
  padding:.85rem 1.1rem;
  background:var(--navy-3);border:1px solid var(--line-on-navy);
  cursor:pointer;transition:background .15s,border-color .15s;
  animation:slideIn .2s ease both;
}
.option:hover:not(.locked){background:#1a3347;border-color:rgba(231,187,167,.2);}
.option.selected{border-color:rgba(231,187,167,.5);background:rgba(231,187,167,.07);}
.option.correct-reveal{border-color:var(--green);background:rgba(126,207,126,.08);}
.option.wrong-reveal{border-color:var(--red);background:rgba(224,96,96,.07);opacity:.7;}
.option.locked{cursor:default;}
.opt-key{
  font-family:var(--mono);font-size:.72rem;letter-spacing:.1em;
  color:rgba(245,240,234,.35);min-width:1.4rem;
}
.opt-text{font-family:var(--mono);font-size:.95rem;color:var(--cream);}
.opt-mark{margin-left:auto;font-family:var(--mono);font-size:.8rem;}
/* RESULT FEEDBACK */
.feedback{
  padding:.9rem 1.2rem;margin-bottom:1.2rem;
  font-family:var(--mono);font-size:.78rem;letter-spacing:.05em;
  display:none;
}
.feedback.show{display:block;}
.feedback.correct{background:rgba(126,207,126,.08);border:1px solid rgba(126,207,126,.25);color:var(--green);}
.feedback.wrong{background:rgba(224,96,96,.08);border:1px solid rgba(224,96,96,.2);color:var(--red);}
/* BUTTONS */
.btn-row{display:flex;gap:.75rem;}
.btn{font-family:var(--sans);font-size:.84rem;font-weight:600;padding:.7rem 1.6rem;border:none;cursor:pointer;border-radius:2px;transition:background .2s,transform .18s,box-shadow .2s;}
.btn-primary{background:var(--peach);color:var(--navy);}
.btn-primary:hover:not(:disabled){background:var(--peach-2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(231,187,167,.18);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-ghost{background:transparent;color:rgba(245,240,234,.5);border:1px solid var(--line-on-navy);}
.btn-ghost:hover{border-color:rgba(231,187,167,.3);color:var(--cream);}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-brand">SOFA ENGINE</a>
  <a href="/dashboard.html" class="nav-back">← 會員中心</a>
</nav>
<main id="main">
  <div class="loading-state"><div class="spinner"></div><div class="loading-text">載入題目中…</div></div>
</main>
<script>
const API = 'https://sofa-engine-api.onrender.com';
const KEYS = ['A','B','C','D'];
function getUID(){ return localStorage.getItem('sofa_uid')||''; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let _answer = '', _chosen = null, _locked = false;
let _count = 0, _correct = 0, _wrong = 0;

function buildUI(data){
  _answer = data.answer || '';
  _chosen = null; _locked = false;
  _count++;

  // Replace （　　） with styled blank
  const qHtml = esc(data.question || '').replace(/（　　）/g,
    '<span class="blank-slot">（　　）</span>');

  const opts = (data.options || []).map((o, i) => `
    <div class="option" data-val="${esc(o)}" onclick="pick(this)" style="animation-delay:${i*0.05}s">
      <span class="opt-key">${KEYS[i]}</span>
      <span class="opt-text">${esc(o)}</span>
      <span class="opt-mark"></span>
    </div>
  `).join('');

  document.getElementById('main').innerHTML = `
    <div class="art-eyebrow">QUIZ · 數字選擇題</div>
    <div class="art-title">${esc(data.title)}</div>
    <div class="score-bar">
      <span class="score-item">第 ${_count} 題</span>
      <span class="score-item">正確 <span class="v-correct">${_correct}</span></span>
      <span class="score-item">錯誤 <span class="v-wrong">${_wrong}</span></span>
    </div>
    <div class="question-card">${qHtml}</div>
    <div class="options" id="options">${opts}</div>
    <div class="feedback" id="feedback"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="next-btn" onclick="loadQuestion()" disabled>下一題</button>
      <button class="btn btn-ghost" onclick="loadQuestion()">換題</button>
    </div>
  `;
}

function pick(el){
  if(_locked) return;
  _locked = true;
  _chosen = el.dataset.val;
  const isCorrect = _chosen === _answer;
  if(isCorrect) _correct++; else _wrong++;

  document.querySelectorAll('.option').forEach(o => {
    o.classList.add('locked');
    const val = o.dataset.val;
    if(val === _answer){
      o.classList.add('correct-reveal');
      o.querySelector('.opt-mark').textContent = '✓';
    } else if(val === _chosen && !isCorrect){
      o.classList.add('wrong-reveal');
      o.querySelector('.opt-mark').textContent = '✗';
    }
  });

  const fb = document.getElementById('feedback');
  fb.classList.add('show');
  if(isCorrect){
    fb.classList.add('correct');
    fb.textContent = '✓ 正確！';
  } else {
    fb.classList.add('wrong');
    fb.textContent = `✗ 答案是 ${_answer}`;
  }

  document.getElementById('next-btn').disabled = false;
}

async function loadQuestion(){
  document.getElementById('main').innerHTML = `
    <div class="loading-state"><div class="spinner"></div><div class="loading-text">載入題目中…</div></div>
  `;
  try{
    const res = await fetch(`${API}/api/quiz`, {headers:{'X-Sofa-UID':getUID()}});
    if(!res.ok) throw new Error((await res.json()).detail || '載入失敗');
    buildUI(await res.json());
  } catch(e){
    document.getElementById('main').innerHTML = `
      <div class="loading-state">
        <div class="loading-text" style="color:rgba(224,96,96,.7)">${esc(e.message)}</div>
        <button class="btn btn-ghost" onclick="loadQuestion()" style="margin-top:1rem">重試</button>
      </div>
    `;
  }
}

if(!getUID()){ window.location.href='/login.html'; } else { loadQuestion(); }
</script>
</body>
</html>
