<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<title>SoFa Engine — 選擇題</title>
<link rel="canonical" href="https://sofaengine.org/quiz.html" />
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-G81F9D4YJ3"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-G81F9D4YJ3');</script>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="sofa.css" />
<script src="sofa-analytics.js?v=20260704-revenue-v1" defer></script>
<style>
  html,body{max-width:100%;overflow-x:hidden}
  .pr-bar{
    background:var(--navy-2);border-bottom:1px solid var(--line);
    padding:16px 40px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;
  }
  .pr-bar .l{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .pr-bar .back{
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;
    color:rgba(245,240,234,.55);text-transform:uppercase;
    padding:6px 10px;border:1px solid var(--line-2);border-radius:3px;
  }
  .pr-bar .title{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .pr-bar .title .lab{
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;
    color:rgba(245,240,234,.5);text-transform:uppercase;
  }
  .pr-bar .title .v{font-family:var(--serif);font-weight:600;font-size:17px;color:var(--cream)}
  .pr-meta{
    display:flex;align-items:center;gap:22px;
    font-family:var(--mono);font-size:12px;letter-spacing:.08em;color:rgba(245,240,234,.55);
  }
  .pr-meta .seg b{color:var(--peach);font-weight:600;font-size:13px;margin-left:6px}
  .pr-meta .timer b{color:var(--cream);font-family:var(--serif);font-size:18px;letter-spacing:.02em}

  .pr-progress{height:2px;background:rgba(245,240,234,.06);position:relative}
  .pr-progress .fl{
    position:absolute;left:0;top:0;height:100%;
    background:linear-gradient(to right, var(--peach), var(--peach-2));
    width:42%;
  }

  .stage{padding:40px 64px 96px;background:var(--navy-3);position:relative;min-height:calc(100vh - 70px - 60px - 2px)}
  .stage::before{
    content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(245,240,234,.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,240,234,.018) 1px, transparent 1px);
    background-size:60px 60px;
    mask-image:radial-gradient(ellipse 60% 50% at 50% 0%, #000 30%, transparent 70%);
    pointer-events:none;
  }
  .inner{max-width:1080px;margin:0 auto;position:relative;display:grid;grid-template-columns:1fr 260px;gap:32px}

  /* question head */
  .q-head{
    display:flex;align-items:flex-end;justify-content:space-between;gap:24px;
    padding-bottom:18px;border-bottom:1px solid var(--line);margin-bottom:28px;
  }
  .q-head .eb{
    font-family:var(--mono);font-size:11px;color:var(--peach);
    letter-spacing:.22em;text-transform:uppercase;
    display:flex;align-items:center;gap:10px;
  }
  .q-head .eb::before{content:"";width:18px;height:1px;background:var(--peach)}
  .q-head .n{
    font-family:var(--serif);font-weight:600;font-size:54px;line-height:1;
    color:var(--cream);letter-spacing:-.01em;
  }
  .q-head .n .of{font-size:22px;color:rgba(245,240,234,.45);font-weight:400;margin-left:4px}
  .q-head .src{
    text-align:right;font-family:var(--mono);font-size:11px;letter-spacing:.12em;
    color:rgba(245,240,234,.5);text-transform:uppercase;line-height:1.8;
  }
  .q-head .src b{color:var(--peach);font-weight:600;display:block;margin-top:4px;font-size:12px}

  .q-stem{
    background:var(--navy-2);border:1px solid var(--line);border-radius:4px;
    padding:32px 36px;position:relative;
  }
  .q-stem::before{
    content:"QUESTION";position:absolute;top:16px;right:22px;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;color:rgba(245,240,234,.25);
  }
  .q-stem p{font-family:var(--serif);font-size:21px;line-height:1.85;color:var(--cream);letter-spacing:.02em}
  .q-stem .quote{
    margin-top:18px;padding:18px 22px;background:var(--navy-3);border-left:3px solid var(--peach-dim);
    border-radius:0 3px 3px 0;font-size:16px;line-height:1.85;color:rgba(245,240,234,.72);
  }
  .q-stem .quote .ro{font-family:var(--mono);color:var(--peach);font-weight:600;margin-right:4px;font-size:13px}

  /* options */
  .opts{margin-top:24px;display:flex;flex-direction:column;gap:10px}
  .opt{
    background:var(--navy-2);border:1px solid var(--line);border-radius:4px;
    padding:18px 22px;display:flex;align-items:flex-start;gap:18px;
    cursor:pointer;transition:.18s;position:relative;
  }
  .opt:hover{background:var(--plum-1);border-color:var(--peach-dim);transform:translateX(2px)}
  .opt .key{
    width:36px;height:36px;border:1.5px solid var(--line-2);border-radius:50%;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    font-family:var(--mono);font-weight:600;font-size:14px;color:rgba(245,240,234,.65);
    transition:.18s;
  }
  .opt .body{flex:1;font-size:15.5px;line-height:1.75;color:rgba(245,240,234,.85);padding-top:4px}
  .opt .body .tag{
    display:inline-block;margin-right:8px;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;
    color:rgba(245,240,234,.5);
  }

  /* selected */
  .opt.sel{border-color:var(--peach);background:rgba(231,187,167,.06)}
  .opt.sel .key{background:var(--peach);color:var(--navy);border-color:var(--peach)}
  .opt.sel .body{color:var(--cream)}

  /* answered states */
  .opt.right{border-color:var(--good);background:rgba(159,184,159,.08)}
  .opt.right .key{background:var(--good);color:var(--navy-3);border-color:var(--good)}
  .opt.right::after{
    content:"✓ 正確";position:absolute;top:18px;right:22px;
    font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--good);font-weight:600;
  }
  .opt.wrong{border-color:var(--bad);background:rgba(199,123,106,.08)}
  .opt.wrong .key{background:var(--bad);color:var(--cream);border-color:var(--bad)}
  .opt.wrong::after{
    content:"✗ 你選的";position:absolute;top:18px;right:22px;
    font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--bad);font-weight:600;
  }

  /* explanation */
  .explain{
    margin-top:24px;background:var(--cream);color:var(--navy);
    border-radius:4px;padding:24px 28px;border-left:4px solid var(--peach-3);
    position:relative;
  }
  .explain .eb{
    font-family:var(--mono);font-size:11px;font-weight:600;color:var(--peach-3);
    letter-spacing:.22em;text-transform:uppercase;
  }
  .explain h3{
    font-family:var(--serif);font-weight:600;font-size:20px;margin-top:8px;color:var(--navy);
  }
  .explain p{margin-top:12px;font-size:14.5px;line-height:1.85;color:rgba(31,56,72,.78)}
  .explain p b{color:var(--navy);font-weight:600}
  .explain .kw{background:rgba(231,187,167,.45);padding:1px 5px;border-radius:2px;color:var(--navy);font-weight:600}
  .explain .src{
    margin-top:16px;padding-top:12px;border-top:1px dashed rgba(31,56,72,.15);
    display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;
    letter-spacing:.12em;color:rgba(31,56,72,.55);text-transform:uppercase;
  }
  .explain .src a{color:var(--peach-3);font-weight:600}
  .explain .src button{background:none;border:none;padding:0;cursor:pointer;font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--peach-3);font-weight:600}
  .art-inline{margin-top:14px;padding:16px 20px;background:rgba(31,56,72,.06);border-radius:3px;max-height:380px;overflow-y:auto;font-family:var(--serif);font-size:14.5px;line-height:2;color:rgba(31,56,72,.82);white-space:pre-wrap;display:none}

  #quiz-answer-actions{display:none;margin-top:18px;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
  #quiz-answer-actions.show{display:grid}
  #quiz-answer-actions button,
  #quiz-answer-actions a{
    min-height:44px;display:inline-flex;align-items:center;justify-content:center;
    border-radius:4px;border:1px solid var(--line);padding:0 14px;
    font-family:var(--mono);font-size:12px;letter-spacing:.06em;text-decoration:none;
    color:var(--cream);background:var(--navy-2);cursor:pointer;
  }
  #view-article-btn{min-height:44px}
  #view-weakness-btn{min-height:44px}
  #quiz-answer-actions #btnNext{min-height:44px;background:var(--peach);border-color:var(--peach);color:var(--navy);font-weight:700}
  #quiz-answer-actions #btnFlag{min-height:44px}
  #post-answer-retention{
    display:none;grid-column:1 / -1;align-items:center;justify-content:space-between;gap:12px;
    border:1px dashed rgba(231,187,167,.38);border-radius:4px;
    padding:12px 14px;background:rgba(231,187,167,.08);
    color:rgba(245,240,234,.82);font-size:13px;line-height:1.6;
  }
  #post-answer-retention .retention-copy b{color:var(--cream);font-weight:600}
  #post-answer-retention .retention-links{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  #post-answer-retention a{min-height:44px;background:rgba(245,240,234,.06);white-space:nowrap}
  #post-answer-retention a.primary{background:var(--peach);border-color:var(--peach);color:var(--navy);font-weight:700}

  /* section analysis */
  .sec-block{margin-top:16px;padding-top:14px;border-top:1px dashed rgba(31,56,72,.15)}
  .sec-label{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--peach-3);font-weight:600;margin-bottom:6px}
  .sec-text{font-size:13px;line-height:1.85;color:rgba(31,56,72,.78)}
  .sec-text .sec-h{margin:10px 0 4px;color:var(--navy);font-weight:600}
  .sec-text .sec-h:first-child{margin-top:0}
  .sec-text .sec-i{position:relative;padding-left:18px;margin:3px 0}
  .sec-text .sec-i::before{content:'◦';position:absolute;left:4px;top:-.04em;color:var(--peach-3);font-weight:700}
  .sec-lock{margin-top:16px;border-top:1px dashed rgba(31,56,72,.15)}
  .sec-lock .sec-label::after{content:" 🔒";font-size:11px;opacity:.65}
  .sec-lock-preview{position:relative;max-height:80px;overflow:hidden;padding:10px 0 0;pointer-events:none;user-select:none;font-size:13.5px;line-height:1.8;color:rgba(31,56,72,.72)}
  .sec-lock-preview::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(245,240,234,0) 15%,var(--cream) 82%);pointer-events:none}
  .sec-lock-cta{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;padding:10px 16px;font-size:12.5px;color:rgba(31,56,72,.72);background:rgba(231,187,167,.1);border:1px dashed rgba(213,154,120,.4);border-radius:4px}
  .sec-lock-cta a{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--peach);text-decoration:none;padding:5px 14px;border:1px solid rgba(213,154,120,.4);border-radius:2px;white-space:nowrap}

  /* bottom action */
  .q-foot{
    margin-top:28px;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;
    padding-top:20px;border-top:1px dashed var(--line);
  }
  .q-foot .l{display:flex;gap:18px;font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:rgba(245,240,234,.5);text-transform:uppercase;align-items:center;flex-wrap:wrap}
  .q-foot .l kbd{
    display:inline-block;padding:3px 8px;
    background:var(--navy-2);border:1px solid var(--line-2);
    border-radius:3px;font-family:var(--mono);font-size:10.5px;color:var(--peach);margin-right:6px;
  }
  .q-foot .r{display:flex;gap:10px}

  /* === rail === */
  .rail{display:flex;flex-direction:column;gap:18px;position:sticky;top:92px;align-self:start}
  .rail-card{background:var(--navy-2);border:1px solid var(--line);border-radius:4px;padding:22px}
  .rail-h{
    font-family:var(--mono);font-size:11px;color:var(--peach);
    letter-spacing:.22em;text-transform:uppercase;font-weight:600;
    padding-bottom:12px;border-bottom:1px dashed var(--line);margin-bottom:14px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .rail-h .ct{color:rgba(245,240,234,.4);font-weight:500;letter-spacing:.1em}

  .qgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
  .qcell{
    aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:12px;font-weight:600;
    background:var(--navy-3);border:1px solid var(--line-2);border-radius:3px;
    color:rgba(245,240,234,.6);cursor:pointer;transition:.18s;
  }
  .qcell:hover{border-color:var(--peach)}
  .qcell.cur{background:var(--peach);color:var(--navy);border-color:var(--peach)}
  .qcell.ok{background:rgba(159,184,159,.18);color:var(--good);border-color:rgba(159,184,159,.3)}
  .qcell.bad{background:rgba(199,123,106,.18);color:var(--bad);border-color:rgba(199,123,106,.3)}
  .qcell.flag{position:relative}
  .qcell.flag::after{
    content:"";position:absolute;top:3px;right:3px;width:4px;height:4px;
    background:var(--warn);border-radius:50%;
  }

  .stat-line{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:13px;color:rgba(245,240,234,.7)}
  .stat-line + .stat-line{border-top:1px dashed var(--line)}
  .stat-line b{font-family:var(--mono);color:var(--cream);font-weight:600}
  .stat-line .v.good{color:var(--good)}
  .stat-line .v.bad{color:var(--bad)}

  @media (max-width:1100px){
    .pr-bar{padding:14px 24px}
    .stage{padding:32px 32px 72px}
    .inner{grid-template-columns:1fr}
    .rail{position:static;flex-direction:row;flex-wrap:wrap}
    .rail-card{flex:1;min-width:240px}
  }
  @media (max-width:760px){
    .topbar{max-width:100vw;gap:10px;overflow:hidden}
    .brand{min-width:0;font-size:14px;letter-spacing:.12em;white-space:nowrap}
    .top-right{gap:10px;min-width:0}
    .user-pill{display:none}
    .pr-bar{padding:12px 18px}
    .pr-bar,.pr-bar .l,.pr-meta{min-width:0;max-width:100%}
    .pr-meta{gap:14px;font-size:11px;overflow:hidden}
    .pr-meta .seg{white-space:nowrap}
    .stage{padding:24px 18px 60px}
    .stage,.inner,.q-stem,.rail-card{max-width:100%;min-width:0}
    .q-head{flex-direction:column;align-items:flex-start;gap:14px}
    .q-head .src{text-align:left}
    .q-head .n{font-size:42px}
    .q-stem{padding:22px 22px}
    .q-stem p{font-size:17px}
    .opt{padding:14px 18px;gap:14px}
    .opt .body{font-size:14.5px}
    .opt.right::after,.opt.wrong::after{display:none}
    .q-foot{flex-direction:column;align-items:stretch}
    .q-foot .r{flex-direction:column}
    .rail{flex-direction:column}
    .stage{overflow-x:hidden}
    .inner{max-width:100%}
    #quiz-answer-actions{display:none;grid-template-columns:1fr}
    #quiz-answer-actions.show{display:grid}
    #quiz-answer-actions button{width:100%;min-width:0}
    #quiz-answer-actions a{width:100%;min-width:0}
    #quiz-answer-actions #quiz-citation{grid-column:1 / -1}
    #post-answer-retention{align-items:stretch;flex-direction:column}
    #post-answer-retention .retention-links{justify-content:stretch}
  }
  h1,h2,h3,h4{text-wrap:balance;}
  p{text-wrap:pretty;}
  .pr-chips{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 40px;background:var(--navy-2);border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11.5px;letter-spacing:.08em}
  .pr-chips .lab{color:rgba(245,240,234,.4);text-transform:uppercase;margin-right:4px}
  .pr-chip{padding:6px 12px;border:1px solid var(--line-2);border-radius:100px;background:transparent;color:rgba(245,240,234,.55);cursor:pointer;font-family:var(--mono);font-size:11px;letter-spacing:.06em;transition:.18s}
  .pr-chip:hover{border-color:var(--peach-dim);color:var(--cream)}
  .pr-chip.on{background:var(--peach);color:var(--navy);border-color:var(--peach);font-weight:600}
  .pr-chips.is-locked .pr-chip{opacity:.4;cursor:not-allowed;border-color:var(--line-2)!important;color:rgba(245,240,234,.35)!important;background:transparent!important}
  .pr-chips .lock-hint{display:none;font-size:10.5px;color:var(--peach-dim);letter-spacing:.05em;margin-left:auto;font-style:italic;opacity:.85}
  .pr-chips.is-locked .lock-hint{display:inline-block}
  .pr-sub{display:none;align-items:center;gap:8px;margin-left:6px}
  .pr-sub.show{display:flex}
  .pr-sub select{background:var(--navy-3);border:1px solid var(--line-2);border-radius:3px;color:var(--cream);font-family:var(--mono);font-size:11.5px;padding:5px 10px;cursor:pointer;outline:none}
  @media (max-width:760px){
    .pr-chips{padding:10px 18px;max-width:100vw;overflow:hidden}
    .pr-chip{min-height:34px;padding:7px 12px}
  }
  html.ios-reader-app .stage{padding-top:calc(34px + env(safe-area-inset-top, 0px))}
</style>
</head>
<body>

  <header class="topbar">
    <a class="brand" href="index.html"><span class="dot"></span>SOFA&nbsp;ENGINE</a>
    <nav class="top-mid">
      <a href="dashboard.html">會員中心</a>
      <a href="practice.html">打字</a>
      <a href="fill.html">填空</a>
      <a href="quiz.html" class="on">選擇題</a>
    </nav>
    <div class="top-right">
      <span class="user-pill"><span class="live"></span><span id="navUid">—</span></span>
      <button class="btn-out" onclick="localStorage.removeItem('sofa_uid');localStorage.removeItem('sofa_token');window.location.href='login.html'">登出</button>
      <button class="menu-btn"><span></span></button>
    </div>
  </header>

  <div class="pr-bar">
    <div class="l">
      <a href="dashboard.html" class="back">← BACK</a>
      <div class="title">
        <span class="lab">LAW</span>
        <select id="lawSelect" style="background:transparent;border:none;outline:none;font-family:var(--serif);font-weight:600;font-size:17px;color:var(--cream);cursor:pointer;-webkit-appearance:none;appearance:none"><option value="">全部法規</option></select>
      </div>
      <div class="title" id="artPickWrap" style="display:none">
        <span class="lab">§</span>
        <input id="artNumInput" list="artDatalist" placeholder="條號"
          style="background:transparent;border:none;outline:none;font-family:var(--mono);font-size:14px;color:var(--cream);width:64px;cursor:text">
        <datalist id="artDatalist"></datalist>
      </div>
      <button id="btnNew" class="btn btn-sec" style="padding:8px 16px;font-size:13px">出題</button>
      <button id="btnPastExam" onclick="_setPastExamMode(!_pastExamMode)"
        style="background:rgba(231,187,167,0.12);border:1px solid rgba(231,187,167,0.42);
               color:var(--peach);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;">
        考古題
      </button>
      <select id="pastExamSubject" onchange="if(_pastExamMode) loadQuiz()"
        style="display:none;background:var(--navy-3);border:1px solid rgba(231,187,167,0.35);
               border-radius:8px;color:var(--cream);font-size:12px;padding:6px 10px;">
        <option value="記帳相關法規概要">記帳法規</option>
        <option value="稅務相關法規概要">稅務法規</option>
      </select>
      <select id="pastExamYear" onchange="if(_pastExamMode) loadQuiz()"
        style="display:none;background:var(--navy-3);border:1px solid rgba(231,187,167,0.35);
               border-radius:8px;color:var(--cream);font-size:12px;padding:6px 10px;">
        <option value="">全部年度</option>

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function normalizeArticleCore(raw){
  const value=String(raw||'').replace(/^§\s*/,'').split(/[｜|]/)[0].trim();
  const m=value.match(/^第?([0-9一二三四五六七八九十百千零兩]+)條?(之[0-9一二三四五六七八九十百千零兩]+)?/);
  if(m)return {core:m[1],suffix:m[2]||''};
  const plain=value.match(/^([0-9]+)(之[0-9]+)?$/);
  if(plain)return {core:plain[1],suffix:plain[2]||''};
  return {core:value,suffix:''};
}

function getArticleCitationNo(raw){
  const n=normalizeArticleCore(raw);
  return `${n.core}${n.suffix}`;
}

function formatArticleCitation(raw,lawName){
  const n=normalizeArticleCore(raw);
  const law=lawName?` ｜ ${lawName}`:'';
  return n.core?`第 ${n.core} 條${n.suffix}${law}`:`${lawName||''}`;
}

const _LOCKED_SECS=[
  {name:'修法與聯覺備註',  label:'修法與聯覺備註'},
  {name:'相關法規及注意事項',label:'相關法規及注意事項'}
];
function formatSection(text){
  if(!text) return '';
  var lines=String(text).replace(/\r\n?/g,'\n').split('\n'),out='';
  lines.forEach(function(raw){
    if(!raw||!raw.trim())return;
    var lead=(raw.match(/^[ \t　]*/)||[''])[0],body=raw.slice(lead.length),isSub=false;
    var bm=body.match(/^([•◦‣·▪])\s*/);
    if(bm){isSub=(bm[1]==='◦');body=body.slice(bm[0].length);}
    else if(lead.length>=2||/　/.test(lead)){isSub=true;}
    body=body.trim();if(!body)return;
    var esc=body.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    esc=esc.replace(/^([^：:]{1,14}[：:])/,'<b>$1</b>');
    out+='<p class="'+(isSub?'sec-i':'sec-h')+'">'+esc+'</p>';
  });
  return out;
}
function buildSections(sections,isPaid,wrapEl,beforeEl){
  wrapEl.querySelectorAll('.sec-block,.sec-lock').forEach(e=>e.remove());
  _FREE_SECS.forEach(name=>{
    if(!sections[name])return;
    const d=document.createElement('div');d.className='sec-block';
    const lb=document.createElement('div');lb.className='sec-label';lb.textContent=name;
    const tx=document.createElement('div');tx.className='sec-text';tx.innerHTML=formatSection(sections[name]);
    d.append(lb,tx);
    if(beforeEl)wrapEl.insertBefore(d,beforeEl);else wrapEl.appendChild(d);
  });
  if(!isPaid){
    _LOCKED_SECS.forEach(({name,label})=>{
      const lk=document.createElement('div');lk.className='sec-lock';
      const preview=sections[name]||'';
      lk.innerHTML='<div class="sec-label">'+label+'</div>'
        +'<div class="sec-lock-preview">'+(preview?formatSection(preview):'')+'</div>'
        +'<div class="sec-lock-cta">🔒 升級解鎖完整內容 <a href="checkout.html">查看方案 →</a></div>';
      if(beforeEl)wrapEl.insertBefore(lk,beforeEl);else wrapEl.appendChild(lk);
    });
  }
}

let sessionHistory=[]; // [{num, correct:null|true|false, flagged:false, law:'', title:''}]
// 計時器
let sessionStart=null, timerIv=null;

function startSessionTimer(){
  if(timerIv)return;
  sessionStart=Date.now();
  timerIv=setInterval(()=>{
    const sec=Math.floor((Date.now()-sessionStart)/1000);
    const m=Math.floor(sec/60), s=sec%60;
    const t=m+':'+(s<10?'0':'')+s;
    document.getElementById('railTimer').textContent=t;
    document.getElementById('topTimer').textContent=t;
  },1000);
}

function rebuildSetMap(){
  const grid=document.getElementById('qgrid');
  document.getElementById('mapCount').textContent=total+' Q';
  grid.innerHTML=sessionHistory.map(q=>{
    let cls='qcell';
    if(q.num===total&&q.correct===null)cls+=' cur';
    else if(q.correct===true)cls+=' ok';
    else if(q.correct===false)cls+=' bad';
    if(q.flagged)cls+=' flag';
    return`<div class="${cls}">${q.num}</div>`;
  }).join('');
}

function rebuildErrorList(){
  const errors=sessionHistory.filter(q=>q.correct===false);
  document.getElementById('errorList').innerHTML=errors.length
    ?errors.map(e=>`<div>Q${e.num}${e.law?' · '+e.law:''}${e.title?' '+e.title:''}</div>`).join('')
    :'<span style="color:rgba(245,240,234,.3)">—</span>';
}

function updateScore(){
  document.getElementById('qNum').textContent=total;
  document.getElementById('qNumBig').textContent=total;
  document.getElementById('scoreRight').textContent=right;
  document.getElementById('scoreWrong').textContent=wrong;
  document.getElementById('railTotal').textContent=sessionHistory.filter(q=>q.correct!==null).length;
  document.getElementById('railWrong').textContent=wrong;
  document.getElementById('railFlagged').textContent=flagged;
  const answered_n=sessionHistory.filter(q=>q.correct!==null).length;
  const acc=answered_n>0?Math.round(right/answered_n*100):0;
  document.getElementById('railAcc').textContent=answered_n>0?acc+'%':'—';
  rebuildSetMap();
  rebuildErrorList();
  // 進度條：以命中率為寬度（有作答才顯示）
  const prog_n=sessionHistory.filter(q=>q.correct!==null).length;
  const prog=prog_n>0?Math.round(right/prog_n*100):0;
  document.getElementById('quizProg').style.width=prog+'%';
}

function updatePostAnswerRetention(){
  const retention=document.getElementById('post-answer-retention');
  if(!retention)return;
  retention.style.display = isFree ? 'flex' : 'none';
}

function hideQuizAnswerActions(){
  const actions=document.getElementById('quiz-answer-actions');
  if(actions)actions.classList.remove('show');
}

function showQuizAnswerActions(){
  const actions=document.getElementById('quiz-answer-actions');
  if(!actions)return;
  document.getElementById('view-article-btn').style.display = 'inline-flex';
  document.getElementById('view-weakness-btn').style.display = 'inline-flex';
  updatePostAnswerRetention();
  actions.classList.add('show');
  if(typeof window.sofaTrack==='function') window.sofaTrack('post_answer_value_viewed',{surface:'quiz',free:isFree});
  actions.scrollIntoView({block:'center', behavior:'auto'});
}

function _pastExamQuestionKey(raw) {
  return [raw.subject || '', raw.roc_year || '', raw.question_no || '', raw.id || ''].join(':');
}

function recentPastExamQuestionKeys() {
  try {
    const parsed = JSON.parse(localStorage.getItem(RECENT_PAST_EXAM_QUESTIONS_KEY) || '[]');
    return Array.isArray(parsed) ? parsed.filter(Boolean).slice(-30) : [];
  } catch {
    return [];
  }
}

function rememberRecentPastExamQuestion(raw) {
  const key = _pastExamQuestionKey(raw);
  if (!key.trim()) return;
  const next = recentPastExamQuestionKeys().filter(k => k !== key);
  next.push(key);
  localStorage.setItem(RECENT_PAST_EXAM_QUESTIONS_KEY, JSON.stringify(next.slice(-30)));
}

function isRecentPastExamQuestion(raw) {
  return recentPastExamQuestionKeys().includes(_pastExamQuestionKey(raw));
}

function _normalizePastExamQuestion(raw) {
  const opts = Array.isArray(raw.options) ? raw.options : [];
  const correctOpt = opts.find(o=>o.key===raw.answer);
  return {
    question: `【歷屆試題】${raw.roc_year || ''} 年第 ${raw.question_no || ''} 題\n${raw.stem || ''}`.trim(),
    options: opts.map(o=>o.text || ''),
    answer: correctOpt ? (correctOpt.text || '') : '',
    page_id: (raw.article_ids || [])[0] || '',
    law_name: raw.subject || '歷屆試題',
    title: `${raw.roc_year || ''} Q${raw.question_no || ''}${raw.answer_conflict ? '｜修法提醒' : ''}`,
    explanation: raw.explanation || '',
    official_answer: raw.official_answer || '',
    verified_answer: raw.verified_answer || '',
    answer_conflict: !!raw.answer_conflict,
    law_change_note: raw.law_change_note || '',
    verify_status: raw.verify_status || '',
    _past_exam: true,
    _past_exam_key: _pastExamQuestionKey(raw),
    _past_exam_subject: raw.subject || '',
    _past_exam_year: raw.roc_year || '',
    _past_exam_question_no: raw.question_no || '',
  };
}

function recordQuizAnswer(data,pageId,isCorrect,choiceIndex,correctIdx){
  if(!pageId||!uid||uid==='PREVIEW'||isFree)return;
  fetch(`${API}/api/me/answer`,{method:'POST',headers:_authH({'Content-Type':'application/json'}),body:JSON.stringify({
    article_id:pageId,
    mode:data._past_exam?'past_exam':'quiz',
    source:data._past_exam?'past_exam':'quiz',
    is_correct:isCorrect,
    choice:choiceIndex,
    correct_idx:Math.max(0, correctIdx),
    question:data.question||'',
    options:Array.isArray(data.options)?data.options:[],
    explanation:data.explanation||'',
    exam_subject:data._past_exam_subject||'',
    exam_year:data._past_exam_year||'',
    exam_question_no:data._past_exam_question_no||''
  })}).catch(()=>{});
}

async function _fetchPastExamQuestion() {
  const sel = document.getElementById('pastExamSubject');
  const subject = (sel && sel.value) || _PAST_EXAM_SUBJECTS[0];
  const yearSel = document.getElementById('pastExamYear');
  const year = (yearSel && yearSel.value) || '';
  const yearPart = year ? `&year=${encodeURIComponent(year)}` : '';
  for(let attempt=0;attempt<5;attempt++){
    const data = await fetch(`${API}/api/past-exam?subject=${encodeURIComponent(subject)}${yearPart}`, {headers:_authH()}).then(r=>r.json());
    if(data.error || data.detail) return data;
    if(!isRecentPastExamQuestion(data) || attempt===4){
      rememberRecentPastExamQuestion(data);
      return _normalizePastExamQuestion(data);
    }
  }
}

async function loadQuiz(){
  answered=false; total++;
  // 新增到 sessionHistory
  sessionHistory.push({num:total, correct:null, flagged:false, law:'', title:''});
  startSessionTimer();

  document.getElementById('questionBox').textContent='載入中…';
  document.getElementById('questionBox').style.opacity='.45';
  document.getElementById('optionsBox').innerHTML='';
  document.getElementById('explainBox').style.display='none';
  hideQuizAnswerActions();
  const answerExplain = document.getElementById('answerExplain');
  if(answerExplain){ answerExplain.style.display='none'; answerExplain.textContent=''; }
  document.getElementById('qSrc').innerHTML='—';
  updateScore();

  let law=document.getElementById('lawSelect').value;
  try{
    let data;
    if(_pastExamMode){
      data=await _fetchPastExamQuestion();
      law='';
    }
    let pickedPageId='';
    if(!_pastExamMode && law==='__starred__'){
      const sl=await fetch(`${API}/api/starred?min_stars=5`,{headers:_authH()}).then(r=>r.json());
      const arts=(sl.articles||[]).filter(a=>a.law);
      if(!arts.length){
        document.getElementById('questionBox').textContent='尚無重點法條';
        document.getElementById('questionBox').style.opacity='1';
        return;
      }
      law=arts[Math.floor(Math.random()*arts.length)].law;
    } else if(!_pastExamMode && law==='__bookmarks__'){
      const bm=await fetch(`${API}/api/me/bookmarks`,{headers:_authH()}).then(r=>r.json());
      const ids=(bm.bookmarks||[]);
      if(!ids.length){
        document.getElementById('questionBox').textContent='尚無收藏條文';
        document.getElementById('questionBox').style.opacity='1';
        return;
      }
      pickedPageId=ids[Math.floor(Math.random()*ids.length)];
      law='';
    } else if(!_pastExamMode && (law==='__mastered__'||law==='__review__')){
      const wantStatus=law==='__mastered__'?'mastered':'review';
      const mr=await fetch(`${API}/api/me/mastery`,{headers:_authH()}).then(r=>r.json());
      const items=(mr.items||[]).filter(m=>m.status===wantStatus&&m.page_id);
      if(!items.length){
        document.getElementById('questionBox').textContent=wantStatus==='mastered'?'尚無已熟記條文':'尚無待複習條文';
        document.getElementById('questionBox').style.opacity='1';
        return;
      }
      const pick=items[Math.floor(Math.random()*items.length)];
      pickedPageId=pick.page_id;
      law='';
    }
    const artNum = (document.getElementById('artNumInput')||{}).value?.trim();
    let url;
    if(_pastExamMode){
      // data already loaded from the real past-exam endpoint.
    } else if(pickedPageId){
      url=`${API}/api/quiz?page_id=${encodeURIComponent(pickedPageId)}`;
    } else if(artNum && law && _artCache[law]){
      const match=_artCache[law].find(a=>{const m=(a.title||'').match(/第(\d+(?:之\d+)?)條/);return m&&m[1]===artNum;});
      url = match ? `${API}/api/quiz?page_id=${encodeURIComponent(match.id)}` : (law?`${API}/api/quiz?law=${encodeURIComponent(law)}`:`${API}/api/quiz`);
    } else if(_curPrChip!=='all' && law && _artCache[law]){
      const filtered=_prFilterByChip(_artCache[law]);
      if(!filtered.length){
        document.getElementById('questionBox').textContent='此細篩條件下沒有條文';
        document.getElementById('questionBox').style.opacity='1';
        return;
      }
      const pick=filtered[Math.floor(Math.random()*filtered.length)];
      url=`${API}/api/quiz?page_id=${encodeURIComponent(pick.id)}`;
    } else {
      url=law?`${API}/api/quiz?law=${encodeURIComponent(law)}`:`${API}/api/quiz`;
      var _subVal=(document.getElementById('prSubSel')||{}).value||'';
      if(!law && _curPrChip!=='all' && _subVal){
        url+=(url.indexOf('?')>=0?'&':'?')+'chip='+encodeURIComponent(_curPrChip)+'&sub='+encodeURIComponent(_subVal);
      }
    }
    if(!_pastExamMode) data=await fetch(url,{headers:_authH()}).then(r=>r.json());
    if(data.error||data.detail){
      document.getElementById('questionBox').textContent=data.error||data.detail;
      document.getElementById('questionBox').style.opacity='1';
      sessionHistory.pop(); total--; updateScore(); return;
    }
    quizData=data;

    // 相容兩種 API 格式：
    // 新格式（已部署）：options=[string], answer=string, page_id=..., title=..., law_name=...
    // 舊格式：options=[{snippet, is_correct, id}], question=...
    const isNewFmt = typeof (data.options||[])[0] !== 'object';
    const correctAnswer = isNewFmt ? data.answer : null;
    const correctIdx = isNewFmt ? (data.options||[]).findIndex(opt=>opt===correctAnswer) : (data.options||[]).findIndex(opt=>!!opt?.is_correct);
    const pageId = data.page_id || data.correct_id || null;

    const lawName=data.law_name||(law&&law!=='__starred__'?document.getElementById('lawSelect').selectedOptions[0]?.text:'');
    const artTitle=data.title||data.correct_title||'';
    const cur=sessionHistory[sessionHistory.length-1];
    cur.law=lawName; cur.title=artTitle;
    renderQuizCitation(artTitle, lawName);

    // 顯示法規來源
    if(lawName||artTitle){
      document.getElementById('qSrc').innerHTML=
        `<span style="color:var(--peach)">${esc(lawName)}</span>${artTitle?` <b>${esc(artTitle)}</b>`:''}`;
    }

    document.getElementById('questionBox').textContent=data.question||'出題失敗';
    document.getElementById('questionBox').style.opacity='1';
    document.getElementById('btnFlag').classList.remove('flagged');
    document.getElementById('btnFlag').textContent='⚑ 標記';

    const labels=['A','B','C','D'];
    (data.options||[]).forEach((opt,i)=>{
      const btn=document.createElement('div');
      btn.className='opt';
      const displayText=isNewFmt?opt:(opt.snippet||'');
      const isOptCorrect=isNewFmt?(opt===correctAnswer):!!opt.is_correct;
      btn.innerHTML=`<div class="key">${labels[i]}</div><div class="body">${esc(displayText)}</div>`;
      btn.addEventListener('click',()=>{
        if(answered)return;
        answered=true;
        document.querySelectorAll('#optionsBox .opt').forEach((b,j)=>{
          b.style.pointerEvents='none';b.style.cursor='default';
          const jOpt=data.options[j];
          const jCorrect=isNewFmt?(jOpt===correctAnswer):!!jOpt?.is_correct;
          if(jCorrect)b.classList.add('right');
        });
        const isCorrect=isOptCorrect;
        if(!isCorrect){btn.classList.add('wrong');wrong++;}else{right++;}
        cur.correct=isCorrect;
        updateScore();
        recordQuizAnswer(data,pageId,isCorrect,i,correctIdx);
        // 寫入練習紀錄
        if(pageId&&uid&&uid!=='PREVIEW'&&!isFree){
          fetch(`${API}/api/me/history`,{method:'POST',headers:_authH({'Content-Type':'application/json'}),body:JSON.stringify({page_id:pageId,law_name:lawName,article:artTitle})}).catch(()=>{});
        }
        // 顯示說明框
        const eb=document.querySelector('#explainBox .eb');
        if(eb)eb.textContent=isCorrect?'✓ 答對了':'✗ 答錯了，正確答案已標綠';
        if(pageId){
          document.getElementById('sourceBox').querySelector('span').textContent='查看該條完整原文 →';
          document.getElementById('sourceLink').textContent='查看完整條文 →';
        }
        if(answerExplain && data.explanation){
          answerExplain.textContent=data.explanation;
          answerExplain.style.display='block';
        }
        document.getElementById('artInline').style.display='none';
        showQuizAnswerActions();
        document.getElementById('explainBox').style.display='block';
        // 載入條文解析 sections
        if(pageId){
          (async()=>{
            try{
              const h=_authH();
              const art=await fetch(`${API}/api/article/${pageId}`,{headers:h}).then(r=>r.json());
              document.getElementById('artInline').textContent=formatLawText(art.original_text);
              buildSections(art.sections||{},art._plan!=='free',
                document.getElementById('explainBox'),document.getElementById('sourceBox'));
            }catch(e){}
          })();
        }
      });
      document.getElementById('optionsBox').appendChild(btn);
    });
  }catch(e){
    document.getElementById('questionBox').textContent='載入失敗，請稍後再試';
    document.getElementById('questionBox').style.opacity='1';
    sessionHistory.pop(); total--; updateScore();
  }
}

function doFlag(){
  if(!quizData)return;
  const cur=sessionHistory.find(q=>q.num===total);
  const pid=quizData.page_id||quizData.correct_id||null;
  const btn=document.getElementById('btnFlag');
  if(btn.classList.contains('flagged')){
    btn.classList.remove('flagged');btn.textContent='⚑ 標記';
    flagged=Math.max(0,flagged-1);
    if(cur)cur.flagged=false;
    if(uid&&uid!=='PREVIEW'&&!isFree&&pid)
      fetch(`${API}/api/me/mastery`,{method:'POST',headers:_authH({'Content-Type':'application/json'}),body:JSON.stringify({page_id:pid,status:'none'})}).catch(()=>{});
  }else{
    btn.classList.add('flagged');btn.textContent='⚑ 已標記';
    flagged++;
    if(cur)cur.flagged=true;
    if(uid&&uid!=='PREVIEW'&&!isFree&&pid)
      fetch(`${API}/api/me/mastery`,{method:'POST',headers:_authH({'Content-Type':'application/json'}),body:JSON.stringify({page_id:pid,law_name:quizData.law_name||'',article:quizData.title||quizData.correct_title||'',status:'review',review_days:7})}).catch(()=>{});
  }
  updateScore();
}
document.getElementById('sourceLink').addEventListener('click',()=>{
  const panel=document.getElementById('artInline');
  const btn=document.getElementById('sourceLink');
  const open=panel.style.display==='none'||!panel.style.display;
  panel.style.display=open?'block':'none';
  btn.textContent=open?'收起條文 ↑':'查看完整條文 →';
});
document.getElementById('view-article-btn').addEventListener('click',()=>{
  document.getElementById('sourceLink').click();
});
document.getElementById('btnFlag').addEventListener('click',doFlag);
document.getElementById('btnNew').addEventListener('click',loadQuiz);
document.getElementById('btnNext').addEventListener('click',loadQuiz);
if(_startQuizParam) setTimeout(_focusQuizQuestionStart, 80);
document.addEventListener('keydown',e=>{
  if(e.key==='Enter')loadQuiz();
  if(e.key.toLowerCase()==='f'){doFlag();return;}
  const idx={'a':0,'b':1,'c':2,'d':3}[e.key.toLowerCase()];
  if(idx!==undefined){const opts=document.querySelectorAll('.opt');if(opts[idx])opts[idx].click();}
});
</script>
