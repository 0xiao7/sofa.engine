<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-G81F9D4YJ3"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-G81F9D4YJ3');</script>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>選擇題 — SoFa Engine</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sofa.css">
<style>
  /* === Quiz control bar === */
  .pr-bar{
    background:var(--navy-2);border-bottom:1px solid var(--line);
    padding:16px 40px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;
  }
  .pr-bar .l{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .pr-back{
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;
    color:rgba(245,240,234,.55);text-transform:uppercase;
    padding:6px 10px;border:1px solid var(--line-2);border-radius:3px;transition:.18s;
  }
  .pr-back:hover{color:var(--cream);border-color:var(--peach-dim)}

  .law-pick{
    position:relative;display:flex;align-items:center;gap:10px;
    background:var(--navy-3);border:1px solid var(--line-2);border-radius:3px;
    padding:9px 36px 9px 14px;transition:.18s;
  }
  .law-pick:focus-within{border-color:var(--peach-dim)}
  .law-pick .lab{font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:rgba(245,240,234,.5);text-transform:uppercase;white-space:nowrap}
  .law-pick select{
    background:transparent;border:none;outline:none;
    font-family:var(--serif);font-weight:500;font-size:14px;color:var(--cream);
    cursor:pointer;min-width:100px;max-width:200px;
    -webkit-appearance:none;appearance:none;
  }
  .law-pick select option{background:var(--navy-2);color:var(--cream)}
  .law-pick .car{
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    color:var(--peach);font-family:var(--mono);font-size:11px;pointer-events:none;
  }

  .pr-meta{
    display:flex;align-items:center;gap:22px;
    font-family:var(--mono);font-size:12px;letter-spacing:.08em;color:rgba(245,240,234,.55);
  }
  .pr-meta .seg b{font-weight:600;font-size:13px;margin-left:6px}
  .pr-meta .seg.good b{color:var(--good)}
  .pr-meta .seg.bad b{color:var(--bad)}
  .pr-meta .seg b{color:var(--peach)}

  .pr-progress{height:2px;background:rgba(245,240,234,.06);position:relative}
  .pr-progress .fl{
    position:absolute;left:0;top:0;height:100%;
    background:linear-gradient(to right, var(--good), var(--peach));
    width:0%;transition:width .4s ease;
  }

  /* === Stage === */
  .stage{
    padding:40px 64px 96px;background:var(--navy-3);
    position:relative;min-height:calc(100vh - 70px - 57px - 2px);
  }
  .stage::before{
    content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(245,240,234,.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,240,234,.018) 1px, transparent 1px);
    background-size:60px 60px;
    mask-image:radial-gradient(ellipse 60% 50% at 50% 0%, #000 30%, transparent 70%);
    pointer-events:none;
  }
  .inner{max-width:1080px;margin:0 auto;position:relative;display:grid;grid-template-columns:1fr 260px;gap:32px}

  /* question head */
  .q-head{
    display:flex;align-items:flex-end;justify-content:space-between;gap:24px;
    padding-bottom:18px;border-bottom:1px solid var(--line);margin-bottom:28px;
  }
  .q-head .eb{
    font-family:var(--mono);font-size:11px;color:var(--peach);
    letter-spacing:.22em;text-transform:uppercase;
    display:flex;align-items:center;gap:10px;
  }
  .q-head .eb::before{content:"";width:18px;height:1px;background:var(--peach)}
  .q-head .n{
    font-family:var(--serif);font-weight:600;font-size:54px;line-height:1;
    color:var(--cream);letter-spacing:-.01em;margin-top:8px;
  }

  /* question stem */
  .q-stem{
    background:var(--navy-2);border:1px solid var(--line);border-radius:4px;
    padding:32px 36px;position:relative;
  }
  .q-stem::before{
    content:"QUESTION";position:absolute;top:16px;right:22px;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;color:rgba(245,240,234,.22);
  }
  #questionBox{
    font-family:var(--serif);font-size:21px;line-height:1.85;
    color:var(--cream);letter-spacing:.02em;min-height:80px;
  }

  /* options */
  .opts{margin-top:24px;display:flex;flex-direction:column;gap:10px}
  .opt{
    background:var(--navy-2);border:1px solid var(--line);border-radius:4px;
    padding:18px 22px;display:flex;align-items:flex-start;gap:18px;
    cursor:pointer;transition:.18s;position:relative;
  }
  .opt:hover{background:var(--plum-1);border-color:var(--peach-dim);transform:translateX(2px)}
  .opt .key{
    width:36px;height:36px;border:1.5px solid var(--line-2);border-radius:50%;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    font-family:var(--mono);font-weight:600;font-size:14px;color:rgba(245,240,234,.65);
    transition:.18s;
  }
  .opt .body{flex:1;font-size:15.5px;line-height:1.75;color:rgba(245,240,234,.85);padding-top:4px}
  .opt.right{border-color:var(--good);background:rgba(159,184,159,.08)}
  .opt.right .key{background:var(--good);color:var(--navy-3);border-color:var(--good)}
  .opt.right::after{
    content:"✓ 正確";position:absolute;top:18px;right:22px;
    font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--good);font-weight:600;
  }
  .opt.wrong{border-color:var(--bad);background:rgba(199,123,106,.08)}
  .opt.wrong .key{background:var(--bad);color:var(--cream);border-color:var(--bad)}
  .opt.wrong::after{
    content:"✗ 你選的";position:absolute;top:18px;right:22px;
    font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--bad);font-weight:600;
  }

  /* source attribution */
  .source-box{
    margin-top:16px;padding:10px 14px;
    font-family:var(--mono);font-size:12px;letter-spacing:.06em;
    color:rgba(245,240,234,.5);
    border-left:2px solid var(--peach-dim);
    background:rgba(245,240,234,.03);border-radius:0 3px 3px 0;
  }
  .source-box a{color:var(--peach);font-weight:600;text-decoration:none}
  .source-box a:hover{color:var(--peach-2)}

  /* foot */
  .q-foot{
    margin-top:28px;display:flex;justify-content:flex-end;align-items:center;gap:10px;
    padding-top:20px;border-top:1px dashed var(--line);
  }

  /* === Rail === */
  .rail{display:flex;flex-direction:column;gap:18px;position:sticky;top:92px;align-self:start}
  .rail-card{background:var(--navy-2);border:1px solid var(--line);border-radius:4px;padding:22px}
  .rail-h{
    font-family:var(--mono);font-size:11px;color:var(--peach);
    letter-spacing:.22em;text-transform:uppercase;font-weight:600;
    padding-bottom:12px;border-bottom:1px dashed var(--line);margin-bottom:14px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .rail-h .ct{color:rgba(245,240,234,.4);font-weight:500;letter-spacing:.1em}
  .stat-line{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:13px;color:rgba(245,240,234,.7)}
  .stat-line + .stat-line{border-top:1px dashed var(--line)}
  .stat-line b{font-family:var(--mono);color:var(--cream);font-weight:600}
  .stat-line .good b{color:var(--good)}
  .stat-line .bad b{color:var(--bad)}

  /* === RWD === */
  @media(max-width:1100px){
    .pr-bar{padding:14px 24px}
    .stage{padding:32px 32px 72px}
    .inner{grid-template-columns:1fr}
    .rail{position:static;flex-direction:row;flex-wrap:wrap}
    .rail-card{flex:1;min-width:240px}
  }
  @media(max-width:760px){
    .topbar{padding:14px 20px}
    .top-mid{display:none}
    .menu-btn{display:flex}
    .pr-bar{padding:12px 18px}
    .pr-meta{gap:14px;font-size:11px}
    .stage{padding:24px 18px 60px}
    .inner{grid-template-columns:1fr}
    .q-head{flex-direction:column;align-items:flex-start;gap:14px}
    .q-head .n{font-size:42px}
    .q-stem{padding:22px}
    #questionBox{font-size:17px}
    .opt{padding:14px 18px;gap:14px}
    .opt .body{font-size:14.5px}
    .opt.right::after,.opt.wrong::after{display:none}
    .rail{flex-direction:column}
  }
</style>
</head>
<body>

<header class="topbar">
  <a class="brand" href="/"><span class="dot"></span>SOFA&nbsp;ENGINE</a>
  <nav class="top-mid">
    <a href="dashboard.html">會員中心</a>
    <a href="practice.html">打字</a>
    <a href="quiz.html" class="on">選擇題</a>
  </nav>
  <div class="top-right">
    <span class="user-pill"><span class="live"></span><span id="navUid"></span></span>
    <button class="btn-out" onclick="localStorage.removeItem('sofa_uid');window.location.href='login.html'">登出</button>
    <button class="menu-btn"><span></span></button>
  </div>
</header>

<div class="pr-bar">
  <div class="l">
    <a href="dashboard.html" class="pr-back">← BACK</a>
    <div class="law-pick">
      <span class="lab">LAW</span>
      <select id="lawSelect"><option value="">全部法規（隨機）</option></select>
      <span class="car">▾</span>
    </div>
  </div>
  <div class="pr-meta">
    <span class="seg good">正確 <b id="scoreRight">0</b></span>
    <span class="seg bad">錯誤 <b id="scoreWrong">0</b></span>
    <span class="seg">共 <b id="scoreTotal">0</b> 題</span>
  </div>
</div>
<div class="pr-progress"><div class="fl" id="progBar"></div></div>

<main class="stage">
  <div class="inner">

    <div>
      <div class="q-head">
        <div>
          <div class="eb">QUESTION · MULTIPLE CHOICE</div>
          <div class="n" id="qNum">—</div>
        </div>
      </div>

      <div class="q-stem">
        <p id="questionBox">選擇法規後點「出題」開始</p>
      </div>

      <div class="opts" id="optionsBox"></div>

      <div id="sourceBox" style="display:none" class="source-box"></div>

      <div class="q-foot">
        <button class="btn btn-pri" id="btnNew">出題</button>
      </div>
    </div>

    <!-- rail sidebar -->
    <aside class="rail">
      <div class="rail-card">
        <div class="rail-h">SESSION <span class="ct">LIVE</span></div>
        <div class="stat-line"><span>答對</span><span class="good"><b id="railRight">0</b></span></div>
        <div class="stat-line"><span>答錯</span><span class="bad"><b id="railWrong">0</b></span></div>
        <div class="stat-line"><span>共答</span><span><b id="railTotal">0</b> 題</span></div>
      </div>
    </aside>

  </div>
</main>

<script>
const API = 'https://sofa-engine-api.onrender.com';
const uid = localStorage.getItem('sofa_uid');
if (!uid) { window.location.href = '/login.html?redirect=quiz.html'; }
document.getElementById('navUid').textContent = localStorage.getItem('sofa_nickname') || uid;

(async () => {
  try {
    const d = await fetch(`${API}/api/laws`).then(r => r.json());
    const sel = document.getElementById('lawSelect');
    (d.laws || []).forEach(l => {
      const o = document.createElement('option'); o.value = l.name; o.textContent = l.name; sel.appendChild(o);
    });
  } catch {}
})();

function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

let answered = false, right = 0, wrong = 0, total = 0;

function updateScore() {
  document.getElementById('scoreRight').textContent = right;
  document.getElementById('scoreWrong').textContent = wrong;
  document.getElementById('scoreTotal').textContent = total;
  document.getElementById('railRight').textContent = right;
  document.getElementById('railWrong').textContent = wrong;
  document.getElementById('railTotal').textContent = total;
  const bar = document.getElementById('progBar');
  if (bar && (right + wrong) > 0) bar.style.width = Math.round(right / (right + wrong) * 100) + '%';
}

async function loadQuiz() {
  const qbox = document.getElementById('questionBox');
  const obox = document.getElementById('optionsBox');
  const sbox = document.getElementById('sourceBox');
  qbox.textContent = '載入中…';
  qbox.style.opacity = '.45';
  obox.innerHTML = '';
  sbox.style.display = 'none';
  answered = false;
  document.getElementById('qNum').textContent = total + 1;
  const law = document.getElementById('lawSelect').value;
  try {
    const url = law ? `${API}/api/quiz?law=${encodeURIComponent(law)}` : `${API}/api/quiz`;
    const data = await fetch(url, { headers: { 'X-Sofa-UID': uid } }).then(r => r.json());
    if (data.error) { qbox.textContent = data.error; qbox.style.opacity = '1'; return; }
    qbox.textContent = data.question || '出題失敗';
    qbox.style.opacity = '1';
    const labels = ['A', 'B', 'C', 'D'];
    (data.options || []).forEach((opt, i) => {
      const btn = document.createElement('div');
      btn.className = 'opt';
      btn.innerHTML = `<div class="key">${labels[i]}</div><div class="body">${esc(opt)}</div>`;
      btn.addEventListener('click', () => {
        if (answered) return;
        answered = true; total++;
        document.querySelectorAll('.opt').forEach((b, j) => {
          b.style.pointerEvents = 'none';
          b.style.cursor = 'default';
          if (data.options[j] === data.answer) b.classList.add('right');
        });
        if (opt !== data.answer) { btn.classList.add('wrong'); wrong++; } else { right++; }
        updateScore();
        if (data.law_name && data.title) {
          const href = `dashboard.html?open=${encodeURIComponent(data.page_id)}&law=${encodeURIComponent(data.law_name)}&art=${encodeURIComponent(data.title)}`;
          sbox.innerHTML = `出自 <a href="${href}">《${esc(data.law_name)}》${esc(data.title)}</a>`;
          sbox.style.display = 'block';
        }
      });
      obox.appendChild(btn);
    });
  } catch {
    qbox.textContent = '載入失敗，請稍後再試';
    qbox.style.opacity = '1';
  }
}

document.getElementById('btnNew').addEventListener('click', loadQuiz);
</script>
</body>
</html>
