<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>選擇題 — SoFa Engine</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231A1A2E'/%3E%3Crect x='5' y='8' width='22' height='11' rx='3' fill='%23e7bba7'/%3E%3Crect x='4' y='13' width='5' height='10' rx='2.5' fill='%23d4a090'/%3E%3Crect x='23' y='13' width='5' height='10' rx='2.5' fill='%23d4a090'/%3E%3Crect x='9' y='18' width='14' height='5' rx='2' fill='%23c4907a'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#1A1A2E; --card:#22223a; --accent:#e7bba7; --accent2:#9EB3C2;
  --text:#F0EDE8; --muted:#a8a8b8; --border:rgba(231,187,167,0.12);
  --mono:'JetBrains Mono',monospace; --serif:'Noto Serif TC',serif;
  --sans:'Noto Sans TC',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 70% 50% at 10% 0%,rgba(42,42,66,.55) 0%,transparent 60%),
             radial-gradient(ellipse 60% 70% at 85% 95%,rgba(231,187,167,.03) 0%,transparent 55%);
  pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;width:100%;max-width:420px;text-align:center}
.brand{font-family:var(--mono);font-size:.8rem;letter-spacing:.18em;color:var(--accent);margin-bottom:2rem}
.brand a{color:inherit;text-decoration:none}
.icon{font-size:2.8rem;margin-bottom:1.2rem;opacity:.65}
h1{font-family:var(--serif);font-size:1.6rem;font-weight:600;margin-bottom:.6rem}
.label{display:inline-block;font-family:var(--mono);font-size:.6rem;letter-spacing:.18em;
  color:var(--accent2);border:1px solid rgba(158,179,194,.3);padding:.2rem .65rem;margin-bottom:1.4rem}
p{color:var(--muted);font-size:.88rem;line-height:1.75;margin-bottom:2rem}
.back{display:inline-flex;align-items:center;gap:.4rem;font-family:var(--mono);font-size:.72rem;
  letter-spacing:.1em;color:var(--muted);text-decoration:none;border:1px solid var(--border);
  padding:.55rem 1.2rem;transition:color .18s,border-color .18s}
.back:hover{color:var(--text);border-color:rgba(231,187,167,.3)}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><a href="/">SoFa Engine</a></div>
  <div class="icon">📋</div>
  <h1>選擇題</h1>
  <div class="label">COMING SOON</div>
  <p>從資料庫自動產生選擇題。<br>數字、金額、期限，這些最容易混淆的地方重點練習。<br><br>開發中，敬請期待。</p>
  <a class="back" href="/">← 回主頁</a>
</div>
</body>
</html>
