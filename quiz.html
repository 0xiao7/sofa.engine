<style>
:root {
  --navy:   #1F3848;
  --navy-2: #19303E;
  --navy-3: #142836;
  --peach:  #E7BBA7;
  --peach-3:#C89580;
  --cream:  #F5F0EA;
  --muted:  #7A8892;
  --line-on-navy: rgba(245,240,234,.14);
  --mono: 'JetBrains Mono', ui-monospace, monospace;
  --serif:'Noto Serif TC', serif;
  --sans: 'Noto Sans TC', system-ui, sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--navy);color:var(--cream);font-family:var(--sans);font-weight:300;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;
}
body::before{content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 10% 0%, rgba(13,28,40,.7) 0%, transparent 60%),
    radial-gradient(ellipse 60% 70% at 85% 95%, rgba(231,187,167,.05) 0%, transparent 55%);
  pointer-events:none;z-index:0;
}
.wrap{position:relative;z-index:1;width:100%;max-width:420px;text-align:center}
.brand{font-family:var(--mono);font-size:.8rem;letter-spacing:.18em;color:var(--peach);margin-bottom:2rem}
.brand a{color:inherit;text-decoration:none}
.eyebrow{
  display:inline-block;font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;
  color:rgba(245,240,234,.4);border:1px solid var(--line-on-navy);
  padding:.22rem .75rem;margin-bottom:1.6rem;text-transform:uppercase;
}
h1{font-family:var(--serif);font-size:1.6rem;font-weight:600;color:var(--cream);margin-bottom:.6rem}
.soon-badge{
  display:inline-block;font-family:var(--mono);font-size:.6rem;letter-spacing:.18em;
  color:var(--peach);border:1px solid rgba(231,187,167,.3);
  padding:.2rem .65rem;margin-bottom:1.4rem;
}
p{color:rgba(245,240,234,.5);font-size:.88rem;line-height:1.8;margin-bottom:2rem}
.back{
  display:inline-flex;align-items:center;gap:.4rem;font-family:var(--mono);font-size:.72rem;
  letter-spacing:.1em;color:rgba(245,240,234,.4);text-decoration:none;
  border:1px solid var(--line-on-navy);padding:.55rem 1.2rem;
  transition:color .2s,border-color .2s;
}
.back:hover{color:var(--cream);border-color:rgba(231,187,167,.3)}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><a href="/">SOFA ENGINE</a></div>
  <div class="eyebrow">F.04 — 選擇題</div>
  <h1>選擇題</h1>
  <div class="soon-badge">COMING SOON</div>
  <p>從資料庫自動產生選擇題。<br>數字、金額、期限，這些最容易混淆的地方重點練習。<br><br>開發中，敬請期待。</p>
  <a class="back" href="/">← 回主頁</a>
</div>
</body>
</html>
