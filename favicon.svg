<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="glow" cx="50%" cy="52%" r="48%">
      <stop offset="0%" stop-color="#E7BBA7" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#E7BBA7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E7BBA7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#1E2D3D"/>
  <!-- Glow -->
  <ellipse cx="16" cy="16" rx="13" ry="12" fill="url(#glow)"/>
  <!-- Backrest -->
  <rect x="8.5" y="6" width="15" height="13.5" rx="3.5" fill="#E7BBA7"/>
  <!-- 3 law lines on backrest -->
  <rect x="11" y="9"   width="10" height="1.4" rx=".7" fill="#1E2D3D" fill-opacity=".4"/>
  <rect x="11" y="11.7" width="10" height="1.4" rx=".7" fill="#1E2D3D" fill-opacity=".4"/>
  <rect x="11" y="14.4" width="10" height="1.4" rx=".7" fill="#1E2D3D" fill-opacity=".4"/>
  <!-- Left armrest -->
  <rect x="5"   y="13" width="5.5" height="8.5" rx="2.75" fill="#E7BBA7"/>
  <!-- Right armrest -->
  <rect x="21.5" y="13" width="5.5" height="8.5" rx="2.75" fill="#E7BBA7"/>
  <!-- Seat cushion -->
  <rect x="8.5" y="18.5" width="15" height="5" rx="2" fill="#D4A090"/>
  <!-- Legs -->
  <circle cx="11"  cy="25" r="1.4" fill="#C07868"/>
  <circle cx="21"  cy="25" r="1.4" fill="#C07868"/>
</svg>
