<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-G81F9D4YJ3"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-G81F9D4YJ3');</script>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>填空題 — SoFa Engine</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sofa.css">
<style>
  /* === Fill control bar === */
  .pr-bar{
    background:var(--navy-2);border-bottom:1px solid var(--line);
    padding:16px 40px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;
  }
  .pr-bar .l{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .pr-back{
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;
    color:rgba(245,240,234,.55);text-transform:uppercase;
    padding:6px 10px;border:1px solid var(--line-2);border-radius:3px;transition:.18s;
  }
  .pr-back:hover{color:var(--cream);border-color:var(--peach-dim)}

  .law-pick{
    position:relative;display:flex;align-items:center;gap:10px;
    background:var(--navy-3);border:1px solid var(--line-2);border-radius:3px;
    padding:9px 36px 9px 14px;transition:.18s;
  }
  .law-pick:focus-within{border-color:var(--peach-dim)}
  .law-pick .lab{font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:rgba(245,240,234,.5);text-transform:uppercase;white-space:nowrap}
  .law-pick select{
    background:transparent;border:none;outline:none;
    font-family:var(--serif);font-weight:500;font-size:14px;color:var(--cream);
    cursor:pointer;min-width:100px;max-width:200px;
    -webkit-appearance:none;appearance:none;
  }
  .law-pick select option{background:var(--navy-2);color:var(--cream)}
  .law-pick .car{
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    color:var(--peach);font-family:var(--mono);font-size:11px;pointer-events:none;
  }

  .pr-meta{
    display:flex;align-items:center;gap:22px;
    font-family:var(--mono);font-size:12px;letter-spacing:.08em;color:rgba(245,240,234,.55);
  }
  .pr-meta .seg b{font-weight:600;font-size:13px;margin-left:6px}
  .pr-meta .seg.good b{color:var(--good)}
  .pr-meta .seg.bad  b{color:var(--bad)}
  .pr-meta .seg      b{color:var(--peach)}

  .pr-progress{height:2px;background:rgba(245,240,234,.06);position:relative}
  .pr-progress .fl{
    position:absolute;left:0;top:0;height:100%;
    background:linear-gradient(to right, var(--good), var(--peach));
    width:0%;transition:width .4s ease;
  }

  /* === Stage === */
  .stage{
    padding:40px 64px 96px;background:var(--navy-3);
    position:relative;min-height:calc(100vh - 70px - 57px - 2px);
  }
  .stage::before{
    content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(245,240,234,.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,240,234,.018) 1px, transparent 1px);
    background-size:60px 60px;
    mask-image:radial-gradient(ellipse 60% 50% at 50% 0%, #000 30%, transparent 70%);
    pointer-events:none;
  }
  .inner{max-width:1080px;margin:0 auto;position:relative;display:grid;grid-template-columns:1fr 260px;gap:32px}

  /* article head */
  .q-head{
    display:flex;align-items:flex-end;justify-content:space-between;gap:24px;
    padding-bottom:18px;border-bottom:1px solid var(--line);margin-bottom:28px;flex-wrap:wrap;
  }
  .q-head .eb{
    font-family:var(--mono);font-size:11px;color:var(--peach);
    letter-spacing:.22em;text-transform:uppercase;
    display:flex;align-items:center;gap:10px;
  }
  .q-head .eb::before{content:"";width:18px;height:1px;background:var(--peach)}
  .q-head .title{
    font-family:var(--serif);font-weight:600;font-size:26px;line-height:1.3;
    color:var(--cream);margin-top:8px;
  }
  .q-head .title a{color:inherit;border-bottom:1px solid rgba(231,187,167,.3);padding-bottom:2px}
  .q-head .title a:hover{border-color:var(--peach)}

  /* fill card */
  .fill-card{
    background:var(--navy-2);border:1px solid var(--line);border-radius:4px;
    padding:32px 36px;position:relative;
  }
  .fill-card::before{
    content:"FILL IN THE BLANK";position:absolute;top:16px;right:22px;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;color:rgba(245,240,234,.18);
  }
  .fill-art-label{
    font-family:var(--mono);font-size:.68rem;letter-spacing:.12em;
    color:rgba(245,240,234,.4);text-transform:uppercase;margin-bottom:16px;
  }
  .fill-text{
    font-family:var(--serif);font-size:19px;line-height:2.6;
    color:var(--cream);letter-spacing:.02em;min-height:80px;
  }
  .fill-blank{
    display:inline-block;border-bottom:2px solid var(--peach);
    margin:0 2px;vertical-align:bottom;
  }
  .fill-blank input{
    background:none;border:none;color:var(--peach);
    font-family:var(--mono);font-weight:600;font-size:.9rem;
    text-align:center;outline:none;padding:0 4px;
    transition:color .18s;
  }
  .fill-blank input.correct{color:var(--good)}
  .fill-blank input.wrong  {color:var(--bad)}
  .fill-blank.correct-wrap{border-color:var(--good)}
  .fill-blank.wrong-wrap  {border-color:var(--bad)}

  /* action strip */
  .q-foot{
    margin-top:28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding-top:20px;border-top:1px dashed var(--line);
  }

  /* result feedback */
  .result-msg{
    margin-top:16px;padding:14px 20px;border-radius:4px;
    font-family:var(--mono);font-size:13px;letter-spacing:.06em;
    display:none;
  }
  .result-msg.correct{
    background:rgba(159,184,159,.07);border:1px solid rgba(159,184,159,.22);color:var(--good);
  }
  .result-msg.partial{
    background:rgba(231,187,167,.05);border:1px solid rgba(231,187,167,.2);color:var(--peach);
  }

  /* source attribution */
  .source-box{
    margin-top:16px;padding:10px 14px;
    font-family:var(--mono);font-size:12px;letter-spacing:.06em;
    color:rgba(245,240,234,.5);
    border-left:2px solid var(--peach-dim);
    background:rgba(245,240,234,.03);border-radius:0 3px 3px 0;
    display:none;
  }
  .source-box a{color:var(--peach);font-weight:600;text-decoration:none}
  .source-box a:hover{color:var(--peach-2)}

  /* === Rail === */
  .rail{display:flex;flex-direction:column;gap:18px;position:sticky;top:92px;align-self:start}
  .rail-card{background:var(--navy-2);border:1px solid var(--line);border-radius:4px;padding:22px}
  .rail-h{
    font-family:var(--mono);font-size:11px;color:var(--peach);
    letter-spacing:.22em;text-transform:uppercase;font-weight:600;
    padding-bottom:12px;border-bottom:1px dashed var(--line);margin-bottom:14px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .rail-h .ct{color:rgba(245,240,234,.4);font-weight:500;letter-spacing:.1em}
  .stat-line{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:13px;color:rgba(245,240,234,.7)}
  .stat-line+.stat-line{border-top:1px dashed var(--line)}
  .stat-line b{font-family:var(--mono);color:var(--cream);font-weight:600}
  .stat-line .good b{color:var(--good)}
  .stat-line .bad  b{color:var(--bad)}

  .tip-card{
    background:rgba(231,187,167,.04);border:1px solid rgba(231,187,167,.12);
    border-radius:4px;padding:16px 18px;
    font-family:var(--mono);font-size:11px;letter-spacing:.08em;
    color:rgba(245,240,234,.45);line-height:1.8;
  }
  .tip-card b{color:var(--peach);font-weight:600}

  /* === RWD === */
  @media(max-width:1100px){
    .pr-bar{padding:14px 24px}
    .stage{padding:32px 32px 72px}
    .inner{grid-template-columns:1fr}
    .rail{position:static;flex-direction:row;flex-wrap:wrap}
    .rail-card,.tip-card{flex:1;min-width:220px}
  }
  @media(max-width:760px){
    .topbar{padding:14px 20px}
    .top-mid{display:none}
    .menu-btn{display:flex}
    .pr-bar{padding:12px 18px}
    .pr-meta{gap:14px;font-size:11px}
    .stage{padding:24px 18px 60px}
    .inner{grid-template-columns:1fr}
    .q-head{flex-direction:column;align-items:flex-start;gap:12px}
    .q-head .title{font-size:20px}
    .fill-card{padding:22px}
    .fill-text{font-size:17px;line-height:2.4}
    .rail{flex-direction:column}
  }
</style>
</head>
<body>

<header class="topbar">
  <a class="brand" href="/"><span class="dot"></span>SOFA&nbsp;ENGINE</a>
  <nav class="top-mid">
    <a href="dashboard.html">會員中心</a>
    <a href="practice.html">打字</a>
    <a href="quiz.html">選擇題</a>
    <a href="fill.html" class="on">填空</a>
  </nav>
  <div class="top-right">
    <span class="user-pill"><span class="live"></span><span id="navUid"></span></span>
    <button class="btn-out" onclick="localStorage.removeItem('sofa_uid');window.location.href='login.html'">登出</button>
    <button class="menu-btn"><span></span></button>
  </div>
</header>

<div class="pr-bar">
  <div class="l">
    <a href="dashboard.html" class="pr-back">← BACK</a>
    <div class="law-pick">
      <span class="lab">LAW</span>
      <select id="lawSelect"><option value="">全部法規（隨機）</option></select>
      <span class="car">▾</span>
    </div>
  </div>
  <div class="pr-meta">
    <span class="seg good">答對 <b id="scoreRight">0</b></span>
    <span class="seg bad">答錯 <b id="scoreWrong">0</b></span>
    <span class="seg">共 <b id="scoreTotal">0</b> 題</span>
  </div>
</div>
<div class="pr-progress"><div class="fl" id="progBar"></div></div>

<main class="stage">
  <div class="inner">

    <div>
      <div class="q-head">
        <div>
          <div class="eb">PRACTICE · FILL IN THE BLANK</div>
          <div class="title" id="artTitle">選擇法規後點「新題目」開始</div>
        </div>
      </div>

      <div class="fill-card">
        <div class="fill-art-label" id="artLabel">數字關鍵字填空</div>
        <div class="fill-text" id="fillText">
          <span style="font-size:.85rem;color:rgba(245,240,234,.35);font-family:var(--mono);letter-spacing:.06em">點「新題目」開始練習</span>
        </div>
        <div class="q-foot">
          <button class="btn btn-pri" id="btnCheck">對答案</button>
          <button class="btn btn-sec" id="btnNext">新題目</button>
        </div>
        <div class="result-msg" id="resultMsg"></div>
        <div class="source-box" id="sourceBox"></div>
      </div>
    </div>

    <!-- rail sidebar -->
    <aside class="rail">
      <div class="rail-card">
        <div class="rail-h">SESSION <span class="ct">LIVE</span></div>
        <div class="stat-line"><span>答對</span><span class="good"><b id="railRight">0</b></span></div>
        <div class="stat-line"><span>答錯</span><span class="bad"><b id="railWrong">0</b></span></div>
        <div class="stat-line"><span>共答</span><span><b id="railTotal">0</b> 題</span></div>
      </div>
      <div class="tip-card">
        <b>TIP</b><br>
        輸入數字後按 <b>Enter</b> 跳下一格<br>
        最後一格 Enter 自動對答案
      </div>
    </aside>

  </div>
</main>

<script>
const API = 'https://sofa-engine-api.onrender.com';
const uid = localStorage.getItem('sofa_uid') || (location.hostname === 'localhost' || location.protocol === 'file:' ? 'PREVIEW' : null);
if (!uid) { window.location.href = '/login.html?redirect=fill.html'; }
document.getElementById('navUid').textContent = localStorage.getItem('sofa_nickname') || uid;

// 載入法規清單
(async () => {
  try {
    const d = await fetch(`${API}/api/laws`).then(r => r.json());
    const sel = document.getElementById('lawSelect');
    (d.laws || []).forEach(l => {
      const o = document.createElement('option'); o.value = l.name; o.textContent = l.name; sel.appendChild(o);
    });
  } catch {}
})();

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let fillData = null, right = 0, wrong = 0, total = 0;

function updateScore(deltaRight, deltaWrong) {
  right += deltaRight; wrong += deltaWrong; total++;
  document.getElementById('scoreRight').textContent = right;
  document.getElementById('scoreWrong').textContent = wrong;
  document.getElementById('scoreTotal').textContent = total;
  document.getElementById('railRight').textContent = right;
  document.getElementById('railWrong').textContent = wrong;
  document.getElementById('railTotal').textContent = total;
  const bar = document.getElementById('progBar');
  if (bar && total > 0) bar.style.width = Math.round(right / total * 100) + '%';
}

function renderFill() {
  const box = document.getElementById('fillText');
  const resultMsg = document.getElementById('resultMsg');
  const sourceBox = document.getElementById('sourceBox');
  resultMsg.style.display = 'none';
  sourceBox.style.display = 'none';
  resultMsg.className = 'result-msg';

  if (!fillData || fillData.error) {
    box.innerHTML = `<span style="color:rgba(245,240,234,.4);font-size:.84rem;font-family:var(--mono)">${esc(fillData?.error||'出題失敗，此法條無數字空格')}</span>`;
    return;
  }

  const titleEl = document.getElementById('artTitle');
  const labelEl = document.getElementById('artLabel');
  if (fillData.id && fillData.title) {
    titleEl.innerHTML = `<a href="dashboard.html?open=${encodeURIComponent(fillData.id)}&art=${encodeURIComponent(fillData.title)}" title="查看解析">${esc(fillData.title)}</a>`;
  } else {
    titleEl.textContent = fillData.title || '數字關鍵字填空';
  }
  labelEl.textContent = '數字關鍵字填空';

  const text = fillData.masked_text || '';
  let html = '', i = 0, idx = 0;
  while (i < text.length) {
    if (text[i] === '＿') {
      let b = ''; while (i < text.length && text[i] === '＿') { b += text[i]; i++; }
      html += `<span class="fill-blank" id="fw_${idx}"><input type="text" id="fb_${idx}" data-idx="${idx}" style="width:${Math.max(b.length*1.1,2.5)}em" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"></span>`;
      idx++;
    } else { html += esc(text[i]); i++; }
  }
  box.innerHTML = html;

  // Enter 跳下一格，最後一格 Enter 對答案
  box.querySelectorAll('input').forEach((inp, i, all) => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (all[i+1]) all[i+1].focus(); else checkAnswers();
      }
    });
  });
  if (box.querySelector('input')) box.querySelector('input').focus();
}

function checkAnswers() {
  if (!fillData || !fillData.answers) return;
  const inputs = document.querySelectorAll('#fillText input');
  if (!inputs.length) return;
  let cor = 0;
  inputs.forEach((inp, i) => {
    const ans = (fillData.answers || [])[i] || '';
    inp.disabled = true;
    const wrap = document.getElementById('fw_' + i);
    if (inp.value.trim() === ans) {
      inp.classList.add('correct');
      if (wrap) wrap.classList.add('correct-wrap');
      cor++;
    } else {
      inp.classList.add('wrong');
      if (wrap) wrap.classList.add('wrong-wrap');
      const sp = document.createElement('span');
      sp.textContent = `（${ans}）`;
      sp.style.cssText = 'color:var(--good);font-size:.78rem;font-family:var(--mono);margin-left:.3rem;';
      inp.parentNode.after(sp);
    }
  });
  const resultMsg = document.getElementById('resultMsg');
  const all = inputs.length;
  if (cor === all) {
    resultMsg.className = 'result-msg correct';
    resultMsg.textContent = `✓ 全對！${all}/${all}`;
  } else {
    resultMsg.className = 'result-msg partial';
    resultMsg.textContent = `${cor}/${all} 正確`;
  }
  resultMsg.style.display = 'block';
  updateScore(cor > 0 ? 1 : 0, cor < all ? 1 : 0);

  // source
  if (fillData.id && fillData.title) {
    const sourceBox = document.getElementById('sourceBox');
    const href = `dashboard.html?open=${encodeURIComponent(fillData.id)}&art=${encodeURIComponent(fillData.title)}`;
    sourceBox.innerHTML = `出自 <a href="${href}">《${esc(fillData.law_name||'')}》${esc(fillData.title)}</a>`;
    sourceBox.style.display = 'block';
  }
}

async function loadNew() {
  const box = document.getElementById('fillText');
  const resultMsg = document.getElementById('resultMsg');
  const sourceBox = document.getElementById('sourceBox');
  resultMsg.style.display = 'none';
  sourceBox.style.display = 'none';
  document.getElementById('artTitle').textContent = '載入中…';
  box.innerHTML = '<span style="font-family:var(--mono);font-size:12px;color:rgba(245,240,234,.4);letter-spacing:.1em">載入中…</span>';
  const law = document.getElementById('lawSelect').value;
  try {
    const url = law ? `${API}/api/fill?law=${encodeURIComponent(law)}` : `${API}/api/fill`;
    fillData = await fetch(url, { headers: { 'X-Sofa-UID': uid } }).then(r => r.json());
    renderFill();
  } catch {
    box.innerHTML = '<span style="font-family:var(--mono);font-size:12px;color:rgba(245,240,234,.4)">載入失敗，請稍後再試</span>';
  }
}

document.getElementById('btnCheck').addEventListener('click', checkAnswers);
document.getElementById('btnNext').addEventListener('click', loadNew);
</script>
</body>
</html>
