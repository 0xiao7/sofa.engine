<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<link rel="icon" type="image/png" href="favicon.png">
<title>SoFa Engine — 填空練習</title>
<meta name="description" content="填入法條關鍵詞，強化對條文細節的記憶。SoFa Engine 填空模式，涵蓋記帳士、地政士等 36,000+ 條國考法規，免費使用。" />
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-G81F9D4YJ3"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-G81F9D4YJ3');</script>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="sofa.css" />
<style>
  .pr-bar{
    background:var(--navy-2);border-bottom:1px solid var(--line);
    padding:16px 40px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;
  }
  .pr-bar .l{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .pr-bar .back{
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;
    color:rgba(245,240,234,.55);text-transform:uppercase;
    padding:6px 10px;border:1px solid var(--line-2);border-radius:3px;
  }
  .pr-bar .back:hover{color:var(--cream);border-color:var(--cream)}
  .pr-bar .title{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .pr-bar .title .law{
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;
    color:rgba(245,240,234,.5);text-transform:uppercase;
  }
  .pr-bar .title .art{font-family:var(--serif);font-weight:600;font-size:18px;color:var(--cream)}
  .pr-bar .title .sub{color:rgba(245,240,234,.6);font-size:13.5px}
  .pr-meta{
    display:flex;align-items:center;gap:22px;
    font-family:var(--mono);font-size:12px;letter-spacing:.08em;
    color:rgba(245,240,234,.55);
  }
  .pr-meta .seg b{color:var(--peach);font-weight:600;font-size:13px;margin-left:6px}

  .pr-progress{height:2px;background:rgba(245,240,234,.06);position:relative}
  .pr-progress .fl{
    position:absolute;left:0;top:0;height:100%;
    background:linear-gradient(to right, var(--peach), var(--peach-2));
    width:55%;
  }

  .stage{
    padding:48px 64px 96px;background:var(--navy-3);
    position:relative;min-height:calc(100vh - 70px - 60px - 2px);
  }
  .stage::before{
    content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(245,240,234,.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,240,234,.018) 1px, transparent 1px);
    background-size:60px 60px;
    mask-image:radial-gradient(ellipse 60% 50% at 50% 0%, #000 30%, transparent 70%);
    pointer-events:none;
  }
  .inner{max-width:1080px;margin:0 auto;position:relative;display:grid;grid-template-columns:1fr 300px;gap:32px}

  .ar-head{margin-bottom:24px}
  .ar-head .eb{
    font-family:var(--mono);font-size:11px;color:var(--peach);
    letter-spacing:.22em;text-transform:uppercase;
    display:flex;align-items:center;gap:10px;
  }
  .ar-head .eb::before{content:"";width:18px;height:1px;background:var(--peach)}
  .ar-head h2{
    font-family:var(--serif);font-weight:600;font-size:32px;
    margin-top:12px;color:var(--cream);
    display:flex;align-items:baseline;gap:18px;
  }
  .ar-head h2 .n{font-size:48px;color:var(--peach);font-weight:600;letter-spacing:-.02em}
  .ar-head .row{
    margin-top:14px;display:flex;gap:18px;align-items:center;
    font-family:var(--mono);font-size:11.5px;letter-spacing:.1em;
    color:rgba(245,240,234,.55);text-transform:uppercase;flex-wrap:wrap;
  }
  .ar-head .row .pill{
    padding:5px 12px;border:1px solid var(--line-2);border-radius:100px;
    color:var(--peach);font-weight:600;
  }

  .fill-card{
    background:var(--navy-2);border:1px solid var(--line);border-radius:4px;
    padding:42px 48px;
    font-family:var(--serif);font-size:21px;line-height:2.15;
    color:var(--cream);letter-spacing:.02em;position:relative;
    word-break:keep-all;overflow-wrap:break-word;
  }
  .fill-card::before{
    content:attr(data-label);
    position:absolute;top:18px;right:24px;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;
    color:rgba(245,240,234,.25);
  }
  .fill-card p{margin-bottom:16px}
  .fill-card .ro{
    color:var(--peach);font-family:var(--mono);font-size:14px;
    font-weight:600;margin-right:8px;letter-spacing:.04em;
  }

  .blank{
    display:inline-block;min-width:5.5em;
    padding:2px 14px;margin:0 3px;
    border:none;border-bottom:2px solid var(--peach);
    background:rgba(231,187,167,.06);
    border-radius:3px 3px 0 0;
    font-family:var(--serif);font-size:21px;
    color:var(--cream);text-align:center;
    outline:none;transition:.18s;
    caret-color:var(--peach);
  }
  .blank:focus{background:rgba(231,187,167,.18);border-bottom-color:var(--peach-2)}
  .blank.ok{
    color:var(--good);border-bottom-color:var(--good);
    background:rgba(159,184,159,.10);
  }
  .blank.bad{
    color:var(--bad);border-bottom-color:var(--bad);
    background:rgba(199,123,106,.10);
  }
  .blank.empty::placeholder{
    color:rgba(245,240,234,.22);
    font-family:var(--mono);font-size:13px;letter-spacing:.04em;
  }
  .blank-tag{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;
    color:var(--peach);text-transform:uppercase;
    vertical-align:super;margin-left:2px;
    background:rgba(231,187,167,.10);padding:1px 5px;border-radius:2px;
  }

  .fill-card .but{
    margin-top:18px;padding-top:16px;border-top:1px dashed var(--line);
    font-family:var(--sans);font-size:15px;line-height:1.85;
    color:rgba(245,240,234,.6);
  }
  .fill-card .but b{color:var(--peach);font-weight:600}

  .fill-actions{
    margin-top:28px;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;
  }
  .fill-actions .l{display:flex;gap:10px;flex-wrap:wrap;font-family:var(--mono);font-size:11.5px;letter-spacing:.1em;color:rgba(245,240,234,.5);text-transform:uppercase;align-items:center}
  .fill-actions .l kbd{
    display:inline-block;padding:3px 8px;
    background:var(--navy-2);border:1px solid var(--line-2);
    border-radius:3px;font-family:var(--mono);font-size:10.5px;
    color:var(--peach);margin-right:6px;
  }
  .fill-actions .r{display:flex;gap:10px}

  /* === Right rail === */
  .rail{display:flex;flex-direction:column;gap:18px;position:sticky;top:92px;align-self:start}
  .rail-card{
    background:var(--navy-2);border:1px solid var(--line);border-radius:4px;padding:22px;
  }
  .rail-h{
    font-family:var(--mono);font-size:11px;color:var(--peach);
    letter-spacing:.22em;text-transform:uppercase;font-weight:600;
    padding-bottom:12px;border-bottom:1px dashed var(--line);margin-bottom:14px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .rail-h .ct{color:rgba(245,240,234,.4);font-weight:500;letter-spacing:.1em}

  .score-row{display:flex;align-items:flex-end;justify-content:space-between;gap:8px}
  .score{
    font-family:var(--serif);font-weight:600;font-size:48px;line-height:1;
    color:var(--cream);letter-spacing:-.01em;
  }
  .score em{font-size:18px;color:rgba(245,240,234,.4);font-style:normal;font-weight:400;margin-left:4px}
  .score-l{
    font-family:var(--mono);font-size:11px;letter-spacing:.12em;
    color:rgba(245,240,234,.5);text-transform:uppercase;
  }
  .pill-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .pill{
    padding:5px 12px;border-radius:100px;
    font-family:var(--mono);font-size:11px;letter-spacing:.04em;
    border:1px solid var(--line-2);background:transparent;color:rgba(245,240,234,.65);
  }
  .pill.good{color:var(--good);border-color:rgba(159,184,159,.4)}
  .pill.bad{color:var(--bad);border-color:rgba(199,123,106,.4)}

  /* Wave 52 — difficulty badge */
  #diff-badge {
    display:inline-flex;align-items:center;gap:5px;
    padding:3px 10px;border-radius:12px;font-size:12px;
    font-weight:600;vertical-align:middle;
    transition:all 0.3s;font-family:var(--mono);letter-spacing:.04em;
  }
  #diff-badge.easy   { background:rgba(46,204,113,0.15);  color:#2ECC71; border:1px solid rgba(46,204,113,0.3); }
  #diff-badge.medium { background:rgba(212,168,71,0.15);   color:#D4A847; border:1px solid rgba(212,168,71,0.3); }
  #diff-badge.hard   { background:rgba(231,76,60,0.15);    color:#E74C3C; border:1px solid rgba(231,76,60,0.3); }

  /* blank list */
  .blank-list{display:flex;flex-direction:column;gap:8px}
  .bl-row{
    display:flex;align-items:center;gap:10px;
    padding:8px 10px;border-radius:3px;
    font-size:13.5px;cursor:pointer;transition:.18s;
  }
  .bl-row:hover{background:rgba(245,240,234,.04)}
  .bl-row .ix{
    font-family:var(--mono);font-size:11px;color:var(--peach);
    letter-spacing:.04em;width:24px;font-weight:600;
  }
  .bl-row .val{flex:1;color:var(--cream)}
  .bl-row .st{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;
    text-transform:uppercase;
  }
  .bl-row .st.ok{color:var(--good)}
  .bl-row .st.bad{color:var(--bad)}
  .bl-row .st.todo{color:rgba(245,240,234,.4)}

  /* hint row */
  .hint-row{display:flex;gap:8px}
  .hint-btn{
    flex:1;padding:11px 12px;
    background:var(--navy-3);border:1px solid var(--line-2);
    border-radius:3px;font-family:var(--mono);font-size:11px;
    letter-spacing:.1em;text-transform:uppercase;
    color:rgba(245,240,234,.7);transition:.18s;cursor:pointer;
    display:flex;flex-direction:column;align-items:flex-start;gap:4px;
  }
  .hint-btn:hover{border-color:var(--peach);color:var(--cream)}
  .hint-btn b{font-family:var(--serif);font-size:18px;color:var(--peach);letter-spacing:.01em;font-weight:600}

  /* section analysis panel */
  .sec-panel{margin-top:22px;background:var(--cream);color:var(--navy);border-radius:4px;padding:22px 26px;border-left:4px solid var(--peach-3)}
  .sec-panel .sec-hd{font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--peach-3);font-weight:600;padding-bottom:12px;border-bottom:1px dashed rgba(31,56,72,.15);margin-bottom:4px}
  .sec-block{margin-top:16px;padding-top:14px;border-top:1px dashed rgba(31,56,72,.15)}
  .sec-label{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--peach-3);font-weight:600;margin-bottom:6px}
  .sec-text{font-size:13px;line-height:1.85;color:rgba(31,56,72,.78)}
  .sec-text .sec-h{margin:10px 0 4px;color:var(--navy);font-weight:600}
  .sec-text .sec-h:first-child{margin-top:0}
  .sec-text .sec-i{position:relative;padding-left:18px;margin:3px 0}
  .sec-text .sec-i::before{content:'◦';position:absolute;left:4px;top:-.04em;color:var(--peach-3);font-weight:700}
  .sec-lock{margin-top:16px;border-top:1px dashed rgba(31,56,72,.15)}
  .sec-lock .sec-label::after{content:" 🔒";font-size:11px;opacity:.65}
  .sec-lock-preview{position:relative;max-height:80px;overflow:hidden;padding:10px 0 0;pointer-events:none;user-select:none;font-size:13.5px;line-height:1.8;color:rgba(31,56,72,.72)}
  .sec-lock-preview::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(245,240,234,0) 15%,var(--cream) 82%);pointer-events:none}
  .sec-lock-cta{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;padding:10px 16px;font-size:12.5px;color:rgba(31,56,72,.72);background:rgba(231,187,167,.1);border:1px dashed rgba(213,154,120,.4);border-radius:4px}
  .sec-lock-cta a{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--peach);text-decoration:none;padding:5px 14px;border:1px solid rgba(213,154,120,.4);border-radius:2px;white-space:nowrap}

  @media (max-width:1100px){
    .pr-bar{padding:14px 24px}
    .stage{padding:36px 32px 72px}
    .inner{grid-template-columns:1fr}
    .rail{position:static;flex-direction:row;flex-wrap:wrap}
    .rail-card{flex:1;min-width:240px}
  }
  @media (max-width:760px){
    .pr-bar{padding:12px 18px;gap:12px}
    .pr-meta{gap:14px;font-size:11px}
    .stage{padding:24px 18px 60px}
    .ar-head h2{font-size:24px}
    .ar-head h2 .n{font-size:36px}
    .fill-card{padding:24px 22px;font-size:18px;line-height:2}
    .blank{font-size:17px;min-width:4.5em;padding:2px 10px}
    .fill-actions{flex-direction:column;align-items:stretch}
    .fill-actions .r{flex-direction:column}
    .rail{flex-direction:column}
  }
  h1,h2,h3,h4{text-wrap:balance;}
  p{text-wrap:pretty;}
  .pr-chips{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 40px;background:var(--navy-2);border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11.5px;letter-spacing:.08em}
  .pr-chips .lab{color:rgba(245,240,234,.4);text-transform:uppercase;margin-right:4px}
  .pr-chip{padding:6px 12px;border:1px solid var(--line-2);border-radius:100px;background:transparent;color:rgba(245,240,234,.55);cursor:pointer;font-family:var(--mono);font-size:11px;letter-spacing:.06em;transition:.18s}
  .pr-chip:hover{border-color:var(--peach-dim);color:var(--cream)}
  .pr-chip.on{background:var(--peach);color:var(--navy);border-color:var(--peach);font-weight:600}
  .pr-chips.is-locked .pr-chip{opacity:.4;cursor:not-allowed;border-color:var(--line-2)!important;color:rgba(245,240,234,.35)!important;background:transparent!important}
  .pr-chips .lock-hint{display:none;font-size:10.5px;color:var(--peach-dim);letter-spacing:.05em;margin-left:auto;font-style:italic;opacity:.85}
  .pr-chips.is-locked .lock-hint{display:inline-block}
  .pr-sub{display:none;align-items:center;gap:8px;margin-left:6px}
  .pr-sub.show{display:flex}
  .pr-sub select{background:var(--navy-3);border:1px solid var(--line-2);border-radius:3px;color:var(--cream);font-family:var(--mono);font-size:11.5px;padding:5px 10px;cursor:pointer;outline:none}
  @media (max-width:760px){.pr-chips{padding:10px 18px}}

  /* ── Wave 62: 鍵盤提示徽章 ── */
  #kb-hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(26,46,61,0.85);color:#8899aa;font-size:12px;padding:5px 14px;border-radius:12px;pointer-events:none;transition:opacity 0.5s;z-index:100;font-family:var(--mono);letter-spacing:.06em;}

  /* ── Wave 93: 每日填空挑戰 ── */
  #btnFillDaily {
    padding: 7px 15px; border-radius: 16px;
    background: rgba(10,20,40,0.7);
    border: 1px solid #4a7fff; color: #8ab4ff;
    font-size: 14px; cursor: pointer; transition: all 0.2s;
  }
  #btnFillDaily.done { border-color: #44cc88; color: #66ddaa; }
  #fill-daily-badge { font-size: 11px; color: #44cc88; margin-left: 4px; display: none; }
</style>
</head>
<body>

  <div id="kb-hint">⌨ Tab 切換空格 · Enter 確認/下一篇</div>

  <header class="topbar">
    <a class="brand" href="index.html"><span class="dot"></span>SOFA&nbsp;ENGINE</a>
    <nav class="top-mid">
      <a href="dashboard.html">會員中心</a>
      <a href="practice.html">打字</a>
      <a href="fill.html" class="on">填空</a>
      <a href="quiz.html">選擇題</a>
    </nav>
    <div class="top-right">
      <span class="user-pill"><span class="live"></span><span id="navUid">—</span></span>
      <button class="btn-out" onclick="localStorage.removeItem('sofa_uid');localStorage.removeItem('sofa_token');window.location.href='login.html'">登出</button>
      <button class="menu-btn"><span></span></button>
    </div>
  </header>

  <div class="pr-bar">
    <div class="l">
      <a href="dashboard.html" class="back">← BACK</a>
      <div class="title">
        <span class="law">LAW</span>
        <select id="lawSelect" style="background:transparent;border:none;outline:none;font-family:var(--serif);font-weight:600;font-size:18px;color:var(--cream);cursor:pointer;-webkit-appearance:none;appearance:none"><option value="">全部法規</option></select>
      </div>
      <div class="title" id="artPickWrap" style="display:none">
        <span class="law">§</span>
        <input id="artNumInput" list="artDatalist" placeholder="條號"
          style="background:transparent;border:none;outline:none;font-family:var(--mono);font-size:14px;color:var(--cream);width:64px;cursor:text">
        <datalist id="artDatalist"></datalist>
      </div>
      <button id="btnNext" class="btn btn-sec" style="padding:8px 16px;font-size:13px">換一條</button>
      <button id="btnFillSession" class="btn btn-sec" style="padding:8px 14px;font-size:12px;display:none;background:rgba(91,175,214,0.15);border-color:rgba(91,175,214,0.6)">⚡ 連刷模式</button>
      <button onclick="openFillStats()" title="個人填空統計" style="background:none;border:1px solid rgba(91,175,214,0.3);color:#5BAFD6;border-radius:8px;padding:5px 10px;font-size:13px;cursor:pointer">📊</button>
      <button id="btnFillDaily" onclick="startFillDailyChallenge()">📅 今日填空</button>
      <span id="fill-daily-badge"></span>
    </div>
    <div class="pr-meta">
      <div class="seg">已填 <b id="filled">— / —</b></div>
      <div class="seg">正確 <b id="metaRight" style="color:var(--good)">0</b></div>
      <div class="seg">提示 <b id="metaHint">0</b></div>
      <div class="seg">TIME <b id="metaTime">00:00</b></div>
      <div class="seg" id="fillSessionWrap" style="display:none">連刷 <b id="fillSessionProg">0 / 0</b></div>
    </div>
  </div>
  <div class="pr-chips">
    <span class="lab">細篩</span>
    <button type="button" class="pr-chip on" data-chip="all">全部</button>
    <button type="button" class="pr-chip" data-chip="deadline">期限 / 時限</button>
    <button type="button" class="pr-chip" data-chip="penalty">罰則</button>
    <div class="pr-sub" id="prSub"><select id="prSubSel"><option value="">全部</option></select></div>
    <span class="lock-hint">⚐ 跨法規請選關鍵字（如 三日 / 三萬元）</span>
  </div>
  <div class="pr-progress"><div class="fl" id="fillProg" style="width:0%"></div></div>

  <main class="stage">
    <div class="inner">

      <div>
        <div class="ar-head">
          <span class="eb">FILL-IN · 關鍵字填空</span>
          <h2><span class="n" id="artNum">—</span><span id="artTitle">選擇法規後換一條開始</span></h2>
          <div class="row">
            <span class="pill" id="lawName" style="display:none"></span>
            <span id="diff-badge"></span>
            <span id="blankCount">—</span>
          </div>
        </div>

        <div class="fill-card" id="fillCard" data-label="FILL">
          <div id="fillText"><span style="font-family:var(--mono);font-size:12px;color:rgba(245,240,234,.35);letter-spacing:.1em">選擇法規後點「換一條」開始</span></div>
          <div id="resultMsg" style="display:none;margin-top:16px;font-family:var(--mono);font-size:13px;letter-spacing:.1em"></div>
          <div id="sourceBox" style="display:none;margin-top:8px;font-family:var(--mono);font-size:11px;color:rgba(245,240,234,.5);letter-spacing:.08em"></div>
          <button id="fillSourceLink" style="display:none;margin-top:10px;background:transparent;border:1px solid var(--peach-dim);color:var(--peach);font-family:var(--mono);font-size:11px;letter-spacing:.1em;padding:6px 12px;border-radius:2px;cursor:pointer">查看完整條文 →</button>

function formatLawText(raw){
  if(!raw) return '';
  let t=String(raw).replace(/\r\n?/g,'\n').trim();
  if(t.indexOf('\n')!==-1) return t;
  t=t.replace(/(?<=\S)\s+(1[0-9]|[2-9])\s+(?=[一-鿿（【「])(?![萬億元個月年日人條項款號次倍種類份件名冊])/g,'\n$1 ');
  t=t.replace(/[ 　]*(?<!第)([一二三四五六七八九十百千零兩]+、)/g,'\n$1');
  t=t.replace(/[ 　]*(（[一二三四五六七八九十百]+）)/g,'\n　$1');
  return t.replace(/^\n+/,'').replace(/\n{2,}/g,'\n').trim();
}

// 中文數字正規化：二年→2年、三十日→30日
function normLegalNum(s){
  const d={'一':'1','二':'2','三':'3','四':'4','五':'5','六':'6','七':'7','八':'8','九':'9'};
  let r=s;
  r=r.replace(/[一二三四五六七八九]十[一二三四五六七八九]/g,m=>String(+d[m[0]]*10+ +d[m[2]]));
  r=r.replace(/[一二三四五六七八九]十/g,m=>String(+d[m[0]]*10));
  r=r.replace(/十[一二三四五六七八九]/g,m=>String(10+ +d[m[1]]));
  r=r.replace(/十/g,'10');
  r=r.replace(/[一二三四五六七八九]/g,c=>d[c]);
  return r;
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

const _FREE_SECS=[
  '章節標題與戰略權重','規範意旨與條文解析','執業要點與考情提示','核心摘要與記憶策略',

];
function formatSection(text){
  if(!text) return '';
  var lines=String(text).replace(/\r\n?/g,'\n').split('\n'),out='';
  lines.forEach(function(raw){
    if(!raw||!raw.trim())return;
    var lead=(raw.match(/^[ \t　]*/)||[''])[0],body=raw.slice(lead.length),isSub=false;
    var bm=body.match(/^([•◦‣·▪])\s*/);
    if(bm){isSub=(bm[1]==='◦');body=body.slice(bm[0].length);}
    else if(lead.length>=2||/　/.test(lead)){isSub=true;}
    body=body.trim();if(!body)return;
    var esc=body.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    esc=esc.replace(/^([^：:]{1,14}[：:])/,'<b>$1</b>');
    out+='<p class="'+(isSub?'sec-i':'sec-h')+'">'+esc+'</p>';
  });
  return out;
}

    d.append(lb,tx);

      const preview=sections[name]||'';
      lk.innerHTML='<div class="sec-label">'+label+'</div>'

        +'<div class="sec-lock-cta">🔒 升級解鎖完整內容 <a href="checkout.html">查看方案 →</a></div>';

    });
  }
}

function _loadFillStats() { try { return JSON.parse(localStorage.getItem(FILL_STATS_KEY) || '{}'); } catch(e){ return {}; } }
function _saveFillStats(s) { try { localStorage.setItem(FILL_STATS_KEY, JSON.stringify(s)); } catch(e){} }

function _getFillDailyData(days) {
  const data = [];
  const now = new Date();
  for (let i = days-1; i >= 0; i--) {
    const d = new Date(now); d.setDate(d.getDate()-i);
    const key = 'sofa_fill_daily_' + d.toISOString().slice(0,10);
    data.push(parseInt(localStorage.getItem(key)||'0',10));
  }
  return data;
}
function _renderFillDailyChart() {
  const data = _getFillDailyData(14);
  const canvas = document.getElementById('fill-daily-chart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W=280, H=40;
  ctx.clearRect(0,0,W,H);
  const max = Math.max(...data,1);
  const barW = Math.floor(W/14)-2;
  data.forEach((v,i) => {
    const h = v>0 ? Math.max(3,Math.round(v/max*(H-4))) : 2;
    const alpha = v>0 ? 0.3+(v/max)*0.7 : 0.15;
    ctx.fillStyle = (i===13 && v>0) ? 'rgba(100,220,150,0.8)' : `rgba(74,158,255,${alpha})`;
    ctx.fillRect(i*(barW+2), H-h, barW, h);
  });
}

function _recordFillStat(correctBlanks, totalBlanks, usedHint, lawName) {
  const _fillD = new Date().toISOString().slice(0,10);
  const _fillDKey = 'sofa_fill_daily_' + _fillD;
  localStorage.setItem(_fillDKey, String(parseInt(localStorage.getItem(_fillDKey)||'0',10)+1));
  const s = _loadFillStats();
  const today = new Date().toISOString().slice(0,10);
  s.total = (s.total||0) + totalBlanks;
  s.correct = (s.correct||0) + correctBlanks;
  if(s.today !== today){ s.today=today; s.todayTotal=0; s.todayCorrect=0; }
  s.todayTotal = (s.todayTotal||0) + totalBlanks;
  s.todayCorrect = (s.todayCorrect||0) + correctBlanks;
  s.clean = (s.clean||0) + (!usedHint && correctBlanks===totalBlanks ? 1 : 0);
  s.articles = (s.articles||0) + 1;
  if(lawName){
    s.byLaw = s.byLaw||{};
    s.byLaw[lawName] = s.byLaw[lawName]||{total:0,correct:0,clean:0};
    s.byLaw[lawName].total += totalBlanks;
    s.byLaw[lawName].correct += correctBlanks;
    if(!usedHint && correctBlanks===totalBlanks) s.byLaw[lawName].clean++;
  }
  _saveFillStats(s);
}

function startFillSession(n){

// Wave 40: Fill session results functions
function showFillResults() {
  const total = _sessionStats.length;
  const totalBlanks = _sessionStats.reduce((s,a)=>s+a.totalBlanks,0);
  const correctBlanks = _sessionStats.reduce((s,a)=>s+a.correctBlanks,0);
  const cleanCount = _sessionStats.filter(a=>!a.usedHint && a.correctBlanks===a.totalBlanks).length;
  const pct = totalBlanks > 0 ? Math.round(correctBlanks/totalBlanks*100) : 0;
  // Wave 93: save daily challenge result
  if (_isFillDailyMode && _sessionStats.length > 0) {
    const totalCorrect = correctBlanks;
    const pctSave = pct;
    localStorage.setItem(_fillDailyKey, JSON.stringify({pct: pctSave, articles: _sessionStats.length}));
    _updateFillDailyBtn();
    _isFillDailyMode = false;
  }
  const emoji = pct >= 80 ? '🎉' : pct >= 60 ? '💪' : '📖';
  document.getElementById('fill-res-score').textContent = correctBlanks + ' / ' + totalBlanks + ' 格';
  document.getElementById('fill-res-sub').textContent = emoji + '  答對率 ' + pct + '%　全對無提示: ' + cleanCount + '/' + total + ' 篇';
  const list = document.getElementById('fill-res-list');
  list.innerHTML = '';
  _sessionStats.forEach((s,i) => {
    const perfect = s.correctBlanks === s.totalBlanks && !s.usedHint;
    const ok = s.correctBlanks === s.totalBlanks;
    const color = perfect ? '#2ECC71' : ok ? '#5BAFD6' : '#E74C3C';
    const icon = perfect ? '✓' : ok ? '△' : '✗';

let _fillAudioCtx = null;
function _getFillAudio() {
  if(!_fillAudioCtx) _fillAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(_fillAudioCtx.state === 'suspended') _fillAudioCtx.resume();
  return _fillAudioCtx;
}
function _fillSoundPerfect() {
  try {
    const ctx = _getFillAudio();
    [0, 0.18].forEach((d, i) => {
      const osc = ctx.createOscillator(); const env = ctx.createGain();
      osc.connect(env); env.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(i===0 ? 520 : 780, ctx.currentTime+d);
      env.gain.setValueAtTime(0.16, ctx.currentTime+d);
      env.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+d+0.3);
      osc.start(ctx.currentTime+d); osc.stop(ctx.currentTime+d+0.31);
    });
  } catch(e){}
}
function _fillSoundPartial() {
  try {
    const ctx = _getFillAudio();
    const osc = ctx.createOscillator(); const env = ctx.createGain();
    osc.connect(env); env.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = 440;
    env.gain.setValueAtTime(0.12, ctx.currentTime);
    env.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.4);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.41);
  } catch(e){}
}
function _fillSoundWrong() {
  try {
    const ctx = _getFillAudio();
    [0, 0.13].forEach(d => {
      const osc = ctx.createOscillator(); const env = ctx.createGain();
      osc.connect(env); env.connect(ctx.destination);
      osc.type = 'sawtooth'; osc.frequency.value = 160;
      env.gain.setValueAtTime(0.10, ctx.currentTime+d);
      env.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+d+0.09);
      osc.start(ctx.currentTime+d); osc.stop(ctx.currentTime+d+0.10);
    });
  } catch(e){}
}
// ── Wave 87: streak milestone sounds ─────────────────────────────────────────
function _playFillStreakMilestone(streak) {
  const ctx = _getFillAudio();
  if (!ctx) return;
  const sequences = {
    3:  [[523,0.0],[659,0.1],[784,0.2]],
    5:  [[523,0.0],[659,0.08],[784,0.16],[1047,0.25],[1319,0.35]],
    10: [[523,0],[659,0.07],[784,0.14],[1047,0.21],[1319,0.29],[1047,0.4],[1319,0.5],[1568,0.6]]
  };
  const seq = sequences[streak];
  if (!seq) return;
  seq.forEach(([freq, delay]) => {
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(0, ctx.currentTime+delay);
    g.gain.linearRampToValueAtTime(0.15, ctx.currentTime+delay+0.02);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+delay+0.35);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime+delay); o.stop(ctx.currentTime+delay+0.4);
  });
}
function _playFillStreakBroken(prev) {
  if (prev < 3) return;
  const ctx = _getFillAudio(); if (!ctx) return;
  [[392,0],[294,0.15]].forEach(([freq,delay]) => {
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type='sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(0.12, ctx.currentTime+delay);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+delay+0.4);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime+delay); o.stop(ctx.currentTime+delay+0.5);
  });
}

  const text=fillData.masked_text||'';
  // 分段渲染：以 \n 切段，各段內處理空格
  const paragraphs=text.split('\n').filter(p=>p.trim());
  let allHtml='', blankIdx=0;
  paragraphs.forEach(para=>{
    let ph='',i=0;
    while(i<para.length){
      if(para[i]==='＿'){
        let b='';while(i<para.length&&para[i]==='＿'){b+=para[i];i++;}
        const lbl=String.fromCharCode(65+blankIdx);
        ph+=`<input class="blank empty" id="fb_${blankIdx}" data-idx="${blankIdx}" data-ans="${esc((fillData.answers||[])[blankIdx]||'')}" style="min-width:${Math.max(b.length*1.1,2.5)}em" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="　"/><span class="blank-tag">${lbl}</span>`;
        blankIdx++;
      } else { ph+=esc(para[i]);i++; }
    }
    if(ph.trim()) allHtml+=`<p>${ph}</p>`;
  });
  // 若無換行，fallback 整段
  if(!allHtml){
    let ph='',i=0;
    while(i<text.length){
      if(text[i]==='＿'){
        let b='';while(i<text.length&&text[i]==='＿'){b+=text[i];i++;}
        const lbl=String.fromCharCode(65+blankIdx);
        ph+=`<input class="blank empty" id="fb_${blankIdx}" data-idx="${blankIdx}" data-ans="${esc((fillData.answers||[])[blankIdx]||'')}" style="min-width:${Math.max(b.length*1.1,2.5)}em" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="　"/><span class="blank-tag">${lbl}</span>`;

  document.getElementById('blankCount').textContent=idx+' 個空格';

  document.getElementById('filled').textContent='0 / '+idx;
  updateBlankList();
  box.querySelectorAll('input').forEach((inp,i,all)=>{
    inp.addEventListener('input',()=>{
      inp.classList.remove('ok','bad','empty');
      const v=inp.value.trim();
      if(!v){inp.classList.add('empty');}
      else if(answerMatch(v,inp.dataset.ans))inp.classList.add('ok');

      document.getElementById('fillProg').style.width=Math.round(filled/all.length*100)+'%';
    });

  });

function updateBlankList(){
  const box=document.getElementById('fillText');
  const inputs=[...box.querySelectorAll('input')];
  const labels='ABCDEFGHIJ';
  const html=inputs.map((inp,i)=>{
    const v=inp.value.trim();
    const st=!v?'todo':inp.classList.contains('ok')?'ok':'bad';
    const stTxt=st==='ok'?'OK':st==='bad'?'XX':'···';
    const valTxt=v||'— 待填 —';
    const valStyle=st==='bad'?'color:var(--bad)':!v?'color:rgba(245,240,234,.4)':'';
    return`<div class="bl-row"><span class="ix">${labels[i]}</span><span class="val" style="${valStyle}">${esc(valTxt)}</span><span class="st ${st}">${stTxt}</span></div>`;
  }).join('');
  document.getElementById('blankList').innerHTML=html||'—';
}

function answerMatch(val, ans){
  const v=val.trim(), a=ans.trim();
  return v===a || normLegalNum(v)===normLegalNum(a);
}

function checkAnswers(){
  const box=document.getElementById('fillText');
  const inputs=[...box.querySelectorAll('input')];
  if(!inputs.length)return;
  let cor=0;
  inputs.forEach((inp,i)=>{
    const ans=(fillData.answers||[])[i]||'';
    inp.disabled=true;
    if(answerMatch(inp.value,ans)){inp.classList.add('ok');cor++;}
    else{inp.classList.add('bad');const sp=document.createElement('span');sp.textContent=`（${ans}）`;sp.style.cssText='color:var(--good);font-size:.78rem;font-family:var(--mono);margin-left:.3rem;';inp.after(sp);}
  });
  // Wave 38: play audio feedback based on score
  if(cor === inputs.length) _fillSoundPerfect();
  else if(cor > 0) _fillSoundPartial();
  else _fillSoundWrong();
  // Wave 55: persist to cumulative stats
  _recordFillStat(cor, inputs.length, _currentHintUsed, fillData?.law_name || '');

  // Wave 87: streak tracking — must run after sound calls above
  const _wasPerfect = (cor === inputs.length && !_currentHintUsed);
  const _prevStreak = _fillStreak;
  if (_wasPerfect) {
    _fillStreak++;
    if ([3,5,10].includes(_fillStreak)) {
      setTimeout(() => _playFillStreakMilestone(_fillStreak), 150);
    }
  } else {
    _fillStreak = 0;
    setTimeout(() => _playFillStreakBroken(_prevStreak), 150);
  }

  const msg=document.getElementById('resultMsg');
  msg.style.display='block';
  msg.style.color=cor===inputs.length?'var(--good)':'var(--warn)';
  msg.textContent=cor===inputs.length?`✓ 全對！${cor}/${inputs.length}`:`${cor}/${inputs.length} 正確`;
  document.getElementById('scoreDisplay').textContent=cor+'/'+inputs.length;
  document.getElementById('accDisplay').textContent=Math.round(cor/inputs.length*100)+'%';
  updateMetaRight(cor);
  document.getElementById('fillProg').style.width='100%';
  pushHistory(fillData.law_name||'', fillData.title||'');
  const pills=cor===inputs.length
    ?`<span class="pill good">✓ ${cor} 正確</span>`
    :`<span class="pill good">✓ ${cor} 正確</span><span class="pill bad">✗ ${inputs.length-cor} 錯誤</span>`;
  document.getElementById('pillRow').innerHTML=pills;
  updateBlankList();
  if(fillData.id&&fillData.title){
    const src=document.getElementById('sourceBox');
    src.innerHTML=`出自 <a href="dashboard.html?open=${encodeURIComponent(fillData.id)}&art=${encodeURIComponent(fillData.title)}" style="color:var(--peach)">《${esc(fillData.law_name||'')}》${esc(fillData.title)}</a>`;
    src.style.display='block';
  }
  // 寫入練習紀錄
  if(fillData.id&&uid&&uid!=='PREVIEW'&&!isFree){
    fetch(`${API}/api/me/history`,{method:'POST',headers:_authH({'Content-Type':'application/json'}),body:JSON.stringify({page_id:fillData.id,law_name:fillData.law_name||'',article:fillData.title||''})}).catch(()=>{});
  }
  // Auto-advance after perfect score (2s delay with countdown)
  if(cor === inputs.length && inputs.length > 0){
    const msg2 = document.getElementById('resultMsg');
    let secs = 2;
    const countdown = setInterval(()=>{
      secs--;
      if(msg2) msg2.textContent = `✓ 全對！${cor}/${inputs.length} — ${secs}s 後自動換題…`;
      if(secs <= 0){ clearInterval(countdown); loadNew(); }
    }, 1000);
    // Cancel auto-advance if user clicks Next manually
    document.getElementById('btnNext')?.addEventListener('click', ()=>clearInterval(countdown), {once:true});
  }
  // 載入條文解析 sections
  if(fillData.id){
    const panel=document.getElementById('sectionsBox');
    panel.innerHTML='<div class="sec-hd">條文解析</div>';
    panel.style.display='block';
    const srcBtn=document.getElementById('fillSourceLink');
    const srcPanel=document.getElementById('fillArtInline');
    srcBtn.style.display='inline-block';
    srcBtn.textContent='查看完整條文 →';
    srcPanel.style.display='none';
    srcPanel.textContent='';
    (async()=>{
      try{
        const h=_authH();
        const art=await fetch(`${API}/api/article/${fillData.id}`,{headers:h}).then(r=>r.json());
        srcPanel.textContent=formatLawText(art.original_text);
        buildSections(art.sections||{},art._plan!=='free',panel);
      }catch(e){}
    })();
  }
  // Wave 40: record per-article stats for session results
  if(_fillSession){
    _sessionStats.push({ correctBlanks: cor, totalBlanks: inputs.length, usedHint: _currentHintUsed });
  }
  _onFillDone();
}

function _fillKeyHandler(e) {
  if (e.key !== 'Enter') return;
  // If focus is inside a blank input, only handle when all blanks are disabled (results showing)
  const inputs = [...document.getElementById('fillText').querySelectorAll('input')];
  const resultsShowing = inputs.length > 0 && inputs.every(inp => inp.disabled);
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
    // Let the per-input Enter handler manage check; only intercept when results are showing
    if (!resultsShowing) return;
  }
  // Results are showing → Enter loads next article
  if (resultsShowing) {
    e.preventDefault();
    document.getElementById('btnNext')?.click();
    return;
  }
  // No blanks yet (no article loaded) → do nothing
  if (!inputs.length) return;
  // Blanks present and not yet checked → trigger check
  const checkBtn = document.getElementById('btnCheck');
  if (checkBtn && !checkBtn.disabled) {
    e.preventDefault();
    checkBtn.click();
  }
}
document.addEventListener('keydown', _fillKeyHandler);

  document.getElementById('fillText').querySelectorAll('input').forEach(inp=>{inp.disabled=false;inp.value='';inp.classList.remove('ok','bad');inp.classList.add('empty');});
  document.getElementById('resultMsg').style.display='none';
  document.getElementById('sourceBox').style.display='none';
  updateBlankList();
  const first=document.getElementById('fillText').querySelector('input');
  if(first)first.focus();
});
document.getElementById('btnReveal').addEventListener('click',()=>{
  if(!fillData)return;
  document.getElementById('fillText').querySelectorAll('input').forEach((inp,i)=>{
    inp.value=(fillData.answers||[])[i]||'';
    inp.classList.remove('empty','bad');
    inp.classList.add('ok');
  });
  updateBlankList();
});
(function(){
  var law=document.getElementById('lawSelect').value;
  if(law){
    loadNew();
  } else {
    document.getElementById('fillText').innerHTML='<span style="font-family:var(--mono);font-size:12px;color:rgba(245,240,234,.4);letter-spacing:.1em">請先選擇法規，再開始練習</span>';
    document.getElementById('artTitle').textContent='—';
  }
})();

// ── Wave 62: 鍵盤提示自動淡出（4秒後）──
setTimeout(() => {
  const h = document.getElementById('kb-hint');
  if (h) {
    h.style.opacity = '0';
    setTimeout(() => h?.remove(), 500);
  }
}, 4000);

// Wave 93: init daily challenge button state on page load
_updateFillDailyBtn();
</script>

<!-- Wave 55: personal fill stats panel -->
<div id="fill-stats-panel" style="display:none; position:fixed; inset:0; background:rgba(4,13,20,0.96); z-index:210; overflow-y:auto; padding:24px 16px;">
  <div style="max-width:540px; margin:0 auto;">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
      <h2 style="color:#F0E8C8; font-family:'Noto Serif TC',serif; margin:0; font-size:20px">📊 填空成績統計</h2>
      <button onclick="closeFillStats()" style="background:none; border:1px solid rgba(91,175,214,0.4); color:#5BAFD6; border-radius:50%; width:32px; height:32px; cursor:pointer; font-size:16px">✕</button>
    </div>
    <div id="fill-stats-content"></div>
  </div>
</div>
<script>
// Wave 55: open/close fill stats panel
function _getWeakestFillLaw(stats) {
  if (!stats.byLaw) return null;
  let worst = null, worstRatio = 1;
  for (const [name, d] of Object.entries(stats.byLaw)) {
    if (d.total < 3) continue;
    const ratio = d.correct / d.total;
    if (ratio < worstRatio) { worstRatio = ratio; worst = name; }
  }
  return worst;
}

function _drillWeakFillLaw(lawName) {
  const sel = document.getElementById('lawSelect');
  if (sel) {
    sel.value = lawName;
    sel.dispatchEvent(new Event('change'));
    localStorage.setItem('sofa_fill_law', lawName);
  }
  closeFillStats();
  startFillSession && startFillSession(1);
}

function openFillStats() {
  const s = _loadFillStats();
  const total = s.total||0, correct = s.correct||0;
  const pct = total > 0 ? Math.round(correct/total*100) : 0;
  const todayPct = s.todayTotal > 0 ? Math.round((s.todayCorrect||0)/s.todayTotal*100) : 0;
  const cleanRate = s.articles > 0 ? Math.round((s.clean||0)/s.articles*100) : 0;
  let byLawHtml = '';
  if(s.byLaw){
    const laws = Object.entries(s.byLaw).sort((a,b)=>b[1].total-a[1].total).slice(0,8);
    byLawHtml = '<div style="margin-top:16px"><div style="color:#8ABED6;font-size:12px;margin-bottom:8px">各法填空準確率</div>' +
      laws.map(([name,d])=>{
        const p = d.total>0?Math.round(d.correct/d.total*100):0;
        return `<div style="background:#0D1F2D;border-radius:8px;padding:10px 12px;margin-bottom:6px"><div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:#C8DDE8">${name}</span><span style="color:#8ABED6">${d.correct}/${d.total}格 (${p}%)</span></div><div style="height:3px;background:rgba(91,175,214,0.1);border-radius:2px;margin-top:6px"><div style="width:${p}%;height:100%;background:${p>=80?'#2ECC71':p>=60?'#5BAFD6':'#E74C3C'};border-radius:2px"></div></div></div>`;
      }).join('') + '</div>';
  }
  const weakLaw = _getWeakestFillLaw(s);
  const weakHtml = weakLaw ? `
    <div style="margin-top:12px;border-top:1px solid rgba(255,255,255,0.15);padding-top:10px">
      <div style="font-size:11px;color:#aaa;margin-bottom:6px">⚠️ 弱點法規</div>
      <div style="font-size:13px;color:#ffd700;margin-bottom:8px">📖 ${weakLaw}</div>
      <button onclick="_drillWeakFillLaw('${weakLaw.replace(/'/g, "\\'")}')"
        style="background:#2a4a7f;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer">
        🎯 練習此法規
      </button>
    </div>` : '';
  document.getElementById('fill-stats-content').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">
      <div style="background:#0D1F2D;border-radius:10px;padding:14px;text-align:center">
        <div style="font-size:28px;font-weight:700;color:#D4A847">${pct}%</div>
        <div style="color:#8ABED6;font-size:11px;margin-top:3px">累計準確率</div>
        <div style="color:#5B7A8D;font-size:10px">${correct}/${total}格</div>
      </div>
      <div style="background:#0D1F2D;border-radius:10px;padding:14px;text-align:center">
        <div style="font-size:28px;font-weight:700;color:#5BAFD6">${todayPct}%</div>
        <div style="color:#8ABED6;font-size:11px;margin-top:3px">今日準確率</div>
        <div style="color:#5B7A8D;font-size:10px">${s.todayCorrect||0}/${s.todayTotal||0}格</div>
      </div>
      <div style="background:#0D1F2D;border-radius:10px;padding:14px;text-align:center">
        <div style="font-size:28px;font-weight:700;color:#2ECC71">${cleanRate}%</div>
        <div style="color:#8ABED6;font-size:11px;margin-top:3px">全對無提示率</div>
        <div style="color:#5B7A8D;font-size:10px">${s.clean||0}/${s.articles||0}篇</div>
      </div>
    </div>${byLawHtml}${weakHtml}
    <div style="text-align:center;margin-top:16px">
      <button onclick="if(confirm('確定清除所有填空統計？')){localStorage.removeItem(FILL_STATS_KEY);closeFillStats();}" style="background:none;border:1px solid rgba(231,76,60,0.3);color:#E74C3C;border-radius:16px;padding:6px 16px;font-size:12px;cursor:pointer">清除紀錄</button>
    </div>
    <div style="margin-top:14px;">
      <div style="color:#8899aa;font-size:12px;margin-bottom:5px;">📅 近14天填空</div>
      <canvas id="fill-daily-chart" width="280" height="40" style="border-radius:4px;display:block;"></canvas>
      <div style="display:flex;justify-content:space-between;color:#556677;font-size:10px;margin-top:3px;">
        <span>14天前</span><span>今日</span>
      </div>
    </div>`;
  document.getElementById('fill-stats-panel').style.display = 'block';
  _renderFillDailyChart();
}

function closeFillStats() {
  document.getElementById('fill-stats-panel').style.display = 'none';
}
</script>

<div id="fillSessionModal" style="display:none;position:fixed;inset:0;background:rgba(7,13,20,0.8);align-items:center;justify-content:center;z-index:50;">

      <button class="btn btn-sec" onclick="startFillSession(20)">20 題</button>
