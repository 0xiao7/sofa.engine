<link rel="stylesheet" href="sofa.css" />
<style>
  :root{--tool-topbar-offset:81px}
  body{padding-top:var(--tool-topbar-offset)}
  .topbar{position:fixed;top:0;left:0;right:0;z-index:80}
  .pr-bar{
    background:var(--navy-2);border-bottom:1px solid var(--line);
    padding:16px 40px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;
  }
  .pr-bar .l{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .pr-bar .back{
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;
    color:rgba(245,240,234,.55);text-transform:uppercase;
    padding:6px 10px;border:1px solid var(--line-2);border-radius:3px;
  }
  .pr-bar .back:hover{color:var(--cream);border-color:var(--cream)}
  .pr-bar .title{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .pr-bar .title .law{
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;
    color:rgba(245,240,234,.5);text-transform:uppercase;
  }
  .pr-bar .title .art{font-family:var(--serif);font-weight:600;font-size:18px;color:var(--cream)}
  .pr-bar .title .sub{color:rgba(245,240,234,.6);font-size:13.5px}

  /* 自製法規下拉樣式已移至 sofa.css（.law-dd*），全站共用 */
  .pr-meta{
    display:flex;align-items:center;gap:22px;
    font-family:var(--mono);font-size:12px;letter-spacing:.08em;
    color:rgba(245,240,234,.55);
  }
  .pr-meta .seg b{color:var(--peach);font-weight:600;font-size:13px;margin-left:6px}

  .pr-progress{height:2px;background:rgba(245,240,234,.06);position:relative}
  .pr-progress .fl{
    position:absolute;left:0;top:0;height:100%;
    background:linear-gradient(to right, var(--peach), var(--peach-2));
    width:55%;
  }

  .stage{
    padding:28px 64px 56px;background:var(--navy-3);
    position:relative;min-height:calc(100vh - 70px - 60px - 2px);
  }
  .stage::before{
    content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(245,240,234,.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,240,234,.018) 1px, transparent 1px);
    background-size:60px 60px;
    mask-image:radial-gradient(ellipse 60% 50% at 50% 0%, #000 30%, transparent 70%);
    pointer-events:none;
  }
  .inner{max-width:1080px;margin:0 auto;position:relative;display:grid;grid-template-columns:1fr 300px;gap:32px}

  .ar-head{margin-bottom:14px}
  .ar-head .eb{
    font-family:var(--mono);font-size:11px;color:var(--peach);
    letter-spacing:.22em;text-transform:uppercase;
    display:flex;align-items:center;gap:10px;
  }
  .ar-head .eb::before{content:"";width:18px;height:1px;background:var(--peach)}
  .ar-head h2{
    font-family:var(--serif);font-weight:600;font-size:27px;
    margin-top:8px;color:var(--cream);
    display:flex;align-items:baseline;gap:18px;
  }
  .ar-head h2 .n{font-size:38px;color:var(--peach);font-weight:600;letter-spacing:-.02em}
  .ar-head .row{
    margin-top:10px;display:flex;gap:18px;align-items:center;
    font-family:var(--mono);font-size:11.5px;letter-spacing:.1em;
    color:rgba(245,240,234,.55);text-transform:uppercase;flex-wrap:wrap;
  }
  .ar-head .row .pill{
    padding:5px 12px;border:1px solid var(--line-2);border-radius:100px;
    color:var(--peach);font-weight:600;
  }

  .fill-card{
    background:var(--navy-2);border:1px solid var(--line);border-radius:4px;
    padding:28px 44px;
    font-family:var(--serif);font-size:21px;line-height:2.0;
    color:var(--cream);letter-spacing:.02em;position:relative;
    word-break:keep-all;overflow-wrap:break-word;
  }
  .fill-card::before{
    content:attr(data-label);
    position:absolute;top:18px;right:24px;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;
    color:rgba(245,240,234,.25);
  }
  .fill-card p{margin-bottom:16px}
  .fill-card .ro{
    color:var(--peach);font-family:var(--mono);font-size:14px;
    font-weight:600;margin-right:8px;letter-spacing:.04em;
  }

  .blank{
    display:inline-block;min-width:5.5em;
    max-width:100%;box-sizing:border-box;
    padding:2px 14px;margin:0 3px;
    border:none;border-bottom:2px solid var(--peach);
    background:rgba(231,187,167,.06);
    border-radius:3px 3px 0 0;
    font-family:var(--serif);font-size:21px;
    color:var(--cream);text-align:center;
    outline:none;transition:.18s;
    caret-color:var(--peach);
  }
  .blank:focus{background:rgba(231,187,167,.18);border-bottom-color:var(--peach-2)}
  .blank.ok{
    color:var(--good);border-bottom-color:var(--good);
    background:rgba(159,184,159,.10);
  }
  .blank.bad{
    color:var(--bad);border-bottom-color:var(--bad);
    background:rgba(199,123,106,.10);
  }
  .blank.empty::placeholder{
    color:rgba(245,240,234,.22);
    font-family:var(--mono);font-size:13px;letter-spacing:.04em;
  }
  .handwrite-mode .blank{
    min-height:48px;min-width:160px!important;max-width:100%;
    font-size:22px;padding:6px 16px;
    vertical-align:middle;border-radius:6px;
  }
  #btn-handwrite.active{
    background:rgba(231,187,167,.15)!important;
    border-color:var(--peach)!important;
    color:var(--peach)!important;
  }
  .blank-tag{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;
    color:var(--peach);text-transform:uppercase;
    vertical-align:super;margin-left:2px;
    background:rgba(231,187,167,.10);padding:1px 5px;border-radius:2px;
  }

  .fill-card .but{
    margin-top:18px;padding-top:16px;border-top:1px dashed var(--line);
    font-family:var(--sans);font-size:15px;line-height:1.85;
    color:rgba(245,240,234,.6);
  }
  .fill-card .but b{color:var(--peach);font-weight:600}

  .fill-actions{
    margin-top:28px;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;
  }
  .fill-actions .l{display:flex;gap:10px;flex-wrap:wrap;font-family:var(--mono);font-size:11.5px;letter-spacing:.1em;color:rgba(245,240,234,.5);text-transform:uppercase;align-items:center}
  .fill-actions .l kbd{
    display:inline-block;padding:3px 8px;
    background:var(--navy-2);border:1px solid var(--line-2);
    border-radius:3px;font-family:var(--mono);font-size:10.5px;
    color:var(--peach);margin-right:6px;
  }
  .fill-actions .r{display:flex;gap:10px}

  /* === Right rail === */
  .rail{display:flex;flex-direction:column;gap:18px;position:sticky;top:92px;align-self:start}
  .rail-card{
    background:var(--navy-2);border:1px solid var(--line);border-radius:4px;padding:22px;
  }
  .rail-h{
    font-family:var(--mono);font-size:11px;color:var(--peach);
    letter-spacing:.22em;text-transform:uppercase;font-weight:600;
    padding-bottom:12px;border-bottom:1px dashed var(--line);margin-bottom:14px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .rail-h .ct{color:rgba(245,240,234,.4);font-weight:500;letter-spacing:.1em}
  .fill-empty-state{
    display:inline-flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    font-size:13px;
    color:rgba(245,240,234,.58);
    line-height:1.7;
  }
  .fill-empty-action{
    min-height:40px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:8px 14px;
    border:1px solid rgba(231,187,167,.42);
    border-radius:10px;
    background:rgba(231,187,167,.08);
    color:var(--peach);
    font-weight:700;
    text-decoration:none;
    white-space:nowrap;
  }
  .fill-empty-action:hover{background:rgba(231,187,167,.14);border-color:var(--peach)}

  .score-row{display:flex;align-items:flex-end;justify-content:space-between;gap:8px}
  .score{
    font-family:var(--serif);font-weight:600;font-size:48px;line-height:1;
    color:var(--cream);letter-spacing:-.01em;
  }
  .score em{font-size:18px;color:rgba(245,240,234,.4);font-style:normal;font-weight:400;margin-left:4px}
  .score-l{
    font-family:var(--mono);font-size:11px;letter-spacing:.12em;
    color:rgba(245,240,234,.5);text-transform:uppercase;
  }
  .pill-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .pill{
    padding:5px 12px;border-radius:100px;
    font-family:var(--mono);font-size:11px;letter-spacing:.04em;
    border:1px solid var(--line-2);background:transparent;color:rgba(245,240,234,.65);
  }
  .pill.good{color:var(--good);border-color:rgba(159,184,159,.4)}
  .pill.bad{color:var(--bad);border-color:rgba(199,123,106,.4)}

  /* Wave 52 — difficulty badge */
  #diff-badge {
    display:inline-flex;align-items:center;gap:6px;
    padding:3px 10px;border-radius:12px;font-size:12px;
    font-weight:600;vertical-align:middle;
    transition:all 0.3s;font-family:var(--mono);letter-spacing:.04em;
  }
  #diff-badge .d{width:7px;height:7px;border-radius:50%;flex:none}
  #diff-badge.easy   { background:rgba(159,184,159,.14); color:var(--good); border:1px solid rgba(159,184,159,.32); }
  #diff-badge.easy   .d{ background:var(--good) }
  #diff-badge.medium { background:rgba(217,176,132,.14); color:var(--warn); border:1px solid rgba(217,176,132,.32); }
  #diff-badge.medium .d{ background:var(--warn) }
  #diff-badge.hard   { background:rgba(199,123,106,.14); color:var(--bad);  border:1px solid rgba(199,123,106,.32); }
  #diff-badge.hard   .d{ background:var(--bad) }

  /* blank list */
  .blank-list{display:flex;flex-direction:column;gap:8px}
  .bl-row{
    display:flex;align-items:center;gap:10px;
    padding:8px 10px;border-radius:3px;
    font-size:13.5px;cursor:pointer;transition:.18s;
  }
  .bl-row:hover{background:rgba(245,240,234,.04)}
  .bl-row .ix{
    font-family:var(--mono);font-size:11px;color:var(--peach);
    letter-spacing:.04em;width:24px;font-weight:600;
  }
  .bl-row .val{flex:1;color:var(--cream)}
  .bl-row .st{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;
    text-transform:uppercase;
  }
  .bl-row .st.ok{color:var(--good)}
  .bl-row .st.bad{color:var(--bad)}
  .bl-row .st.todo{color:rgba(245,240,234,.4)}

  /* hint row */
  .hint-row{display:flex;gap:8px}
  .hint-btn{
    flex:1;padding:11px 12px;
    background:var(--navy-3);border:1px solid var(--line-2);
    border-radius:3px;font-family:var(--mono);font-size:11px;
    letter-spacing:.1em;text-transform:uppercase;
    color:rgba(245,240,234,.7);transition:.18s;cursor:pointer;
    display:flex;flex-direction:column;align-items:flex-start;gap:4px;
  }
  .hint-btn:hover{border-color:var(--peach);color:var(--cream)}
  .hint-btn b{font-family:var(--serif);font-size:18px;color:var(--peach);letter-spacing:.01em;font-weight:600}

  /* section analysis panel */
  .sec-panel{margin-top:22px;background:var(--cream);color:var(--navy);border-radius:4px;padding:22px 26px;border-left:4px solid var(--peach-3)}
  .sec-panel .sec-hd{font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--peach-3);font-weight:600;padding-bottom:12px;border-bottom:1px dashed rgba(31,56,72,.15);margin-bottom:4px}
  .sec-block{margin-top:16px;padding-top:14px;border-top:1px dashed rgba(31,56,72,.15)}
  .sec-label{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--peach-3);font-weight:600;margin-bottom:6px}
  .sec-text{font-size:13px;line-height:1.85;color:rgba(31,56,72,.78)}
  .sec-text .crossref{display:inline-flex;align-items:center;max-width:100%;margin:0 3px 4px 0;padding:1px 6px;border:1px solid rgba(213,154,120,.45);border-radius:3px;background:rgba(231,187,167,.14);color:var(--peach-3);text-decoration:none;text-underline-offset:3px;white-space:nowrap;line-height:1.55;vertical-align:baseline}
  .sec-text .crossref:hover{background:rgba(231,187,167,.24);color:var(--navy)}
  .sec-text .sec-h{margin:10px 0 4px;color:var(--navy);font-weight:600}
  .sec-text .sec-h:first-child{margin-top:0}
  .sec-text .sec-i{position:relative;margin:8px 0 8px 26px;padding:8px 12px 8px 34px;border-left:4px solid rgba(231,187,167,.68);background:rgba(231,187,167,.13);border-radius:4px}
  .sec-text .sec-i::before{content:'';position:absolute;left:11px;top:1.02em;width:7px;height:7px;border:1.5px solid var(--peach-3);border-radius:50%;box-sizing:border-box;background:rgba(245,240,234,.75)}
  .sec-empty{margin-top:14px;padding:13px 15px;background:rgba(231,187,167,.12);border:1px dashed rgba(213,154,120,.32);border-radius:4px;color:rgba(31,56,72,.62);font-size:13px;line-height:1.8}
  .sec-lock{margin-top:16px;border-top:1px dashed rgba(31,56,72,.15)}
  .sec-lock .sec-label::after{content:"";font-size:11px;opacity:.65}
  .sec-lock-preview{position:relative;max-height:80px;overflow:hidden;padding:10px 0 0;pointer-events:none;user-select:none;font-size:13.5px;line-height:1.8;color:rgba(31,56,72,.72)}
  .sec-lock-preview::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(245,240,234,0) 15%,var(--cream) 82%);pointer-events:none}
  .sec-lock-cta{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;padding:10px 16px;font-size:12.5px;color:rgba(31,56,72,.72);background:rgba(231,187,167,.1);border:1px dashed rgba(213,154,120,.4);border-radius:4px}
  .sec-lock-cta a{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--peach);text-decoration:none;padding:5px 14px;border:1px solid rgba(213,154,120,.4);border-radius:2px;white-space:nowrap}
  .cpi-note{margin-top:16px;padding:14px 16px;background:rgba(217,176,132,.12);border:1px solid rgba(217,176,132,.38);border-left:3px solid var(--peach);border-radius:4px;color:var(--navy);font-size:14px;line-height:1.75;white-space:pre-line}
  .cpi-note b{display:block;margin-bottom:4px;color:var(--navy);font-family:var(--sans);font-weight:700}

  @media (max-width:1100px){
    .pr-bar{padding:14px 24px}
    .stage{padding:36px 32px 72px}
    .inner{grid-template-columns:1fr}
    .rail{position:static;flex-direction:row;flex-wrap:wrap}
    .rail-card{flex:1;min-width:240px}
  }
  @media (max-width:760px){
    :root{--tool-topbar-offset:calc(64px + env(safe-area-inset-top, 0px))}
    html,body{overflow-x:hidden}          /* 手機 390 頂部列略寬造成的橫向溢出收掉（內容不受影響）*/
    .pr-bar{padding:12px 18px;gap:12px;flex-wrap:wrap}
    .pr-meta{gap:14px;font-size:11px}
    .stage{padding:24px 18px 60px}
    .ar-head h2{font-size:24px}
    .ar-head h2 .n{font-size:36px}
    .fill-card{padding:24px 22px;font-size:18px;line-height:2}
    .sec-text .sec-i{margin:7px 0 7px 12px;padding:7px 10px 7px 28px;border-left-width:3px}
    .sec-text .sec-i::before{left:9px;width:6px;height:6px}
    .blank{font-size:17px;min-width:4.5em;padding:2px 10px}
    .fill-actions{flex-direction:column;align-items:stretch}
    .fill-actions .l{display:none}     /* 鍵盤快捷提示在觸控手機無意義，收起 */
    .fill-actions .r{flex-direction:column}
    .rail{flex-direction:column}
    #kb-hint{display:none}             /* 浮動鍵盤提示列手機收起 */
  }
  @media (max-width:760px){
    html.ios-reader-app .stage{padding-bottom:calc(96px + env(safe-area-inset-bottom, 0px))}
  }
  h1,h2,h3,h4{text-wrap:balance;}
  p{text-wrap:pretty;}
  .pr-chips{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 40px;background:var(--navy-2);border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11.5px;letter-spacing:.08em}
  .pr-chips .lab{color:rgba(245,240,234,.4);text-transform:uppercase;margin-right:4px}
  .pr-chip{padding:6px 12px;border:1px solid var(--line-2);border-radius:100px;background:transparent;color:rgba(245,240,234,.55);cursor:pointer;font-family:var(--mono);font-size:11px;letter-spacing:.06em;transition:.18s}
  .pr-chip:hover{border-color:var(--peach-dim);color:var(--cream)}
  .pr-chip.on{background:var(--peach);color:var(--navy);border-color:var(--peach);font-weight:600}
  .pr-chips.is-locked .pr-chip{opacity:.4;cursor:not-allowed;border-color:var(--line-2)!important;color:rgba(245,240,234,.35)!important;background:transparent!important}
  .pr-chips .lock-hint{display:none;font-size:10.5px;color:var(--peach-dim);letter-spacing:.05em;margin-left:auto;font-style:italic;opacity:.85}
  .pr-chips.is-locked .lock-hint{display:inline-block}
  .pr-sub{display:none;align-items:center;gap:8px;margin-left:6px}
  .pr-sub.show{display:flex}
  .pr-sub select{background:var(--navy-3);border:1px solid var(--line-2);border-radius:3px;color:var(--cream);font-family:var(--mono);font-size:11.5px;padding:5px 10px;cursor:pointer;outline:none}
  @media (max-width:760px){.pr-chips{padding:10px 18px}}

  /* ── Wave 62: 鍵盤提示徽章 ── */
  #kb-hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(26,46,61,0.85);color:var(--cream-3);font-size:12px;padding:5px 14px;border-radius:12px;pointer-events:none;transition:opacity 0.5s;z-index:100;font-family:var(--mono);letter-spacing:.06em;}

  /* ── Wave 93: 每日填空挑戰 ── */
  #btnFillDaily {
    padding: 8px 14px; border-radius: 8px;
    background: rgba(231,187,167,0.12);
    border: 1px solid rgba(231,187,167,0.55); color: var(--peach);
    font-size: 12px; cursor: pointer; transition: all 0.2s;
    font-family: var(--mono); letter-spacing: .04em;
  }
  #btnFillDaily:hover { background: rgba(231,187,167,0.2); }
  #btnFillDaily.done { border-color: rgba(159,184,159,.55); color: var(--good); background: rgba(159,184,159,.12); }
  #fill-daily-badge { font-size: 11px; color: var(--good); margin-left: 4px; display: none; }
</style>
</head>
<body>

  <div id="kb-hint">Tab 切換空格 · Enter 確認，全對才換下一篇</div>

function formatLawText(raw){
  if(!raw) return '';
  let t=String(raw).replace(/\r\n?/g,'\n').trim();
  if(t.indexOf('\n')!==-1) return t;
  t=t.replace(/(?<=\S)\s+(1[0-9]|[2-9])\s+(?=[一-鿿（【「])(?![萬億元個月年日人條項款號次倍種類份件名冊])/g,'\n$1 ');

  return t.replace(/^\n+/,'').replace(/\n{2,}/g,'\n').trim();
}

// 中文數字正規化：二年→2年、三十日→30日、一百二十日→120日
function normLegalNum(s){
  const d={'零':0,'〇':0,'○':0,'一':1,'二':2,'兩':2,'两':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9};
  const units={'十':10,'百':100,'千':1000};
  const parseNum=t=>{
    if(!/[十百千萬万]/.test(t))return t.replace(/[零〇○一二兩两三四五六七八九]/g,c=>String(d[c]));
    let total=0, section=0, num=0;
    [...t].forEach(c=>{
      if(c in d){num=d[c];return;}
      if(c in units){section+=(num||1)*units[c];num=0;return;}
      if(c==='萬'||c==='万'){total+=(section+num||1)*10000;section=0;num=0;}
    });
    return String(total+section+num);
  };
  let r=String(s||'').normalize('NFKC');
  r=r.replace(/(\d+(?:\.\d+)?)\s*[萬万]/g,(_,n)=>String(Number(n)*10000));
  r=r.replace(/(\d+(?:\.\d+)?)\s*千/g,(_,n)=>String(Number(n)*1000));
  r=r.replace(/(\d+(?:\.\d+)?)\s*百/g,(_,n)=>String(Number(n)*100));
  r=r.replace(/[零〇○一二兩两三四五六七八九十百千萬万]+/g,parseNum);
  return r;
}
function normalizeFillArticleNo(raw){
  let text=String(raw||'').normalize('NFKC')
    .replace(/^第\s*/,'')
    .replace(/\s*條$/,'')
    .replace(/^§+/,'')
    .replace(/\s+/g,'')
    .trim();
  text=text.replace(/條之/g,'之');
  const m=text.match(/^([0-9一二三四五六七八九十百千零兩两]+)(?:條)?(?:之([0-9一二三四五六七八九十百千零兩两]+))?$/);
  if(!m)return text;
  return normLegalNum(m[1])+(m[2]?'之'+normLegalNum(m[2]):'');
}
function fillArticleNoFromRecord(a){
  if(!a)return '';
  if(a.article_no)return normalizeFillArticleNo(a.article_no);
  if(a.article)return normalizeFillArticleNo(a.article);
  if(a.no)return normalizeFillArticleNo(a.no);
  const title=String(a.title||'');
  let m=title.match(/第\s*([0-9０-９一二三四五六七八九十百千零兩两]+)\s*條?\s*之\s*([0-9０-９一二三四五六七八九十百千零兩两]+)\s*條?/);
  if(m)return normalizeFillArticleNo(m[1]+'之'+m[2]);
  m=title.match(/第\s*([0-9０-９一二三四五六七八九十百千零兩两]+(?:之[0-9０-９一二三四五六七八九十百千零兩两]+)?)\s*條/);
  return m?normalizeFillArticleNo(m[1]):'';
}
function findFillArticleByNo(articles,raw){
  const target=normalizeFillArticleNo(raw);
  return (articles||[]).find(a=>fillArticleNoFromRecord(a)===target)||null;
}

  const set = _EXAM_LAWS[key] ? new Set(_EXAM_LAWS[key]) : null;
  return set ? laws.filter(l => set.has(l.name)) : laws;
}

function _saveAndApplyFillExam(key) {
  localStorage.setItem('sofa_exam_key', key);
  if(uid && key!=='all') fetch(`${API}/api/me/profile`,{method:'PATCH',headers:_authH({'Content-Type':'application/json'}),body:JSON.stringify({exam_key:key})}).catch(()=>{});
  const bar=document.getElementById('_exam-picker-fill');
  if(bar) bar.remove();
  const filtered = _filterLawsForExam(_allLoadedFillLaws, key);
  const sel = document.getElementById('lawSelect');
  // Remove existing law options (keep __ special ones)
  Array.from(sel.options).forEach(o => { if(!o.value.startsWith('__')&&!o.disabled)sel.removeChild(o); });
  _allFillLawNames = [];
  filtered.forEach(l => { _allFillLawNames.push(l.name); const o=document.createElement('option');o.value=l.name;o.textContent=l.name;sel.appendChild(o); });
  const first = filtered[0];
  if(first&&sel){ sel.value=first.name; sel.dispatchEvent(new Event('change')); _updateFillStatusBar(first.name); loadNew(); }
}

function _showFillExamBanner() {
  if(document.getElementById('_exam-picker-fill')) return;
  const bar=document.createElement('div');
  bar.id='_exam-picker-fill';
  bar.style.cssText='background:var(--navy-4);border-bottom:2px solid rgba(231,187,167,.35);padding:11px 32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:56px;z-index:200;';

    +Object.entries(_EXAM_NAMES).map(([k,n])=>`<button onclick="_saveAndApplyFillExam('${k}')" style="font-family:var(--mono);font-size:11px;padding:5px 14px;border:1px solid rgba(231,187,167,.5);border-radius:2px;background:transparent;color:var(--cream);cursor:pointer">${n}</button>`).join('')

  const nav=document.querySelector('.pr-bar')||document.querySelector('.top-bar')||document.body;

}

(async()=>{
  const sel = document.getElementById('lawSelect');
  if(uid){
    [['__starred__','重點法條'],['__bookmarks__','我的收藏'],['__mastered__','已熟記'],['__review__','待複習']].forEach(([v,t])=>{

    });
  } catch{}
  const _urlFillLaw = fillUrlLawParam();
  if(_urlFillLaw){
    let opt = sel.querySelector(`option[value="${CSS.escape(_urlFillLaw)}"]`);
    if(!opt && _allLoadedFillLaws.some(l=>l.name===_urlFillLaw)){
      opt=document.createElement('option');

      opt.textContent=_urlFillLaw;

      _updateFillScopeLabel();
      loadNew();
      return;
    }
  }
  // Wave 74: restore saved law preference and auto-load; default to 記帳士法 for first-time visitors
  const _savedFillLaw = localStorage.getItem('sofa_fill_law');
  if(_savedFillLaw&&sel.querySelector(`option[value="${CSS.escape(_savedFillLaw)}"]`)){
    sel.value = _savedFillLaw;
    sel.dispatchEvent(new Event('change'));
    _updateFillStatusBar(sel.value);
    loadNew();

    if(_defFillOpt){ sel.value = _defFillOpt.value; sel.dispatchEvent(new Event('change')); _updateFillStatusBar(_defFillOpt.value); loadNew(); }
  }
  _updateFillScopeLabel();
})();

// 自製法規下拉：以隱藏的 <select id="lawSelect"> 為真實狀態，自畫選單只負責顯示與品牌色高亮
(function(){
  const sel=document.getElementById('lawSelect');
  const dd=document.getElementById('lawDD');
  const btn=document.getElementById('lawDDBtn');
  const pop=document.getElementById('lawDDPop');
  const label=document.getElementById('lawDDLabel');
  if(!sel||!dd||!btn||!pop||!label) return;
  function syncLabel(){ const o=sel.selectedOptions[0]; label.textContent=o?o.textContent:'全部法規'; }
  function buildPop(){
    pop.innerHTML='';
    Array.from(sel.options).forEach(o=>{
      if(o.disabled){ const s=document.createElement('div');s.className='law-dd-sep';pop.appendChild(s);return; }
      const it=document.createElement('div');
      it.className='law-dd-item'+(o.value===sel.value?' sel':'');
      it.textContent=o.textContent;
      it.addEventListener('click',()=>{ sel.value=o.value; sel.dispatchEvent(new Event('change')); syncLabel(); close(); });
      pop.appendChild(it);
    });
  }
  function open(){ buildPop(); dd.classList.add('open'); const s=pop.querySelector('.sel'); if(s)s.scrollIntoView({block:'nearest'}); }
  function close(){ dd.classList.remove('open'); }
  btn.addEventListener('click',e=>{ e.stopPropagation(); dd.classList.contains('open')?close():open(); });
  document.addEventListener('click',e=>{ if(!dd.contains(e.target))close(); });
  document.addEventListener('keydown',e=>{ if(e.key==='Escape')close(); });
  sel.addEventListener('change',syncLabel);
  syncLabel();
})();

function _prFilterByChip(arts){
  if(_curPrChip==='all')return arts;
  var sub=(document.getElementById('prSubSel')||{}).value||'';
  return arts.filter(function(a){
    var t=a.title||'',tl=a.time_limit||'',tags=a.tags||[];
    var base=false;
    if(_curPrChip==='deadline'){
      base=(tl&&tl!=='無')||tags.some(function(x){return x.indexOf('期間')!==-1||x.indexOf('時限')!==-1;})||t.indexOf('期間')!==-1||t.indexOf('時限')!==-1;

      base=tags.some(function(x){return x.indexOf('罰')!==-1;})||t.indexOf('罰')!==-1;

    if(!sub)return true;
    return t.indexOf(sub)!==-1||tl.indexOf(sub)!==-1||tags.some(function(x){return x.indexOf(sub)!==-1;});

}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Wave 118: law proficiency status bar
function _updateFillStatusBar(lawName) {
  const bar = document.getElementById('fill-status-bar');
  if (!bar) return;

  if (!lawName || lawName.startsWith('__')) {
    if (lawName === '__all__') {
      bar.style.display = 'block';
      bar.innerHTML = '<span style="color:var(--peach)">全部法規混練模式</span>';
    } else {
      bar.style.display = 'none';
    }
    return;
  }

  const s = JSON.parse(localStorage.getItem('sofa_fill_stats_v1') || '{}');
  const d = (s.byLaw || {})[lawName];

  if (!d || d.total === 0) {
    bar.style.display = 'block';
    bar.innerHTML = '<span style="color:var(--cream-3)">尚未練習此法規</span>';
    return;
  }

  const count = d.total;
  const color = count >= 15 ? 'var(--good)' : count >= 5 ? 'var(--warn)' : 'var(--peach)';
  const label = count >= 15 ? '熟練' : count >= 5 ? '練習中' : '起步中';
  const barPct = Math.min(100, Math.round(count / 20 * 100)); // 20 articles = full bar

  bar.style.display = 'block';
  bar.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <span>已練 <b style="color:var(--cream-3)">${count}</b> 篇填空</span>
      <span style="color:${color};font-weight:600">${label}</span>
    </div>
    <div style="background:rgba(255,255,255,0.1);border-radius:3px;height:4px">
      <div style="background:${color};border-radius:3px;height:4px;width:${barPct}%;transition:width 0.4s"></div>
    </div>
  `;
}

// ── 填空範圍標籤：{考科顯示名}＿全部法規（N 部）／或單一法規名 ──────────
function _updateFillScopeLabel() {
  const el = document.getElementById('fill-scope-label');
  if (!el) return;
  const sel = document.getElementById('lawSelect');
  const v = sel ? sel.value : '';
  const examKey = localStorage.getItem('sofa_exam_key') || localStorage.getItem('sofa.dash.exam.pick') || '';
  const examName = _EXAM_NAMES[examKey] || '';
  // 全部法規 / 未選具體法規 → 顯示「{考科}＿全部法規（N 部）」
  if (v === '' || v === '__all__') {
    const n = _allFillLawNames.length;
    const scope = examName ? `${examName}＿全部法規` : '全部法規';
    el.textContent = n ? `${scope}（${n} 部）` : scope;
    el.style.display = 'inline';
    return;
  }
  // 特殊清單（收藏 / 重點 / 已熟記 / 待複習）→ 不顯示範圍標籤
  if (v.startsWith('__')) { el.style.display = 'none'; return; }
  // 指定單一法規 → 顯示該法規名
  el.textContent = v;
  el.style.display = 'inline';
}

const _FREE_SECS=[
  '章節標題與戰略權重','規範意旨與條文解析','執業要點與考情提示','核心摘要與記憶策略',

  {name:'相關法規及注意事項',label:'相關法規及注意事項'}

function cleanVisibleSpeechCueText(text){
  return String(text || '')
    .replace(/[\[【（(]\s*(重音|強調|輕讀|慢讀|快讀)\s*[\]】）)]/g, '')
    .replace(/[\[【（(]\s*停頓\s*[\]】）)]/g, '，')
    .replace(/\[(\/?emphasis)\]/gi, '')
    .replace(/\[break[^\]]*\]/gi, '，')
    .replace(/<\s*\/?\s*(em|strong|mark)\s*>/gi, '')
    .replace(/<\s*break[^>]*>/gi, '，')
    .replace(/[，,]\s*[，,]+/g, '，')
    .trim();
}
function cleanCrossRefLawName(lawName){
  return String(lawName || '')
    .replace(/^.*?(?:可看|請看|請參照|請見|另參照|另見)/, '')
    .replace(/^(搭配|參照|依|按|見|與)+/, '')
    .replace(/[，。、；：\s]+$/, '')
    .trim();
}
function currentFillReturnTarget(){
  try{ return 'fill.html' + (location.search || '') + (location.hash || ''); }catch(e){}
  return 'fill.html';
}
function linkifyLawRefs(escapedText,currentLawName){
  let lastLaw = null;
  const linkedAnchors = [];
  function stashLinked(html){
    const key = '@@SOFA_XREF_' + linkedAnchors.length + '@@';
    linkedAnchors.push(html);
    return key;
  }
  function hrefFor(law, art){
    const safeLaw = encodeURIComponent(String(law || '').replace(/\\/g, ''));
    const safeArt = encodeURIComponent(String(art || ''));
    const safeBack = encodeURIComponent(currentFillReturnTarget() || 'fill.html');
    return `law-preview.html?law=${safeLaw}&art=${safeArt}&from=fill&back=${safeBack}`;
  }
  function normalizeArtLabel(value){
    return String(value || '').replace(/\s+/g, '').replace(/條?之/g, '之').replace(/-/g, '之').replace(/^第/, '').replace(/條$/, '');
  }
  function splitLawPrefix(rawLaw, law){
    const raw = String(rawLaw || '');
    return raw.endsWith(law) ? raw.slice(0, raw.length - law.length) : '';
  }
  const lawTypes = '(?:法|條例|規則|辦法|標準|準則|細則|規程|通則)';
  const lawPat = '(?:《([^》]+)》|(?:搭配|參照|依|按|見|與)?([^，。、；：\\s《》()（）;；]{1,40}' + lawTypes + '))';
  const numPat = '[0-9０-９一二三四五六七八九十百千零兩两]+(?:\\s*(?:條?之|-)\\s*[0-9０-９一二三四五六七八九十百千零兩两]+)?';
  const articleSeq = new RegExp(lawPat + '第?\\s*(' + numPat + '(?:\\s*(?:、|,|，|及|和|與)\\s*第?\\s*' + numPat + ')+)\\s*條', 'g');
  const sequenced = String(escapedText || '').replace(articleSeq, (match, bracketLaw, plainLaw, nums) => {
    const rawLaw = bracketLaw || plainLaw || '';
    const law = cleanCrossRefLawName(rawLaw);
    if(!law || law === '同法' || law === '本法') return match;
    lastLaw = law;
    const prefix = bracketLaw ? '' : splitLawPrefix(rawLaw, law);
    const tokens = nums.split(/(、|,|，|及|和|與)/);
    let first = true;
    const linked = tokens.map(token => {
      if(/^(、|,|，|及|和|與)$/.test(token)) return token;
      const cleanToken = String(token).trim();
      const art = normalizeArtLabel(cleanToken);
      if(!art) return token;
      const label = first ? law + (cleanToken.startsWith('第') ? cleanToken : art) + '條' : (cleanToken.startsWith('第') ? cleanToken : art + '條');
      first = false;
      return `<a class="crossref" href="${hrefFor(law, art)}" data-law="${encodeURIComponent(law)}" data-art="${encodeURIComponent(art)}">${label}</a>`;
    }).join('');
    return prefix + stashLinked(linked);
  });
  return sequenced.replace(/(?:《([^》]+)》|(?:搭配|參照|依|按|見|與)?([^，。、；：\s《》()（）;；]{1,40}(?:法|條例|規則|辦法|標準|準則|細則|規程|通則)))?(同法|本法)?第?(\d+)條(?:之(\d+))?/g, (match, bracketLaw, plainLaw, sameLaw, art, sub)=>{
    const law = cleanCrossRefLawName(bracketLaw || plainLaw || '');
    if(law && law !== '同法' && law !== '本法') lastLaw = law;
    else if((sameLaw || law === '同法' || law === '本法') && (lastLaw || currentLawName)) lastLaw = lastLaw || currentLawName;
    if(!lastLaw) return match;
    const fullArt = art + (sub ? '之' + sub : '');
    const prefixMatch = match.match(/^(.+?(?:可看|請看|請參照|請見|另參照|另見)|搭配|參照|依|按|見|與)(.+)$/);
    const prefix = prefixMatch ? prefixMatch[1] : '';
    const label = prefixMatch ? prefixMatch[2] : match;
    return `${prefix}<a class="crossref" href="${hrefFor(lastLaw, fullArt)}" data-law="${encodeURIComponent(lastLaw)}" data-art="${encodeURIComponent(fullArt)}">${label}</a>`;
  }).replace(/@@SOFA_XREF_(\d+)@@/g, (match, idx) => linkedAnchors[Number(idx)] || match);
}
function formatSection(text,currentLawName){
  if(!text) return '';
  var lines=String(text).replace(/\r\n?/g,'\n').split('\n'),out='';
  lines.forEach(function(raw){
    if(!raw||!raw.trim())return;
    var lead=(raw.match(/^[ \t　]*/)||[''])[0],body=raw.slice(lead.length),isSub=false;
    var bm=body.match(/^([•◦‣·▪])\s*/);
    if(bm){isSub=(bm[1]==='◦');body=body.slice(bm[0].length);}
    else if(lead.length>=2||/　/.test(lead)){isSub=true;}
    body=cleanVisibleSpeechCueText(body.trim());if(!body)return;
    var esc=body.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    esc=esc.replace(/^([^：:]{1,14}[：:])/,'<b>$1</b>');
    out+='<p class="'+(isSub?'sec-i':'sec-h')+'">'+linkifyLawRefs(esc,currentLawName)+'</p>';
  });
  return out;
}
function buildCpiAdjustmentNote(article,sections){
  const lawName=article?.law_name||(document.getElementById('lawSelect')||{}).value||'';
  const articleText=[article?.title,article?.article_no,article?.original_text,JSON.stringify(sections||{})].join('\n');
  const artNo=String(article?.article_no||article?.title||'');
  const hasCpiText=/CPI|消費者物價指數|物價指數|公告調整|按.*物價/.test(articleText);
  const isBasicTax=lawName.includes('所得基本稅額條例') && /(^|第|\D)13(條|$|\D)/.test(artNo);
  const estateGiftAmountArticle=/12\s*[-之]\s*1|十二條之一|第十二條之一|(^|第|\D)(13|17|18|19|20|22)(條|$|\D)/.test(artNo);
  const estateGiftAmountText=/免稅額|扣除額|配偶|直系血親卑親屬|父母|喪葬費|殘障|扶養|課稅級距|贈與稅|遺產稅|萬|元/.test(articleText);
  const isEstateGift=lawName.includes('遺產及贈與稅法') && (estateGiftAmountArticle || hasCpiText || estateGiftAmountText);
  if(!hasCpiText && !isBasicTax && !isEstateGift) return '';
  if(isBasicTax){
    return '這題條文寫六百萬元，但 113 年度起個人基本所得額扣除額已調整為 750 萬元；115 年度沿用 750 萬元。題目仍可考條文基準或比例，考前請以當年度公告額為準。';
  }
  if(isEstateGift){
    return '條文原文、舊題數字和當年度公告額要分開看。\n115 / 114 現行：遺產稅免稅額 1,333 萬；不計入遺產總額的日常器具 100 萬、職業工具 56 萬；配偶扣除 553 萬；直系血親卑親屬每人 56 萬；父母、喪葬費各 138 萬；重度以上身心障礙 693 萬；扶養兄弟姊妹、祖父母每人 56 萬；贈與稅免稅額 244 萬 / 年。\n舊題常見差異：職業工具條文舊基準 40 萬，113 年度起已公告為 56 萬；級距 113 年仍為遺產 5,000 萬 / 1 億、贈與稅 2,500 萬 / 5,000 萬，114 / 115 已為遺產 5,621 萬 / 1 億 1,242 萬、贈與稅 2,811 萬 / 5,621 萬。\n題目仍可考條文基準或比例，作答時以考試年度與財政部公告額為準。';
  }
  return '這類金額會受 CPI / 財政部公告調整。115 年度與 113 年度是否相同，要看各稅目公告；題目仍可考條文基準或比例，考前請以當年度公告額為準。';
}

function _buildFillCalendar() {
  const today = new Date();
  const days = [];
  for (let i = 29; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = d.toLocaleDateString('zh-TW', {
      timeZone: 'Asia/Taipei',
      year: 'numeric', month: '2-digit', day: '2-digit'
    }).replace(/\//g, '-');
    const count = parseInt(localStorage.getItem(`sofa_fill_daily_${key}`) || '0');
    days.push({ count, isToday: i === 0 });
  }

  const maxCount = Math.max(...days.map(d => d.count), 1);

  let html = `<div style="margin-top:12px">
    <div style="font-size:10px;color:var(--cream-3);margin-bottom:6px">近 30 日填空</div>
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:3px">`;

  days.forEach(({ count, isToday }) => {
    const intensity = count === 0 ? 0 : Math.max(0.15, count / maxCount);
    const bg = count === 0
      ? 'rgba(255,255,255,0.06)'
      : `rgba(231,187,167,${intensity})`;
    const border = isToday ? '1px solid var(--peach)' : '1px solid transparent';
    html += `<div title="${count}篇" style="
      aspect-ratio:1;border-radius:3px;
      background:${bg};border:${border}
    "></div>`;
  });

  html += `</div>
    <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--cream-3);margin-top:4px">
      <span>30天前</span><span>今日</span>
    </div>
  </div>`;

  return html;
}

function _recordFillStat(correctBlanks, totalBlanks, usedHint, lawName, fillElapsed) {
  const _fillD = new Date().toISOString().slice(0,10);
  const _fillDKey = 'sofa_fill_daily_' + _fillD;
  localStorage.setItem(_fillDKey, String(parseInt(localStorage.getItem(_fillDKey)||'0',10)+1));
  const s = _loadFillStats();
  const today = new Date().toISOString().slice(0,10);
  s.total = (s.total||0) + totalBlanks;
  s.correct = (s.correct||0) + correctBlanks;
  if(s.today !== today){ s.today=today; s.todayTotal=0; s.todayCorrect=0; }
  s.todayTotal = (s.todayTotal||0) + totalBlanks;
  s.todayCorrect = (s.todayCorrect||0) + correctBlanks;
  s.clean = (s.clean||0) + (!usedHint && correctBlanks===totalBlanks ? 1 : 0);
  s.articles = (s.articles||0) + 1;
  // Wave 107: per-article response time tracking
  if(fillElapsed > 0){
    s.totalTimeSec = (s.totalTimeSec||0) + fillElapsed;
    s.timedArticles = (s.timedArticles||0) + 1;
  }
  if(lawName){
    s.byLaw = s.byLaw||{};
    s.byLaw[lawName] = s.byLaw[lawName]||{total:0,correct:0,clean:0};
    s.byLaw[lawName].total += totalBlanks;
    s.byLaw[lawName].correct += correctBlanks;
    if(!usedHint && correctBlanks===totalBlanks) s.byLaw[lawName].clean++;
  }
  _saveFillStats(s);
  // Wave 125: update and render daily cross-session streak
  _updateFillDailyStreak();
  _renderFillStreak();
}

function _getFillToday() {
  return new Date().toLocaleDateString('zh-TW', {
    timeZone: 'Asia/Taipei',
    year: 'numeric', month: '2-digit', day: '2-digit'
  }).replace(/\//g, '-');
}

function _getFillYesterday() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return d.toLocaleDateString('zh-TW', {
    timeZone: 'Asia/Taipei',
    year: 'numeric', month: '2-digit', day: '2-digit'
  }).replace(/\//g, '-');
}

function _updateFillDailyStreak() {
  const STREAK_KEY = 'sofa_fill_streak';
  const today = _getFillToday();
  const s = JSON.parse(localStorage.getItem(STREAK_KEY) || '{"count":0,"lastDate":""}');

  if (s.lastDate === today) return s.count; // already updated today

  const yStr = _getFillYesterday();

  if (s.lastDate === yStr) {
    s.count += 1; // extend streak
  } else if (s.lastDate === '') {
    s.count = 1; // first time
  } else {
    s.count = 1; // streak broken, restart
  }

  s.lastDate = today;
  localStorage.setItem(STREAK_KEY, JSON.stringify(s));
  return s.count;
}

function _getFillStreak() {
  const s = JSON.parse(localStorage.getItem('sofa_fill_streak') || '{"count":0,"lastDate":""}');
  if (!s.lastDate || s.lastDate < _getFillYesterday()) return 0;
  return s.count;
}

  const el = document.getElementById('fill-streak');
  if (!el) return;
  const count = _getFillStreak();

function _fillSoundPerfect() {
  try {
    const ctx = _getFillAudio();
    [0, 0.18].forEach((d, i) => {
      const osc = ctx.createOscillator(); const env = ctx.createGain();
      osc.connect(env); env.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(i===0 ? 520 : 780, ctx.currentTime+d);
      env.gain.setValueAtTime(0.16, ctx.currentTime+d);
      env.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+d+0.3);
      osc.start(ctx.currentTime+d); osc.stop(ctx.currentTime+d+0.31);
    });
  } catch(e){}
}
function _fillSoundPartial() {
  try {
    const ctx = _getFillAudio();
    const osc = ctx.createOscillator(); const env = ctx.createGain();
    osc.connect(env); env.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = 440;
    env.gain.setValueAtTime(0.12, ctx.currentTime);
    env.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.4);

// ── Wave 87: streak milestone sounds ─────────────────────────────────────────
function _playFillStreakMilestone(streak) {
  const ctx = _getFillAudio();
  if (!ctx) return;
  const sequences = {
    3:  [[523,0.0],[659,0.1],[784,0.2]],
    5:  [[523,0.0],[659,0.08],[784,0.16],[1047,0.25],[1319,0.35]],
    10: [[523,0],[659,0.07],[784,0.14],[1047,0.21],[1319,0.29],[1047,0.4],[1319,0.5],[1568,0.6]]
  };
  const seq = sequences[streak];
  if (!seq) return;
  seq.forEach(([freq, delay]) => {
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(0, ctx.currentTime+delay);
    g.gain.linearRampToValueAtTime(0.15, ctx.currentTime+delay+0.02);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+delay+0.35);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime+delay); o.stop(ctx.currentTime+delay+0.4);
  });
}
function _playFillStreakBroken(prev) {
  if (prev < 3) return;
  const ctx = _getFillAudio(); if (!ctx) return;
  [[392,0],[294,0.15]].forEach(([freq,delay]) => {
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type='sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(0.12, ctx.currentTime+delay);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+delay+0.4);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime+delay); o.stop(ctx.currentTime+delay+0.5);
  });
}

function _updateDiffBadge(blankCount){

    badge.className = 'easy';

  }
}

function renderFill(){
  fillTimerReset();
  fillTimerStart();
  // Wave 107: start per-article timer
  _fillStartTime = Date.now();
  clearInterval(_fillTimerInterval);
  _fillTimerInterval = setInterval(()=>{
    const el = document.getElementById('fill-timer');
    if(el && _fillStartTime > 0) el.textContent = ((Date.now()-_fillStartTime)/1000).toFixed(0)+'s';
  }, 1000);
  document.getElementById('fillProg').style.width='0%';
  const box = document.getElementById('fillText');
  document.getElementById('resultMsg').style.display='none';
  document.getElementById('sourceBox').style.display='none';
  if(!fillData||fillData.error){
    box.innerHTML=`<span style="color:rgba(245,240,234,.4);font-size:.84rem;font-family:var(--mono)">${esc(fillData?.error||'出題失敗')}</span>`;
    return;
  }
  const m=(fillData.title||'').match(/第(\d+(?:之\d+)?)條/);
  document.getElementById('artNum').textContent=m?m[1]:'—';
  document.getElementById('artTitle').textContent=(fillData.title||'').replace(/第[\d之]+條/,'').trim()||fillData.title||'—';
  // 顯示法規名
  const lawEl=document.getElementById('lawName');
  if(fillData.law_name){lawEl.textContent=fillData.law_name;lawEl.style.display='';}
  else{lawEl.style.display='none';}

  const text=fillData.masked_text||'';
  // 分段渲染：以 \n 切段，各段內處理空格
  const paragraphs=text.split('\n').filter(p=>p.trim());
  let allHtml='', blankIdx=0;
  paragraphs.forEach(para=>{
    let ph='',i=0;
    while(i<para.length){
      if(para[i]==='＿'){
        let b='';while(i<para.length&&para[i]==='＿'){b+=para[i];i++;}
        const lbl=String.fromCharCode(65+blankIdx);
        ph+=`<input class="blank empty" id="fb_${blankIdx}" data-idx="${blankIdx}" data-ans="${esc((fillData.answers||[])[blankIdx]||'')}" style="width:min(${Math.max(b.length*1.1,2.5)}em, 100%)" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="　"/><span class="blank-tag">${lbl}</span>`;
        blankIdx++;
      } else { ph+=esc(para[i]);i++; }
    }
    if(ph.trim()) allHtml+=`<p>${ph}</p>`;
  });
  // 若無換行，fallback 整段
  if(!allHtml){
    let ph='',i=0;
    while(i<text.length){
      if(text[i]==='＿'){
        let b='';while(i<text.length&&text[i]==='＿'){b+=text[i];i++;}
        const lbl=String.fromCharCode(65+blankIdx);
        ph+=`<input class="blank empty" id="fb_${blankIdx}" data-idx="${blankIdx}" data-ans="${esc((fillData.answers||[])[blankIdx]||'')}" style="width:min(${Math.max(b.length*1.1,2.5)}em, 100%)" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="　"/><span class="blank-tag">${lbl}</span>`;
        blankIdx++;
      } else { ph+=esc(text[i]);i++; }
    }
    allHtml=`<p>${ph}</p>`;
  }
  const idx=blankIdx;
  // 防呆：若這條算不出任何空格（偶發的空白/異常條文），自動換下一條，最多重試 6 次，
  // 不要把空卡片留在畫面上讓使用者以為「沒有自動出題」
  if(idx===0 && !_isFillDailyMode){
    if(_fillEmptyRetry < 6){ _fillEmptyRetry++; loadNew(); return; }
  } else {
    _fillEmptyRetry = 0;
  }
  box.innerHTML=allHtml;
  // 更新 data-label
  document.getElementById('fillCard').dataset.label=`FILL · ${idx} BLANK${idx>1?'S':''}`;
  document.getElementById('blankCount').textContent=idx+' 個空格';
  _updateDiffBadge(idx);  // Wave 52
  document.getElementById('filled').textContent='0 / '+idx;
  updateBlankList();
  box.querySelectorAll('input').forEach((inp,i,all)=>{
    inp.addEventListener('input',()=>{
      inp.classList.remove('ok','bad','empty');
      const v=inp.value.trim();
      if(!v){inp.classList.add('empty');}
      else if(answerMatch(v,inp.dataset.ans))inp.classList.add('ok');
      else if(normLegalNum(v).length>=normLegalNum(inp.dataset.ans).length)inp.classList.add('bad');
      updateBlankList();
      const filled=[...box.querySelectorAll('input')].filter(x=>x.value.trim()).length;
      document.getElementById('filled').textContent=filled+' / '+all.length;
      document.getElementById('fillProg').style.width=Math.round(filled/all.length*100)+'%';
    });
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();if(all[i+1])all[i+1].focus();else checkAnswers();}});
  });
  if(!isIOSReaderApp()&&box.querySelector('input'))box.querySelector('input').focus();
  hintsLeft=3;
  updateHintUI();
  _currentHintUsed = false;  // Wave 40: reset per-article hint flag
}

function updateBlankList(){
  const box=document.getElementById('fillText');
  const inputs=[...box.querySelectorAll('input')];
  const labels='ABCDEFGHIJ';
  const html=inputs.map((inp,i)=>{
    const v=inp.value.trim();
    const st=!v?'todo':inp.classList.contains('ok')?'ok':'bad';
    const stTxt=st==='ok'?'OK':st==='bad'?'XX':'···';
    const valTxt=v||'— 待填 —';
    const valStyle=st==='bad'?'color:var(--bad)':!v?'color:rgba(245,240,234,.4)':'';
    return`<div class="bl-row"><span class="ix">${labels[i]}</span><span class="val" style="${valStyle}">${esc(valTxt)}</span><span class="st ${st}">${stTxt}</span></div>`;
  }).join('');
  document.getElementById('blankList').innerHTML=html||'—';
}

function answerMatch(val, ans){
  const v=val.trim(), a=ans.trim();
  return v===a || normLegalNum(v)===normLegalNum(a);
}
function fillArticleNo(data){
  const raw = String((data && (data.article_no || data.article || data.title)) || '')
    .replace(/｜.*$/,'')
    .replace(/^§\s*/,'')
    .replace(/\s+/g,'')
    .trim();
  const ch = '[0-9０-９一二三四五六七八九十百千零兩两]+';
  let m = raw.match(new RegExp('^第?(' + ch + ')條?之(' + ch + ')條?'));
  if(m) return m[1] + '之' + m[2];
  m = raw.match(new RegExp('^第?(' + ch + ')條?'));
  return m ? m[1] : raw;
}
function fillArticleReaderHref(data){
  const law = String((data && data.law_name) || '');
  const art = fillArticleNo(data);
  let href = 'law-preview.html?law=' + encodeURIComponent(law);
  if(data && data.id){
    href += '&id=' + encodeURIComponent(data.id);
  }
  href += (art ? '&art=' + encodeURIComponent(art) : '');
  let back = 'fill.html';
  try{ back = 'fill.html' + (location.search || '') + (location.hash || ''); }catch(e){}
  return href + '&from=fill&back=' + encodeURIComponent(back);
}

function checkAnswers(){
  const box=document.getElementById('fillText');
  const inputs=[...box.querySelectorAll('input')];
  if(!inputs.length)return;
  let cor=0;
  inputs.forEach((inp,i)=>{
    const ans=(fillData.answers||[])[i]||'';
    inp.disabled=true;
    if(answerMatch(inp.value,ans)){inp.classList.add('ok');cor++;}
    else{inp.classList.add('bad');const sp=document.createElement('span');sp.textContent=`（${ans}）`;sp.style.cssText='color:var(--good);font-size:.78rem;font-family:var(--mono);margin-left:.3rem;';inp.after(sp);}
  });
  _lastFillPerfect = (cor === inputs.length);  // 記住本題是否全對
  // Wave 38: play audio feedback based on score
  if(cor === inputs.length) _fillSoundPerfect();
  else if(cor > 0) _fillSoundPartial();
  else _fillSoundWrong();
  // Wave 107: capture per-article elapsed time and stop live timer
  const _fillElapsed = _fillStartTime > 0 ? (Date.now() - _fillStartTime) / 1000 : 0;
  _fillStartTime = 0;
  clearInterval(_fillTimerInterval);
  const _timerEl = document.getElementById('fill-timer');
  if(_timerEl) _timerEl.textContent = _fillElapsed > 0 ? _fillElapsed.toFixed(0)+'s' : '--';
  // Wave 55: persist to cumulative stats
  _recordFillStat(cor, inputs.length, _currentHintUsed, fillData?.law_name || '', _fillElapsed);
  if (typeof window.sofaTrack === 'function') {
    window.sofaTrack('answer_submitted', {
      mode: 'fill',
      law_name: fillData?.law_name || '',
      page_id: fillData?.id || '',
      is_correct: (cor === inputs.length && inputs.length > 0),
      elapsed_sec: Math.round(_fillElapsed || 0)
    });
  }

  // Wave 87: streak tracking — must run after sound calls above
  const _wasPerfect = (cor === inputs.length && !_currentHintUsed);
  const _prevStreak = _fillStreak;
  if (_wasPerfect) {
    _fillStreak++;
    if ([3,5,10].includes(_fillStreak)) {
      setTimeout(() => _playFillStreakMilestone(_fillStreak), 150);
    }
  } else {
    _fillStreak = 0;
    setTimeout(() => _playFillStreakBroken(_prevStreak), 150);
  }

  const msg=document.getElementById('resultMsg');
  msg.style.display='block';
  msg.style.color=cor===inputs.length?'var(--good)':'var(--warn)';
  msg.textContent=cor===inputs.length?`✓ 全對！${cor}/${inputs.length}`:`${cor}/${inputs.length} 正確`;
  document.getElementById('scoreDisplay').textContent=cor+'/'+inputs.length;
  document.getElementById('accDisplay').textContent=Math.round(cor/inputs.length*100)+'%';
  updateMetaRight(cor);
  document.getElementById('fillProg').style.width='100%';
  pushHistory(fillData.law_name||'', fillData.title||'');
  const pills=cor===inputs.length
    ?`<span class="pill good">✓ ${cor} 正確</span>`
    :`<span class="pill good">✓ ${cor} 正確</span><span class="pill bad">✗ ${inputs.length-cor} 錯誤</span>`;
  document.getElementById('pillRow').innerHTML=pills;
  updateBlankList();
  if(fillData.id&&fillData.title){
    const src=document.getElementById('sourceBox');
    src.innerHTML=`出自 <a href="${fillArticleReaderHref(fillData)}" style="color:var(--peach)">《${esc(fillData.law_name||'')}》${esc(fillData.title)}</a>`;
    src.style.display='block';
  }
  // 寫入練習紀錄
  if(fillData.id&&uid&&uid!=='PREVIEW'&&!isFree){
    fetch(`${API}/api/me/history`,{method:'POST',headers:_authH({'Content-Type':'application/json'}),body:JSON.stringify({page_id:fillData.id,law_name:fillData.law_name||'',article:fillData.title||''})}).catch(()=>{});
    // 跨裝置答題紀錄：填空全對才算答對該條，並留下可讀題目給統計/弱點/最近作答。
    const fillQuestion=(fillData.masked_text||fillData.title||'填空練習').replace(/\s+/g,' ').trim();
    fetch(`${API}/api/me/answer`,{method:'POST',headers:_authH({'Content-Type':'application/json'}),body:JSON.stringify({
      article_id:fillData.id,
      is_correct:(cor===inputs.length&&inputs.length>0),
      mode:'fill',
      question:fillQuestion,
      options:fillData.answers||[],
      explanation:`${fillData.law_name||''} ${fillData.title||''}`.trim()
    })}).catch(()=>{});
  }
  // Auto-advance after perfect score (2s delay with countdown)
  if(cor === inputs.length && inputs.length > 0){
    const msg2 = document.getElementById('resultMsg');
    let secs = 2;
    const countdown = setInterval(()=>{
      secs--;
      if(msg2) msg2.textContent = `✓ 全對！${cor}/${inputs.length} — ${secs}s 後自動換題…`;
      if(secs <= 0){ clearInterval(countdown); loadNew(); }
    }, 1000);
    // Cancel auto-advance if user clicks Next manually
    document.getElementById('btnNext')?.addEventListener('click', ()=>clearInterval(countdown), {once:true});
  }
  // 載入條文解析 sections
  if(fillData.id){
    const panel=document.getElementById('sectionsBox');
    showFillSectionsLoading(panel);
    const srcBtn=document.getElementById('fillSourceLink');
    const srcPanel=document.getElementById('fillArtInline');
    srcBtn.style.display='inline-block';
    srcBtn.textContent='展開原文 ↓';
    srcPanel.style.display='none';
    srcPanel.textContent='';
    (async()=>{
      try{
        const h=_authH();
        const art=await fetch(`${API}/api/article/${fillData.id}`,{headers:h}).then(r=>r.json());
        srcPanel.textContent=formatLawText(art.original_text);
        renderFillSections(panel, art.sections||{}, art._plan!=='free', art);
      }catch(e){
        renderFillSections(panel, {}, true);
      }
    })();
  }
  // Wave 40: record per-article stats for session results
  if(_fillSession){
    _sessionStats.push({ correctBlanks: cor, totalBlanks: inputs.length, usedHint: _currentHintUsed });
  }
  _onFillDone();
  // Wave 118: refresh status bar with updated stats
  _updateFillStatusBar(document.getElementById('lawSelect').value);
}

  }
  try{

      try{

        }else if(targetLaw && targetArt){

              _artCache[targetLaw]=r.articles||r.items||[];

        }
      }finally{
        _fillUrlTargetPending = false;
        _fillUrlTargetResolving = false;
      }
    }
    if(!url && law==='__starred__'){
      const sl=await fetch(`${API}/api/starred?min_stars=5`,{headers:_authH()}).then(r=>r.json());
      const arts=(sl.articles||[]);
      if(!arts.length){
        document.getElementById('fillText').innerHTML='<span style="font-family:var(--mono);font-size:12px;color:rgba(245,240,234,.4)">尚無重點法條</span>';
        return;

      const pick=arts[Math.floor(Math.random()*arts.length)];
      url=`${API}/api/fill?page_id=${encodeURIComponent(pick.id)}`;
    } else if(!url && law==='__bookmarks__'){
      const bm=await fetch(`${API}/api/me/bookmarks`,{headers:_authH()}).then(r=>r.json());
      const ids=(bm.bookmarks||[]);
      if(!ids.length){
        document.getElementById('fillText').innerHTML='<span style="font-family:var(--mono);font-size:12px;color:rgba(245,240,234,.4)">尚無收藏條文</span>';
        return;
      }
      const pick=ids[Math.floor(Math.random()*ids.length)];
      url=`${API}/api/fill?page_id=${encodeURIComponent(pick)}`;
    } else if(!url && (law==='__mastered__'||law==='__review__')){
      const wantStatus=law==='__mastered__'?'mastered':'review';
      const mr=await fetch(`${API}/api/me/mastery`,{headers:_authH()}).then(r=>r.json());
      const items=(mr.items||[]).filter(m=>m.status===wantStatus&&m.page_id);
      if(!items.length){
        const msg=wantStatus==='mastered'?'尚無已熟記條文':'尚無待複習條文';
        document.getElementById('fillText').innerHTML='<span style="font-family:var(--mono);font-size:12px;color:rgba(245,240,234,.4)">'+msg+'</span>';
        return;
      }
      const pick=items[Math.floor(Math.random()*items.length)];
      url=`${API}/api/fill?page_id=${encodeURIComponent(pick.page_id)}`;
    } else if(!url) {
      const artNum = (document.getElementById('artNumInput')||{}).value?.trim();
      if(artNum && law && _artCache[law]){
        const match=findFillArticleByNo(_artCache[law],artNum);
        if(match){ url=`${API}/api/fill?page_id=${encodeURIComponent(match.id)}`; }
      }
      if(!url && _curPrChip!=='all' && law && _artCache[law]){
        const filtered=_prFilterByChip(_artCache[law]);
        if(!filtered.length){
          document.getElementById('fillText').innerHTML='<span style="font-family:var(--mono);font-size:12px;color:rgba(245,240,234,.4)">此細篩條件下沒有條文</span>';
          return;
        }
        const pick=filtered[Math.floor(Math.random()*filtered.length)];
        url=`${API}/api/fill?page_id=${encodeURIComponent(pick.id)}`;
      }
      if(!url){
        url=law?`${API}/api/fill?law=${encodeURIComponent(law)}`:`${API}/api/fill`;
        var _subVal=(document.getElementById('prSubSel')||{}).value||'';
        if(!law && _curPrChip!=='all' && _subVal){
          url+=(url.indexOf('?')>=0?'&':'?')+'chip='+encodeURIComponent(_curPrChip)+'&sub='+encodeURIComponent(_subVal);
        }
      }
    }
    let resp=await fetch(url,{headers:_authH()});
    fillData=await resp.json();
    // 8.8% 條文無數字可挖空：API 對指定 page_id 會 404（body 是 {detail}，非 {error}），
    // 舊版會略過守門直接 render 出壞掉的空白題。改為優雅換題：
    //   指定條文/收藏/熟記等 page_id 路徑挖不了空 → 退回「同一部法」挑挖得了的；
    //   真的整組都沒數字 → 顯示「換一題」而不是壞掉。
    if(!resp.ok || !fillData || !fillData.masked_text){
      const wasPageId = url.indexOf('page_id=')>=0;
      const realLaw = law && !law.startsWith('__');
      if(wasPageId && realLaw){
        try{
          const r2=await fetch(`${API}/api/fill?law=${encodeURIComponent(law)}`,{headers:_authH()});
          const d2=await r2.json();
          if(r2.ok && d2 && d2.masked_text){ fillData=d2; }
        }catch{}
      }
      if(!fillData || !fillData.masked_text){
        document.getElementById('fillText').innerHTML='<span class="fill-empty-state">這組條件下沒有可以挖空的數字 <a class="fill-empty-action" href="#" onclick="loadNew();return false;">換一題</a></span>';
        document.getElementById('artTitle').textContent='—';
        return;
      }
    }
    // 補上前端已知的法規名（若 API 未回傳）
    // Wave 110: law is already resolved (never '__all__' at this point), use resolved law name directly
    if(!fillData.law_name&&law&&!law.startsWith('__')){
      const _selText=document.getElementById('lawSelect').selectedOptions[0]?.value;
      fillData.law_name=(_selText&&_selText!=='__all__'&&!_selText.startsWith('__'))?_selText:law;
    }
    renderFill();
  }catch{
    document.getElementById('fillText').innerHTML='<span style="font-family:var(--mono);font-size:12px;color:rgba(245,240,234,.4)">載入失敗，請稍後再試</span>';
  }
}

// ── Wave 62: Enter 鍵 — 確認答案或換下一篇 ──────────────────────────────────
function _fillKeyHandler(e) {
  if (e.key !== 'Enter') return;
  // If focus is inside a blank input, only handle when all blanks are disabled (results showing)
  const inputs = [...document.getElementById('fillText').querySelectorAll('input')];
  const resultsShowing = inputs.length > 0 && inputs.every(inp => inp.disabled);
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
    // Let the per-input Enter handler manage check; only intercept when results are showing
    if (!resultsShowing) return;
  }
  // Results are showing → 只有全對才用 Enter 直接跳下一題；答錯時停留讓使用者看訂正
  if (resultsShowing) {
    e.preventDefault();
    if (_lastFillPerfect) document.getElementById('btnNext')?.click();
    return;
  }
  // No blanks yet (no article loaded) → do nothing
  if (!inputs.length) return;
  // Blanks present and not yet checked → trigger check
  const checkBtn = document.getElementById('btnCheck');
  if (checkBtn && !checkBtn.disabled) {
    e.preventDefault();
    checkBtn.click();
  }
}
document.addEventListener('keydown', _fillKeyHandler);

document.addEventListener('keydown', function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(e.metaKey||e.ctrlKey||e.altKey) return;
  const k = e.key.toLowerCase();
  if(k==='h'){ document.getElementById('hintFirst')?.click(); }
  else if(k==='c'){ document.getElementById('hintCount')?.click(); }
  else if(k==='r'){ document.getElementById('hintReveal')?.click(); }
  else if(k==='n'){ document.getElementById('btnNext')?.click(); }
});
document.getElementById('btnFillSession')?.addEventListener('click', ()=>{
  document.getElementById('fillSessionModal').style.display = 'flex';
});
document.getElementById('btnReset').addEventListener('click',()=>{
  document.getElementById('fillText').querySelectorAll('input').forEach(inp=>{inp.disabled=false;inp.value='';inp.classList.remove('ok','bad');inp.classList.add('empty');});
  document.getElementById('resultMsg').style.display='none';
  document.getElementById('sourceBox').style.display='none';
  updateBlankList();
  const first=document.getElementById('fillText').querySelector('input');
  if(first)first.focus();
});
document.getElementById('btnReveal').addEventListener('click',()=>{
  if(!fillData)return;
  document.getElementById('fillText').querySelectorAll('input').forEach((inp,i)=>{
    inp.value=(fillData.answers||[])[i]||'';
    inp.classList.remove('empty','bad');
    inp.classList.add('ok');
  });
  updateBlankList();
});
(function(){
  if(_fillUrlTargetPending) return;
  var law=document.getElementById('lawSelect').value;
  if(law){
    loadNew();
  } else {
    document.getElementById('fillText').innerHTML='<span style="font-family:var(--mono);font-size:12px;color:rgba(245,240,234,.4);letter-spacing:.1em">請先選擇法規，再開始練習</span>';
    document.getElementById('artTitle').textContent='—';
  }
})();

// ── Wave 62: 鍵盤提示自動淡出（4秒後）──
setTimeout(() => {
  const h = document.getElementById('kb-hint');
  if (h) {
    h.style.opacity = '0';
    setTimeout(() => h?.remove(), 500);
  }
}, 4000);

// Wave 93: init daily challenge button state on page load
_updateFillDailyBtn();
</script>

<!-- Wave 55: personal fill stats panel -->
<div id="fill-stats-panel" style="display:none; position:fixed; inset:0; background:rgba(4,13,20,0.96); z-index:210; overflow-y:auto; padding:24px 16px;">
  <div style="max-width:540px; margin:0 auto;">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
      <h2 style="color:var(--cream); font-family:var(--serif); margin:0; font-size:20px">填空成績統計</h2>
      <button onclick="closeFillStats()" style="background:none; border:1px solid rgba(231,187,167,0.4); color:var(--peach); border-radius:50%; width:32px; height:32px; cursor:pointer; font-size:16px">✕</button>

    <!-- Wave 145: Tab bar -->
    <div id="fill-stats-tab-bar" style="display:flex;gap:6px;margin-bottom:16px;">

      <button id="fill-tab-btn-wrong" onclick="_switchFillStatsTab('wrong')" style="flex:1;padding:8px 0;border-radius:20px;border:none;background:rgba(255,255,255,0.06);color:rgba(245,240,234,0.45);font-size:13px;cursor:pointer;font-family:var(--sans);font-weight:400;transition:background 0.2s">弱點清單</button>
    </div>
    <!-- Tab: 統計 -->

      <div id="fill-stats-content"></div>
    </div>
    <!-- Tab: 弱點清單 (Wave 145) -->
    <div id="fill-stats-tab-wrong" style="display:none;">
      <div id="fill-wrong-panel"></div>
    </div>
  </div>
</div>
<script>
// Wave 55: open/close fill stats panel
function _getWeakestFillLaw(stats) {
  if (!stats.byLaw) return null;
  let worst = null, worstRatio = 1;
  for (const [name, d] of Object.entries(stats.byLaw)) {
    if (d.total < 3) continue;
    const ratio = d.correct / d.total;
    if (ratio < worstRatio) { worstRatio = ratio; worst = name; }
  }
  return worst;
}

function _drillWeakFillLaw(lawName) {
  const sel = document.getElementById('lawSelect');
  if (sel) {
    sel.value = lawName;
    sel.dispatchEvent(new Event('change'));
    localStorage.setItem('sofa_fill_law', lawName);
  }
  closeFillStats();
  startFillSession && startFillSession(1);
}

function _toggleHandwrite(btn){
  const on = document.body.classList.toggle('handwrite-mode');
  btn.classList.toggle('active', on);
  try { localStorage.setItem('sofa_fill_handwrite', on ? '1' : '0'); } catch(e) {}
}

function openFillStats() {
  const s = _loadFillStats();
  const total = s.total||0, correct = s.correct||0;
  const pct = total > 0 ? Math.round(correct/total*100) : 0;
  const todayPct = s.todayTotal > 0 ? Math.round((s.todayCorrect||0)/s.todayTotal*100) : 0;
  const cleanRate = s.articles > 0 ? Math.round((s.clean||0)/s.articles*100) : 0;
  let byLawHtml = '';
  if(s.byLaw){
    const laws = Object.entries(s.byLaw).sort((a,b)=>b[1].total-a[1].total).slice(0,8);
    byLawHtml = '<div style="margin-top:16px"><div style="color:var(--peach);font-size:12px;margin-bottom:8px">各法填空準確率</div>' +
      laws.map(([name,d])=>{
        const p = d.total>0?Math.round(d.correct/d.total*100):0;
        return `<div style="background:var(--navy-3);border-radius:8px;padding:10px 12px;margin-bottom:6px"><div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--peach)">${name}</span><span style="color:var(--peach)">${d.correct}/${d.total}格 (${p}%)</span></div><div style="height:3px;background:rgba(231,187,167,0.1);border-radius:2px;margin-top:6px"><div style="width:${p}%;height:100%;background:${p>=80?'#9FB89F':p>=60?'var(--peach)':'var(--bad)'};border-radius:2px"></div></div></div>`;
      }).join('') + '</div>';
  }
  const weakLaw = _getWeakestFillLaw(s);
  const weakHtml = weakLaw ? `
    <div style="margin-top:12px;border-top:1px solid rgba(255,255,255,0.15);padding-top:10px">
      <div style="font-size:11px;color:var(--cream-3);margin-bottom:6px">弱點法規</div>
      <div style="font-size:13px;color:var(--peach);margin-bottom:8px">${weakLaw}</div>
      <button onclick="_drillWeakFillLaw('${weakLaw.replace(/'/g, "\\'")}')"
        style="background:rgba(231,187,167,.14);color:var(--peach);border:1px solid rgba(231,187,167,.38);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer">
        練習此法規
      </button>
    </div>` : '';
  // Wave 107: compute average response time
  const avgSec = (s.timedArticles||0) > 0 ? (s.totalTimeSec / s.timedArticles).toFixed(1) : '--';
  document.getElementById('fill-stats-content').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">
      <div style="background:var(--navy-3);border-radius:10px;padding:14px;text-align:center">
        <div style="font-size:28px;font-weight:700;color:var(--warn)">${pct}%</div>
        <div style="color:var(--peach);font-size:11px;margin-top:3px">累計準確率</div>
        <div style="color:var(--cream-3);font-size:10px">${correct}/${total}格</div>
      </div>
      <div style="background:var(--navy-3);border-radius:10px;padding:14px;text-align:center">
        <div style="font-size:28px;font-weight:700;color:var(--peach)">${todayPct}%</div>
        <div style="color:var(--peach);font-size:11px;margin-top:3px">今日準確率</div>
        <div style="color:var(--cream-3);font-size:10px">${s.todayCorrect||0}/${s.todayTotal||0}格</div>
      </div>
      <div style="background:var(--navy-3);border-radius:10px;padding:14px;text-align:center">
        <div style="font-size:28px;font-weight:700;color:#9FB89F">${cleanRate}%</div>
        <div style="color:var(--peach);font-size:11px;margin-top:3px">全對無提示率</div>
        <div style="color:var(--cream-3);font-size:10px">${s.clean||0}/${s.articles||0}篇</div>
      </div>
      <div style="background:var(--navy-3);border-radius:10px;padding:14px;text-align:center;grid-column:1/-1">
        <div style="font-size:20px;font-weight:700;color:var(--peach)">${avgSec}s</div>
        <div style="font-size:10px;color:var(--cream-3);margin-top:2px">平均完成時間</div>
      </div>
    </div>${byLawHtml}${weakHtml}
    <div style="text-align:center;margin-top:16px">
      <button onclick="if(confirm('確定清除所有填空統計？')){localStorage.removeItem(FILL_STATS_KEY);closeFillStats();}" style="background:none;border:1px solid rgba(199,123,106,0.3);color:var(--bad);border-radius:16px;padding:6px 16px;font-size:12px;cursor:pointer">清除紀錄</button>
    </div>
    ${_buildFillCalendar()}`;
  // Wave 145: reset to 統計 tab each time panel opens
  _switchFillStatsTab('stats');
  document.getElementById('fill-stats-panel').style.display = 'block';
}

function closeFillStats() {
  document.getElementById('fill-stats-panel').style.display = 'none';
}

// ── Wave 145: 填空統計面板 Tab 切換 ────────────────────────────────────
function _switchFillStatsTab(tab) {
  const statsDiv = document.getElementById('fill-stats-tab-stats');
  const wrongDiv = document.getElementById('fill-stats-tab-wrong');
  const btnStats = document.getElementById('fill-tab-btn-stats');
  const btnWrong = document.getElementById('fill-tab-btn-wrong');
  if (tab === 'stats') {
    statsDiv.style.display = '';
    wrongDiv.style.display = 'none';
    btnStats.style.background = 'var(--navy-2)';
    btnStats.style.color = 'var(--cream)';
    btnStats.style.fontWeight = '600';
    btnWrong.style.background = 'rgba(255,255,255,0.06)';
    btnWrong.style.color = 'rgba(245,240,234,0.45)';
    btnWrong.style.fontWeight = '400';
  } else {
    statsDiv.style.display = 'none';
    wrongDiv.style.display = '';
    btnWrong.style.background = 'var(--navy-2)';
    btnWrong.style.color = 'var(--cream)';
    btnWrong.style.fontWeight = '600';
    btnStats.style.background = 'rgba(255,255,255,0.06)';
    btnStats.style.color = 'rgba(245,240,234,0.45)';
    btnStats.style.fontWeight = '400';
    _renderFillWrongList();
  }
}

// ── Wave 145: 弱點法條清單渲染 ──────────────────────────────────────────
function _renderFillWrongList() {
  const panel = document.getElementById('fill-wrong-panel');
  if (!panel) return;
  const s = _loadFillStats();
  const byLaw = s.byLaw || {};
  const MIN_BLANKS = 5;

  const lawWrongs = Object.entries(byLaw)
    .filter(([, d]) => (d.total || 0) >= MIN_BLANKS)
    .map(([name, d]) => ({ name, wrong: (d.total || 0) - (d.correct || 0), total: d.total || 0 }))
    .filter(l => l.wrong > 0)
    .sort((a, b) => b.wrong - a.wrong);

  if (lawWrongs.length === 0) {
    panel.innerHTML = '<div style="text-align:center;padding:40px 0;color:rgba(245,240,234,0.4);font-size:14px">✓ 目前沒有錯誤紀錄</div>';
    return;
  }

  let html = '<div style="display:flex;flex-direction:column;gap:8px;">';
  lawWrongs.forEach(({ name, wrong, total }) => {
    const pct = Math.round((total - wrong) / total * 100);
    const color = pct >= 80 ? '#9FB89F' : pct >= 60 ? 'var(--peach)' : 'var(--bad)';
    const safeName = name.replace(/'/g, "\\'");
    html += `<div style="background:var(--navy-3);border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;">
      <div style="flex:1;min-width:0;">
        <div style="color:var(--peach);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${name}</div>
        <div style="color:var(--bad);font-size:11px;margin-top:2px;font-family:var(--mono);">✗ ${wrong}格錯 &nbsp;•&nbsp; <span style="color:${color}">${pct}%正確</span></div>
      </div>
      <button onclick="_drillFillWeakLaw('${safeName}')" style="flex-shrink:0;background:rgba(231,187,167,0.12);border:1px solid rgba(231,187,167,0.35);color:var(--peach);border-radius:12px;padding:5px 12px;font-size:12px;cursor:pointer;white-space:nowrap;">重練</button>
    </div>`;
  });
  html += '</div>';
  panel.innerHTML = html;
}

// ── Wave 145: 一鍵重練弱點法規 ──────────────────────────────────────────
function _drillFillWeakLaw(lawName) {
  const sel = document.getElementById('lawSelect');
  if (sel) {
    const opt = Array.from(sel.options).find(o => o.value === lawName || o.text === lawName);
    if (opt) {
      sel.value = opt.value;
    } else {
      sel.value = lawName;
    }
    sel.dispatchEvent(new Event('change'));
    localStorage.setItem('sofa_fill_law', lawName);
  }
  closeFillStats();
  if (typeof loadArticle === 'function') loadArticle();
}
</script>

  <div style="background:var(--navy-2,var(--navy-3));border:1px solid rgba(231,187,167,0.3);border-radius:8px;padding:28px 32px;min-width:240px;text-align:center" onclick="event.stopPropagation()">
