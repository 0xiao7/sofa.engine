<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>填空題 — SoFa Engine</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231F3848'/%3E%3Crect x='5' y='8' width='22' height='11' rx='3' fill='%23e7bba7'/%3E%3Crect x='4' y='13' width='5' height='10' rx='2.5' fill='%23d4a090'/%3E%3Crect x='23' y='13' width='5' height='10' rx='2.5' fill='%23d4a090'/%3E%3Crect x='9' y='18' width='14' height='5' rx='2' fill='%23c4907a'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:   #1F3848; --navy-2: #19303E; --navy-3: #142836; --navy-4: #0D1C28;
  --peach:  #E7BBA7; --peach-2:#F0CDBD; --peach-3:#C89580;
  --cream:  #F5F0EA; --muted:  #7A8892;
  --green:  #7ecf7e; --red:    #e06060;
  --line-on-navy: rgba(245,240,234,.14);
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --serif:'Noto Serif TC',serif; --sans:'Noto Sans TC',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{0%{transform:scale(.92)}60%{transform:scale(1.04)}100%{transform:scale(1)}}
body{background:var(--navy);color:var(--cream);font-family:var(--sans);font-weight:300;min-height:100vh;display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 70% 50% at 10% 0%,rgba(13,28,40,.7) 0%,transparent 60%),
             radial-gradient(ellipse 60% 70% at 85% 95%,rgba(231,187,167,.05) 0%,transparent 55%);
  pointer-events:none;z-index:0;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;background:rgba(13,28,40,.96);backdrop-filter:blur(18px);border-bottom:1px solid var(--line-on-navy);}
.nav-brand{font-family:var(--mono);font-size:.85rem;letter-spacing:.14em;color:var(--peach);text-decoration:none;}
.nav-back{font-family:var(--mono);font-size:.7rem;letter-spacing:.12em;color:rgba(245,240,234,.4);text-decoration:none;border:1px solid var(--line-on-navy);padding:.28rem .8rem;transition:color .2s,border-color .2s;}
.nav-back:hover{color:var(--cream);border-color:rgba(231,187,167,.3);}
main{flex:1;padding:5rem 1.5rem 3rem;position:relative;z-index:1;max-width:680px;margin:0 auto;width:100%;}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:1rem;}
.spinner{width:28px;height:28px;border:2px solid rgba(231,187,167,.15);border-top-color:var(--peach);border-radius:50%;animation:spin .8s linear infinite;}
.loading-text{font-family:var(--mono);font-size:.72rem;color:rgba(245,240,234,.35);letter-spacing:.1em;}
.art-eyebrow{font-family:var(--mono);font-size:.65rem;letter-spacing:.18em;color:rgba(245,240,234,.35);text-transform:uppercase;margin-bottom:.4rem;}
.art-title{font-family:var(--serif);font-size:1.15rem;font-weight:600;color:var(--cream);margin-bottom:1.4rem;}
.instruction{font-size:.82rem;color:rgba(245,240,234,.4);margin-bottom:1.2rem;line-height:1.6;}
.text-block{
  font-family:var(--serif);font-size:1rem;line-height:2;
  background:var(--navy-2);border:1px solid var(--line-on-navy);
  padding:1.4rem 1.6rem;margin-bottom:1.5rem;
}
.blank-input{
  display:inline-block;
  font-family:var(--mono);font-size:.9rem;
  background:var(--navy-3);border:none;border-bottom:2px solid var(--peach);
  color:var(--peach);text-align:center;outline:none;
  padding:.1rem .3rem;min-width:3ch;max-width:14ch;
  transition:border-color .2s,background .2s;
  vertical-align:baseline;
}
.blank-input:focus{background:rgba(231,187,167,.08);border-color:var(--peach-2);}
.blank-input.correct{border-color:var(--green);color:var(--green);background:rgba(126,207,126,.06);}
.blank-input.wrong{border-color:var(--red);color:var(--red);background:rgba(224,96,96,.06);animation:pop .25s ease;}
.btn-row{display:flex;gap:.75rem;margin-top:1.2rem;}
.btn{font-family:var(--sans);font-size:.84rem;font-weight:600;padding:.7rem 1.6rem;border:none;cursor:pointer;border-radius:2px;transition:background .2s,transform .18s,box-shadow .2s;}
.btn-primary{background:var(--peach);color:var(--navy);}
.btn-primary:hover:not(:disabled){background:var(--peach-2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(231,187,167,.18);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-ghost{background:transparent;color:rgba(245,240,234,.5);border:1px solid var(--line-on-navy);}
.btn-ghost:hover{border-color:rgba(231,187,167,.3);color:var(--cream);}
.result-strip{
  padding:1rem 1.4rem;margin-top:1rem;
  font-family:var(--mono);font-size:.78rem;letter-spacing:.05em;
  display:none;
}
.result-strip.show{display:block;}
.result-strip.all-correct{background:rgba(126,207,126,.08);border:1px solid rgba(126,207,126,.25);color:var(--green);}
.result-strip.has-wrong{background:rgba(224,96,96,.08);border:1px solid rgba(224,96,96,.2);color:var(--red);}
.answer-reveal{margin-top:.6rem;color:rgba(245,240,234,.5);font-size:.74rem;}
.counter{font-family:var(--mono);font-size:.68rem;letter-spacing:.1em;color:rgba(245,240,234,.3);margin-bottom:1rem;}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-brand">SOFA ENGINE</a>
  <a href="/dashboard.html" class="nav-back">← 會員中心</a>
</nav>
<main id="main">
  <div class="loading-state"><div class="spinner"></div><div class="loading-text">載入題目中…</div></div>
</main>
<script>
const API = 'https://sofa-engine-api.onrender.com';
function getUID(){ return localStorage.getItem('sofa_uid')||''; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let _answers = [], _checked = false, _count = 0;

function buildUI(data){
  _answers = data.answers || [];
  _checked = false;
  _count++;

  // Build masked text with inline inputs
  let html = data.masked_text || '';
  let inputIdx = 0;
  html = html.replace(/＿+/g, match => {
    const i = inputIdx++;
    const w = Math.max(match.length * 1.2, 3);
    return `<input class="blank-input" id="inp-${i}" data-idx="${i}" size="${match.length+1}" maxlength="${match.length+4}" autocomplete="off" spellcheck="false" inputmode="text">`;
  });

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="art-eyebrow">FILL · 填空題</div>
    <div class="art-title">${esc(data.title)}</div>
    <div class="counter">第 ${_count} 題</div>
    <div class="instruction">填入正確的數字（金額、天數、比例等）</div>
    <div class="text-block" id="text-block">${html}</div>
    <div class="result-strip" id="result"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="check-btn" onclick="checkAnswers()">確認答案</button>
      <button class="btn btn-ghost" onclick="loadQuestion()">換一題</button>
    </div>
  `;

  // Focus first input, handle Enter key
  const first = document.getElementById('inp-0');
  if(first) first.focus();
  document.querySelectorAll('.blank-input').forEach(inp => {
    inp.addEventListener('keydown', e => {
      if(e.key === 'Enter'){ e.preventDefault(); checkAnswers(); }
    });
    // auto-size width as user types
    inp.addEventListener('input', () => {
      inp.size = Math.max(inp.value.length + 2, 3);
    });
  });
}

function checkAnswers(){
  if(_checked) return;
  _checked = true;
  let allCorrect = true;
  const wrong = [];

  _answers.forEach((ans, i) => {
    const inp = document.getElementById(`inp-${i}`);
    if(!inp) return;
    const val = inp.value.trim();
    if(val === ans){
      inp.classList.add('correct');
      inp.disabled = true;
    } else {
      inp.classList.add('wrong');
      inp.disabled = true;
      allCorrect = false;
      wrong.push({idx: i+1, correct: ans, user: val});
    }
  });

  const strip = document.getElementById('result');
  strip.classList.add('show');
  if(allCorrect){
    strip.classList.add('all-correct');
    strip.innerHTML = `✓ 全對！${_answers.length} 個數字都正確`;
  } else {
    strip.classList.add('has-wrong');
    const reveals = wrong.map(w => `第 ${w.idx} 格正確答案：<strong>${esc(w.correct)}</strong>`).join('　');
    strip.innerHTML = `✗ 有 ${wrong.length} 個錯誤<div class="answer-reveal">${reveals}</div>`;
  }

  document.getElementById('check-btn').disabled = true;
}

async function loadQuestion(){
  document.getElementById('main').innerHTML = `
    <div class="loading-state"><div class="spinner"></div><div class="loading-text">載入題目中…</div></div>
  `;
  try{
    const res = await fetch(`${API}/api/fill`, {headers:{'X-Sofa-UID':getUID()}});
    if(!res.ok) throw new Error((await res.json()).detail || '載入失敗');
    buildUI(await res.json());
  } catch(e){
    document.getElementById('main').innerHTML = `
      <div class="loading-state">
        <div class="loading-text" style="color:rgba(224,96,96,.7)">${esc(e.message)}</div>
        <button class="btn btn-ghost" onclick="loadQuestion()" style="margin-top:1rem">重試</button>
      </div>
    `;
  }
}

if(!getUID()){ window.location.href='/login.html'; } else { loadQuestion(); }
</script>
</body>
</html>
