<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<title>SoFa Engine — 私人筆記庫</title>

<style>
  :root{
    --navy:#1F3848; --navy-2:#19303E; --navy-3:#142836; --navy-4:#0D1C28;
    --plum-1:#2C4A5C; --plum-2:#4A6373;
    --peach:#E7BBA7; --peach-2:#F0CDBD; --peach-3:#C89580; --peach-dim:rgba(231,187,167,.7);
    --cream:#F5F0EA; --cream-2:#ECE5DB; --cream-3:#E0D6C7;
    --good:#9FB89F; --warn:#D9B084;
    --line:rgba(245,240,234,.08); --line-2:rgba(245,240,234,.16); --line-3:rgba(245,240,234,.28);
    --serif:"Noto Serif TC","Songti TC",serif;
    --sans:"Noto Sans TC",system-ui,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--navy-3)}
  body{font-family:var(--sans);color:var(--cream);font-size:15px;line-height:1.65;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  ::selection{background:var(--peach);color:var(--navy)}

  .topbar{background:rgba(20,40,54,.97);border-bottom:1px solid var(--line);
    padding:18px 44px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:10;backdrop-filter:blur(8px)}
  .topbar .brand{font-family:var(--serif);font-weight:700;font-size:17px;letter-spacing:.04em}
  .topbar .brand .dot{color:var(--peach)}
  .topbar .back{font-family:var(--mono);font-size:12px;letter-spacing:.12em;color:rgba(245,240,234,.6);
    text-transform:uppercase;transition:.18s}
  .topbar .back:hover{color:var(--peach)}

  .wrap{max-width:1100px;margin:0 auto;padding:56px 44px 96px}

  .head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;
    border-bottom:1px solid var(--line-2);padding-bottom:22px;margin-bottom:40px}
  .head .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.28em;color:var(--peach-3);
    text-transform:uppercase;margin-bottom:12px}
  .head h1{font-family:var(--serif);font-weight:700;font-size:30px;letter-spacing:.02em}
  .head .sub{font-size:13px;color:rgba(245,240,234,.5);margin-top:8px}
  .head .cnt b{color:var(--peach-2)}
  .export-btn{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    border:1px solid var(--line-3);border-radius:4px;padding:9px 16px;color:var(--cream-2);
    white-space:nowrap;transition:.18s}
  .export-btn:hover{border-color:var(--peach-dim);color:var(--peach-2);background:rgba(231,187,167,.06)}

  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  @media(max-width:720px){.grid{grid-template-columns:1fr}.wrap{padding:36px 22px 80px}.topbar{padding:16px 22px}.head{flex-direction:column;align-items:flex-start}}

  .nc{position:relative;display:block;background:var(--navy-2);border:1px solid var(--line);
    border-left:2px solid var(--peach-dim);border-radius:5px;padding:20px 22px;transition:.18s;cursor:pointer}
  .nc:hover{border-color:var(--line-2);border-left-color:var(--peach);background:var(--navy);transform:translateY(-1px)}
  .nc .meta{display:flex;align-items:baseline;gap:10px;margin-bottom:11px}
  .nc .law{font-family:var(--serif);font-weight:600;font-size:15px;color:var(--cream)}
  .nc .art{font-family:var(--mono);font-size:12px;color:var(--peach-3);letter-spacing:.04em}
  .nc .body{font-size:13.5px;line-height:1.7;color:var(--cream-2);
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;white-space:pre-wrap}
  .nc .foot{margin-top:14px;display:flex;align-items:center;justify-content:space-between}
  .nc .date{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:rgba(245,240,234,.4)}
  .nc .open{font-family:var(--mono);font-size:11px;color:var(--peach-3);opacity:0;transition:.18s}
  .nc:hover .open{opacity:1}

  .empty{grid-column:1/-1;text-align:center;padding:80px 20px;border:1px dashed var(--line-2);border-radius:6px}
  .empty .ic{font-size:34px;display:block;margin-bottom:18px;opacity:.55}
  .empty .t{font-family:var(--serif);font-size:17px;color:var(--cream);margin-bottom:8px}
  .empty .d{font-size:13px;color:rgba(245,240,234,.5);line-height:1.8}
  .empty .cta{display:inline-block;margin-top:24px;font-family:var(--mono);font-size:12px;letter-spacing:.1em;
    text-transform:uppercase;border:1px solid var(--peach-dim);border-radius:4px;padding:11px 22px;color:var(--peach-2);transition:.18s}
  .empty .cta:hover{background:rgba(231,187,167,.08)}

  .foot-note{margin-top:48px;text-align:center;font-size:11.5px;color:rgba(245,240,234,.32);
    font-family:var(--mono);letter-spacing:.06em}
</style>
</head>
<body>
  <div class="topbar">
    <a class="brand" href="dashboard.html">So<span class="dot">·</span>Fa</a>
    <a class="back" href="dashboard.html">← 回會員中心</a>
  </div>

  <div class="wrap">
    <div class="head">
      <div>
        <div class="kicker">NOTE · 私人筆記庫</div>
        <h1>我寫過筆記的條文</h1>
        <div class="sub cnt" id="sub">坐下來，一條一條回看。</div>
      </div>
      <button class="export-btn" id="exportBtn" onclick="doExport()">匯出 .txt</button>
    </div>

    <div class="grid" id="grid">
      <div class="empty"><span class="ic">📝</span><div class="t">載入中…</div></div>
    </div>

    <div class="foot-note" id="footnote"></div>
  </div>

<script src="notes-store.js"></script>
<script>
  var API = 'https://sofa-engine-api.onrender.com';
  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

  // ── 全域付費判定（keystone，fail-OPEN）────────────────────────────
  // 私人筆記庫整頁為升級內容；判定不確定一律「不鎖」，絕不擋付費會員。
  //   · 明確免費（無 uid 且 sofa_free=FREE）→ 鎖（顯示升級 CTA 取代清單）。
  //   · 已登入 → 預設付費（fail-open），非同步向 /api/me/profile 確認；
  //     只有「明確回免費 plan」才降為鎖，其餘（200付費/4xx/5xx/逾時/parse失敗）維持不鎖。
  var _PAID_PLANS = {'月費':1,'季費':1,'買斷':1,'體驗':1,'Admin':1,'monthly':1,'quarterly':1,'trial':1};
  var _FREE_PLANS = {'免費':1,'free':1,'':1};
  var _uid = localStorage.getItem('sofa_uid');
  var _tok = localStorage.getItem('sofa_token') || '';
  var _explicitFree = (!_uid && localStorage.getItem('sofa_free') === 'FREE');
  window.__notesPaid = !_explicitFree;        // fail-open 初值
  window.__notesPaidResolved = !_uid;          // 未登入沒得查
  function _authHeaders(){ var h={}; if(_tok) h['Authorization']='Bearer '+_tok; else if(_uid) h['X-Sofa-UID']=_uid; return h; }
  function _confirmNotesPaid(cb){
    if(!_uid){ cb(window.__notesPaid); return; }
    var done=false;
    var ctrl = (typeof AbortController!=='undefined') ? new AbortController() : null;
    var timer = ctrl ? setTimeout(function(){ ctrl.abort(); }, 6000) : null;
    function finish(v){ if(done) return; done=true; if(timer) clearTimeout(timer); window.__notesPaid=v; window.__notesPaidResolved=true; cb(v); }
    fetch(API + '/api/me/profile', { headers: _authHeaders(), signal: ctrl ? ctrl.signal : undefined })
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(d){
        if(!d){ finish(true); return; }                 // 4xx/5xx → fail-open
        if(d.is_admin){ finish(true); return; }
        var plan = (d.plan||'').trim();
        if(_PAID_PLANS[plan]){
          // 過期付費仍全開的漏：付費 plan 但到期日已過 → 視為免費。
          // fail-open：只有到期日格式正確且嚴格早於今天才鎖；缺/壞/今天/未來日皆不鎖。
          var _exp = (d.expire||'').slice(0,10);
          if(/^\d{4}-\d{2}-\d{2}$/.test(_exp)){
            var _n = new Date();
            var _today = _n.getFullYear()+'-'+String(_n.getMonth()+1).padStart(2,'0')+'-'+String(_n.getDate()).padStart(2,'0');
            if(_exp < _today){ finish(false); return; }  // 到期日已過 → 鎖
          }
          finish(true); return;                          // 有效 / 無到期日 / 格式異常 → fail-open
        }
        if(_FREE_PLANS.hasOwnProperty(plan)){ finish(false); return; } // 明確免費
        finish(true);                                    // 未知 plan → fail-open
      })
      .catch(function(){ finish(true); });               // 逾時/網路錯 → fail-open
  }

  function renderUpgradeGate(){
    var grid = document.getElementById('grid');
    var sub = document.getElementById('sub');
    var foot = document.getElementById('footnote');
    var btn = document.getElementById('exportBtn');
    btn.style.display = 'none';
    sub.textContent = '雲端筆記庫 · 升級後解鎖';
    grid.innerHTML = '<div class="empty"><span class="ic">🔒</span>'
      + '<div class="t">私人筆記庫是升級功能</div>'
      + '<div class="d">把你在每條法條寫下的口訣、易混淆點、考前提醒，<br>'
      + '集中收進這裡，登入後自動雲端同步、跨裝置回看。<br>'
      + '升級後就能打開你的整座筆記庫。</div>'
      + '<a class="cta" href="pricing.html">升級解鎖筆記庫 →</a></div>';
    foot.textContent = '免費版仍可在條文底部寫筆記（存在本機）· 升級後同步雲端';
  }

  function fmtDate(iso){
    if(!iso) return '';
    try{ return new Date(iso).toLocaleDateString('zh-TW',{timeZone:'Asia/Taipei',year:'numeric',month:'2-digit',day:'2-digit'}); }
    catch(e){ return ''; }
  }
  // 「第 13 條」/「13之1」→ 取數字段給 dashboard ?art=
  function artNum(s){ var m = (s||'').match(/第?\s*([0-9之\-]+)\s*條?/); return m?m[1]:''; }
  function artLabel(s){ s=(s||'').trim(); if(!s) return ''; return /條/.test(s)?s:('§'+s); }

  function render(){
    var notes = window.notesStore ? notesStore.all() : [];
    var grid = document.getElementById('grid');
    var sub = document.getElementById('sub');
    var foot = document.getElementById('footnote');
    var btn = document.getElementById('exportBtn');

    if(!notes.length){
      grid.innerHTML = '<div class="empty"><span class="ic">📝</span>'
        + '<div class="t">還沒有任何筆記</div>'
        + '<div class="d">開啟任一條文後，在底部 <b>📝 我的筆記</b> 寫下你的想法、<br>記憶口訣或易混淆點，它就會收進這裡。</div>'
        + '<a class="cta" href="dashboard.html#search">去查第一條 →</a></div>';
      sub.textContent = '坐下來，一條一條回看。';
      btn.style.display = 'none';
      foot.textContent = '';
      return;
    }

    sub.innerHTML = '共 <b>' + notes.length + '</b> 條筆記 · 最近更新在前';
    btn.style.display = '';
    grid.innerHTML = notes.map(function(n){
      var num = artNum(n.articleNo);
      var href = 'dashboard.html?open=' + encodeURIComponent(n.articleId)
        + (n.lawName ? '&law=' + encodeURIComponent(n.lawName) : '')
        + (num ? '&art=' + encodeURIComponent(num) : '');
      return '<a class="nc" href="' + href + '">'
        + '<div class="meta">'
        +   '<span class="law">' + esc(n.lawName || '——') + '</span>'
        +   (n.articleNo ? '<span class="art">' + esc(artLabel(n.articleNo)) + '</span>' : '')
        + '</div>'
        + '<div class="body">' + esc(n.text) + '</div>'
        + '<div class="foot"><span class="date">' + esc(fmtDate(n.updatedAt)) + '</span>'
        +   '<span class="open">翻開條文 →</span></div>'
        + '</a>';
    }).join('');

    foot.textContent = notesStore.isLoggedIn() ? '已同步到雲端 · 跨裝置可見' : '目前只存在這台裝置 · 登入後自動雲端同步';
  }

  function doExport(){
    var n = window.notesStore ? notesStore.exportTxt() : false;
    if(!n){ alert('尚無筆記可匯出'); }
  }

  // 付費判定後決定顯示：免費→升級 CTA；付費/不確定→照常渲染（fail-open）
  // 明確免費直接擋；已登入先 fail-open 渲染本地內容，確認後若為免費才換成 CTA。
  if(_explicitFree){
    renderUpgradeGate();
  } else {
    // 先用本地內容立即渲染（offline-first），登入則拉雲端合併後再重繪
    render();
    if(window.notesStore && notesStore.isLoggedIn()){
      notesStore.sync().then(function(){ render(); });
    }
    _confirmNotesPaid(function(paid){
      if(!paid){ renderUpgradeGate(); }
      // paid 或不確定 → 維持已渲染的清單，不動作
    });
  }
</script>
</body>
</html>
