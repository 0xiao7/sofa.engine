<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<title>法規更新查核 — SoFa Engine</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23244658'/%3E%3Ctext x='16' y='23.5' font-size='21' font-family='Georgia,serif' font-weight='700' text-anchor='middle' fill='%23E7BBA7'%3ES%3C/text%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#1F3848;--navy-2:#19303E;--navy-3:#142836;--navy-4:#0D1C28;
  --plum-1:#2C4A5C;--plum-2:#4A6373;
  --peach:#E7BBA7;--peach-2:#F0CDBD;--peach-3:#C89580;
  --cream:#F5F0EA;--cream-2:#ECE5DB;--cream-3:#E0D6C7;
  --good:#9FB89F;--warn:#D9B084;--bad:#C77B6A;
  --line:rgba(245,240,234,.08);--line-2:rgba(245,240,234,.16);--line-3:rgba(245,240,234,.28);
  --serif:"Noto Serif TC",serif;
  --sans:"Noto Sans TC",system-ui,sans-serif;
  --mono:"JetBrains Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--navy-3);height:100%}
body{font-family:var(--sans);color:var(--cream);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;color:inherit}
::selection{background:var(--peach);color:var(--navy)}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{
  width:260px;flex-shrink:0;
  background:var(--navy-2);
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sidebar-header{
  padding:18px 16px 14px;
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
}
.sidebar-brand{
  font-family:var(--mono);font-size:11px;font-weight:500;
  letter-spacing:.12em;color:var(--peach);
  display:flex;align-items:center;gap:8px;
}
.brand-icon{width:26px;height:26px;background:var(--peach);border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--navy-4);font-weight:700}
.btn-new{
  background:var(--peach);color:var(--navy-4);
  font-size:12px;font-weight:600;padding:5px 10px;border-radius:6px;
  transition:background .15s;
}
.btn-new:hover{background:var(--peach-2)}
.task-list{flex:1;overflow-y:auto;padding:8px 0}
.task-item{
  padding:10px 16px;cursor:pointer;border-left:3px solid transparent;
  transition:background .12s;
}
.task-item:hover{background:rgba(245,240,234,.05)}
.task-item.active{background:rgba(231,187,167,.08);border-left-color:var(--peach)}
.task-item-name{font-size:13px;font-weight:500;color:var(--cream)}
.task-item-meta{font-size:11px;color:var(--plum-2);margin-top:2px}
.task-badge{
  display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;
  margin-left:4px;vertical-align:middle;
}
.badge-changed{background:rgba(196,122,122,.25);color:var(--bad)}
.badge-ok{background:rgba(159,184,159,.2);color:var(--good)}
.badge-new{background:rgba(231,187,167,.2);color:var(--peach)}

/* Main */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{
  background:rgba(20,40,54,.97);border-bottom:1px solid var(--line);
  padding:14px 32px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:20;
}
.topbar-title{font-size:15px;font-weight:600;color:var(--cream)}
.topbar-sync{font-size:11px;color:var(--plum-2)}
.content{padding:28px 32px;flex:1}

/* Task header */
.task-header{margin-bottom:20px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.task-title{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--cream)}
.task-actions{display:flex;gap:8px;flex-shrink:0}
.btn-run{
  background:var(--peach);color:var(--navy-4);
  font-size:13px;font-weight:600;padding:8px 18px;border-radius:8px;
  transition:background .15s;display:flex;align-items:center;gap:6px;
}
.btn-run:hover{background:var(--peach-2)}
.btn-run:disabled{opacity:.5;cursor:not-allowed}
.btn-edit{
  border:1px solid var(--line-2);color:var(--cream-2);
  font-size:13px;padding:7px 14px;border-radius:8px;
  transition:background .12s;
}
.btn-edit:hover{background:rgba(245,240,234,.06)}

/* Stats row */
.stats-row{
  display:grid;grid-template-columns:repeat(6,1fr);gap:12px;
  margin-bottom:16px;
}
.stat-box{
  background:var(--navy-2);border:1px solid var(--line);
  border-radius:8px;padding:10px 12px;
}
.stat-label{font-size:10px;color:var(--plum-2);letter-spacing:.04em;margin-bottom:3px}
.stat-value{font-size:13px;font-weight:600;color:var(--cream);font-family:var(--mono)}

/* Alert banner */
.alert{
  border-radius:8px;padding:10px 14px;margin-bottom:16px;
  font-size:13px;display:flex;align-items:center;gap:8px;
}
.alert-changed{background:rgba(196,122,122,.15);border:1px solid rgba(196,122,122,.35);color:var(--bad)}
.alert-ok{background:rgba(159,184,159,.1);border:1px solid rgba(159,184,159,.25);color:var(--good)}
.alert-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.alert-changed .alert-dot{background:var(--bad)}
.alert-ok .alert-dot{background:var(--good)}

/* Law table */
.section-title{font-size:13px;font-weight:600;color:var(--cream-2);margin-bottom:10px;letter-spacing:.02em}
.law-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:28px}
.law-table th{
  text-align:left;padding:8px 12px;
  border-bottom:1px solid var(--line-2);
  font-size:11px;font-weight:500;color:var(--plum-2);letter-spacing:.04em;
}
.law-table td{padding:10px 12px;border-bottom:1px solid var(--line)}
.law-table tr:hover td{background:rgba(245,240,234,.03)}
.law-name{font-weight:500;color:var(--cream)}
.law-cat{font-size:11px;color:var(--plum-2)}
.date-cell{font-family:var(--mono);font-size:12px;color:var(--cream-2)}
.status-changed{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(196,122,122,.2);color:var(--bad);
  font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;
}
.status-ok{
  display:inline-flex;align-items:center;gap:4px;
  color:var(--plum-2);font-size:11px;
}
.status-new{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(159,184,159,.15);color:var(--good);
  font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;
}
.btn-diff{
  font-size:11px;color:var(--peach-3);background:none;border:none;cursor:pointer;
  padding:2px 6px;border-radius:4px;transition:background .12s;margin-left:4px;
}
.btn-diff:hover{background:rgba(231,187,167,.1)}

/* History */
.history-list{display:flex;flex-direction:column;gap:8px}
.history-item{
  background:var(--navy-2);border:1px solid var(--line);
  border-radius:8px;padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;
}
.history-meta{font-size:12px;color:var(--cream-2)}
.history-detail{font-size:11px;color:var(--plum-2);margin-top:2px}
.history-badge{font-size:11px;font-family:var(--mono);padding:3px 8px;border-radius:4px}
.history-badge.has-change{background:rgba(196,122,122,.2);color:var(--bad)}
.history-badge.no-change{background:rgba(245,240,234,.06);color:var(--plum-2)}
.btn-history-view{font-size:11px;color:var(--peach-3);cursor:pointer}
.btn-history-view:hover{text-decoration:underline}

/* Empty state */
.empty{text-align:center;padding:80px 24px;color:var(--plum-2)}
.empty h3{font-size:16px;font-weight:600;color:var(--cream-2);margin-bottom:8px}
.empty p{font-size:13px;line-height:1.6}

/* Modal */
.overlay{
  position:fixed;inset:0;background:rgba(13,28,40,.75);
  z-index:100;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.modal{
  background:var(--navy-2);border:1px solid var(--line-2);
  border-radius:14px;width:540px;max-width:96vw;max-height:90vh;
  overflow-y:auto;padding:24px 28px;
}
.modal h2{font-family:var(--serif);font-size:17px;font-weight:700;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;color:var(--plum-2);margin-bottom:5px;letter-spacing:.03em}
.form-input{
  width:100%;background:var(--navy-3);border:1px solid var(--line-2);
  border-radius:7px;padding:9px 12px;font-size:13px;color:var(--cream);
  outline:none;transition:border-color .15s;
}
.form-input:focus{border-color:var(--peach-3)}
.form-hint{font-size:11px;color:var(--plum-2);margin-top:4px}
.law-entry-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.law-entry-row{display:flex;gap:6px;align-items:center}
.law-entry-row input{flex:1}
.law-entry-row input:first-child{flex:2}
.btn-remove{
  width:26px;height:26px;border-radius:5px;flex-shrink:0;
  color:var(--bad);font-size:15px;line-height:1;
  background:rgba(196,122,122,.1);transition:background .12s;
}
.btn-remove:hover{background:rgba(196,122,122,.2)}
.btn-add-law{
  font-size:12px;color:var(--peach-3);margin-top:6px;padding:5px 0;
  display:flex;align-items:center;gap:4px;
}
.btn-add-law:hover{color:var(--peach)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--line)}
.btn-cancel{
  font-size:13px;padding:8px 16px;border-radius:8px;
  border:1px solid var(--line-2);color:var(--cream-2);
  transition:background .12s;
}
.btn-cancel:hover{background:rgba(245,240,234,.06)}
.btn-save{
  font-size:13px;font-weight:600;padding:8px 20px;border-radius:8px;
  background:var(--peach);color:var(--navy-4);transition:background .15s;
}
.btn-save:hover{background:var(--peach-2)}
.btn-save:disabled{opacity:.5;cursor:not-allowed}

/* Diff modal */
.diff-modal{width:680px}
.diff-meta{
  background:var(--navy-3);border-radius:8px;padding:12px 14px;
  margin-bottom:16px;font-size:12px;color:var(--cream-2);
}
.diff-meta-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.diff-meta-tag{
  display:inline-block;font-size:10px;font-weight:600;
  padding:2px 7px;border-radius:3px;letter-spacing:.04em;
}
.tag-令令{background:rgba(231,187,167,.2);color:var(--peach)}
.tag-法律{background:rgba(159,184,159,.15);color:var(--good)}
.diff-article{margin-bottom:12px}
.diff-article-no{
  font-family:var(--mono);font-size:11px;font-weight:600;
  background:rgba(231,187,167,.15);color:var(--peach);
  padding:2px 8px;border-radius:4px;margin-bottom:6px;display:inline-block;
}
.diff-row{padding:4px 10px;border-radius:4px;font-size:12px;line-height:1.65;font-family:var(--mono);white-space:pre-wrap;word-break:break-all}
.diff-del{background:rgba(196,122,122,.12);color:var(--bad);text-decoration:line-through}
.diff-add{background:rgba(159,184,159,.1);color:var(--good)}
.diff-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
.btn-export{
  font-size:12px;font-weight:600;padding:7px 14px;border-radius:7px;
  border:1px solid var(--peach-3);color:var(--peach);
  transition:background .12s;display:flex;align-items:center;gap:6px;
}
.btn-export:hover{background:rgba(231,187,167,.08)}

/* Spinner */
.spinner{
  width:16px;height:16px;border:2px solid rgba(231,187,167,.3);
  border-top-color:var(--peach);border-radius:50%;
  animation:spin .7s linear infinite;display:inline-block;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--plum-1);border-radius:3px}

/* RWD — 手機把側欄收到上方、主內容在下，避免雙欄擠壓成單字一行 */
@media (max-width:760px){
  .app{flex-direction:column;height:auto;min-height:100vh;overflow:visible}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--line);max-height:40vh}
  .sidebar-header{padding:14px 16px}
  .task-list{max-height:28vh}
  .main{overflow:visible}
  .topbar{padding:12px 16px}
  .content{padding:18px 16px}
  .stats-row{grid-template-columns:repeat(3,1fr);gap:8px}
  .task-header{flex-direction:column;align-items:stretch;gap:12px}
  .task-actions{flex-wrap:wrap}
  .topbar-title{font-size:14px}
  .law-table{font-size:12px}
  .law-table th,.law-table td{padding:7px 8px}
}
@media (max-width:420px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="brand-icon">§</div>
        法規查核
      </div>
      <button class="btn-new admin-only" onclick="openCreateModal()" style="display:none">＋ 新增</button>
    </div>
    <div class="task-list" id="taskList">
      <div style="padding:20px 16px;color:var(--plum-2);font-size:12px">載入中…</div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="pageTitle">法規更新查核</div>
      <div style="display:flex;align-items:center;gap:14px">
        <div class="topbar-sync" id="syncLabel"></div>
        <button id="adminToggleBtn" onclick="toggleAdmin()" style="font-size:11px;color:rgba(245,240,234,.25);font-family:var(--mono);letter-spacing:.06em;transition:color .15s" onmouseover="this.style.color='rgba(245,240,234,.5)'" onmouseout="this.style.color=_isAdmin?'var(--peach-3)':'rgba(245,240,234,.25)'">管理</button>
      </div>
    </div>
    <div style="background:rgba(245,240,234,.04);border-bottom:1px solid var(--line);padding:8px 32px;font-size:11px;color:rgba(245,240,234,.38);line-height:1.5">
      資料來源：<a href="https://law.moj.gov.tw" target="_blank" style="color:rgba(231,187,167,.5);text-decoration:underline">全國法規資料庫</a>（法務部）。本頁僅供追蹤法規是否有異動之參考，不構成法律意見，實際法律效力以官方公告為準。
    </div>
    <div class="content" id="mainContent">
      <div class="empty">
        <h3>選擇一項查核任務</h3>
        <p>或點擊「＋ 新增」建立第一個查核任務</p>
      </div>
    </div>
  </div>
</div>

<!-- Task Edit Modal -->
<div class="overlay" id="editOverlay" style="display:none" onclick="if(event.target===this)closeEditModal()">
  <div class="modal">
    <h2 id="editModalTitle">新增任務</h2>
    <input type="hidden" id="editTaskId"/>

    <div class="form-group">
      <label class="form-label">任務名稱（負責人 / 業件）</label>
      <input class="form-input" id="editName" placeholder="例：2026 記帳士備考法規追蹤"/>
    </div>

    <div class="form-group">
      <label class="form-label">前次查核基準日（可選）</label>
      <input class="form-input" type="date" id="editBaselineDate"/>
      <div class="form-hint">填了才能比對「改了幾次」；留空則以今天首次查核日為基準。</div>
    </div>

    <div class="form-group">
      <label class="form-label">下次查核基準日</label>
      <input class="form-input" type="date" id="editNextRunDate"/>
      <div class="form-hint">以這一天的法規狀態為本次查核基準。設了就自動排下一次。</div>
    </div>

    <div class="form-group">
      <label class="form-label">查核頻率（每 N 個月，0 = 不定期）</label>
      <input class="form-input" type="number" id="editFreq" value="6" min="0" max="24"/>
    </div>

    <div class="form-group">
      <label class="form-label">觀察法規（加入法規：輸入名稱與 pcode）</label>
      <div class="form-hint" style="margin-bottom:8px">pcode 從 moj.gov.tw 網址取得，如 G0340110</div>
      <div style="display:grid;grid-template-columns:1fr 120px 28px;gap:6px;margin-bottom:4px">
        <span style="font-size:10px;color:var(--plum-2);padding:0 2px">法規名稱</span>
        <span style="font-size:10px;color:var(--plum-2);padding:0 2px">pcode</span>
        <span></span>
      </div>
      <div class="law-entry-list" id="lawEntryList"></div>
      <button class="btn-add-law" onclick="addLawEntry()">＋ 新增法規</button>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEditModal()">取消</button>
      <button class="btn-save" id="editSaveBtn" onclick="saveTask()">儲存</button>
    </div>
  </div>
</div>

<!-- Diff Modal -->
<div class="overlay" id="diffOverlay" style="display:none" onclick="if(event.target===this)closeDiffModal()">
  <div class="modal diff-modal">
    <h2 id="diffTitle">新舊對照</h2>
    <div class="diff-meta" id="diffMeta"></div>
    <div id="diffBody"></div>
    <div class="diff-actions">
      <button class="btn-export" onclick="exportWord()">
        <span>⬇</span> 匯出 Word 對照表
      </button>
      <button class="btn-cancel" onclick="closeDiffModal()">關閉</button>
    </div>
  </div>
</div>

<script>
const API = 'https://sofa-engine-api.onrender.com';
let _adminKey = localStorage.getItem('monitorKey') || '';
let _isAdmin = false;

let _tasks = [];
let _activeTaskId = null;
let _activeRunData = null;
let _diffLaw = null;

function h(){ return _adminKey ? {'X-Monitor-Key': _adminKey, 'Content-Type':'application/json'} : {'Content-Type':'application/json'} }

async function api(method, path, body){
  const opts = {method, headers: h()};
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (!r.ok){
    const e = await r.json().catch(()=>({detail:r.statusText}));
    throw new Error(e.detail || r.statusText);
  }
  return r.json();
}

// ── Admin toggle ─────────────────────────────────────────────
function toggleAdmin(){
  if (_isAdmin){
    _isAdmin = false; _adminKey = '';
    localStorage.removeItem('monitorKey');
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
    document.getElementById('adminToggleBtn').style.color = 'rgba(245,240,234,.25)';
    return;
  }
  const k = prompt('管理金鑰：');
  if (!k) return;
  _adminKey = k; _isAdmin = true;
  localStorage.setItem('monitorKey', k);
  document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
  document.getElementById('adminToggleBtn').style.color = 'var(--peach-3)';
}

// 頁面載入時若已有 key 自動進入 admin 模式
if (_adminKey){
  _isAdmin = true;
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
    document.getElementById('adminToggleBtn').style.color = 'var(--peach-3)';
  });
}

// ── Task List ─────────────────────────────────────────────────
async function loadTasks(){
  try {
    const data = await api('GET', '/api/monitor/tasks');
    _tasks = data.tasks || [];
    renderTaskList();
  } catch(e){
    console.error(e);
  }
}

function renderTaskList(){
  const el = document.getElementById('taskList');
  if (!_tasks.length){
    el.innerHTML = '<div style="padding:16px;color:var(--plum-2);font-size:12px">尚無任務</div>';
    return;
  }
  el.innerHTML = _tasks.map(t => {
    const active = t.id === _activeTaskId;
    return `<div class="task-item${active?' active':''}" onclick="selectTask('${t.id}')">
      <div class="task-item-name">${esc(t.name)}</div>
      <div class="task-item-meta">${t.frequency_months ? '每 '+t.frequency_months+' 個月' : '不定期'} · ${t.law_entries?.length||0} 部</div>
    </div>`;
  }).join('');
}

// ── Task Detail ───────────────────────────────────────────────
async function selectTask(id){
  _activeTaskId = id;
  renderTaskList();
  document.getElementById('mainContent').innerHTML = '<div style="padding:40px;color:var(--plum-2)">載入中…</div>';
  try {
    const data = await api('GET', `/api/monitor/tasks/${id}`);
    renderTaskDetail(data.task, data.latest_run);
  } catch(e){ console.error(e); }
}

function renderTaskDetail(task, latestRun){
  _activeRunData = latestRun;
  const laws = latestRun?.monitor_run_laws || [];
  const ranAt = latestRun ? fmtDate(latestRun.ran_at) : '—';
  const changed = latestRun?.total_changed || 0;
  const checked = latestRun?.total_checked || 0;
  const baseline = latestRun?.data_baseline || '—';

  const alertHtml = latestRun
    ? changed > 0
      ? `<div class="alert alert-changed"><div class="alert-dot"></div>上次查核 ${ranAt}：有異動 ${changed} · 資料基準 ${baseline}</div>`
      : `<div class="alert alert-ok"><div class="alert-dot"></div>上次查核 ${ranAt}：無異動 · 資料基準 ${baseline}</div>`
    : '';

  const lawRows = (task.law_entries || []).map(entry => {
    const runLaw = laws.find(l => l.statute_name === entry.name);
    const prevDate = runLaw?.prev_law_date || '—';
    const currDate = runLaw?.curr_law_date || '—';
    const hasChange = runLaw?.has_changes;
    const hasError = runLaw?.error_message;

    let statusHtml = '<span class="status-ok">無異動</span>';
    if (!runLaw) statusHtml = '<span style="color:var(--plum-2);font-size:11px">未查核</span>';
    else if (hasError) statusHtml = `<span style="color:var(--warn);font-size:11px">錯誤</span>`;
    else if (hasChange) statusHtml = `<span class="status-changed">有異動</span>
      <button class="btn-diff" onclick="showDiff('${esc(entry.name)}','${entry.pcode||''}')">新舊對照</button>`;

    return `<tr>
      <td><div class="law-name">${esc(entry.name)}</div></td>
      <td class="date-cell">${prevDate}</td>
      <td class="date-cell">${currDate}</td>
      <td>${statusHtml}</td>
    </tr>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="task-header">
      <div class="task-title">${esc(task.name)}</div>
      <div class="task-actions">
        <button class="btn-run admin-only" id="runBtn" onclick="runTask('${task.id}')" style="display:${_isAdmin?'':'none'}">
          執行查核
        </button>
        <button class="btn-edit admin-only" onclick="openEditModal('${task.id}')" style="display:${_isAdmin?'':'none'}">編輯</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-box"><div class="stat-label">前次查核基準日</div><div class="stat-value">${task.baseline_date||'—'}</div></div>
      <div class="stat-box"><div class="stat-label">查核基準日</div><div class="stat-value">${task.next_run_date||'—'}</div></div>
      <div class="stat-box"><div class="stat-label">查核頻率</div><div class="stat-value">${task.frequency_months?'每 '+task.frequency_months+' 個月':'不定期'}</div></div>
      <div class="stat-box"><div class="stat-label">下次自動查核日</div><div class="stat-value">${task.next_run_date||'不定期'}</div></div>
      <div class="stat-box"><div class="stat-label">組數</div><div class="stat-value">${task.law_entries?.length||0} 部</div></div>
      <div class="stat-box"><div class="stat-label">上次執行</div><div class="stat-value" style="font-size:11px">${ranAt}</div></div>
    </div>

    ${alertHtml}

    <div class="section-title">法規名稱</div>
    <table class="law-table">
      <thead><tr>
        <th>法規名稱</th><th>前次查核結果</th><th>本次查核結果</th><th>狀態</th>
      </tr></thead>
      <tbody>${lawRows || '<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--plum-2)">尚未執行查核</td></tr>'}</tbody>
    </table>

    <div class="section-title">查核歷史</div>
    <div id="historySection"><div style="color:var(--plum-2);font-size:12px">載入中…</div></div>
  `;

  loadHistory(task.id);
}

async function loadHistory(taskId){
  try {
    const data = await api('GET', `/api/monitor/tasks/${taskId}/runs`);
    const runs = data.runs || [];
    const el = document.getElementById('historySection');
    if (!runs.length){ el.innerHTML = '<div style="color:var(--plum-2);font-size:12px">尚無查核歷史</div>'; return; }
    el.innerHTML = '<div class="history-list">' + runs.map(r => `
      <div class="history-item">
        <div>
          <div class="history-meta">${fmtDate(r.ran_at)} · 執行 ${fmtDate(r.ran_at)}</div>
          <div class="history-detail">${r.total_checked} 部已查 · ${r.total_changed > 0 ? r.total_changed+' 部有異動' : '無異動'}</div>
        </div>
        <span class="history-badge ${r.total_changed>0?'has-change':'no-change'}">${r.total_changed>0?r.total_changed+' 部異動':'無異動'}</span>
      </div>`).join('') + '</div>';
  } catch(e){ console.error(e); }
}

// ── Run Task ──────────────────────────────────────────────────
async function runTask(taskId){
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 查核中…';
  try {
    await api('POST', `/api/monitor/tasks/${taskId}/run`);
    await selectTask(taskId);
    await loadTasks();
  } catch(e){
    alert('查核失敗：' + e.message);
  } finally {
    if(btn){ btn.disabled = false; btn.innerHTML = '執行查核'; }
  }
}

// ── Diff Modal ────────────────────────────────────────────────
function showDiff(lawName, pcode){
  const laws = _activeRunData?.monitor_run_laws || [];
  const law = laws.find(l => l.statute_name === lawName);
  if (!law) return;
  _diffLaw = law;

  document.getElementById('diffTitle').textContent = `新舊對照 — ${lawName}`;
  document.getElementById('diffMeta').innerHTML = `
    <div class="diff-meta-row">
      <strong>${esc(lawName)}</strong>
      <span class="diff-meta-tag tag-令令">令令</span>
      <span>前版 ${law.prev_law_date||'—'}</span>
      <span>→</span>
      <span>現版 ${law.curr_law_date||'—'}</span>
      <span>異動 ${(law.changed_articles||[]).length} 條</span>
    </div>`;

  const articles = law.changed_articles || [];
  if (!articles.length){
    document.getElementById('diffBody').innerHTML = '<div style="color:var(--plum-2);font-size:13px;padding:12px 0">無逐條差異資料（修正日期不同，但首次查核無前版快照可比對）</div>';
  } else {
    document.getElementById('diffBody').innerHTML = articles.map(a => `
      <div class="diff-article">
        <div class="diff-article-no">第 ${a.article_no} 條 ${a.change_type==='added'?'（新增）':a.change_type==='deleted'?'（廢止）':'修正'}</div>
        ${a.prev_text ? `<div class="diff-row diff-del">${esc(a.prev_text)}</div>` : ''}
        ${a.curr_text ? `<div class="diff-row diff-add">${esc(a.curr_text)}</div>` : ''}
      </div>`).join('');
  }

  document.getElementById('diffOverlay').style.display = 'flex';
}
function closeDiffModal(){ document.getElementById('diffOverlay').style.display = 'none'; }

function exportWord(){
  if (!_diffLaw) return;
  const articles = _diffLaw.changed_articles || [];
  let txt = `法規更新對照表\n`;
  txt += `法規：${_diffLaw.statute_name}\n`;
  txt += `前版修正日期：${_diffLaw.prev_law_date||'—'}\n`;
  txt += `現版修正日期：${_diffLaw.curr_law_date||'—'}\n\n`;
  articles.forEach(a => {
    txt += `第 ${a.article_no} 條\n`;
    if (a.prev_text) txt += `【舊】${a.prev_text}\n`;
    if (a.curr_text) txt += `【新】${a.curr_text}\n`;
    txt += '\n';
  });
  const blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `法規對照_${_diffLaw.statute_name}.txt`;
  a.click(); URL.revokeObjectURL(url);
}

// ── Edit Modal ────────────────────────────────────────────────
function openCreateModal(){
  document.getElementById('editTaskId').value = '';
  document.getElementById('editModalTitle').textContent = '新增任務';
  document.getElementById('editName').value = '';
  document.getElementById('editBaselineDate').value = '';
  document.getElementById('editNextRunDate').value = '';
  document.getElementById('editFreq').value = '6';
  document.getElementById('lawEntryList').innerHTML = '';
  addLawEntry();
  document.getElementById('editOverlay').style.display = 'flex';
}

async function openEditModal(taskId){
  const task = _tasks.find(t => t.id === taskId);
  if (!task) return;
  document.getElementById('editTaskId').value = taskId;
  document.getElementById('editModalTitle').textContent = '編輯任務';
  document.getElementById('editName').value = task.name;
  document.getElementById('editBaselineDate').value = task.baseline_date || '';
  document.getElementById('editNextRunDate').value = task.next_run_date || '';
  document.getElementById('editFreq').value = task.frequency_months || 0;
  const listEl = document.getElementById('lawEntryList');
  listEl.innerHTML = '';
  (task.law_entries || []).forEach(e => addLawEntry(e.name, e.pcode));
  if (!(task.law_entries || []).length) addLawEntry();
  document.getElementById('editOverlay').style.display = 'flex';
}

function closeEditModal(){ document.getElementById('editOverlay').style.display = 'none'; }

function addLawEntry(name='', pcode=''){
  const row = document.createElement('div');
  row.className = 'law-entry-row';
  row.innerHTML = `
    <input class="form-input law-name-input" placeholder="法規名稱" value="${esc(name)}"/>
    <input class="form-input law-pcode-input" placeholder="pcode" value="${esc(pcode)}" style="font-family:var(--mono);font-size:12px"/>
    <button class="btn-remove" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById('lawEntryList').appendChild(row);
}

async function saveTask(){
  const btn = document.getElementById('editSaveBtn');
  btn.disabled = true;
  try {
    const id = document.getElementById('editTaskId').value;
    const entries = [...document.querySelectorAll('.law-entry-row')].map(row => ({
      name: row.querySelector('.law-name-input').value.trim(),
      pcode: row.querySelector('.law-pcode-input').value.trim(),
    })).filter(e => e.name);

    const body = {
      name: document.getElementById('editName').value.trim(),
      law_entries: entries,
      frequency_months: parseInt(document.getElementById('editFreq').value) || 0,
      baseline_date: document.getElementById('editBaselineDate').value || null,
      next_run_date: document.getElementById('editNextRunDate').value || null,
    };
    if (!body.name){ alert('請填寫任務名稱'); return; }

    if (id) await api('PATCH', `/api/monitor/tasks/${id}`, body);
    else await api('POST', '/api/monitor/tasks', body);

    closeEditModal();
    await loadTasks();
    if (id) await selectTask(id);
  } catch(e){ alert('儲存失敗：' + e.message); }
  finally { btn.disabled = false; }
}

// ── Helpers ───────────────────────────────────────────────────
function fmtDate(iso){
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

// ── Init ──────────────────────────────────────────────────────
loadTasks();
</script>
