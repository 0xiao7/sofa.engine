<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 2500px; height: 1686px; overflow: hidden; }

  .grid {
    display: grid;
    width: 2500px; height: 1686px;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr;
  }

  .btn {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 40px;
    position: relative;
    background: #1A2B35;
    border: 1px solid rgba(231,187,167,0.10);
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(231,187,167,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(231,187,167,.04) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
  }

  .btn.hi {
    background: #1F3848;
    border-color: rgba(231,187,167,0.22);
  }
  .btn.hi::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--peach, #E7BBA7);
  }

  /* NEW tile — teal-navy highlight */
  .btn.new-tile {
    background: #162E3A;
    border-color: rgba(231,187,167,0.35);
  }
  .btn.new-tile::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: #E7BBA7;
  }

  .icon-wrap {
    width: 160px; height: 160px;
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 1;
  }
  .icon-wrap svg {
    width: 120px; height: 120px;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .btn:not(.hi):not(.new-tile) .icon-wrap svg { stroke: rgba(231,187,167,0.45); stroke-width: 7; }
  .btn.hi       .icon-wrap svg { stroke: #E7BBA7; stroke-width: 7; }
  .btn.new-tile .icon-wrap svg { stroke: #E7BBA7; stroke-width: 7; }

  .label {
    font-family: 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: 104px;
    letter-spacing: 0.04em;
    position: relative; z-index: 1;
    line-height: 1;
  }
  .btn:not(.hi):not(.new-tile) .label { color: rgba(245,240,234,0.65); }
  .btn.hi       .label { color: #F0EDE8; }
  .btn.new-tile .label { color: #F0EDE8; }

  .tag {
    position: absolute;
    top: 52px; left: 58px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 30px; font-weight: 400;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    z-index: 1;
  }
  .btn:not(.hi):not(.new-tile) .tag { color: rgba(231,187,167,0.20); }
  .btn.hi       .tag { color: rgba(231,187,167,0.55); }
  .btn.new-tile .tag { color: rgba(231,187,167,0.70); }

  /* NEW badge */
  .new-badge {
    position: absolute;
    top: 48px; right: 56px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px; font-weight: 700;
    letter-spacing: 0.12em;
    background: #E7BBA7;
    color: #1A2B35;
    padding: 6px 18px;
    border-radius: 40px;
    z-index: 2;
  }

  .accent-line {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(231,187,167,0.4), transparent);
    z-index: 1;
  }
</style>
</head>
<body>
<div class="grid">

  <!-- 法條 -->
  <div class="btn">
    <span class="tag">DAILY</span>
    <div class="icon-wrap">
      <svg viewBox="0 0 120 120">
        <rect x="12" y="20" width="96" height="84" rx="8"/>
        <line x1="12" y1="46" x2="108" y2="46"/>
        <line x1="38" y1="8"  x2="38"  y2="32"/>
        <line x1="82" y1="8"  x2="82"  y2="32"/>
        <line x1="32" y1="66" x2="88"  y2="66"/>
        <line x1="32" y1="84" x2="66"  y2="84"/>
      </svg>
    </div>
    <span class="label">法條</span>
    <div class="accent-line"></div>
  </div>

  <!-- 查法條 (featured) -->
  <div class="btn hi">
    <span class="tag">SEARCH</span>
    <div class="icon-wrap">
      <svg viewBox="0 0 120 120">
        <circle cx="50" cy="50" r="32"/>
        <line x1="74" y1="74" x2="108" y2="108"/>
      </svg>
    </div>
    <span class="label">查法條</span>
  </div>

  <!-- 我的考科 (NEW) -->
  <div class="btn new-tile">
    <span class="tag">EXAM</span>
    <div class="new-badge">NEW</div>
    <div class="icon-wrap">
      <svg viewBox="0 0 120 120">
        <!-- graduation cap -->
        <polygon points="60,18 108,42 60,66 12,42" fill="none"/>
        <path d="M84 54 L84 82 C84 92 72 100 60 100 C48 100 36 92 36 82 L36 54" fill="none"/>
        <line x1="108" y1="42" x2="108" y2="70"/>
        <circle cx="108" cy="74" r="5" fill="rgba(231,187,167,0.7)" stroke="none"/>
      </svg>
    </div>
    <span class="label">我的考科</span>
    <div class="accent-line"></div>
  </div>

  <!-- 我的收藏 -->
  <div class="btn">
    <span class="tag">SAVED</span>
    <div class="icon-wrap">
      <svg viewBox="0 0 120 120">
        <polygon points="60,16 73,48 108,48 80,68 90,100 60,80 30,100 40,68 12,48 47,48"/>
      </svg>
    </div>
    <span class="label">我的收藏</span>
    <div class="accent-line"></div>
  </div>

  <!-- 幫助 -->
  <div class="btn">
    <span class="tag">HELP</span>
    <div class="icon-wrap">
      <svg viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="48"/>
        <path d="M42 46 c0-20 36-20 36 2 c0 14-18 18-18 30" fill="none"/>
        <circle cx="60" cy="92" r="5" fill="rgba(231,187,167,0.45)" stroke="none"/>
      </svg>
    </div>
    <span class="label">幫助</span>
    <div class="accent-line"></div>
  </div>

  <!-- 更多 (featured/switch) -->
  <div class="btn hi">
    <span class="tag">MORE</span>
    <div class="icon-wrap">
      <svg viewBox="0 0 120 120">
        <circle cx="30" cy="60" r="8" fill="rgba(231,187,167,0.7)" stroke="none"/>
        <circle cx="60" cy="60" r="8" fill="rgba(231,187,167,0.7)" stroke="none"/>
        <circle cx="90" cy="60" r="8" fill="rgba(231,187,167,0.7)" stroke="none"/>
      </svg>
    </div>
    <span class="label">更多 ▶</span>
  </div>

</div>
</body>
</html>
