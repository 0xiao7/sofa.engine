<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    background: #142836;
    font-family: "Noto Sans TC", system-ui, sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* 背景裝飾 */
  .bg-line {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      repeating-linear-gradient(
        90deg,
        rgba(245,240,234,0.03) 0px,
        rgba(245,240,234,0.03) 1px,
        transparent 1px,
        transparent 80px
      );
    pointer-events: none;
  }

  .bg-glow {
    position: absolute;
    top: -80px;
    left: -80px;
    width: 500px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(231,187,167,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .bg-glow-right {
    position: absolute;
    bottom: -100px;
    right: -60px;
    width: 400px;
    height: 360px;
    background: radial-gradient(ellipse, rgba(44,74,92,0.5) 0%, transparent 70%);
    pointer-events: none;
  }

  /* 主容器 */
  .canvas {
    position: relative;
    width: 1200px;
    height: 630px;
    display: flex;
    align-items: center;
    padding: 64px 80px;
    gap: 0;
  }

  /* 左側主體 */
  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0;
  }

  /* eyebrow */
  .eyebrow {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .eyebrow-line {
    width: 18px;
    height: 2px;
    background: #E7BBA7;
  }
  .eyebrow-text {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: #E7BBA7;
    text-transform: uppercase;
    opacity: 0.9;
  }

  /* 主標題 */
  .title {
    font-family: "Noto Serif TC", serif;
    font-size: 52px;
    font-weight: 700;
    color: #F5F0EA;
    line-height: 1.3;
    margin-bottom: 20px;
    letter-spacing: -0.01em;
  }
  .title .accent {
    color: #E7BBA7;
  }

  /* 副標 */
  .subtitle {
    font-size: 16px;
    color: rgba(245,240,234,0.65);
    line-height: 1.6;
    max-width: 460px;
  }

  /* 數字群 */
  .stats {
    display: flex;
    gap: 36px;
    margin-top: 36px;
  }
  .stat-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stat-num {
    font-family: "Noto Serif TC", serif;
    font-size: 28px;
    font-weight: 700;
    color: #F5F0EA;
    line-height: 1;
  }
  .stat-num .unit {
    font-size: 16px;
    font-weight: 400;
    opacity: 0.7;
  }
  .stat-label {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: rgba(231,187,167,0.7);
    text-transform: uppercase;
  }
  .stat-divider {
    width: 1px;
    background: rgba(245,240,234,0.12);
    align-self: stretch;
  }

  /* 右側 — 法條卡片 */
  .right {
    width: 340px;
    flex-shrink: 0;
    margin-left: 60px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .law-card {
    background: rgba(31,56,72,0.7);
    border: 1px solid rgba(245,240,234,0.10);
    border-radius: 4px;
    padding: 16px 20px;
    position: relative;
  }
  .law-card.featured {
    border-color: rgba(231,187,167,0.25);
    background: rgba(44,74,92,0.45);
  }
  .law-card-tag {
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: #E7BBA7;
    text-transform: uppercase;
    margin-bottom: 7px;
    opacity: 0.85;
  }
  .law-card-title {
    font-family: "Noto Serif TC", serif;
    font-size: 14px;
    color: #F5F0EA;
    line-height: 1.5;
    font-weight: 600;
  }
  .law-card-sub {
    font-size: 12px;
    color: rgba(245,240,234,0.5);
    margin-top: 5px;
    line-height: 1.5;
  }
  .law-card-dot {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #9FB89F;
  }

  /* 底部 logo 區 */
  .logo-area {
    position: absolute;
    bottom: 36px;
    left: 80px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-mark {
    width: 32px;
    height: 32px;
    border: 1.5px solid rgba(231,187,167,0.5);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Noto Serif TC", serif;
    font-size: 14px;
    color: #E7BBA7;
    font-weight: 700;
  }
  .logo-name {
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    letter-spacing: 0.15em;
    color: rgba(245,240,234,0.55);
  }

  /* 右下 URL */
  .url-label {
    position: absolute;
    bottom: 38px;
    right: 80px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: rgba(245,240,234,0.30);
  }
</style>
</head>
<body>
  <div class="bg-line"></div>
  <div class="bg-glow"></div>
  <div class="bg-glow-right"></div>

  <div class="canvas">
    <div class="left">
      <div class="eyebrow">
        <div class="eyebrow-line"></div>
        <span class="eyebrow-text">記帳士國考備考系統</span>
      </div>

      <h1 class="title">
        法條讀得懂，<br>
        <span class="accent">考試才有底</span>
      </h1>

      <p class="subtitle">
        2,131 條法規 · 34 部法典<br>
        打字練習、選擇題、填空、每日推播——四種模式自由混搭
      </p>

      <div class="stats">
        <div class="stat-item">
          <div class="stat-num">2,131<span class="unit"> 條</span></div>
          <div class="stat-label">法規條文</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-num">34<span class="unit"> 部</span></div>
          <div class="stat-label">法典涵蓋</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-num">4<span class="unit"> 種</span></div>
          <div class="stat-label">練習模式</div>
        </div>
      </div>
    </div>

    <div class="right">
      <div class="law-card featured">
        <div class="law-card-dot"></div>
        <div class="law-card-tag">所得稅法 § 71</div>
        <div class="law-card-title">年度結算申報義務</div>
        <div class="law-card-sub">納稅義務人應於每年五月一日起至五月三十一日止，填具結算申報書…</div>
      </div>
      <div class="law-card">
        <div class="law-card-tag">商業會計法 § 19</div>
        <div class="law-card-title">會計基礎採用原則</div>
        <div class="law-card-sub">商業會計事務之處理，應以權責發生制為基礎…</div>
      </div>
      <div class="law-card">
        <div class="law-card-tag">遺產及贈與稅法 § 17</div>
        <div class="law-card-title">遺產稅扣除額</div>
        <div class="law-card-sub">配偶扣除額 553 萬、直系卑親屬每人 56 萬…</div>
      </div>
    </div>
  </div>

  <div class="logo-area">
    <div class="logo-mark">S</div>
    <span class="logo-name">SoFa Engine</span>
  </div>
  <div class="url-label">sofaengine.org</div>
</body>
</html>
