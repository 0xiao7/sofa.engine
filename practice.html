<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<title>SoFa Engine — 打字練習</title>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-G81F9D4YJ3"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-G81F9D4YJ3');</script>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="sofa.css" />
<style>
  /* === Practice layout === */
  .pr-bar{
    background:var(--navy-2);border-bottom:1px solid var(--line);
    padding:18px 40px;display:flex;align-items:center;justify-content:space-between;gap:24px;
  }
  .pr-bar .l{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
  .pr-pick{
    display:flex;align-items:center;gap:10px;
    background:var(--navy-3);border:1px solid var(--line-2);border-radius:3px;
    padding:10px 16px;cursor:pointer;transition:.18s;
    font-size:13.5px;color:var(--cream);
  }
  .pr-pick:hover{border-color:var(--peach-dim)}
  .pr-pick .lab{
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;
    color:rgba(245,240,234,.5);text-transform:uppercase;
  }
  .pr-pick .v{font-family:var(--serif);font-weight:500;font-size:15px;color:var(--cream)}
  .pr-pick .car{color:var(--peach);font-family:var(--mono);font-size:11px;margin-left:4px}

  .pr-meta{
    display:flex;align-items:center;gap:24px;
    font-family:var(--mono);font-size:12px;letter-spacing:.08em;
    color:rgba(245,240,234,.55);
  }
  .pr-meta .seg{display:flex;align-items:center;gap:8px}
  .pr-meta .seg b{color:var(--peach);font-weight:600;letter-spacing:.04em;font-size:13px}

  .pr-progress{
    height:2px;background:rgba(245,240,234,.06);position:relative;
  }
  .pr-progress .fl{
    position:absolute;left:0;top:0;height:100%;
    background:linear-gradient(to right, var(--peach), var(--peach-2));
    width:32%;transition:width .35s ease;
  }

  /* === main stage === */
  .pr-stage{
    padding:48px 64px 96px;background:var(--navy-3);
    position:relative;min-height:calc(100vh - 70px - 60px - 2px);
  }
  .pr-stage::before{
    content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(245,240,234,.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,240,234,.018) 1px, transparent 1px);
    background-size:60px 60px;
    mask-image:radial-gradient(ellipse 60% 50% at 50% 0%, #000 30%, transparent 70%);
    pointer-events:none;
  }
  .pr-inner{max-width:980px;margin:0 auto;position:relative}

  /* article head */
  .ar-head{
    display:flex;align-items:flex-end;justify-content:space-between;
    margin-bottom:28px;gap:24px;padding-bottom:20px;border-bottom:1px solid var(--line);
  }
  .ar-head .eb{
    font-family:var(--mono);font-size:11px;color:var(--peach);
    letter-spacing:.22em;text-transform:uppercase;
    display:flex;align-items:center;gap:10px;
  }
  .ar-head .eb::before{content:"";width:18px;height:1px;background:var(--peach)}
  .ar-head h2{
    font-family:var(--serif);font-weight:600;font-size:32px;
    margin-top:10px;color:var(--cream);line-height:1.25;
    display:flex;align-items:baseline;gap:18px;
  }
  .ar-head h2 .n{
    font-size:46px;letter-spacing:-.02em;color:var(--peach);font-weight:600;
  }
  .ar-head .r{
    text-align:right;
    font-family:var(--mono);font-size:11px;letter-spacing:.12em;
    color:rgba(245,240,234,.5);text-transform:uppercase;
  }
  .ar-head .r b{color:var(--cream);font-weight:500;font-size:12px;display:block;margin-top:4px}

  /* big stat row */
  .stat-row{
    display:grid;grid-template-columns:repeat(4,1fr);gap:0;
    background:var(--navy-2);border:1px solid var(--line);border-radius:4px;
    padding:22px 8px;margin-bottom:36px;
  }
  .stat{padding:0 24px;border-right:1px solid var(--line);text-align:center}
  .stat:last-child{border-right:none}
  .stat .v{
    font-family:var(--serif);font-weight:600;font-size:36px;line-height:1;
    color:var(--cream);letter-spacing:.01em;
  }
  .stat .v.peach{color:var(--peach)}
  .stat .v.good{color:var(--good)}
  .stat .k{
    margin-top:10px;font-family:var(--mono);font-size:10.5px;
    letter-spacing:.18em;color:rgba(245,240,234,.5);text-transform:uppercase;
  }

  /* article body — type stage */
  .type-card{
    background:var(--navy-2);
    border:1px solid var(--line);border-radius:4px;
    padding:42px 48px;position:relative;
  }
  .type-card::before{
    content:"ARTICLE 13";
    position:absolute;top:18px;right:24px;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;
    color:rgba(245,240,234,.25);
  }

  .ghost{
    font-family:var(--serif);font-size:22px;line-height:2.05;
    color:rgba(245,240,234,.25);letter-spacing:.02em;
    user-select:none;
  }
  .ghost p{margin-bottom:14px}
  .ghost .ro{
    color:rgba(231,187,167,.42);font-family:var(--mono);font-size:14px;
    font-weight:600;margin-right:6px;letter-spacing:.04em;
  }
  /* characters already typed correctly */
  .ghost .ok{color:var(--cream)}
  /* current character — cursor */
  .ghost .cur{
    color:var(--peach);background:rgba(231,187,167,.16);
    padding:0 2px;border-radius:1px;
    animation:blink 1s steps(2) infinite;
  }
  /* wrong typed chars */
  .ghost .err{color:var(--bad);background:rgba(199,123,106,.18);border-radius:1px}
  @keyframes blink{50%{background:transparent}}

  /* input strip */
  .type-input{
    margin-top:32px;padding-top:24px;border-top:1px dashed var(--line);
    display:flex;align-items:stretch;gap:14px;
  }
  .type-input .key{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;
    color:rgba(245,240,234,.5);text-transform:uppercase;
    align-self:center;min-width:96px;
  }
  .type-input .key b{color:var(--peach);font-weight:600}
  .type-field{
    flex:1;background:var(--navy-3);border:1px solid var(--line-2);
    border-radius:3px;padding:14px 18px;
    display:flex;align-items:center;gap:12px;transition:.18s;
  }
  .type-field:focus-within{border-color:var(--peach);background:var(--navy)}
  .type-field input{
    background:transparent;border:none;outline:none;width:100%;
    font-family:var(--serif);font-size:18px;color:var(--cream);letter-spacing:.02em;
  }
  .type-field input::placeholder{
    color:rgba(245,240,234,.3);font-family:var(--sans);font-size:14px;
  }
  .type-actions{display:flex;gap:10px}

  /* === Bottom mode strip === */
  .mode-strip{
    margin-top:36px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;
  }
  .mode{
    background:var(--navy-2);border:1px solid var(--line);border-radius:4px;
    padding:18px 22px;display:flex;align-items:center;justify-content:space-between;
    cursor:pointer;transition:.18s;
  }
  .mode:hover{background:var(--plum-1);border-color:var(--peach-dim)}
  .mode.on{background:rgba(231,187,167,.10);border-color:var(--peach);color:var(--cream)}
  .mode .ml{display:flex;flex-direction:column;gap:4px}
  .mode .code{
    font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--peach);font-weight:600;
  }
  .mode .nm{font-family:var(--serif);font-size:16px;color:var(--cream);font-weight:500}
  .mode .desc{font-size:12px;color:rgba(245,240,234,.55);max-width:170px}

  /* === Keyboard hint footer === */
  .kbd-foot{
    margin-top:36px;padding:18px 24px;
    border-top:1px dashed var(--line);
    display:flex;justify-content:space-between;align-items:center;
    font-family:var(--mono);font-size:11px;letter-spacing:.12em;
    color:rgba(245,240,234,.5);text-transform:uppercase;flex-wrap:wrap;gap:12px;
  }
  .kbd-foot .gp{display:flex;gap:18px;flex-wrap:wrap}
  .kbd-foot kbd{
    display:inline-block;padding:3px 8px;
    background:var(--navy-2);border:1px solid var(--line-2);
    border-radius:3px;font-family:var(--mono);font-size:10.5px;
    color:var(--peach);margin-right:6px;
  }

  /* === Mode 03 blank inputs === */
  .blank{
    display:inline-block;min-width:3em;
    padding:2px 10px;margin:0 2px;
    border:none;border-bottom:2px solid var(--peach);
    background:rgba(231,187,167,.07);
    border-radius:3px 3px 0 0;
    font-family:var(--serif);font-size:20px;
    color:var(--cream);text-align:center;
    outline:none;transition:.18s;caret-color:var(--peach);
    vertical-align:baseline;
  }
  .blank:focus{background:rgba(231,187,167,.18);border-bottom-color:var(--peach-2)}
  .blank.ok{color:var(--good);border-bottom-color:var(--good);background:rgba(159,184,159,.10)}
  .blank.bad{color:var(--bad);border-bottom-color:var(--bad);background:rgba(199,123,106,.10)}

  /* === RWD === */
  @media (max-width:1100px){
    .pr-bar{padding:14px 24px;flex-wrap:wrap}
    .pr-stage{padding:36px 32px 72px}
    .stat-row{grid-template-columns:1fr 1fr}
    .stat{border-bottom:1px solid var(--line);padding:14px 16px}
    .stat:nth-child(2){border-right:none}
    .stat:nth-last-child(-n+2){border-bottom:none}
  }
  @media (max-width:760px){
    .pr-bar{padding:12px 18px;gap:12px}
    .pr-bar .l{gap:10px}
    .pr-meta{gap:14px;font-size:11px}
    .pr-stage{padding:28px 18px 60px}
    .ar-head{flex-direction:column;align-items:flex-start;gap:14px}
    .ar-head h2{font-size:24px}
    .ar-head h2 .n{font-size:36px}
    .type-card{padding:24px 22px}
    .ghost{font-size:17px;line-height:1.95}
    .type-input{flex-direction:column;align-items:stretch}
    .type-input .key{min-width:0;align-self:flex-start}
    .mode-strip{grid-template-columns:1fr}
    .kbd-foot{flex-direction:column;align-items:flex-start;gap:14px}
  }
</style>
</head>
<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <a class="brand" href="index.html"><span class="dot"></span>SOFA&nbsp;ENGINE</a>
    <nav class="top-mid">
      <a href="dashboard.html">會員中心</a>
      <a href="practice.html" class="on">打字</a>
      <a href="fill.html">填空</a>
      <a href="quiz.html">選擇題</a>
    </nav>
    <div class="top-right">
      <span class="user-pill"><span class="live"></span><span id="navUid">—</span></span>
      <button class="btn-out" onclick="localStorage.removeItem('sofa_uid');window.location.href='login.html'">登出</button>
      <button class="menu-btn"><span></span></button>
    </div>
  </header>

  <!-- Practice control bar -->
  <div class="pr-bar">
    <div class="l">
      <a href="dashboard.html" style="font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:rgba(245,240,234,.55);text-transform:uppercase;padding:6px 10px;border:1px solid var(--line-2);border-radius:3px">← BACK</a>

      <div class="pr-pick">
        <span class="lab">LAW</span>
        <select id="lawSelect" style="background:transparent;border:none;outline:none;font-family:var(--serif);font-weight:500;font-size:15px;color:var(--cream);cursor:pointer;-webkit-appearance:none;appearance:none;min-width:80px;max-width:200px"><option value="">全部法規</option></select>
        <span class="car">▾</span>
      </div>
      <button id="btnNew" class="btn btn-sec" style="padding:8px 16px;font-size:13px">換一條</button>
    </div>
    <div class="pr-meta">
      <div class="seg">WPM <b id="wpm">42</b></div>
      <div class="seg">ACC <b id="acc">96.4%</b></div>
      <div class="seg">TIME <b id="time">01:24</b></div>
      <div class="seg">STREAK <b>3 day</b></div>
    </div>
  </div>
  <div class="pr-progress"><div class="fl" id="prog"></div></div>

  <main class="pr-stage">
    <div class="pr-inner">

      <!-- article head -->
      <div class="ar-head">
        <div>
          <span class="eb">TYPING DRILL · ARTICLE</span>
          <h2><span class="n" id="artNum">—</span><span id="artTitle">選擇法規後換一條開始</span></h2>
        </div>
        <div class="r">
<span id="artMeta">—</span>
        </div>
      </div>

      <!-- stat row -->
      <div class="stat-row">
        <div class="stat"><div class="v peach" id="stat-prog">—</div><div class="k">PROGRESS</div></div>
        <div class="stat"><div class="v" id="stat-wpm">—</div><div class="k">WPM (字 / 分)</div></div>
        <div class="stat"><div class="v good" id="stat-acc">—</div><div class="k">ACCURACY</div></div>
        <div class="stat"><div class="v" id="stat-err">0</div><div class="k">ERRORS</div></div>
      </div>

      <!-- type card -->
      <div class="type-card">
<div class="ghost" id="ghost"><span style="font-family:var(--mono);font-size:12px;color:rgba(245,240,234,.35);letter-spacing:.1em">選擇法規後點「換一條」開始</span></div>

        <div class="type-input">
          <div class="key">輸入 <b id="curHint">—</b></div>
          <div class="type-field">
            <input id="ti" placeholder="點擊此處開始輸入…" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />
          </div>
          <div class="type-actions">
            <button class="btn btn-sec" id="btnReset">重來</button>
          </div>
        </div>

        <!-- Mode 03 關鍵字 inline area -->
        <div id="m3area" style="display:none;margin-top:24px;padding-top:20px;border-top:1px dashed var(--line)"></div>
      </div>

      <!-- mode strip -->
      <div class="mode-strip">
        <button class="mode on">
          <div class="ml">
            <span class="code">MODE · 01</span>
            <span class="nm">逐字模式</span>
            <span class="desc">一字一字輸入，最嚴格。</span>
          </div>
          <span style="font-family:var(--mono);font-size:11px;color:var(--peach)">▸</span>
        </button>
        <button class="mode">
          <div class="ml">
            <span class="code">MODE · 02</span>
            <span class="nm">逐句模式</span>
            <span class="desc">按 ↵ 換句，較適合熟讀。</span>
          </div>
          <span style="font-family:var(--mono);font-size:11px;color:rgba(245,240,234,.4)">▸</span>
        </button>
        <button class="mode">
          <div class="ml">
            <span class="code">MODE · 03</span>
            <span class="nm">關鍵字模式</span>
            <span class="desc">只輸入挖空關鍵字。</span>
          </div>
          <span style="font-family:var(--mono);font-size:11px;color:rgba(245,240,234,.4)">▸</span>
        </button>
      </div>

      <!-- kbd foot -->
      <div class="kbd-foot">
        <div class="gp">
          <span><kbd>↵</kbd>確認</span>
          <span><kbd>TAB</kbd>提示</span>
          <span><kbd>ESC</kbd>暫停</span>
          <span><kbd>⌘</kbd>+<kbd>K</kbd>切換條文</span>
        </div>
        <div>SESSION · 01:24 / EST 04:20</div>
      </div>

    </div>
  </main>

<script>
const API = 'https://sofa-engine-api.onrender.com';
const uid = localStorage.getItem('sofa_uid') || (location.hostname==='localhost'||location.protocol==='file:'?'PREVIEW':null);
const isFree = !uid && localStorage.getItem('sofa_free') === 'FREE';
if (!uid && !isFree) { window.location.href = 'login.html?redirect=practice.html'; }
document.getElementById('navUid').textContent = isFree ? '免費版' : (localStorage.getItem('sofa_nickname') || uid);

(async()=>{
  try {
    const d = await fetch(`${API}/api/laws`).then(r=>r.json());
    const sel = document.getElementById('lawSelect');
    (d.laws||[]).forEach(l=>{ const o=document.createElement('option');o.value=l.name;o.textContent=l.name;sel.appendChild(o); });
  } catch{}
})();

let typeText='', typeInput='', startTime=null, timerIv=null;
const ti = document.getElementById('ti');
const ghost = document.getElementById('ghost');
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function render(){
  if(!typeText)return;
  let html='';
  for(let i=0;i<typeText.length;i++){
    const ch=esc(typeText[i]);
    if(i<typeInput.length){ html+=typeInput[i]===typeText[i]?`<span class="ok">${ch}</span>`:`<span class="err" title="您輸入：${esc(typeInput[i]||'?')}">${ch}</span>`; }
    else if(i===typeInput.length){ html+=`<span class="cur">${ch}</span>`; }
    else{ html+=`<span>${ch}</span>`; }
  }
  ghost.innerHTML=`<p>${html}</p>`;
  const cor=[...typeInput].filter((c,i)=>c===typeText[i]).length;
  const err=typeInput.length-cor;
  const acc=typeInput.length?Math.round(cor/typeInput.length*100):100;
  const prog=Math.min(typeText.length?Math.round(typeInput.length/typeText.length*100):0,100);
  document.getElementById('acc').textContent=acc+'%';
  document.getElementById('stat-acc').textContent=acc+'%';
  document.getElementById('stat-prog').textContent=prog+'%';
  document.getElementById('stat-err').textContent=err;
  document.getElementById('prog').style.width=prog+'%';
  if(typeInput.length>=typeText.length&&typeText.length>0){
    stopTimer();
    ghost.innerHTML+=`<div style="margin-top:16px;font-family:var(--mono);font-size:13px;color:var(--good);letter-spacing:.1em">✓ 完成 · 正確率 ${acc}%</div>`;
  }
}

ti.addEventListener('input',()=>{
  typeInput=ti.value;
  if(!startTime&&typeInput.length>0)startTimer();
  if(currentMode===2) renderMode2();
  else render();
});

function startTimer(){
  startTime=Date.now();
  timerIv=setInterval(()=>{
    const sec=Math.floor((Date.now()-startTime)/1000);
    document.getElementById('time').textContent=String(Math.floor(sec/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0');
    if(typeInput.length>0&&sec>0){
      const w=Math.round(typeInput.length/sec*60/2);
      document.getElementById('wpm').textContent=w;
      document.getElementById('stat-wpm').textContent=w;
    }
  },1000);
}
function stopTimer(){ if(timerIv){clearInterval(timerIv);timerIv=null;} }

async function loadNew(){
  stopTimer();startTime=null;typeInput='';typeText='';ti.value='';
  ghost.innerHTML='<span style="font-family:var(--mono);font-size:12px;color:rgba(245,240,234,.4);letter-spacing:.1em">載入中…</span>';
  ['wpm','acc','time'].forEach(id=>document.getElementById(id).textContent=id==='time'?'00:00':'—');
  ['stat-prog','stat-wpm','stat-acc'].forEach(id=>document.getElementById(id).textContent='—');
  document.getElementById('stat-err').textContent='0';
  document.getElementById('prog').style.width='0%';
  const law=document.getElementById('lawSelect').value;
  try{
    const url=law?`${API}/api/random?law=${encodeURIComponent(law)}`:`${API}/api/random`;
    const d=await fetch(url,{headers:{'X-Sofa-UID':uid}}).then(r=>r.json());
    typeText=d.original_text||'';
    const m=(d.title||'').match(/第(\d+)條/);
    document.getElementById('artNum').textContent=m?m[1]:'—';
    document.getElementById('artTitle').textContent=(d.title||'').replace(/第\d+條/,'').trim()||d.title||'—';
    document.getElementById('artMeta').textContent=(d.law_name||'')+(d.chapter?' / '+d.chapter:'');
    ghost.innerHTML='';
    if(currentMode===2) initMode2(); else if(currentMode===3) initMode3(); else render();
  }catch{
    typeText='民事訴訟，係指當事人就私法上之權利義務關係，請求法院加以裁判之程序。';
    document.getElementById('artNum').textContent='1';
    document.getElementById('artTitle').textContent='（展示模式）';
    ghost.innerHTML='';
    if(currentMode===2) initMode2(); else if(currentMode===3) initMode3(); else render();
  }
}

document.getElementById('btnNew').addEventListener('click',loadNew);
document.getElementById('btnReset').addEventListener('click',()=>{
  stopTimer();startTime=null;typeInput='';ti.value='';
  document.getElementById('time').textContent='00:00';
  document.getElementById('wpm').textContent='—';
  if(currentMode===1) render();
  else if(currentMode===2) initMode2();
  else if(currentMode===3) initMode3();
});

// ── Mode strip ──────────────────────────────────────────
let currentMode=1;
// Mode 02 state
let sentences=[], sentIdx=0, sentDone=[];
// Mode 03 state
let m3Blanks=[], m3Checked=false;

function switchMode(newMode){
  currentMode=newMode;
  document.querySelectorAll('.mode').forEach((b,i)=>b.classList.toggle('on',i===newMode-1));
  if(!typeText) return;
  stopTimer(); startTime=null; typeInput=''; ti.value='';
  document.getElementById('time').textContent='00:00';
  document.getElementById('wpm').textContent='—';
  if(newMode===1){ ti.style.display=''; document.getElementById('m3area').style.display='none'; render(); }
  else if(newMode===2){ ti.style.display=''; document.getElementById('m3area').style.display='none'; initMode2(); }
  else if(newMode===3){ ti.style.display='none'; document.getElementById('m3area').style.display='block'; initMode3(); }
}

function initMode2(){
  // Split by sentence-ending punctuation, keep delimiter
  sentences = typeText.split(/(?<=[。；：])/).filter(s=>s.trim());
  if(!sentences.length){ sentences=[typeText]; }
  sentIdx=0; sentDone=sentences.map(()=>null);
  typeInput=''; ti.value=''; ti.placeholder='輸入當前句子，按 ↵ 確認…';
  renderMode2();
}

function renderMode2(){
  if(!sentences.length) return;
  const cur=sentences[sentIdx]||'';
  let html='';
  sentences.forEach((s,si)=>{
    if(si<sentIdx){
      // completed
      const ok = sentDone[si];
      const cls = ok ? 'ok' : 'err';
      html+=`<p>${[...s].map(c=>`<span class="${cls}">${esc(c)}</span>`).join('')}</p>`;
    } else if(si===sentIdx){
      // current sentence — char-by-char like mode 01
      let sh='';
      for(let i=0;i<s.length;i++){
        const ch=esc(s[i]);
        if(i<typeInput.length){ sh+=typeInput[i]===s[i]?`<span class="ok">${ch}</span>`:`<span class="err">${ch}</span>`; }
        else if(i===typeInput.length){ sh+=`<span class="cur">${ch}</span>`; }
        else{ sh+=`<span>${ch}</span>`; }
      }
      html+=`<p>${sh}</p>`;
    } else {
      // future — dimmed
      html+=`<p style="opacity:.25">${esc(s)}</p>`;
    }
  });
  ghost.innerHTML=html;
  const done=sentDone.filter(x=>x!==null).length;
  const prog=Math.round(done/sentences.length*100);
  document.getElementById('stat-prog').textContent=prog+'%';
  document.getElementById('prog').style.width=prog+'%';
  const cor=[...typeInput].filter((c,i)=>c===(sentences[sentIdx]||'')[i]).length;
  const acc=typeInput.length?Math.round(cor/typeInput.length*100):100;
  document.getElementById('stat-acc').textContent=acc+'%';
  document.getElementById('stat-err').textContent=typeInput.length-cor;
}

function advanceSentence(){
  const cur=sentences[sentIdx]||'';
  const cor=[...typeInput].filter((c,i)=>c===cur[i]).length;
  sentDone[sentIdx]=(typeInput.trim()===cur.trim()||cor/cur.length>=0.9);
  sentIdx++;
  typeInput=''; ti.value='';
  if(sentIdx>=sentences.length){
    stopTimer();
    const totalCor=sentDone.filter(Boolean).length;
    ghost.innerHTML+=`<div style="margin-top:16px;font-family:var(--mono);font-size:13px;color:var(--good);letter-spacing:.1em">✓ 完成 · ${totalCor}/${sentences.length} 句正確</div>`;
  } else { renderMode2(); ti.focus(); }
}

// ── Mode 03 (關鍵字) ──────────────────────────────────────
function initMode3(){
  m3Checked=false;
  // Extract blanks using same patterns as fill API
  const patterns=[
    /\d+(?:,\d+)*(?:\.\d+)?(?:元|萬元|億元)/g,
    /\d+(?:日|天|月|年)/g,
    /百分之\d+(?:\.\d+)?/g,
    /\d+(?:人|份|次|條)/g,
  ];
  const found=[];
  const used=new Set();
  patterns.forEach(re=>{
    let m;re.lastIndex=0;
    while((m=re.exec(typeText))!==null){
      const key=m.index+'_'+m[0].length;
      if(!used.has(key)){used.add(key);found.push({start:m.index,end:m.index+m[0].length,ans:m[0]});}
    }
  });
  if(!found.length){
    // fallback: pick 2-4 char words
    const re=/[一-鿿]{2,4}/g;
    let m, picks=[];
    while((m=re.exec(typeText))!==null){ picks.push({start:m.index,end:m.index+m[0].length,ans:m[0]}); }
    picks=picks.sort(()=>Math.random()-.5).slice(0,3);
    found.push(...picks);
  }
  found.sort((a,b)=>a.start-b.start);
  m3Blanks=found;

  // Render text with inline inputs
  const box=document.getElementById('m3area');
  let html=`<div style="font-family:var(--serif);font-size:20px;line-height:2.1;color:var(--cream);letter-spacing:.02em">`;
  let prev=0;
  found.forEach((b,i)=>{
    html+=esc(typeText.slice(prev,b.start));
    const w=Math.max(b.ans.length*22+16,60);
    html+=`<input class="blank" id="m3b_${i}" data-ans="${esc(b.ans)}" style="width:${w}px" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="　"/>`;
    prev=b.end;
  });
  html+=esc(typeText.slice(prev))+'</div>';
  html+=`<div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn btn-pri" id="m3check">提交 ↵</button>
    <button class="btn btn-sec" id="m3reset">重來</button>
    <button class="btn btn-ghost" id="m3reveal">看答案</button>
  </div>`;
  box.innerHTML=html;

  box.querySelectorAll('.blank').forEach((inp,i,all)=>{
    inp.addEventListener('input',()=>{
      inp.classList.remove('ok','bad');
      const v=inp.value.trim();
      if(v===inp.dataset.ans) inp.classList.add('ok');
      else if(v.length>=inp.dataset.ans.length) inp.classList.add('bad');
      updateM3Stats();
    });
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'||e.key==='Tab'){
        e.preventDefault();
        if(all[i+1]) all[i+1].focus(); else checkMode3();
      }
    });
  });
  document.getElementById('m3check').addEventListener('click',checkMode3);
  document.getElementById('m3reset').addEventListener('click',()=>{
    box.querySelectorAll('.blank').forEach(inp=>{inp.disabled=false;inp.value='';inp.classList.remove('ok','bad');});
    m3Checked=false; updateM3Stats();
    const first=box.querySelector('.blank'); if(first)first.focus();
  });
  document.getElementById('m3reveal').addEventListener('click',()=>{
    box.querySelectorAll('.blank').forEach(inp=>{inp.value=inp.dataset.ans;inp.classList.remove('bad');inp.classList.add('ok');});
    updateM3Stats();
  });
  updateM3Stats();
  const first=box.querySelector('.blank'); if(first)first.focus();
}

function checkMode3(){
  if(m3Checked)return; m3Checked=true;
  const box=document.getElementById('m3area');
  let cor=0;
  box.querySelectorAll('.blank').forEach((inp,i)=>{
    inp.disabled=true;
    if(inp.value.trim()===inp.dataset.ans){inp.classList.add('ok');cor++;}
    else{
      inp.classList.add('bad');
      const sp=document.createElement('span');
      sp.textContent=`（${inp.dataset.ans}）`;
      sp.style.cssText='color:var(--good);font-size:.75rem;font-family:var(--mono);margin-left:.25rem;';
      inp.after(sp);
    }
  });
  document.getElementById('stat-acc').textContent=m3Blanks.length?Math.round(cor/m3Blanks.length*100)+'%':'—';
  document.getElementById('stat-prog').textContent='✓';
}

function updateM3Stats(){
  const box=document.getElementById('m3area');
  const inputs=[...box.querySelectorAll('.blank')];
  const filled=inputs.filter(i=>i.value.trim()).length;
  document.getElementById('stat-prog').textContent=`${filled}/${inputs.length}`;
}

document.querySelectorAll('.mode').forEach((btn,idx)=>{
  btn.addEventListener('click',()=>switchMode(idx+1));
});

// ── Keyboard shortcuts ──────────────────────────────────
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){
    e.preventDefault(); loadNew(); return;
  }
  // Mode 02: Enter → confirm sentence and advance
  if(e.key==='Enter'&&document.activeElement===ti&&currentMode===2){
    e.preventDefault();
    if(sentIdx<sentences.length) advanceSentence();
    return;
  }
  // TAB → hint (mode 01 only)
  if(e.key==='Tab'&&document.activeElement===ti&&currentMode===1){
    e.preventDefault();
    const cur=document.querySelector('.ghost .cur');
    if(cur){
      cur.style.background='rgba(231,187,167,.5)';
      cur.style.color='var(--cream)';
      setTimeout(()=>{ cur.style.background=''; cur.style.color=''; },800);
    }
    return;
  }
  if(e.key==='Escape'){ ti.blur(); }
});

loadNew();
</script>
</body>
</html>
