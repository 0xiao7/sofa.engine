<html lang="zh-TW">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打字練習 — SoFa Engine</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231F3848'/%3E%3Crect x='5' y='8' width='22' height='11' rx='3' fill='%23e7bba7'/%3E%3Crect x='4' y='13' width='5' height='10' rx='2.5' fill='%23d4a090'/%3E%3Crect x='23' y='13' width='5' height='10' rx='2.5' fill='%23d4a090'/%3E%3Crect x='9' y='18' width='14' height='5' rx='2' fill='%23c4907a'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:   #1F3848;
  --navy-2: #19303E;
  --navy-3: #142836;
  --navy-4: #0D1C28;
  --peach:  #E7BBA7;
  --peach-2:#F0CDBD;
  --peach-3:#C89580;
  --cream:  #F5F0EA;
  --muted:  #7A8892;
  --green:  #7ecf7e;
  --red:    #e06060;
  --line-on-navy: rgba(245,240,234,.14);
  --mono: 'JetBrains Mono', ui-monospace, monospace;
  --serif:'Noto Serif TC', serif;
  --sans: 'Noto Sans TC', system-ui, sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
@keyframes spin{to{transform:rotate(360deg)}}
body{
  background:var(--navy);color:var(--cream);font-family:var(--sans);font-weight:300;
  min-height:100vh;display:flex;flex-direction:column;
}
body::before{content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 10% 0%,rgba(13,28,40,.7) 0%,transparent 60%),
    radial-gradient(ellipse 60% 70% at 85% 95%,rgba(231,187,167,.05) 0%,transparent 55%);
  pointer-events:none;z-index:0;
}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;
  background:rgba(13,28,40,.96);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--line-on-navy);
}
.nav-brand{font-family:var(--mono);font-size:.85rem;letter-spacing:.14em;color:var(--peach);text-decoration:none;}
.nav-right{display:flex;align-items:center;gap:1.2rem;}
.nav-back{
  font-family:var(--mono);font-size:.7rem;letter-spacing:.12em;
  color:rgba(245,240,234,.4);text-decoration:none;
  border:1px solid var(--line-on-navy);padding:.28rem .8rem;
  transition:color .2s,border-color .2s;
}
.nav-back:hover{color:var(--cream);border-color:rgba(231,187,167,.3);}

/* LAYOUT */
main{flex:1;padding:5rem 1.5rem 3rem;position:relative;z-index:1;max-width:720px;margin:0 auto;width:100%;}

/* LOADING */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:1rem;}
.spinner{width:28px;height:28px;border:2px solid rgba(231,187,167,.15);border-top-color:var(--peach);border-radius:50%;animation:spin .8s linear infinite;}
.loading-text{font-family:var(--mono);font-size:.72rem;color:rgba(245,240,234,.35);letter-spacing:.1em;}

/* ARTICLE HEADER */
.art-header{margin-bottom:1.5rem;}
.art-eyebrow{font-family:var(--mono);font-size:.65rem;letter-spacing:.18em;color:rgba(245,240,234,.35);text-transform:uppercase;margin-bottom:.4rem;}
.art-title{font-family:var(--serif);font-size:1.15rem;font-weight:600;color:var(--cream);}

/* TYPING AREA */
.typing-wrap{position:relative;margin-bottom:1.5rem;}
.source-text{
  font-family:var(--serif);font-size:1rem;line-height:2;
  color:transparent;user-select:none;pointer-events:none;
  position:absolute;top:0;left:0;right:0;
  padding:1.2rem;white-space:pre-wrap;word-break:break-all;
}
.char{position:relative;}
.char.correct{color:rgba(245,240,234,.25);}
.char.wrong{color:var(--red);text-decoration:underline;}
.char.pending{color:rgba(245,240,234,.18);}
.char.cursor::after{
  content:'';position:absolute;left:0;bottom:2px;width:2px;height:1.1em;
  background:var(--peach);animation:blink 1s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

textarea.input-mirror{
  width:100%;min-height:160px;
  background:var(--navy-2);border:1px solid var(--line-on-navy);
  color:transparent;caret-color:var(--peach);
  font-family:var(--serif);font-size:1rem;line-height:2;
  padding:1.2rem;resize:none;outline:none;
  white-space:pre-wrap;word-break:break-all;
  transition:border-color .2s;
}
textarea.input-mirror:focus{border-color:rgba(231,187,167,.3);}

.overlay-text{
  font-family:var(--serif);font-size:1rem;line-height:2;
  padding:1.2rem;white-space:pre-wrap;word-break:break-all;
  position:absolute;top:0;left:0;right:0;pointer-events:none;
}

/* STATS BAR */
.stats-bar{
  display:flex;align-items:center;gap:1.5rem;
  margin-bottom:1.2rem;
  font-family:var(--mono);font-size:.7rem;letter-spacing:.08em;color:rgba(245,240,234,.35);
}
.stat-item{display:flex;align-items:center;gap:.4rem;}
.stat-val{color:var(--peach);}
.stat-val.green{color:var(--green);}
.stat-val.red{color:var(--red);}

/* PROGRESS */
.progress-bar-wrap{height:3px;background:rgba(245,240,234,.08);margin-bottom:1.5rem;border-radius:2px;}
.progress-bar-fill{height:100%;background:var(--peach);transition:width .15s;border-radius:2px;}

/* COMPLETE STATE */
.complete-state{
  text-align:center;padding:2.5rem;
  background:var(--navy-2);border:1px solid var(--line-on-navy);
}
.complete-icon{font-family:var(--mono);font-size:2rem;color:var(--peach);margin-bottom:1rem;}
.complete-title{font-family:var(--serif);font-size:1.3rem;font-weight:600;margin-bottom:.5rem;}
.complete-sub{font-size:.85rem;color:rgba(245,240,234,.45);margin-bottom:1.8rem;}
.complete-stats{
  display:flex;justify-content:center;gap:2.5rem;
  margin-bottom:1.8rem;
}
.cs-item{text-align:center;}
.cs-num{font-family:var(--mono);font-size:1.6rem;color:var(--peach);display:block;}
.cs-label{font-size:.72rem;color:rgba(245,240,234,.35);letter-spacing:.08em;}

/* BUTTONS */
.btn-row{display:flex;gap:.75rem;justify-content:center;}
.btn{
  font-family:var(--sans);font-size:.84rem;font-weight:600;
  padding:.7rem 1.6rem;border:none;cursor:pointer;border-radius:2px;
  transition:background .2s,transform .18s,box-shadow .2s;
}
.btn-primary{background:var(--peach);color:var(--navy);}
.btn-primary:hover{background:var(--peach-2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(231,187,167,.18);}
.btn-ghost{background:transparent;color:rgba(245,240,234,.6);border:1px solid var(--line-on-navy);}
.btn-ghost:hover{border-color:rgba(231,187,167,.3);color:var(--cream);}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-brand">SOFA ENGINE</a>
  <div class="nav-right">
    <a href="/dashboard.html" class="nav-back">← 會員中心</a>
  </div>
</nav>

<main id="main">
  <div class="loading-state" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">載入條文中…</div>
  </div>
</main>

<script>
const API = 'https://sofa-engine-api.onrender.com';
function getUID(){ return localStorage.getItem('sofa_uid')||''; }

let sourceText = '', typed = '', startTime = null, errorCount = 0, done = false;

function renderTyping(){
  const wrap = document.getElementById('typing-wrap');
  if(!wrap) return;
  const overlay = wrap.querySelector('.overlay-text');
  let html = '';
  for(let i=0;i<sourceText.length;i++){
    const ch = sourceText[i]==' '?'&nbsp;':sourceText[i]==='\n'?'↵\n':sourceText[i];
    if(i<typed.length){
      const ok = typed[i]===sourceText[i];
      html += `<span class="char ${ok?'correct':'wrong'}">${ch}</span>`;
    } else if(i===typed.length){
      html += `<span class="char pending cursor">${ch}</span>`;
    } else {
      html += `<span class="char pending">${ch}</span>`;
    }
  }
  overlay.innerHTML = html;
  // progress
  const pct = Math.round(typed.length/sourceText.length*100);
  document.getElementById('progress-fill').style.width = pct+'%';
  // stats
  const correct = typed.split('').filter((c,i)=>c===sourceText[i]).length;
  document.getElementById('stat-progress').textContent = `${typed.length}/${sourceText.length}`;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-errors').textContent = errorCount;
  if(startTime){
    const secs = Math.round((Date.now()-startTime)/1000);
    document.getElementById('stat-time').textContent = secs+'s';
  }
}

function buildUI(data){
  const main = document.getElementById('main');
  sourceText = data.original_text || '';
  typed = ''; errorCount = 0; startTime = null; done = false;
  main.innerHTML = `
    <div class="art-header">
      <div class="art-eyebrow">TYPE · 打字練習</div>
      <div class="art-title">${esc(data.title)}</div>
    </div>
    <div class="stats-bar">
      <div class="stat-item">進度 <span class="stat-val" id="stat-progress">0/${sourceText.length}</span></div>
      <div class="stat-item">正確 <span class="stat-val green" id="stat-correct">0</span></div>
      <div class="stat-item">錯誤 <span class="stat-val red" id="stat-errors">0</span></div>
      <div class="stat-item">時間 <span class="stat-val" id="stat-time">0s</span></div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="typing-wrap" id="typing-wrap">
      <textarea class="input-mirror" id="input" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" placeholder="點此開始打字…"></textarea>
      <div class="overlay-text"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="loadArticle()">換一條</button>
    </div>
  `;
  renderTyping();
  const inp = document.getElementById('input');
  inp.addEventListener('input', onInput);
  inp.addEventListener('keydown', e=>{
    // prevent default tab
    if(e.key==='Tab'){e.preventDefault();}
  });
}

function onInput(e){
  if(done) return;
  const inp = e.target;
  const val = inp.value;
  if(!startTime && val.length>0) startTime = Date.now();
  // count new errors
  for(let i=typed.length;i<val.length;i++){
    if(val[i]!==sourceText[i]) errorCount++;
  }
  typed = val;
  renderTyping();
  if(typed.length>=sourceText.length && typed===sourceText){
    showComplete();
  }
}

function showComplete(){
  done = true;
  const elapsed = Math.round((Date.now()-startTime)/1000);
  const correct = typed.split('').filter((c,i)=>c===sourceText[i]).length;
  const acc = Math.round(correct/sourceText.length*100);
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="complete-state">
      <div class="complete-icon">✓</div>
      <div class="complete-title">完成！</div>
      <div class="complete-sub">這條法條已經在你的手指記憶裡了。</div>
      <div class="complete-stats">
        <div class="cs-item"><span class="cs-num">${elapsed}s</span><span class="cs-label">用時</span></div>
        <div class="cs-item"><span class="cs-num">${acc}%</span><span class="cs-label">正確率</span></div>
        <div class="cs-item"><span class="cs-num">${errorCount}</span><span class="cs-label">錯誤次數</span></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="loadArticle()">下一條</button>
        <a href="/dashboard.html" class="btn btn-ghost">回會員中心</a>
      </div>
    </div>
  `;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function loadArticle(){
  document.getElementById('main').innerHTML = `
    <div class="loading-state"><div class="spinner"></div><div class="loading-text">載入條文中…</div></div>
  `;
  try{
    const res = await fetch(`${API}/api/random`, {headers:{'X-Sofa-UID':getUID()}});
    if(!res.ok) throw new Error(await res.text());
    const data = await res.json();
    if(!data.original_text) throw new Error('無原文');
    buildUI(data);
  } catch(e){
    document.getElementById('main').innerHTML = `
      <div class="loading-state">
        <div class="loading-text" style="color:rgba(224,96,96,.7)">載入失敗：${esc(e.message)}</div>
        <button class="btn btn-ghost" onclick="loadArticle()" style="margin-top:1rem">重試</button>
      </div>
    `;
  }
}

if(!getUID()){ window.location.href='/login.html'; } else { loadArticle(); }
</script>
</body>
</html>
