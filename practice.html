<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<title>SoFa Engine — 打字練習</title>
<meta name="description" content="逐字打出法條原文，讓條文記憶更紮實。SoFa Engine 打字練習模式，涵蓋 37,000+ 條國考法規，免費使用。" />
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-G81F9D4YJ3"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-G81F9D4YJ3');</script>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="sofa.css" />
<style>
  /* === Practice layout === */
  .pr-bar{
    background:var(--navy-2);border-bottom:1px solid var(--line);
    padding:18px 40px;display:flex;align-items:center;justify-content:space-between;gap:24px;
  }
  .pr-bar .l{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
  .pr-pick{
    display:flex;align-items:center;gap:10px;
    background:var(--navy-3);border:1px solid var(--line-2);border-radius:3px;
    padding:10px 16px;cursor:pointer;transition:.18s;
    font-size:13.5px;color:var(--cream);
  }
  .pr-pick:hover{border-color:var(--peach-dim)}
  .pr-pick .lab{
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;
    color:rgba(245,240,234,.5);text-transform:uppercase;
  }
  .pr-pick .v{font-family:var(--serif);font-weight:500;font-size:15px;color:var(--cream)}
  .pr-pick .car{color:var(--peach);font-family:var(--mono);font-size:11px;margin-left:4px}

  .pr-meta{
    display:flex;align-items:center;gap:24px;
    font-family:var(--mono);font-size:12px;letter-spacing:.08em;
    color:rgba(245,240,234,.55);
  }
  .pr-meta .seg{display:flex;align-items:center;gap:8px}
  .pr-meta .seg b{color:var(--peach);font-weight:600;letter-spacing:.04em;font-size:13px}

  .pr-progress{
    height:2px;background:rgba(245,240,234,.06);position:relative;
  }
  .pr-progress .fl{
    position:absolute;left:0;top:0;height:100%;
    background:linear-gradient(to right, var(--peach), var(--peach-2));
    width:32%;transition:width .35s ease;
  }

  /* === main stage === */
  .pr-stage{
    padding:48px 64px 96px;background:var(--navy-3);
    position:relative;min-height:calc(100vh - 70px - 60px - 2px);
  }
  .pr-stage::before{
    content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(245,240,234,.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,240,234,.018) 1px, transparent 1px);
    background-size:60px 60px;
    mask-image:radial-gradient(ellipse 60% 50% at 50% 0%, #000 30%, transparent 70%);
    pointer-events:none;
  }
  .pr-inner{max-width:980px;margin:0 auto;position:relative}

  /* article head */
  .ar-head{
    margin-bottom:28px;gap:8px;padding-bottom:20px;border-bottom:1px solid var(--line);
  }
  .ar-head .eb{
    font-family:var(--mono);font-size:11px;color:var(--peach);
    letter-spacing:.22em;text-transform:uppercase;
    display:flex;align-items:center;gap:10px;
  }
  .ar-head .eb::before{content:"";width:18px;height:1px;background:var(--peach)}
  .ar-head h2{
    font-family:var(--serif);font-weight:600;font-size:32px;
    margin-top:10px;color:var(--cream);line-height:1.25;
    display:flex;align-items:baseline;gap:18px;flex-wrap:wrap;
  }
  .ar-head h2 .n{
    font-size:46px;letter-spacing:-.02em;color:var(--peach);font-weight:600;
  }
  .ar-head .law-tag{
    display:inline-block;margin-top:10px;
    font-family:var(--mono);font-size:11px;letter-spacing:.14em;
    color:rgba(245,240,234,.55);text-transform:uppercase;
    background:rgba(231,187,167,.08);border:1px solid var(--line-2);
    border-radius:100px;padding:4px 12px;
  }

  /* big stat row */
  .stat-row{
    display:grid;grid-template-columns:repeat(4,1fr);gap:0;
    background:var(--navy-2);border:1px solid var(--line);border-radius:4px;
    padding:22px 8px;margin-bottom:36px;
  }
  .stat{padding:0 24px;border-right:1px solid var(--line);text-align:center}
  .stat:last-child{border-right:none}
  .stat .v{
    font-family:var(--serif);font-weight:600;font-size:36px;line-height:1;
    color:var(--cream);letter-spacing:.01em;
  }
  .stat .v.peach{color:var(--peach)}
  .stat .v.good{color:var(--good)}
  .stat .k{
    margin-top:10px;font-family:var(--mono);font-size:10.5px;
    letter-spacing:.18em;color:rgba(245,240,234,.5);text-transform:uppercase;
  }

  /* article body — type stage */
  .type-card{
    background:var(--navy-2);
    border:1px solid var(--line);border-radius:4px;
    padding:42px 48px;position:relative;
  }
  .art-label{
    position:absolute;top:18px;right:24px;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;
    color:rgba(245,240,234,.25);pointer-events:none;
  }

  .ghost{
    font-family:var(--serif);font-size:22px;line-height:2.05;
    color:rgba(245,240,234,.25);letter-spacing:.02em;
    user-select:none;word-break:keep-all;overflow-wrap:break-word;
  }
  .ghost p{margin-bottom:14px}
  .ghost .ro{
    color:rgba(231,187,167,.42);font-family:var(--mono);font-size:14px;
    font-weight:600;margin-right:6px;letter-spacing:.04em;
  }
  /* characters already typed correctly */
  .ghost .ok{color:var(--cream)}
  /* current character — cursor */
  .ghost .cur{
    color:var(--peach);background:rgba(231,187,167,.16);
    padding:0 2px;border-radius:1px;
    animation:blink 1s steps(2) infinite;
  }
  /* wrong typed chars */
  .ghost .err{color:var(--bad);background:rgba(199,123,106,.18);border-radius:1px}
  @keyframes blink{50%{background:transparent}}

  /* input strip */
  .type-input{
    margin-top:32px;padding-top:24px;border-top:1px dashed var(--line);
    display:flex;align-items:stretch;gap:14px;
  }
  .type-input .key{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;
    color:rgba(245,240,234,.5);text-transform:uppercase;
    align-self:center;min-width:96px;
  }
  .type-input .key b{color:var(--peach);font-weight:600}
  .type-field{
    flex:1;background:var(--navy-3);border:1px solid var(--line-2);
    border-radius:3px;padding:14px 18px;
    display:flex;align-items:flex-start;gap:12px;transition:.18s;
  }
  .type-field:focus-within{border-color:var(--peach);background:var(--navy)}
  .type-field textarea{
    background:transparent;border:none;outline:none;width:100%;
    font-family:var(--serif);font-size:18px;color:var(--cream);letter-spacing:.02em;
    resize:none;overflow-y:hidden;min-height:1.6em;line-height:1.6;
  }
  .type-field textarea::placeholder{
    color:rgba(245,240,234,.3);font-family:var(--sans);font-size:14px;
  }
  .type-actions{display:flex;gap:10px}

  /* === Bottom mode strip === */
  .mode-strip{
    margin-top:36px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;
  }
  .mode{
    background:var(--navy-2);border:1px solid var(--line);border-radius:4px;
    padding:18px 22px;display:flex;align-items:center;justify-content:space-between;
    cursor:pointer;transition:.18s;
  }
  .mode:hover{background:var(--plum-1);border-color:var(--peach-dim)}
  .mode.on{background:rgba(231,187,167,.10);border-color:var(--peach);color:var(--cream)}
  .mode .ml{display:flex;flex-direction:column;gap:4px}
  .mode .code{
    font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--peach);font-weight:600;
  }
  .mode .nm{font-family:var(--serif);font-size:16px;color:var(--cream);font-weight:500}
  .mode .desc{font-size:12px;color:rgba(245,240,234,.55);max-width:170px}

  /* === Keyboard hint footer === */
  .kbd-foot{
    margin-top:36px;padding:18px 24px;
    border-top:1px dashed var(--line);
    display:flex;justify-content:space-between;align-items:center;
    font-family:var(--mono);font-size:11px;letter-spacing:.12em;
    color:rgba(245,240,234,.5);text-transform:uppercase;flex-wrap:wrap;gap:12px;
  }
  .kbd-foot .gp{display:flex;gap:18px;flex-wrap:wrap}
  .kbd-foot kbd{
    display:inline-block;padding:3px 8px;
    background:var(--navy-2);border:1px solid var(--line-2);
    border-radius:3px;font-family:var(--mono);font-size:10.5px;
    color:var(--peach);margin-right:6px;
  }

  /* === Mode 03 blank inputs === */
  .blank{
    display:inline-block;min-width:3em;
    padding:2px 10px;margin:0 2px;
    border:none;border-bottom:2px solid var(--peach);
    background:rgba(231,187,167,.07);
    border-radius:3px 3px 0 0;
    font-family:var(--serif);font-size:20px;
    color:var(--cream);text-align:center;
    outline:none;transition:.18s;caret-color:var(--peach);
    vertical-align:baseline;
  }
  .blank:focus{background:rgba(231,187,167,.18);border-bottom-color:var(--peach-2)}
  .blank.ok{color:var(--good);border-bottom-color:var(--good);background:rgba(159,184,159,.10)}
  .blank.bad{color:var(--bad);border-bottom-color:var(--bad);background:rgba(199,123,106,.10)}

  /* section analysis panel */
  .sec-panel{margin-top:22px;background:var(--cream);color:var(--navy);border-radius:4px;padding:22px 26px;border-left:4px solid var(--peach-3)}
  .sec-panel .sec-hd{font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--peach-3);font-weight:600;padding-bottom:12px;border-bottom:1px dashed rgba(31,56,72,.15);margin-bottom:4px}
  .sec-block{margin-top:16px;padding-top:14px;border-top:1px dashed rgba(31,56,72,.15)}
  .sec-label{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--peach-3);font-weight:600;margin-bottom:6px}
  .sec-text{font-size:13px;line-height:1.85;color:rgba(31,56,72,.78)}
  .sec-text .sec-h{margin:10px 0 4px;color:var(--navy);font-weight:600}
  .sec-text .sec-h:first-child{margin-top:0}
  .sec-text .sec-i{position:relative;padding-left:18px;margin:3px 0}
  .sec-text .sec-i::before{content:'◦';position:absolute;left:4px;top:-.04em;color:var(--peach-3);font-weight:700}
  .sec-lock{margin-top:16px;border-top:1px dashed rgba(31,56,72,.15)}
  .sec-lock .sec-label::after{content:" 🔒";font-size:11px;opacity:.65}
  .sec-lock-preview{position:relative;max-height:80px;overflow:hidden;padding:10px 0 0;pointer-events:none;user-select:none;font-size:13.5px;line-height:1.8;color:rgba(31,56,72,.72)}
  .sec-lock-preview::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(245,240,234,0) 15%,var(--cream) 82%);pointer-events:none}
  .sec-lock-cta{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;padding:10px 16px;font-size:12.5px;color:rgba(31,56,72,.72);background:rgba(231,187,167,.1);border:1px dashed rgba(213,154,120,.4);border-radius:4px}
  .sec-lock-cta a{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--peach);text-decoration:none;padding:5px 14px;border:1px solid rgba(213,154,120,.4);border-radius:2px;white-space:nowrap}

  /* === RWD === */
  @media (max-width:1100px){
    .pr-bar{padding:14px 24px;flex-wrap:wrap}
    .pr-stage{padding:36px 32px 72px}
    .stat-row{grid-template-columns:1fr 1fr}
    .stat{border-bottom:1px solid var(--line);padding:14px 16px}
    .stat:nth-child(2){border-right:none}
    .stat:nth-last-child(-n+2){border-bottom:none}
  }
  @media (max-width:760px){
    .pr-bar{padding:12px 18px;gap:12px}
    .pr-bar .l{gap:10px}
    .pr-meta{gap:14px;font-size:11px}
    .pr-stage{padding:28px 18px 60px}
    .ar-head{flex-direction:column;align-items:flex-start;gap:14px}
    .ar-head h2{font-size:24px}
    .ar-head h2 .n{font-size:36px}
    .type-card{padding:24px 22px}
    .ghost{font-size:17px;line-height:1.95}
    .type-input{flex-direction:column;align-items:stretch}
    .type-input .key{min-width:0;align-self:flex-start}
    .mode-strip{grid-template-columns:1fr}
    .kbd-foot{flex-direction:column;align-items:flex-start;gap:14px}
  }
  h1,h2,h3,h4{text-wrap:balance;}
  p{text-wrap:pretty;}
  .pr-chips{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 40px;background:var(--navy-2);border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11.5px;letter-spacing:.08em}
  .pr-chips .lab{color:rgba(245,240,234,.4);text-transform:uppercase;margin-right:4px}
  .pr-chip{padding:6px 12px;border:1px solid var(--line-2);border-radius:100px;background:transparent;color:rgba(245,240,234,.55);cursor:pointer;font-family:var(--mono);font-size:11px;letter-spacing:.06em;transition:.18s}
  .pr-chip:hover{border-color:var(--peach-dim);color:var(--cream)}
  .pr-chip.on{background:var(--peach);color:var(--navy);border-color:var(--peach);font-weight:600}
  .pr-chips.is-locked .pr-chip{opacity:.4;cursor:not-allowed;border-color:var(--line-2)!important;color:rgba(245,240,234,.35)!important;background:transparent!important}
  .pr-chips .lock-hint{display:none;font-size:10.5px;color:var(--peach-dim);letter-spacing:.05em;margin-left:auto;font-style:italic;opacity:.85}
  .pr-chips.is-locked .lock-hint{display:inline-block}
  .pr-sub{display:none;align-items:center;gap:8px;margin-left:6px}
  .pr-sub.show{display:flex}
  .pr-sub select{background:var(--navy-3);border:1px solid var(--line-2);border-radius:3px;color:var(--cream);font-family:var(--mono);font-size:11.5px;padding:5px 10px;cursor:pointer;outline:none}
  @media (max-width:760px){.pr-chips{padding:10px 18px}}

  /* === Wave 89: TTS button === */
  #practice-tts-btn {
    background: none; border: 1px solid #2a4060; cursor: pointer;
    font-size: 14px; color: #8899aa; padding: 4px 12px;
    border-radius: 14px; margin-left: 8px;
    transition: border-color 0.2s, color 0.2s;
  }
  #practice-tts-btn:hover { border-color: #4a9eff; color: #4a9eff; }
  #practice-tts-btn.speaking {
    color: #4a9eff; border-color: #4a9eff;
    animation: ttsPulse 1s ease-in-out infinite;
  }
  @keyframes ttsPulse { 0%,100%{opacity:0.7} 50%{opacity:1} }

  /* === Wave 45: Answer reveal + completion animations === */
  @keyframes blank-correct{
    0%  { background:rgba(212,168,71,.22); border-bottom-color:var(--gold,#D4A847); color:#D4A847; }
    50% { background:rgba(212,168,71,.42); border-bottom-color:#D4A847; color:#D4A847; box-shadow:0 0 12px rgba(212,168,71,.35); }
    100%{ background:rgba(159,184,159,.10); border-bottom-color:var(--good); color:var(--good); box-shadow:none; }
  }
  @keyframes blank-wrong{
    0%  { background:rgba(199,123,106,.10); border-bottom-color:var(--bad); }
    30% { background:rgba(199,123,106,.32); border-bottom-color:#E87B6B; box-shadow:0 0 8px rgba(199,123,106,.4); }
    100%{ background:rgba(199,123,106,.10); border-bottom-color:var(--bad); box-shadow:none; }
  }
  .blank.reveal-ok  { animation: blank-correct .55s ease forwards; }
  .blank.reveal-bad { animation: blank-wrong   .45s ease forwards; }

  @keyframes card-flash{
    0%  { box-shadow: 0 0 0 0 rgba(212,168,71,0); }
    30% { box-shadow: 0 0 0 6px rgba(212,168,71,.35); border-color: rgba(212,168,71,.55); }
    100%{ box-shadow: 0 0 0 0 rgba(212,168,71,0);  }
  }
  .type-card.celebrate { animation: card-flash .8s ease forwards; }

  @keyframes done-slide{
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .pr-done-banner{
    display:flex; align-items:center; gap:12px;
    margin-top:18px; padding:14px 20px;
    background:rgba(212,168,71,.10); border:1px solid rgba(212,168,71,.35);
    border-radius:4px; font-family:var(--mono); font-size:12.5px;
    letter-spacing:.06em; color:#D4A847;
    animation: done-slide .4s ease forwards;
  }
  .pr-done-banner .icon{ font-size:18px; line-height:1; }

  /* === Wave 56: Session timer chip + summary overlay === */
  #session-timer{
    position:fixed;top:12px;right:16px;
    background:rgba(26,46,61,0.85);border:1px solid rgba(91,175,214,0.25);
    border-radius:20px;padding:5px 12px;font-size:12px;
    color:#8ABED6;z-index:50;backdrop-filter:blur(6px);
    font-family:'JetBrains Mono',monospace;
    cursor:pointer;transition:background 0.2s;
    user-select:none;
  }
  #session-timer:hover{background:rgba(26,46,61,1);color:#5BAFD6;}

  #session-summary{
    display:none;position:fixed;inset:0;
    background:rgba(4,13,20,0.95);z-index:200;
    align-items:center;justify-content:center;
  }
  #session-summary.show{display:flex;}
  .ss-card{
    background:#0D1F2D;border-radius:16px;padding:32px 36px;
    border:1px solid rgba(91,175,214,0.2);max-width:380px;width:90%;
    text-align:center;
  }
</style>
</head>
<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <a class="brand" href="index.html"><span class="dot"></span>SOFA&nbsp;ENGINE</a>
    <nav class="top-mid">
      <a href="dashboard.html">會員中心</a>
      <a href="practice.html" class="on">打字</a>
      <a href="fill.html">填空</a>
      <a href="quiz.html">選擇題</a>
    </nav>
    <div class="top-right">
      <span class="user-pill"><span class="live"></span><span id="navUid">—</span></span>
      <button class="btn-out" onclick="localStorage.removeItem('sofa_uid');localStorage.removeItem('sofa_token');window.location.href='login.html'">登出</button>
      <button class="menu-btn"><span></span></button>
    </div>
  </header>

  <!-- Practice control bar -->
  <div class="pr-bar">
    <div class="l">
      <a href="dashboard.html" style="font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:rgba(245,240,234,.55);text-transform:uppercase;padding:6px 10px;border:1px solid var(--line-2);border-radius:3px">← BACK</a>

      <div class="pr-pick">
        <span class="lab">LAW</span>
        <select id="lawSelect" style="background:transparent;border:none;outline:none;font-family:var(--serif);font-weight:500;font-size:15px;color:var(--cream);cursor:pointer;-webkit-appearance:none;appearance:none;min-width:80px;max-width:200px"><option value="">全部法規</option></select>
        <span class="car">▾</span>
      </div>
      <div id="practice-status-bar" style="
        margin-top:4px;padding:6px 10px;
        background:rgba(255,255,255,0.04);
        border-radius:6px;border:1px solid rgba(100,160,220,0.15);
        font-size:11px;color:#aaa;min-height:28px;
        transition:opacity 0.2s;display:none
      "></div>
      <div class="pr-pick" id="artPickWrap" style="display:none">
        <span class="lab">§</span>
        <input id="artNumInput" list="artDatalist" placeholder="條號"
          style="background:transparent;border:none;outline:none;font-family:var(--mono);font-size:13px;color:var(--cream);width:64px;cursor:text">
        <datalist id="artDatalist"></datalist>
      </div>
      <button id="btnNew" class="btn btn-sec" style="padding:8px 16px;font-size:13px">換一條</button>
      <div id="practice-streak" style="
        display:none;
        font-size:13px;color:#ff9955;font-weight:600;
        padding:3px 8px;background:rgba(255,140,0,0.12);
        border:1px solid rgba(255,140,0,0.3);border-radius:12px;
        margin-left:8px
      "></div>
    </div>
    <div class="pr-meta">
      <div class="seg">WPM <b id="wpm">42</b></div>
      <div class="seg">ACC <b id="acc">96.4%</b></div>
      <div class="seg">TIME <b id="time">01:24</b></div>
      <div class="seg">STREAK <b id="streakVal">—</b></div>
    </div>
  </div>
  <div class="pr-chips">
    <span class="lab">細篩</span>

<script>
const API = 'https://sofa-engine-api.onrender.com';

const tok = localStorage.getItem('sofa_token') || '';
// 過渡期：有 token 用 Bearer，否則 fallback X-Sofa-UID
function formatLawText(raw){
  if(!raw) return '';
  let t=String(raw).replace(/\r\n?/g,'\n').trim();
  if(t.indexOf('\n')!==-1) return t;
  t=t.replace(/(?<=\S)\s+(1[0-9]|[2-9])\s+(?=[一-鿿（【「])(?![萬億元個月年日人條項款號次倍種類份件名冊])/g,'\n$1 ');
  t=t.replace(/[ 　]*(?<!第)([一二三四五六七八九十百千零兩]+、)/g,'\n$1');
  t=t.replace(/[ 　]*(（[一二三四五六七八九十百]+）)/g,'\n　$1');
  return t.replace(/^\n+/,'').replace(/\n{2,}/g,'\n').trim();
}
function _authH(extra) {
  const h = extra ? {...extra} : {};
  if (tok) h['Authorization'] = 'Bearer ' + tok;
  else if (uid) h['X-Sofa-UID'] = uid;
  return h;
}

  realestate: ['民法','土地法','平均地權條例','平均地權條例施行細則','土地徵收條例','非都市土地使用管制規則','區域計畫法','都市計畫法','土地稅法','土地稅法施行細則','契稅條例','房屋稅條例','所得稅法','所得稅法施行細則','不動產經紀業管理條例','不動產經紀業管理條例施行細則','公平交易法','消費者保護法','公寓大廈管理條例'],
};
const _EXAM_NAMES = {bookkeeper:'記帳士',landadmin:'地政士',realestate:'不動產經紀人'};
let _allLoadedPrLaws = [];

function _filterLawsForExam(laws, key) {
  const set = _EXAM_LAWS[key] ? new Set(_EXAM_LAWS[key]) : null;
  return set ? laws.filter(l => set.has(l.name)) : laws;
}

function _repopulatePrSel(laws) {
  const sel = document.getElementById('lawSelect');
  // Remove existing law options (keep __ special ones)
  Array.from(sel.options).forEach(o => { if(!o.value.startsWith('__')&&!o.disabled)sel.removeChild(o); });
  laws.forEach(l => { const o=document.createElement('option');o.value=l.name;o.textContent=l.name;sel.appendChild(o); });
}

function _saveAndApplyPrExam(key) {
  localStorage.setItem('sofa_exam_key', key);
  if(uid && key!=='all') fetch(`${API}/api/me/profile`,{method:'PATCH',headers:_authH({'Content-Type':'application/json'}),body:JSON.stringify({exam_key:key})}).catch(()=>{});
  const bar=document.getElementById('_exam-picker-pr');
  if(bar) bar.remove();
  const filtered = _filterLawsForExam(_allLoadedPrLaws, key);
  _repopulatePrSel(filtered);
  const sel = document.getElementById('lawSelect');
  const firstLaw = filtered[0];
  if(firstLaw&&sel){ sel.value=firstLaw.name; sel.dispatchEvent(new Event('change')); }
  _updatePracticeStatusBar(sel&&sel.value||'');
}

(async()=>{
  const sel = document.getElementById('lawSelect');

    [['__starred__','★ 重點法條'],['__bookmarks__','♥ 我的收藏'],['__mastered__','✓ 已熟記'],['__review__','⏰ 待複習']].forEach(([v,t])=>{

var _PR_PENALTY_OPTS=[{l:'全部',v:''},{l:'3千元',v:'三千元'},{l:'5千元',v:'五千元'},{l:'1萬元',v:'一萬元'},{l:'3萬元',v:'三萬元'},{l:'5萬元',v:'五萬元'},{l:'10萬元',v:'十萬元'},{l:'15萬元',v:'十五萬元'},{l:'30萬元',v:'三十萬元'},{l:'50萬元',v:'五十萬元'},{l:'100萬元',v:'一百萬元'},{l:'200萬元',v:'二百萬元'},{l:'300萬元',v:'三百萬元'},{l:'500萬元',v:'五百萬元'}];
var _curPrChip='all';
function _prPopulateSub(opts){var sel=document.getElementById('prSubSel');if(sel)sel.innerHTML=opts.map(function(o){return '<option value="'+esc(o.v)+'">'+esc(o.l)+'</option>';}).join('');}
function _prFilterByChip(arts){
  if(_curPrChip==='all')return arts;
  var sub=(document.getElementById('prSubSel')||{}).value||'';
  return arts.filter(function(a){
    var t=a.title||'',tl=a.time_limit||'',tags=a.tags||[];
    var base=false;
    if(_curPrChip==='deadline'){
      base=(tl&&tl!=='無')||tags.some(function(x){return x.indexOf('期間')!==-1||x.indexOf('時限')!==-1;})||t.indexOf('期間')!==-1||t.indexOf('時限')!==-1;
    }else if(_curPrChip==='penalty'){
      base=tags.some(function(x){return x.indexOf('罰')!==-1;})||t.indexOf('罰')!==-1;
    }
    if(!base)return false;
    if(!sub)return true;
    return t.indexOf(sub)!==-1||tl.indexOf(sub)!==-1||tags.some(function(x){return x.indexOf(sub)!==-1;});
  });
}
function _updateChipLock(){

const _FREE_SECS=[
  '章節標題與戰略權重','規範意旨與條文解析','執業要點與考情提示','核心摘要與記憶策略',

  {name:'修法與聯覺備註',  label:'修法與聯覺備註'},
  {name:'相關法規及注意事項',label:'相關法規及注意事項'}
];
function formatSection(text){
  if(!text) return '';
  var lines=String(text).replace(/\r\n?/g,'\n').split('\n'),out='';
  lines.forEach(function(raw){
    if(!raw||!raw.trim())return;
    var lead=(raw.match(/^[ \t　]*/)||[''])[0],body=raw.slice(lead.length),isSub=false;
    var bm=body.match(/^([•◦‣·▪])\s*/);
    if(bm){isSub=(bm[1]==='◦');body=body.slice(bm[0].length);}
    else if(lead.length>=2||/　/.test(lead)){isSub=true;}
    body=body.trim();if(!body)return;
    var esc=body.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    esc=esc.replace(/^([^：:]{1,14}[：:])/,'<b>$1</b>');
    out+='<p class="'+(isSub?'sec-i':'sec-h')+'">'+esc+'</p>';
  });
  return out;
}
function buildSections(sections,isPaid,wrapEl,beforeEl){
  wrapEl.querySelectorAll('.sec-block,.sec-lock').forEach(e=>e.remove());
  _FREE_SECS.forEach(name=>{
    if(!sections[name])return;
    const d=document.createElement('div');d.className='sec-block';
    const lb=document.createElement('div');lb.className='sec-label';lb.textContent=name;
    const tx=document.createElement('div');tx.className='sec-text';tx.innerHTML=formatSection(sections[name]);
    d.append(lb,tx);
    if(beforeEl)wrapEl.insertBefore(d,beforeEl);else wrapEl.appendChild(d);
  });
  if(!isPaid){
    _LOCKED_SECS.forEach(({name,label})=>{
      const lk=document.createElement('div');lk.className='sec-lock';
      const preview=sections[name]||'';
      lk.innerHTML='<div class="sec-label">'+label+'</div>'
        +'<div class="sec-lock-preview">'+(preview?formatSection(preview):'')+'</div>'
        +'<div class="sec-lock-cta">🔒 升級解鎖完整內容 <a href="pricing.html">查看方案 →</a></div>';
      if(beforeEl)wrapEl.insertBefore(lk,beforeEl);else wrapEl.appendChild(lk);
    });
  }
}

function render(){
  if(!typeText)return;
  // 以 \n 分段渲染
  const lines=typeText.split('\n');
  let html='', globalI=0;
  lines.forEach((line,li)=>{
    let lh='';
    for(let i=0;i<line.length;i++,globalI++){
      const ch=esc(line[i]);
      if(globalI<typeInput.length){
        lh+=typeInput[globalI]===line[i]?`<span class="ok">${ch}</span>`:`<span class="err" title="您輸入：${esc(typeInput[globalI]||'?')}">${ch}</span>`;
      } else if(globalI===typeInput.length){
        lh+=`<span class="cur">${ch}</span>`;
      } else { lh+=`<span>${ch}</span>`; }
    }
    html+=`<p>${lh}</p>`;
    if(li<lines.length-1) globalI++; // skip the \n itself
  });
  ghost.innerHTML=html;
  const cor=[...typeInput].filter((c,i)=>c===typeText[i]).length;
  const err=typeInput.length-cor;
  const acc=typeInput.length?Math.round(cor/typeInput.length*100):null;

  document.getElementById('stat-acc').textContent=acc!==null?acc+'%':'—';

let _sessionStart=null, _sessionIv=null;
// Wave 56 — article counters
let _articlesAttempted=0, _articlesCompleted=0;
let _autoSummaryShown=false;

function _fmtSessionTime(ms){
  const s=Math.floor(ms/1000), m=Math.floor(s/60), h=Math.floor(m/60);
  if(h>0) return h+':'+String(m%60).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  return String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
}

function showSessionSummary(){
  const elapsed=Date.now()-(_sessionStart||Date.now());
  document.getElementById('ss-time').textContent=_fmtSessionTime(elapsed);
  document.getElementById('ss-complete').textContent=_articlesCompleted;
  document.getElementById('ss-attempt').textContent=_articlesAttempted;
  document.getElementById('session-summary').classList.add('show');
}

function ensureSessionTimer(){
  if(_sessionIv) return;
  if(!_sessionStart) _sessionStart=Date.now();
  _sessionIv=setInterval(()=>{
    const elapsed=Date.now()-_sessionStart;
    const s=Math.floor(elapsed/1000);
    const sm=Math.floor(s/60), ss=s%60;
    document.getElementById('sessionInfo').textContent=
      'SESSION · '+String(sm).padStart(2,'0')+':'+(ss<10?'0':'')+ss;
    // update corner chip
    const chip=document.getElementById('session-timer');
    if(chip) chip.textContent='⏱ '+_fmtSessionTime(elapsed);
    // auto-show summary at 15 min (once)
    if(!_autoSummaryShown && elapsed>=15*60*1000){
      _autoSummaryShown=true;
      showSessionSummary();
    }
  },1000);
}
function startTimer(){
  startTime=Date.now();
  ensureSessionTimer();
  timerIv=setInterval(()=>{
    const sec=Math.floor((Date.now()-startTime)/1000);
    document.getElementById('time').textContent=String(Math.floor(sec/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0');
    if(typeInput.length>0&&sec>0){
      const w=Math.round(typeInput.length/sec*60/2);
      document.getElementById('wpm').textContent=w;
      document.getElementById('stat-wpm').textContent=w;
    }
  },1000);
}
function stopTimer(){ if(timerIv){clearInterval(timerIv);timerIv=null;} }

// Wave 45 — done banner helper (shown after any mode completes)
function showDoneBanner(cor, total, mode){
  // remove any previous banner
  const old=document.getElementById('prDoneBanner');
  if(old)old.remove();
  let msg='';
  if(mode==='m1'){
    // cor = accuracy %
    const star=cor===100?'★':cor>=90?'◆':'◇';
    msg=`${star} 正確率 ${cor}%　按 ⌘K 換一條`;
  } else if(mode==='m2'){
    // cor = correct sentences, total = total sentences
    const pct=total?Math.round(cor/total*100):0;
    const star=pct===100?'★':pct>=80?'◆':'◇';
    msg=`${star} ${cor}/${total} 句正確（${pct}%）　按 ⌘K 換一條`;
  } else {
    // m3
    const pct=total?Math.round(cor/total*100):0;
    const star=pct===100?'★':pct>=80?'◆':'◇';
    msg=`${star} ${cor}/${total} 關鍵字正確（${pct}%）　按 ⌘K 換一條`;
  }
  const banner=document.createElement('div');
  banner.id='prDoneBanner';
  banner.className='pr-done-banner';
  banner.innerHTML=`<span class="icon">✓</span><span>${msg}</span>`;
  // insert after type-card
  const card=document.querySelector('.type-card');
  if(card&&card.parentNode) card.parentNode.insertBefore(banner,card.nextSibling);
}

let currentMode=1;
// Mode 02 state
let sentences=[], sentIdx=0, sentDone=[];
// Mode 03 state
let m3Blanks=[], m3Checked=false;

function switchMode(newMode){
  currentMode=newMode;
  document.querySelectorAll('.mode').forEach((b,i)=>b.classList.toggle('on',i===newMode-1));
  if(!typeText) return;
  stopTimer(); startTime=null; typeInput=''; ti.value='';

  else if(newMode===3){ if(typeInputRow)typeInputRow.style.display='none'; ghost.style.display='none'; document.getElementById('m3area').style.display='block'; initMode3(); }
}

function initMode2(){
  // Split by sentence-ending punctuation, keep delimiter
  sentences = typeText.split(/(?<=[。；：])/).filter(s=>s.trim());
  if(!sentences.length){ sentences=[typeText]; }
  sentIdx=0; sentDone=sentences.map(()=>null);
  typeInput=''; ti.value=''; ti.placeholder='輸入當前句子，按 ↵ 確認…';
  renderMode2();
}

function renderMode2(){
  if(!sentences.length) return;
  const cur=sentences[sentIdx]||'';
  let html='';
  sentences.forEach((s,si)=>{
    if(si<sentIdx){
      // completed
      const ok = sentDone[si];
      const cls = ok ? 'ok' : 'err';
      html+=`<p>${[...s].map(c=>`<span class="${cls}">${esc(c)}</span>`).join('')}</p>`;
    } else if(si===sentIdx){
      // current sentence — char-by-char like mode 01
      let sh='';
      for(let i=0;i<s.length;i++){
        const ch=esc(s[i]);
        if(i<typeInput.length){ sh+=typeInput[i]===s[i]?`<span class="ok">${ch}</span>`:`<span class="err">${ch}</span>`; }
        else if(i===typeInput.length){ sh+=`<span class="cur">${ch}</span>`; }
        else{ sh+=`<span>${ch}</span>`; }
      }
      html+=`<p>${sh}</p>`;
    } else {
      // future — dimmed
      html+=`<p style="opacity:.25">${esc(s)}</p>`;
    }
  });
  ghost.innerHTML=html;
  const done=sentDone.filter(x=>x!==null).length;
  const prog=Math.round(done/sentences.length*100);
  document.getElementById('stat-prog').textContent=prog+'%';
  document.getElementById('prog').style.width=prog+'%';
  const cor=[...typeInput].filter((c,i)=>c===(sentences[sentIdx]||'')[i]).length;
  const acc=typeInput.length?Math.round(cor/typeInput.length*100):null;
  document.getElementById('stat-acc').textContent=acc!==null?acc+'%':'—';
  document.getElementById('stat-err').textContent=typeInput.length-cor;
}

function advanceSentence(){
  const cur=sentences[sentIdx]||'';
  const cor=[...typeInput].filter((c,i)=>c===cur[i]).length;
  sentDone[sentIdx]=(typeInput.trim()===cur.trim()||cor/cur.length>=0.9);
  sentIdx++;
  typeInput=''; ti.value='';
  if(sentIdx>=sentences.length){
    stopTimer();
    const totalCor=sentDone.filter(Boolean).length;
    ghost.innerHTML+=`<div style="margin-top:16px;font-family:var(--mono);font-size:13px;color:var(--good);letter-spacing:.1em">✓ 完成 · ${totalCor}/${sentences.length} 句正確</div>`;
    // celebrate card + banner
    const card=document.querySelector('.type-card');
    if(card){ card.classList.add('celebrate'); card.addEventListener('animationend',()=>card.classList.remove('celebrate'),{once:true}); }
    showDoneBanner(totalCor,sentences.length,'m2');
    _articlesCompleted++;  // Wave 56
    _recordPracticeStat(document.getElementById('artMeta').textContent||document.getElementById('lawSelect').value, typeText.length);  // Wave 103
    // 顯示條文解析 sections
    const sp=document.getElementById('sectionsBox');
    sp.innerHTML='<div class="sec-hd">條文解析</div>';
    sp.style.display='block';
    buildSections(articleSections,articlePlan!=='free',sp);
    showFullArticleBtn();
  } else { renderMode2(); ti.focus(); }
}

function initMode3(){
  m3Checked=false;
  // Extract blanks using same patterns as fill API
  const patterns=[
    /\d+(?:,\d+)*(?:\.\d+)?(?:元|萬元|億元)/g,
    /\d+(?:日|天|月|年)/g,
    /百分之\d+(?:\.\d+)?/g,
    /\d+(?:人|份|次|條)/g,
  ];
  const found=[];
  const used=new Set();
  patterns.forEach(re=>{
    let m;re.lastIndex=0;
    while((m=re.exec(typeText))!==null){
      const key=m.index+'_'+m[0].length;
      if(!used.has(key)){used.add(key);found.push({start:m.index,end:m.index+m[0].length,ans:m[0]});}
    }
  });
  if(!found.length){
    // 後備：優先挑句末（標點前）的名詞，比隨機更自然
    const rePunct=/[一-鿿]{2,4}(?=[，。；：、])/g;
    const reAny=/[一-鿿]{2,4}/g;
    let m, picks=[];
    while((m=rePunct.exec(typeText))!==null) picks.push({start:m.index,end:m.index+m[0].length,ans:m[0]});
    if(!picks.length){ while((m=reAny.exec(typeText))!==null) picks.push({start:m.index,end:m.index+m[0].length,ans:m[0]}); }
    // 隨機挑最多 3 個，並確保不重疊
    picks=picks.sort(()=>Math.random()-.5);
    const chosen=[]; const usedSet=new Set();
    for(const p of picks){
      if(chosen.length>=3)break;
      const key=p.start+'_'+p.end;
      if(!usedSet.has(key)&&!chosen.some(c=>c.start<p.end&&c.end>p.start)){usedSet.add(key);chosen.push(p);}
    }
    found.push(...chosen);
  }
  found.sort((a,b)=>a.start-b.start);
  m3Blanks=found;

  // Render text with inline inputs, split by \n for proper paragraphs
  const box=document.getElementById('m3area');
  // Build segment list: [{type:'text',val} | {type:'blank',idx,ans}]
  const segs=[];
  let prev=0;
  found.sort((a,b)=>a.start-b.start).forEach((b,i)=>{
    if(b.start>prev) segs.push({type:'text',val:typeText.slice(prev,b.start)});
    segs.push({type:'blank',idx:i,ans:b.ans});
    prev=b.end;
  });
  if(prev<typeText.length) segs.push({type:'text',val:typeText.slice(prev)});
  // Flatten to per-line structure
  let lineHtmlArr=[''];
  segs.forEach(seg=>{
    if(seg.type==='blank'){
      const w=Math.max(seg.ans.length*22+16,60);
      lineHtmlArr[lineHtmlArr.length-1]+=`<input class="blank" id="m3b_${seg.idx}" data-ans="${esc(seg.ans)}" style="width:${w}px" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="　"/>`;
    } else {
      const parts=seg.val.split('\n');
      parts.forEach((part,pi)=>{
        if(pi>0) lineHtmlArr.push('');
        lineHtmlArr[lineHtmlArr.length-1]+=esc(part);
      });
    }
  });
  let html=`<div style="font-family:var(--serif);font-size:20px;line-height:2.15;color:var(--cream);letter-spacing:.02em;word-break:keep-all;overflow-wrap:break-word">`;
  html+=lineHtmlArr.filter(l=>l.trim()||l.includes('input')).map(l=>`<p>${l}</p>`).join('');
  html+='</div>';
  html+=`<div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn btn-pri" id="m3check">提交 ↵</button>
    <button class="btn btn-sec" id="m3reset">重來</button>
    <button class="btn btn-ghost" id="m3reveal">看答案</button>
  </div>`;
  box.innerHTML=html;

  box.querySelectorAll('.blank').forEach((inp,i,all)=>{
    inp.addEventListener('input',()=>{
      inp.classList.remove('ok','bad');
      const v=inp.value.trim();
      if(v===inp.dataset.ans) inp.classList.add('ok');
      else if(v.length>=inp.dataset.ans.length) inp.classList.add('bad');
      updateM3Stats();
    });
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'||e.key==='Tab'){
        e.preventDefault();
        if(all[i+1]) all[i+1].focus(); else checkMode3();
      }
    });
  });
  document.getElementById('m3check').addEventListener('click',checkMode3);
  document.getElementById('m3reset').addEventListener('click',()=>{
    box.querySelectorAll('.blank').forEach(inp=>{inp.disabled=false;inp.value='';inp.classList.remove('ok','bad');});
    m3Checked=false; updateM3Stats();
    const first=box.querySelector('.blank'); if(first)first.focus();
  });
  document.getElementById('m3reveal').addEventListener('click',()=>{
    box.querySelectorAll('.blank').forEach(inp=>{inp.value=inp.dataset.ans;inp.classList.remove('bad');inp.classList.add('ok');});
    updateM3Stats();
  });
  updateM3Stats();
  const first=box.querySelector('.blank'); if(first)first.focus();
}

function checkMode3(){
  if(m3Checked)return; m3Checked=true;
  const box=document.getElementById('m3area');
  let cor=0;
  box.querySelectorAll('.blank').forEach((inp,i)=>{
    inp.disabled=true;
    if(inp.value.trim()===inp.dataset.ans){
      // stagger each correct blank by 60ms for cascade effect
      setTimeout(()=>{
        inp.classList.remove('ok','bad');
        inp.classList.add('reveal-ok');
        inp.addEventListener('animationend',()=>{ inp.classList.remove('reveal-ok'); inp.classList.add('ok'); },{once:true});
      }, i*60);
      cor++;
    } else {
      setTimeout(()=>{
        inp.classList.remove('ok','bad');
        inp.classList.add('reveal-bad');
        inp.addEventListener('animationend',()=>{ inp.classList.remove('reveal-bad'); inp.classList.add('bad'); },{once:true});
        const sp=document.createElement('span');
        sp.textContent=`（${inp.dataset.ans}）`;
        sp.style.cssText='color:var(--good);font-size:.75rem;font-family:var(--mono);margin-left:.25rem;opacity:0;transition:opacity .3s ease;';
        inp.after(sp);
        setTimeout(()=>{ sp.style.opacity='1'; }, 80);
      }, i*60);
    }
  });
  const total=m3Blanks.length;
  document.getElementById('stat-acc').textContent=total?Math.round(cor/total*100)+'%':'—';
  document.getElementById('stat-prog').textContent='✓';
  // celebrate card border flash
  const card=document.querySelector('.type-card');
  if(card){ card.classList.add('celebrate'); card.addEventListener('animationend',()=>card.classList.remove('celebrate'),{once:true}); }
  // show done banner
  showDoneBanner(cor,total,'m3');
  _articlesCompleted++;  // Wave 56
  _recordPracticeStat(document.getElementById('artMeta').textContent||document.getElementById('lawSelect').value, typeText.length);  // Wave 103
  const sp=document.getElementById('sectionsBox');
  if(sp.style.display==='none'){
    sp.innerHTML='<div class="sec-hd">條文解析</div>';
    sp.style.display='block';
    buildSections(articleSections,articlePlan!=='free',sp);
  }
  showFullArticleBtn();
}

function updateM3Stats(){
  const box=document.getElementById('m3area');
  const inputs=[...box.querySelectorAll('.blank')];
  const filled=inputs.filter(i=>i.value.trim()).length;
  document.getElementById('stat-prog').textContent=`${filled}/${inputs.length}`;
}

document.querySelectorAll('.mode').forEach((btn,idx)=>{
  btn.addEventListener('click',()=>switchMode(idx+1));
});

// ── Keyboard shortcuts ──────────────────────────────────
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){
    e.preventDefault(); loadNew(); return;
  }
  // Mode 02: Enter → confirm sentence and advance
  if(e.key==='Enter'&&document.activeElement===ti&&currentMode===2){
    e.preventDefault();
    if(sentIdx<sentences.length) advanceSentence();
    return;
  }
  // TAB → hint (mode 01 only)
  if(e.key==='Tab'&&document.activeElement===ti&&currentMode===1){
    e.preventDefault();
    const cur=document.querySelector('.ghost .cur');
    if(cur){
      cur.style.background='rgba(231,187,167,.5)';
      cur.style.color='var(--cream)';
      setTimeout(()=>{ cur.style.background=''; cur.style.color=''; },800);
    }
    return;
  }
  if(e.key==='Escape'){ ti.blur(); }
});

// Wave 56 — start session timer immediately on page load
ensureSessionTimer();
loadNew();

// === Wave 89: TTS (朗讀法條) ===
let _practiceTtsUtterance = null;

function _practiceTTS() {
  const btn = document.getElementById('practice-tts-btn');
  if (!btn) return;

  if (speechSynthesis.speaking) {
    speechSynthesis.cancel();
    btn.textContent = '🔊'; btn.classList.remove('speaking');
    return;
  }

  if (!('speechSynthesis' in window)) {
    alert('⚠ 瀏覽器不支援朗讀'); return;
  }

  const text = typeText || '';
  if (!text.trim()) return;

  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'zh-TW'; utt.rate = 0.95;
  const voices = speechSynthesis.getVoices();
  const twVoice = voices.find(v => v.lang === 'zh-TW') || voices.find(v => v.lang.startsWith('zh'));
  if (twVoice) utt.voice = twVoice;

  utt.onend = utt.onerror = () => {
    btn.textContent = '🔊'; btn.classList.remove('speaking');
  };

  _practiceTtsUtterance = utt;
  btn.textContent = '⏹'; btn.classList.add('speaking');
  speechSynthesis.speak(utt);
}

// === Wave 103: Practice Statistics Panel ===
const PRACTICE_STATS_KEY = 'sofa_practice_stats_v1';

function _recordPracticeStat(lawName, charCount) {
  const s = JSON.parse(localStorage.getItem(PRACTICE_STATS_KEY) || '{"total":0,"chars":0,"byLaw":{}}');
  s.total = (s.total || 0) + 1;
  s.chars = (s.chars || 0) + (charCount || 0);
  if (lawName) {
    if (!s.byLaw) s.byLaw = {};
    if (!s.byLaw[lawName]) s.byLaw[lawName] = { total: 0, chars: 0 };
    s.byLaw[lawName].total++;
    s.byLaw[lawName].chars = (s.byLaw[lawName].chars || 0) + (charCount || 0);
  }
  localStorage.setItem(PRACTICE_STATS_KEY, JSON.stringify(s));
  _updatePracticeStatusBar((document.getElementById('lawSelect') || {}).value || '');
  _updatePracticeStreak(); _renderPracticeStreak();
  // Wave 139: show share button after first article completion
  const shareBtn = document.getElementById('practice-share-btn');
  if (shareBtn && s.total > 0) shareBtn.style.display = 'inline-block';
}

// === Wave 126: Daily practice streak ===
function _getPracticeToday() {
  return new Date().toLocaleDateString('zh-TW', {
    timeZone: 'Asia/Taipei',
    year: 'numeric', month: '2-digit', day: '2-digit'
  }).replace(/\//g, '-');
}

function _getPracticeYesterday() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return d.toLocaleDateString('zh-TW', {
    timeZone: 'Asia/Taipei',
    year: 'numeric', month: '2-digit', day: '2-digit'
  }).replace(/\//g, '-');
}

function _updatePracticeStreak() {
  const STREAK_KEY = 'sofa_practice_streak';
  const today = _getPracticeToday();
  const s = JSON.parse(localStorage.getItem(STREAK_KEY) || '{"count":0,"lastDate":""}');
  if (s.lastDate === today) return s.count;
  const yStr = _getPracticeYesterday();
  if (s.lastDate === yStr) { s.count += 1; }
  else if (!s.lastDate) { s.count = 1; }
  else { s.count = 1; }
  s.lastDate = today;
  localStorage.setItem(STREAK_KEY, JSON.stringify(s));
  return s.count;
}

function _getPracticeStreakCount() {
  const s = JSON.parse(localStorage.getItem('sofa_practice_streak') || '{"count":0,"lastDate":""}');
  if (!s.lastDate || s.lastDate < _getPracticeYesterday()) return 0;
  return s.count;
}

function _renderPracticeStreak() {
  const el = document.getElementById('practice-streak');
  if (!el) return;
  const count = _getPracticeStreakCount();
  if (count >= 2) {
    el.style.display = 'inline-block';
    el.textContent = `🔥 ${count}日連刷`;
  } else {
    el.style.display = 'none';
  }
}

// === Wave 120: Law proficiency status bar ===
function _updatePracticeStatusBar(lawName) {
  const bar = document.getElementById('practice-status-bar');
  if (!bar) return;

  if (!lawName || lawName.startsWith('__')) {
    bar.style.display = 'none';
    return;
  }

  const s = JSON.parse(localStorage.getItem('sofa_practice_stats_v1') || '{}');
  const d = (s.byLaw || {})[lawName];

  if (!d || d.total === 0) {
    bar.style.display = 'block';
    bar.innerHTML = '<span style="color:#667">尚未練習此法規</span>';
    return;
  }

  const count = d.total;
  const kchars = Math.round((d.chars || 0) / 100) / 10; // in k
  const color = count >= 20 ? '#4d4' : count >= 8 ? '#fa4' : '#7ab8f5';
  const label = count >= 20 ? '熟練' : count >= 8 ? '練習中' : '起步中';
  const barPct = Math.min(100, Math.round(count / 25 * 100)); // 25 articles = full bar

  bar.style.display = 'block';
  bar.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <span>已練 <b style="color:#ddd">${count}</b> 條 &nbsp;•&nbsp; ${kchars}k 字</span>
      <span style="color:${color};font-weight:600">${label}</span>
    </div>
    <div style="background:rgba(255,255,255,0.1);border-radius:3px;height:4px">
      <div style="background:${color};border-radius:3px;height:4px;width:${barPct}%;transition:width 0.4s"></div>
    </div>
  `;
}

function openPracticeStats() {
  _switchPracticeStatsTab('stats'); // Wave 149: always reset to stats tab on open
  const s = JSON.parse(localStorage.getItem(PRACTICE_STATS_KEY) || '{"total":0,"chars":0,"byLaw":{}}');
  const body = document.getElementById('practice-stats-body');

  let html = `
    <div style="display:flex;gap:12px;margin-bottom:12px">
      <div style="flex:1;background:rgba(255,255,255,0.06);border-radius:8px;padding:8px;text-align:center">
        <div style="font-size:20px;font-weight:700;color:#7ab8f5">${s.total||0}</div>
        <div style="font-size:10px;color:#aaa;margin-top:2px">已練條數</div>
      </div>
      <div style="flex:1;background:rgba(255,255,255,0.06);border-radius:8px;padding:8px;text-align:center">
        <div style="font-size:20px;font-weight:700;color:#7ab8f5">${Math.round((s.chars||0)/100)/10}k</div>
        <div style="font-size:10px;color:#aaa;margin-top:2px">練習字數</div>
      </div>
    </div>`;

  if (s.byLaw && Object.keys(s.byLaw).length > 0) {
    const maxTotal = Math.max(...Object.values(s.byLaw).map(d => d.total));
    html += `<div style="font-size:11px;color:#aaa;margin-bottom:6px">各法規練習條數</div>`;
    for (const [law, d] of Object.entries(s.byLaw).sort((a,b) => b[1].total - a[1].total)) {
      const pct = maxTotal > 0 ? Math.round(d.total / maxTotal * 100) : 0;
      html += `
        <div style="margin-bottom:6px">
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px">
            <span style="color:#ccc;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${law}</span>
            <span style="color:#7ab8f5">${d.total}條</span>
          </div>
          <div style="background:rgba(255,255,255,0.1);border-radius:3px;height:4px">
            <div style="background:#4a90d9;border-radius:3px;height:4px;width:${pct}%"></div>
          </div>
        </div>`;
    }
  }

  // Wave 108: least-practiced law hint
  const leastLaw = _getLeastPracticedLaw(s);
  if (leastLaw) {
    html += `
      <div style="margin-top:12px;border-top:1px solid rgba(255,255,255,0.12);padding-top:10px">
        <div style="font-size:11px;color:#aaa;margin-bottom:6px">📖 練習較少法規</div>
        <div style="font-size:13px;color:#ffd700;margin-bottom:8px">📋 ${leastLaw}</div>
        <button onclick="_drillLeastPracticedLaw('${leastLaw.replace(/'/g, "\\'")}')"
          style="background:#2a4a7f;color:#fff;border:none;border-radius:6px;padding:6px 12px;
                 font-size:12px;cursor:pointer">
          🎯 練習此法規
        </button>
      </div>`;
  }

  body.innerHTML = html;
  document.getElementById('practice-stats-panel').style.display = 'block';
}

function closePracticeStats() {
  document.getElementById('practice-stats-panel').style.display = 'none';
}

// === Wave 108: Least-practiced law helper ===
function _getLeastPracticedLaw(stats) {
  if (!stats.byLaw) return null;
  let least = null, leastCount = Infinity;
  for (const [name, d] of Object.entries(stats.byLaw)) {
    if (d.total < 1) continue;
    if (d.total < leastCount) { leastCount = d.total; least = name; }
  }
  // Only surface it if there are multiple laws (otherwise it's not a useful hint)
  const lawCount = Object.keys(stats.byLaw).length;
  return lawCount >= 2 ? least : null;
}

function _drillLeastPracticedLaw(lawName) {
  const sel = document.getElementById('lawSelect');
  if (sel) {
    sel.value = lawName;
    sel.dispatchEvent(new Event('change'));
    localStorage.setItem('sofa_practice_law', lawName);
  }
  closePracticeStats();
  // Trigger load of next article for the selected law
  typeof loadNew === 'function' && loadNew();
}

// === Wave 149: 少練清單 tab ===
function _switchPracticeStatsTab(tab) {
  const statsTab = document.getElementById('practice-stats-tab-stats');
  const drillTab = document.getElementById('practice-stats-tab-drill');
  const statsBtn = document.getElementById('practice-tab-btn-stats');
  const drillBtn = document.getElementById('practice-tab-btn-drill');
  if (!statsTab || !drillTab) return;
  if (tab === 'drill') {
    statsTab.style.display = 'none';
    drillTab.style.display = 'block';
    if (statsBtn) { statsBtn.style.background = 'transparent'; statsBtn.style.color = '#888'; }
    if (drillBtn) { drillBtn.style.background = '#1A2E3D'; drillBtn.style.color = '#fff'; }
    _renderPracticeDrillList();
  } else {
    statsTab.style.display = 'block';
    drillTab.style.display = 'none';
    if (statsBtn) { statsBtn.style.background = '#1A2E3D'; statsBtn.style.color = '#fff'; }
    if (drillBtn) { drillBtn.style.background = 'transparent'; drillBtn.style.color = '#888'; }
  }
}

function _renderPracticeDrillList() {
  const body = document.getElementById('practice-drill-body');
  if (!body) return;
  const s = JSON.parse(localStorage.getItem(PRACTICE_STATS_KEY) || '{}');
  const byLaw = s.byLaw || {};
  // Filter laws with at least 1 article practiced
  const entries = Object.entries(byLaw).filter(([, d]) => d.total >= 1);
  if (entries.length < 2) {
    body.innerHTML = '<div style="color:#888;font-size:12px;text-align:center;padding:16px 0">📊 練習多幾部法規後再來看</div>';
    return;
  }
  // Sort ascending by total (least practiced first)
  entries.sort((a, b) => a[1].total - b[1].total);
  let html = '<div style="font-size:11px;color:#aaa;margin-bottom:8px">由少到多排列，點加練切換法規</div>';
  for (const [law, d] of entries) {
    const escaped = law.replace(/'/g, "\\'");
    html += `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;gap:6px">
        <span style="font-size:11px;color:#ccc;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
              title="${law}">${law} ━━ <span style="color:#7ab8f5">${d.total}篇練過</span></span>
        <button onclick="_drillPracticeLaw('${escaped}')"
          style="background:#2a4a7f;color:#fff;border:none;border-radius:5px;padding:3px 8px;
                 font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0">
          🔁 加練
        </button>
      </div>`;
  }
  body.innerHTML = html;
}

function _drillPracticeLaw(lawName) {
  const sel = document.getElementById('lawSelect');
  if (sel) {
    sel.value = lawName;
    sel.dispatchEvent(new Event('change'));
    localStorage.setItem('sofa_practice_law', lawName);
  }
  closePracticeStats();
  typeof loadNew === 'function' && loadNew();
}

document.addEventListener('click', e => {
  const panel = document.getElementById('practice-stats-panel');
  const btn = document.getElementById('practice-stats-btn');
  if (panel && panel.style.display !== 'none' && !panel.contains(e.target) && e.target !== btn) {
    closePracticeStats();
  }
});

// === Wave 139: Share practice session results ===
async function _sharePracticeSession(triggerEl) {
  const stats = JSON.parse(localStorage.getItem('sofa_practice_stats_v1') || '{}');
  const total = stats.total || 0;
  const kchars = Math.round((stats.chars || 0) / 100) / 10;

  const sel = document.getElementById('lawSelect');
  const lawName = (sel && sel.value && !sel.value.startsWith('__')) ? sel.value : '法條練習';

  const streak = JSON.parse(localStorage.getItem('sofa_practice_streak') || '{"count":0}');

  const lines = [
    '📖 SoFa 法條練習',
    `📚 法規：${lawName}`,
    `✅ 累積：${total}條，${kchars}k字`,
    streak.count >= 2 ? `🔥 連刷：${streak.count}日` : null,
    '━━━━━━━━━━',
    '記帳士備考 | SoFa Engine',
  ].filter(Boolean).join('\n');

  try {
    await navigator.clipboard.writeText(lines);
    // Brief visual feedback on the button
    if (triggerEl) {
      const orig = triggerEl.textContent;
      triggerEl.textContent = '✓ 已複製！';
      triggerEl.style.color = '#2ECC71';
      triggerEl.style.borderColor = '#2ECC71';
      setTimeout(() => {
        triggerEl.textContent = orig;
        triggerEl.style.color = '';
        triggerEl.style.borderColor = '';
      }, 1800);
    }
  } catch(e) {
    prompt('複製以下文字分享成績：', lines);
  }
}
