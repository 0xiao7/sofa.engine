<html lang="zh-TW">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 — SoFa Engine</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231F3848'/%3E%3Crect x='5' y='8' width='22' height='11' rx='3' fill='%23e7bba7'/%3E%3Crect x='4' y='13' width='5' height='10' rx='2.5' fill='%23d4a090'/%3E%3Crect x='23' y='13' width='5' height='10' rx='2.5' fill='%23d4a090'/%3E%3Crect x='9' y='18' width='14' height='5' rx='2' fill='%23c4907a'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:   #1F3848;
  --navy-2: #19303E;
  --navy-3: #142836;
  --navy-4: #0D1C28;
  --peach:  #E7BBA7;
  --peach-2:#F0CDBD;
  --peach-3:#C89580;
  --cream:  #F5F0EA;
  --ink:    #1A2B35;
  --muted:  #7A8892;
  --line-on-navy: rgba(245,240,234,.14);
  --mono: 'JetBrains Mono', ui-monospace, monospace;
  --serif:'Noto Serif TC', serif;
  --sans: 'Noto Sans TC', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:focus-visible { outline: 2px solid var(--peach-3); outline-offset: 3px; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
@keyframes errFade { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration:0.01ms !important; transition-duration:0.01ms !important; } }
body {
  background: var(--navy); color: var(--cream);
  font-family: var(--sans); font-weight: 300;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 10% 0%, rgba(13,28,40,.7) 0%, transparent 60%),
    radial-gradient(ellipse 60% 70% at 85% 95%, rgba(231,187,167,.05) 0%, transparent 55%);
  pointer-events: none; z-index: 0;
}
.wrap {
  position: relative; z-index: 1;
  width: 100%; max-width: 400px;
}
.brand {
  font-family: var(--mono); font-size: .85rem;
  letter-spacing: .18em; color: var(--peach);
  margin-bottom: .5rem;
}
.tagline {
  font-size: .78rem; color: rgba(245,240,234,.45);
  letter-spacing: .04em; margin-bottom: 2.5rem;
}
.card {
  background: var(--navy-2);
  border: 1px solid var(--line-on-navy);
  padding: 2.2rem 2rem;
}
.card-label {
  font-family: var(--mono); font-size: .68rem;
  letter-spacing: .25em; color: rgba(245,240,234,.4);
  text-transform: uppercase; margin-bottom: 1.2rem;
}
h1 {
  font-family: var(--serif); font-size: 1.3rem;
  font-weight: 600; color: var(--cream);
  margin-bottom: .5rem;
}
.sub {
  font-size: .82rem; color: rgba(245,240,234,.5);
  line-height: 1.7; margin-bottom: 1.8rem;
}
label {
  display: block; font-family: var(--mono);
  font-size: .68rem; letter-spacing: .18em;
  color: rgba(245,240,234,.5); text-transform: uppercase;
  margin-bottom: .5rem;
}
.serial-wrap {
  display: flex; align-items: stretch;
  border: 1px solid var(--line-on-navy); transition: border-color .2s;
}
.serial-wrap:focus-within { border-color: rgba(231,187,167,.5); box-shadow: 0 0 0 3px rgba(231,187,167,.08); }
.serial-prefix {
  padding: .7rem .9rem;
  background: rgba(231,187,167,.07);
  color: var(--peach); font-family: var(--mono); font-size: .95rem;
  letter-spacing: .12em; user-select: none;
  border-right: 1px solid var(--line-on-navy);
  display: flex; align-items: center;
}
.serial-wrap input {
  flex: 1; padding: .7rem .9rem;
  background: var(--navy-3); border: none;
  color: var(--cream);
  font-family: var(--mono); font-size: .95rem;
  letter-spacing: .18em; text-transform: uppercase;
  outline: none; width: 0;
}
.serial-wrap input::placeholder { color: rgba(245,240,234,.25); letter-spacing: .1em; font-size: .85rem; }
.btn-primary {
  width: 100%; margin-top: 1.2rem;
  padding: .85rem 1.8rem;
  background: var(--peach); color: var(--navy);
  font-family: var(--sans); font-size: .86rem;
  font-weight: 600; letter-spacing: .06em;
  border: none; cursor: pointer; border-radius: 2px;
  transition: background .2s, transform .18s cubic-bezier(.2,.8,.4,1), box-shadow .2s;
}
.btn-primary:hover:not(:disabled) { background: var(--peach-2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(231,187,167,.2); }
.btn-primary:active:not(:disabled) { transform: scale(.97) translateY(0); box-shadow: none; }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }
.error {
  margin-top: .9rem;
  padding: .7rem 1rem;
  background: rgba(229,100,100,0.08);
  border: 1px solid rgba(229,100,100,0.2);
  color: #e57373; font-size: .8rem;
  display: none;
  animation: errFade .25s ease;
}
.shake { animation: shake .35s ease !important; }
.hint {
  margin-top: 1.6rem;
  padding-top: 1.4rem;
  border-top: 1px solid var(--line-on-navy);
  font-size: .78rem; color: rgba(245,240,234,.4); line-height: 1.8;
}
.hint a { color: var(--peach-3); text-decoration: none; }
.hint a:hover { color: var(--peach); }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><a href="/" style="color:inherit;text-decoration:none">SOFA ENGINE</a></div>
  <div class="tagline">2,138 條法規。坐下來，一條一條來。</div>

  <div class="card">
    <div class="card-label">Member Access</div>
    <h1>輸入序號登入</h1>
    <p class="sub">購買後收到的 8 位序號</p>

    <label for="serial">序號</label>
    <div class="serial-wrap">
      <span class="serial-prefix">SOFA-</span>
      <input id="serial" type="text" placeholder="XXXX-XXXX" maxlength="9" autocomplete="off" autocapitalize="characters" spellcheck="false" inputmode="text">
    </div>
    <button class="btn-primary" id="btn" onclick="doLogin()">進入會員中心</button>
    <div class="error" id="err"></div>

    <div class="hint">
      還沒有序號？先加入 <a href="https://lin.ee/zUeMwo4" target="_blank">LINE 好友</a> 試用<br>
      序號問題請透過 LINE 聯繫客服<br><br>
      <a href="/">← 回主頁</a>
    </div>
  </div>
</div>

<script>
const API = 'https://sofa-engine-api.onrender.com';

document.getElementById('serial').addEventListener('input', function() {
  let raw = this.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase().slice(0, 8);
  if (!raw) { this.value = ''; return; }
  this.value = raw.length > 4 ? raw.slice(0, 4) + '-' + raw.slice(4) : raw;
});

async function doLogin() {
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  const raw = document.getElementById('serial').value.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
  err.style.display = 'none';
  if (raw.length < 8) { showErr('請輸入完整的 8 位序號'); return; }
  const serial = 'SOFA-' + raw.slice(0, 4) + '-' + raw.slice(4, 8);
  btn.disabled = true; btn.textContent = '驗證中…';
  try {
    const res = await fetch(`${API}/api/verify-serial`, {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ serial }),
    });
    const data = await res.json();
    if (!res.ok) { showErr(data.detail || '序號無效，請確認後再試'); return; }
    localStorage.setItem('sofa_uid', data.uid);
    window.location.href = '/dashboard.html';
  } catch { showErr('連線失敗，請稍後再試'); }
  finally { btn.disabled = false; btn.textContent = '進入會員中心'; }
}
function showErr(msg) {
  const e = document.getElementById('err');
  e.textContent = msg; e.style.display = 'block';
  const wrap = document.querySelector('.serial-wrap');
  if(wrap){ wrap.classList.remove('shake'); void wrap.offsetWidth; wrap.classList.add('shake'); setTimeout(()=>wrap.classList.remove('shake'),400); }
}
document.getElementById('serial').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
