<style>
:root {
  --navy:   #1F3848;
  --navy-2: #19303E;
  --navy-3: #142836;
  --navy-4: #0D1C28;
  --peach:  #E7BBA7;
  --peach-2:#F0CDBD;
  --peach-3:#C89580;
  --cream:  #F5F0EA;
  --ink-2:  #3A4A55;
  --muted:  #7A8892;
  --green:  #7ecf7e;
  --warn:   #f5a623;
  --danger: #e06060;
  --line-on-navy: rgba(245,240,234,.14);
  --mono: 'JetBrains Mono', ui-monospace, monospace;
  --serif:'Noto Serif TC', serif;
  --sans: 'Noto Sans TC', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
:focus-visible { outline: 2px solid var(--peach-3); outline-offset: 3px; }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration:.01ms !important; transition-duration:.01ms !important; } }
body {
  background: var(--navy); color: var(--cream);
  font-family: var(--sans); font-weight: 300;
  min-height: 100vh; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 10% 0%, rgba(13,28,40,.7) 0%, transparent 60%),
    radial-gradient(ellipse 60% 70% at 85% 95%, rgba(231,187,167,.05) 0%, transparent 55%);
  pointer-events: none; z-index: 0;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 1.1rem 2.5rem;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(13,28,40,0.96); backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--line-on-navy);
}
.nav-brand { font-family: var(--mono); font-size: .9rem; letter-spacing: .14em; color: var(--peach); text-decoration: none; }
.nav-right  { display: flex; align-items: center; gap: 1.8rem; }
.nav-user   { font-family: var(--mono); font-size: .72rem; letter-spacing: .1em; color: rgba(245,240,234,.4); }
.nav-logout {
  font-family: var(--mono); font-size: .72rem; letter-spacing: .12em;
  color: rgba(245,240,234,.4); background: none; border: 1px solid var(--line-on-navy);
  padding: .3rem .9rem; cursor: pointer; transition: color .2s, border-color .2s, transform .15s;
}
.nav-logout:hover { color: var(--cream); border-color: rgba(231,187,167,.3); transform: translateY(-1px); }
.nav-logout:active { transform: scale(.97); }

/* ── LAYOUT ── */
.container { max-width: 860px; margin: 0 auto; padding: 0 2rem; position: relative; z-index: 1; }
main { padding-top: 6rem; padding-bottom: 5rem; }
.section { margin-bottom: 2rem; }
.section-label {
  font-family: var(--mono); font-size: .68rem;
  letter-spacing: .25em; color: rgba(245,240,234,.35);
  text-transform: uppercase; margin-bottom: 1rem;
}
.card { background: var(--navy-2); border: 1px solid var(--line-on-navy); padding: 2rem; }

/* ── MEMBER CARD ── */
.member-card {
  background: linear-gradient(135deg, rgba(25,48,62,.95) 0%, rgba(13,28,40,.98) 100%);
  border: 1px solid rgba(231,187,167,0.2);
  padding: 1.8rem 2rem;
  position: relative; overflow: hidden;
}
.member-card::after {
  content: 'S';
  position: absolute; right: -.4rem; top: 50%;
  transform: translateY(-50%);
  font-family: var(--mono); font-size: 11rem; font-weight: 700;
  color: rgba(231,187,167,0.04); pointer-events: none; line-height: 1;
}
.mc-top { display: flex; align-items: center; gap: .9rem; margin-bottom: 1.1rem; }
.mc-plan-badge {
  font-family: var(--mono); font-size: .62rem; letter-spacing: .15em;
  background: rgba(231,187,167,0.1); color: var(--peach);
  padding: .22rem .75rem; border: 1px solid rgba(231,187,167,0.2);
}
.mc-status {
  font-family: var(--mono); font-size: .6rem; letter-spacing: .15em; color: var(--green);
}
.mc-serial {
  font-family: var(--mono); font-size: .9rem; color: var(--cream);
  letter-spacing: .1em; margin-bottom: 1.5rem; opacity: .7;
}
.mc-bottom { display: flex; gap: 2.8rem; flex-wrap: wrap; }
.mc-col-label {
  font-family: var(--mono); font-size: .58rem; letter-spacing: .16em;
  color: rgba(245,240,234,.35); text-transform: uppercase; margin-bottom: .35rem;
}
.mc-col-val { font-family: var(--mono); font-size: 1.05rem; color: var(--cream); }
.mc-col-val.accent  { color: var(--peach); }
.mc-col-val.warn    { color: var(--warn); }
.mc-col-val.danger  { color: var(--danger); }
.mc-col-val.green   { color: var(--green); }

/* ── STATS ── */
.stats-row {
  display: grid; grid-template-columns: repeat(4, 1fr);
  border-bottom: 1px solid var(--line-on-navy); margin-bottom: 1.8rem;
}
.stat-item { padding: 1rem 0; text-align: center; border-right: 1px solid var(--line-on-navy); }
.stat-item:last-child { border-right: none; }
.stat-num { font-family: var(--mono); font-size: 2rem; font-weight: 500; color: var(--peach); display: block; line-height: 1; }
.stat-label { display: block; margin-top: .4rem; font-size: .72rem; letter-spacing: .1em; color: rgba(245,240,234,.4); }

/* ── PROGRESS BARS ── */
.law-row { display: flex; align-items: center; gap: 1rem; margin-bottom: .8rem; }
.law-name { font-size: .78rem; color: rgba(245,240,234,.45); min-width: 130px; flex-shrink: 0; letter-spacing: .02em; }
.bar-wrap { flex: 1; background: rgba(245,240,234,.06); height: 4px; }
.bar-fill { height: 100%; background: var(--peach); transition: width .7s ease; }
.bar-count { font-family: var(--mono); font-size: .68rem; color: rgba(245,240,234,.4); min-width: 40px; text-align: right; }

/* ── BOOKMARKS ── */
.bm-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--line-on-navy); }
.bm-item {
  background: var(--navy-3); padding: .9rem 1rem;
  display: flex; justify-content: space-between; align-items: center;
  transition: background .2s, border-left-color .2s;
  border-left: 2px solid transparent; cursor: pointer;
}
.bm-item:hover { background: #1a3347; border-left-color: var(--peach); }
.bm-art  { font-family: var(--mono); font-size: .8rem; color: var(--peach); }
.bm-law  { font-size: .72rem; color: rgba(245,240,234,.4); margin-top: .15rem; }
.bm-date { font-family: var(--mono); font-size: .65rem; color: rgba(245,240,234,.3); }

/* ── TOOLS ── */
.tools-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--line-on-navy); }
.tool-item {
  background: var(--navy-3); padding: 1.4rem 1rem;
  text-align: center; text-decoration: none;
  transition: background .2s; display: block;
}
.tool-item:hover { background: #1a3347; }
.tool-icon  { font-family: var(--mono); font-size: .72rem; letter-spacing: .18em; color: var(--peach); display: block; margin-bottom: .4rem; }
.tool-label { font-size: .76rem; color: rgba(245,240,234,.45); letter-spacing: .04em; display: block; }
.tool-soon  { font-family: var(--mono); font-size: .58rem; letter-spacing: .12em; color: rgba(245,240,234,.3); display: inline-block; margin-top: .35rem; border: 1px solid var(--line-on-navy); padding: .1rem .4rem; }

/* ── HISTORY ── */
.hist-list { display: flex; flex-direction: column; gap: 1px; background: var(--line-on-navy); }
.hist-item {
  background: var(--navy-3); padding: .85rem 1rem;
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; border-left: 2px solid transparent;
  transition: background .2s, border-left-color .2s;
}
.hist-item:hover { background: #1a3347; border-left-color: var(--peach-3); }
.hist-main { font-size: .84rem; color: var(--cream); }
.hist-time { font-family: var(--mono); font-size: .68rem; color: rgba(245,240,234,.35); flex-shrink: 0; margin-left: 1rem; }

/* ── EMPTY / LOADING ── */
.empty   { font-size: .82rem; color: rgba(245,240,234,.35); padding: 1.5rem 0; }
.loading { font-family: var(--mono); font-size: .75rem; color: rgba(245,240,234,.3); padding: 1.2rem 0; letter-spacing: .1em; }

/* ── DRAWER OVERLAY ── */
.drawer-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.6); backdrop-filter: blur(3px);
  opacity: 0; pointer-events: none;
  transition: opacity .3s ease;
}
.drawer-overlay.open { opacity: 1; pointer-events: all; }

/* ── DRAWER PANEL ── */
.drawer {
  position: fixed; top: 0; right: 0; bottom: 0; z-index: 201;
  width: min(540px, 94vw);
  background: var(--navy-2);
  border-left: 1px solid rgba(231,187,167,0.18);
  transform: translateX(100%);
  transition: transform .35s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column; overflow: hidden;
}
.drawer.open { transform: translateX(0); }

.drawer-header {
  padding: 1.3rem 1.6rem 1.1rem;
  border-bottom: 1px solid var(--line-on-navy);
  display: flex; align-items: flex-start; justify-content: space-between;
  flex-shrink: 0;
}
.drawer-law  { font-family: var(--mono); font-size: .64rem; letter-spacing: .1em; color: rgba(245,240,234,.4); margin-bottom: .3rem; }
.drawer-art  { font-family: var(--serif); font-size: 1.05rem; color: var(--cream); line-height: 1.4; }
.drawer-close {
  background: rgba(245,240,234,.06); border: 1px solid var(--line-on-navy);
  color: rgba(245,240,234,.4); cursor: pointer;
  font-size: 1rem; width: 2rem; height: 2rem;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s, color .2s; flex-shrink: 0; margin-left: 1.2rem;
}
.drawer-close:hover { background: rgba(245,240,234,.12); color: var(--cream); }

.drawer-body {
  flex: 1; overflow-y: auto; padding: 1.4rem 1.6rem;
}
.drawer-body::-webkit-scrollbar { width: 4px; }
.drawer-body::-webkit-scrollbar-thumb { background: rgba(231,187,167,.15); border-radius: 2px; }

/* ── DRAWER SPINNER ── */
.drawer-spinner {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 1rem; padding: 3rem 0;
}
.drawer-spinner::before {
  content: '';
  width: 28px; height: 28px;
  border: 2px solid rgba(231,187,167,.15);
  border-top-color: var(--peach);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
.drawer-spinner-text {
  font-family: var(--mono); font-size: .7rem;
  color: rgba(245,240,234,.35); letter-spacing: .1em;
}
@keyframes spin { to { transform: rotate(360deg); } }

.art-callout {
  background: rgba(231,187,167,.06);
  border-left: 3px solid var(--peach);
  padding: 1rem 1.2rem; margin-bottom: 1.4rem;
  font-family: var(--serif); font-size: .88rem;
  line-height: 1.85; color: var(--cream);
}
.art-section { border-bottom: 1px solid var(--line-on-navy); }
.art-section summary {
  padding: .85rem 0;
  font-family: var(--mono); font-size: .7rem;
  letter-spacing: .07em; color: rgba(245,240,234,.4);
  cursor: pointer; list-style: none;
  display: flex; align-items: center; gap: .55rem;
  transition: color .2s; user-select: none;
}
.art-section summary::-webkit-details-marker { display: none; }
.art-section summary::before {
  content: '▶'; font-size: .52rem;
  transition: transform .2s; flex-shrink: 0;
}
.art-section[open] summary::before { transform: rotate(90deg); }
.art-section summary:hover  { color: var(--cream); }
.art-section[open] summary  { color: var(--peach); }
.art-section-body { padding: .4rem 0 1rem .4rem; }
.art-line { font-size: .8rem; color: var(--cream); line-height: 1.75; padding: .08rem 0; }
.art-line.d1 { padding-left: 1.1rem; color: rgba(245,240,234,.55); font-size: .78rem; }
.art-line.d2 { padding-left: 2.2rem; color: rgba(245,240,234,.45); font-size: .76rem; }
.art-locked { border-bottom: 1px solid var(--line-on-navy); padding: .85rem 0; display: flex; align-items: center; gap: .6rem; }
.art-locked-label { font-family: var(--mono); font-size: .7rem; letter-spacing: .07em; color: rgba(245,240,234,.25); }
.art-locked-icon { font-size: .8rem; opacity: .4; }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  nav { padding: 1rem 1.2rem; }
  .container { padding: 0 1rem; }
  .bm-grid, .tools-grid { grid-template-columns: repeat(2, 1fr); }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .stats-row .stat-item:nth-child(2) { border-right: none; }
  .law-name { min-width: 90px; font-size: .7rem; }
  .mc-bottom { gap: 1.8rem; }
}
</style>

<script>
const API = 'https://sofa-engine-api.onrender.com';
let _drawerOpen = false;
let _userPlan = '免費';

/* ── 工具 ── */
function getUID() { return localStorage.getItem('sofa_uid') || ''; }

function apiFetch(path) {
  const uid = getUID();
  const ctrl = new AbortController();
  setTimeout(() => ctrl.abort(), 15000);
  return fetch(`${API}${path}`, {
    headers: { 'X-Sofa-UID': uid },
    signal: ctrl.signal,
  }).then(r => {
    if (r.ok) return r.json();
    return r.json().catch(() => ({})).then(body => Promise.reject({ status: r.status, detail: body.detail || '' }));
  });
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function animateCount(el, target, duration=900) {
  const pref = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (pref || isNaN(target)) { el.textContent = target; return; }
  const t0 = performance.now();
  function tick(now) {
    const p = Math.min((now-t0)/duration, 1);
    const ease = 1-Math.pow(1-p, 3);
    el.textContent = Math.round(target*ease);
    if (p < 1) requestAnimationFrame(tick); else el.textContent = target;
  }
  requestAnimationFrame(tick);
}

/* ── Streak 計算 ── */
function calcStreak(history) {
  if (!history || !history.length) return 0;
  const dates = new Set(history.map(h => (h.queried_at||'').slice(0,10)).filter(Boolean));
  const now = new Date();
  const taipeiMs = now.getTime() + (8*60 + now.getTimezoneOffset()) * 60000;
  const taipeiNow = new Date(taipeiMs);
  const fmt = d => {
    const y = d.getUTCFullYear();
    const m = String(d.getUTCMonth()+1).padStart(2,'0');
    const day = String(d.getUTCDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  };
  let check = fmt(taipeiNow);
  if (!dates.has(check)) {
    const prev = new Date(taipeiMs - 86400000);
    check = fmt(prev);
    if (!dates.has(check)) return 0;
  }
  let streak = 0;
  while (dates.has(check)) {
    streak++;
    const d = new Date(check + 'T12:00:00Z');
    d.setUTCDate(d.getUTCDate() - 1);
    check = fmt(d);
  }
  return streak;
}

/* ── Member Card ── */
function planLabel(plan) {
  if (plan === 'monthly'  || plan === '月費') return '月訂閱';
  if (plan === 'lifetime' || plan === '買斷') return '買斷終身';
  if (plan === '季費') return '季訂閱';
  return plan || '—';
}
function maskSerial(s) {
  if (!s) return '—';
  const parts = s.split('-');
  if (parts.length >= 3) { parts[1] = '****'; return parts.join('-'); }
  return s.slice(0,5) + '****' + s.slice(-4);
}
function daysUntil(dateStr) {
  if (!dateStr || dateStr.startsWith('2099')) return null;
  const target = new Date(dateStr + 'T00:00:00+08:00');
  return Math.ceil((target - new Date()) / 86400000);
}

function renderMemberCard(data, streak) {
  const plan      = planLabel(data.plan);
  const serial    = maskSerial(data.serial);
  const isLife    = data.plan === 'lifetime' || data.plan === '買斷' || (data.expire||'').startsWith('2099');
  const days      = daysUntil(data.expire);

  let expireHtml, daysHtml = '';
  if (isLife) {
    expireHtml = `<div class="mc-col-val accent">永久有效</div>`;
  } else if (days === null) {
    expireHtml = `<div class="mc-col-val">—</div>`;
  } else {
    const cls = days < 0 ? 'danger' : days <= 14 ? 'warn' : '';
    expireHtml = `<div class="mc-col-val ${cls}">${(data.expire||'').slice(0,10)}</div>`;
    const dcls = days < 0 ? 'danger' : days <= 14 ? 'warn' : '';
    daysHtml = `
      <div>
        <div class="mc-col-label">剩餘天數</div>
        <div class="mc-col-val ${dcls}">${Math.max(days,0)}</div>
      </div>`;
  }

  const streakCls = streak >= 7 ? 'accent' : streak >= 3 ? 'green' : '';
  document.getElementById('member-card').innerHTML = `
    <div class="mc-top">
      <span class="mc-plan-badge">${escHtml(plan)}</span>
      <span class="mc-status">● ACTIVE</span>
    </div>
    <div class="mc-serial">${escHtml(serial)}</div>
    <div class="mc-bottom">
      <div>
        <div class="mc-col-label">到期日</div>
        ${expireHtml}
      </div>
      ${daysHtml}
      <div>
        <div class="mc-col-label">連續學習</div>
        <div class="mc-col-val ${streakCls}">${streak} 天</div>
      </div>
    </div>
  `;
}

/* ── 進度 ── */
function renderProgress(data) {
  animateCount(document.getElementById('stat-arts'), data.total_articles);
  animateCount(document.getElementById('stat-laws'), data.total_laws);
  document.getElementById('nav-user').textContent = `${data.total_articles} 條已查`;
  const laws = data.by_law || [];
  if (!laws.length) {
    document.getElementById('progress-list').innerHTML = '<div class="empty">還沒有查詢紀錄，從 LINE 開始查第一條吧。</div>';
    return;
  }
  const max = laws[0].count;
  document.getElementById('progress-list').innerHTML = laws.slice(0,12).map(l => `
    <div class="law-row">
      <div class="law-name">${escHtml(l.law)}</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(l.count/max*100)}%"></div></div>
      <div class="bar-count">${l.count}</div>
    </div>
  `).join('');
}

function renderProgressError(reason) {
  const msg = reason?.detail || (reason?.status ? `錯誤 ${reason.status}` : '連線逾時');
  document.getElementById('stat-arts').textContent = '—';
  document.getElementById('stat-laws').textContent = '—';
  document.getElementById('progress-list').innerHTML = `<div class="empty">資料載入失敗：${escHtml(msg)}</div>`;
}

/* ── 收藏 ── */
function renderBookmarks(data) {
  animateCount(document.getElementById('stat-bm'), data.total || 0);
  const el = document.getElementById('bookmark-wrap');
  if (!data.bookmarks || !data.bookmarks.length) {
    el.innerHTML = '<div class="card"><div class="empty">還沒有收藏。查詢法條後點「⭐ 收藏」加入清單。</div></div>';
    return;
  }
  const items = data.bookmarks.slice(0,16).map(b => `
    <div class="bm-item"
      data-page-id="${escHtml(b.page_id||'')}"
      data-law="${escHtml(b.law_name||'')}"
      data-art="${escHtml(b.article||'')}"
      onclick="itemClick(this)">
      <div>
        <div class="bm-art">§${escHtml(b.article)}</div>
        <div class="bm-law">${escHtml(b.law_name)}</div>
      </div>
      <div class="bm-date">${(b.bookmarked_at||'').slice(5,10)}</div>
    </div>
  `).join('');
  el.innerHTML = `<div class="bm-grid">${items}</div>`;
  if (data.total > 16)
    el.innerHTML += `<div style="margin-top:.8rem;font-family:var(--mono);font-size:.68rem;color:rgba(245,240,234,.35);letter-spacing:.08em">共 ${data.total} 條 · LINE 傳「複習收藏」一次推播全部</div>`;
}

/* ── 最近查詢 ── */
function renderHistory(data) {
  const el = document.getElementById('history-wrap');
  if (!data.history || !data.history.length) {
    el.innerHTML = '<div class="card"><div class="empty">還沒有查詢紀錄。</div></div>';
    return;
  }
  const items = data.history.map(h => `
    <div class="hist-item"
      data-page-id="${escHtml(h.page_id||'')}"
      data-law="${escHtml(h.law_name||'')}"
      data-art="${escHtml(h.article||'')}"
      onclick="itemClick(this)">
      <div class="hist-main">${escHtml(h.law_name)} §${escHtml(h.article)}</div>
      <div class="hist-time">${(h.queried_at||'').slice(5)}</div>
    </div>
  `).join('');
  el.innerHTML = `<div class="hist-list">${items}</div>`;
}

function itemClick(el) {
  const pid = el.dataset.pageId;
  const law = el.dataset.law;
  const art = el.dataset.art;
  if (pid) openDrawer(pid, law, art);
}

/* ── Drawer ── */
function openDrawer(pageId, law, art) {
  document.getElementById('drawer-law').textContent = law;
  document.getElementById('drawer-art').textContent = `§${art}`;
  document.getElementById('drawer-content').innerHTML = '<div class="drawer-spinner"><div class="drawer-spinner-text">LOADING</div></div>';
  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  document.body.style.overflow = 'hidden';
  _drawerOpen = true;

  apiFetch(`/api/article/${encodeURIComponent(pageId)}`)
    .then(renderArticle)
    .catch(() => {
      document.getElementById('drawer-content').innerHTML = '<div class="empty">載入失敗，請稍後再試。</div>';
    });
}

function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  document.body.style.overflow = '';
  _drawerOpen = false;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && _drawerOpen) closeDrawer();
});

const SECTION_ORDER = [
  '章節標題與戰略權重',
  '規範意旨與條文解析',
  '執業要點與考情提示',
  '核心摘要與記憶策略',
  '修法與聯覺備註',
  '2026 修法與聯覺備註',
  '相關法規及注意事項',
];

function formatContent(text) {
  return text.split('\n').filter(l => l.trim()).map(l => {
    const spaces = (l.match(/^(\s*)/) || ['',''])[1].length;
    const depth  = Math.min(Math.floor(spaces / 2), 2);
    const cls    = depth > 0 ? ` d${depth}` : '';
    return `<div class="art-line${cls}">${escHtml(l.trim())}</div>`;
  }).join('');
}

function renderArticle(data) {
  let html = '';
  if (data.original_text)
    html += `<div class="art-callout">${escHtml(data.original_text)}</div>`;

  const sections = data.sections || {};
  const TRIAL_END_ART = new Date('2026-06-01T00:00:00+08:00');
  const isPaid = new Date() < TRIAL_END_ART ||
    _userPlan === '月費' || _userPlan === '月訂' || _userPlan === '季費' || _userPlan === '買斷' || _userPlan === 'monthly' || _userPlan === 'lifetime';
  SECTION_ORDER.forEach((key, i) => {
    const body = sections[key];
    if (!body) return;
    const label = `${i+1}．${key}`;
    if (i >= 4 && !isPaid) {
      html += `<div class="art-locked"><span class="art-locked-label">${escHtml(label)}</span><span class="art-locked-icon">🔒</span></div>`;
      return;
    }
    html += `
      <details class="art-section">
        <summary>${escHtml(label)}</summary>
        <div class="art-section-body">${formatContent(body)}</div>
      </details>`;
  });

  if (!html) html = '<div class="empty">此條文暫無詳細資料。</div>';
  document.getElementById('drawer-content').innerHTML = html;
}

/* ── 登出 ── */
async function doLogout() {
  localStorage.removeItem('sofa_uid');
  window.location.href = '/login.html';
}

/* ── 初始化 ── */
async function init() {
  if (!getUID()) { window.location.href = '/login.html'; return; }

  const [prof, prog, bm, hist] = await Promise.allSettled([
    apiFetch('/api/me/profile'),
    apiFetch('/api/me/progress'),
    apiFetch('/api/me/bookmarks'),
    apiFetch('/api/me/history?limit=60'),
  ]);

  const all401 = [prog, bm, hist].every(r => r.status === 'rejected' && r.reason?.status === 401);
  if (all401) { window.location.href = '/login.html'; return; }

  const histData = hist.status === 'fulfilled' ? hist.value : null;
  const streak = histData ? calcStreak(histData.history) : 0;
  animateCount(document.getElementById('stat-streak'), streak);

  if (prof.status === 'fulfilled') {
    _userPlan = prof.value.plan || '免費';
    renderMemberCard(prof.value, streak);
  } else
    document.getElementById('member-card').innerHTML =
      '<div class="empty" style="padding:1rem 0">會員資料載入失敗。</div>';

  const TRIAL_END = new Date('2026-06-01T00:00:00+08:00');
  const isPaidUser = new Date() < TRIAL_END ||
    _userPlan === '月費' || _userPlan === '月訂' || _userPlan === '季費' || _userPlan === '買斷' || _userPlan === 'monthly' || _userPlan === 'lifetime';
  const LOCK_HTML = '<div class="card" style="display:flex;align-items:center;gap:.5rem;padding:1.2rem 1.4rem;color:rgba(245,240,234,.25);font-family:var(--mono);font-size:.7rem;letter-spacing:.06em">🔒 <span>付費功能</span></div>';

  if (isPaidUser) {
    if (prog.status === 'fulfilled') renderProgress(prog.value);
    else renderProgressError(prog.reason);
  } else {
    document.getElementById('progress-list').innerHTML = '';
    document.querySelector('.stats-row').innerHTML = LOCK_HTML.replace('class="card"','').replace('style="','style="margin:0;');
    document.querySelector('.stats-row').style = 'padding:0';
    document.getElementById('progress-list').innerHTML = '';
  }

  if (isPaidUser) {
    if (bm.status === 'fulfilled') renderBookmarks(bm.value);
    else document.getElementById('bookmark-wrap').innerHTML =
      '<div class="card"><div class="empty">資料載入失敗，請重新整理。</div></div>';
  } else {
    document.getElementById('bookmark-wrap').innerHTML = LOCK_HTML;
  }

  if (isPaidUser) {
    if (hist.status === 'fulfilled') renderHistory(hist.value);
    else document.getElementById('history-wrap').innerHTML =
      '<div class="card"><div class="empty">資料載入失敗，請重新整理。</div></div>';
  } else {
    document.getElementById('history-wrap').innerHTML = LOCK_HTML;
  }
}

init().then(() => {
  const params = new URLSearchParams(location.search);
  const openId  = params.get('open');
  const lawName = params.get('law') || '';
  const artNo   = params.get('art') || '';
  if (openId) openDrawer(openId, lawName, artNo);
});
</script>
